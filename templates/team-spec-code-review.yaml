# Team spec — Code Review lane (Phase 2)
# SSOT: ADR-035 (Phase-scoped agent teams + worktree)
# Spec ref: <internal-docs>/wrapper/specs/2026-05-08-cfp-134-codeforge-agent-teams-epic-design.md §3.1, §3.5
# Note: ADR-022 deprecate 후 (CFP-135) PL = decider 책임자. Sonnet decider 미사용.
team_name: TEAM-CODE-REVIEW
phase: phase:구현-리뷰
lifecycle: phase-scoped (TeamCreate at lane entry, TeamDelete at lane exit)
worktree: ${HOME}/.claude/worktrees/<repo>/cfp-NNN/code-review
lead: Orchestrator
teammates:
  - role: code-review-pl
    plugin: codeforge-review
    agent_file: agents/CodeReviewPLAgent.md
    model: claude-opus-4-7
    worktree_sub: code-review/pl
    sendmessage_peers:
      - claude-worker
      - codex-worker
    responsibilities:
      - Worker findings dedup + severity 종합
      - PL final pl_recommendation (PASS / FIX / FIX_DISCRETIONARY)
      - Story §9 owner write (review-verdict-v4 packet)
      - Lane FIX max 3 enforcement
      - 코드 ↔ Change Plan drift 검출
  - role: claude-worker
    plugin: codeforge-review
    agent_file: agents/ClaudeReviewAgent.md
    model: claude-sonnet-4-6
    worktree_sub: code-review/claude
    sendmessage_peers:
      - code-review-pl
      - codex-worker
    responsibilities:
      - 코드 스타일 / 네이밍 / 가독성
      - 테스트 코드 품질 (커버리지 / 경계 / mock 경계)
      - 런타임 오류 가능성 (null / 타입 / race 일반)
      - Adversarial debate 시 Codex 와 cross-check
  - role: codex-worker
    plugin: codeforge-review
    agent_file: agents/CodexReviewAgent.md
    model: codex-gpt-5-5-high
    worktree_sub: code-review/codex
    sendmessage_peers:
      - code-review-pl
      - claude-worker
    responsibilities:
      - 레이어 경계 / 의존성 방향 위반 검출
      - Impl Manifest §8.5 ↔ 실제 파일 일치
      - P1 boundary issue (multi-file pattern drift)
      - Adversarial debate 시 Claude 와 disagree-and-justify
sendmessage_protocol:
  rounds: 2-4
  patterns:
    - Adversarial-Debate
    - Cross-layer
output_contract: review-verdict-v4
