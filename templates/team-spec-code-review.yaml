# Team spec — 구현 리뷰 lane

  # ADR-109 §결정 4 + ADR-044 Amendment 2 신설 (429 incident throttle policy)
  parallel_spawn_cap: 7       # Default: low intensity (0 incident/30min) — Phase 0 brainstorm 7-agent baseline
  spawn_stagger_ms: 0         # Default: no stagger (low intensity)
  cascade_circuit_breaker: false  # Default: disabled, opt-in (429 cascade depth ≥ 2 detection)
# CFP-137 / ADR-044 §결정 2 SSOT (dispatch_mode SSOT — design-review 와 동일 패턴)
# Trigger: DeveloperPL ready 후 Orchestrator 가 CodeReviewPL spawn
# Activation: CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 (env=0 시 fallback to ADR-039 default subagent context)

lane: code-review
description: |
  구현 리뷰 lane — CodeReviewPL (lead) + 1~2 worker (Claude default + Codex on user_request).
  Default roster = 2 teammate (PL + Claude worker). Codex worker 는 사용자 explicit request 시 추가 → 3 teammate.
  Adversarial debate: Claude vs Codex SendMessage rounds (사용자 활성 시).
  PL final pl_recommendation = review-verdict v4 packet.

teammates:
  - name: CodeReviewPLAgent
    role: PL
    system_prompt_path: agents/CodeReviewPLAgent.md  # codeforge-review plugin canonical
    model: claude-opus-4-7
    spawn_mode: default
    dispatch_mode: default

  - name: ClaudeReviewAgent
    role: worker
    system_prompt_path: agents/ClaudeReviewAgent.md
    model: claude-opus-4-7
    spawn_mode: default
    dispatch_mode: default

  - name: CodexReviewAgent
    role: worker
    system_prompt_path: agents/CodexReviewAgent.md
    model: gpt-5-codex
    spawn_mode: conditional
    activation_condition: user_explicit_request
    dispatch_mode: user_request_only

dispatch_pattern: adversarial
worktree_layout:
  per_teammate: false
  base_worktree: cfp-NNN/code-review

hook_subscriptions:
  - TeammateIdle
  - TaskCreated
  - TaskCompleted

measurable_verification:
  adversarial: "review-verdict v4 packet의 worker_dialog_rounds >= 2 (Codex worker 활성 시) — ADR-044 §결정 5"

env_divergent_fallback:
  env_0_behavior: "design-review 와 동일 — CodeReviewPL 1개 spawn → Claude worker 호출 → return → Orchestrator 재 spawn 으로 Codex worker (사용자 요청 시). worker_dialog_rounds = 0."
