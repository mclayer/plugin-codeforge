# Team spec — Security Test lane (Phase 2)
# SSOT: ADR-035 (Phase-scoped agent teams + worktree)
# Spec ref: <internal-docs>/wrapper/specs/2026-05-08-cfp-134-codeforge-agent-teams-epic-design.md §3.1, §3.5
# Note: ADR-022 deprecate 후 (CFP-135) PL = decider 책임자. Sonnet decider 미사용.
#       2-layer = (1) GitHub native (Dependabot/CodeQL/Secret Scanning) (2) Claude+Codex packet.
#       본 team 은 layer 2 (Claude+Codex) 영역. Layer 1 = GitHub Actions, 별도 team 무.
team_name: TEAM-SECURITY-TEST
phase: phase:보안-테스트
lifecycle: phase-scoped (TeamCreate at lane entry, TeamDelete at lane exit)
worktree: ${HOME}/.claude/worktrees/<repo>/cfp-NNN/security-test
lead: Orchestrator
teammates:
  - role: security-test-pl
    plugin: codeforge-review
    agent_file: agents/SecurityTestPLAgent.md
    model: claude-opus-4-7
    worktree_sub: security-test/pl
    sendmessage_peers:
      - claude-worker
      - codex-worker
    responsibilities:
      - 2-layer 통합 verdict (GitHub native + worker packet)
      - PL final pl_recommendation (PASS / FIX)
      - Story §9 owner write (review-verdict-v4 packet)
      - gate:security-test-pass + gate:live-entry-pass (ADR-030) label
      - Lane FIX max ∞ (보안 차단 우선)
  - role: claude-worker
    plugin: codeforge-review
    agent_file: agents/ClaudeReviewAgent.md
    model: claude-sonnet-4-6
    worktree_sub: security-test/claude
    sendmessage_peers:
      - security-test-pl
      - codex-worker
    responsibilities:
      - Injection 공격 표면 (SQL / Command / Template / NoSQL)
      - Trust boundary 위반 (외부 입력 검증 누락)
      - Auth / 세션 결함 (CSRF / session fixation / JWT 무결성)
      - 민감 데이터 유출 (PII / 금융 / 헬스 데이터 log·response)
      - Adversarial debate 시 Codex 와 cross-check
  - role: codex-worker
    plugin: codeforge-review
    agent_file: agents/CodexReviewAgent.md
    model: codex-gpt-5-5-high
    worktree_sub: security-test/codex
    sendmessage_peers:
      - security-test-pl
      - claude-worker
    responsibilities:
      - 암호학 오용 (weak algo / nonce reuse / ECB / hardcoded key)
      - Race / TOCTOU 보안 취약
      - 설정 / 배포 보안 (default credential / open port / TLS)
      - Container CVE / misconfig audit (CFP-128 ADR-033)
      - Adversarial debate 시 Claude 와 disagree-and-justify
sendmessage_protocol:
  rounds: 2-5
  patterns:
    - Adversarial-Debate
    - Cross-layer
output_contract: review-verdict-v4
