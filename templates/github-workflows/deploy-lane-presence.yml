name: deploy-lane-presence

# CFP-1808 — Phase 2 wire activation (ADR-087 Amendment 2 §B)
# 본 workflow = 본 repo `main` 보호 contexts 6번째 required check.
# Phase 2 PR (`phase:종합` 또는 `gate:design-review-pass` label) 에서 deploy lane evidence 의무 declarative gate.
# 실 deploy trigger 는 `auto-deploy.yml`; 본 workflow 는 presence gate only.
# ADR-088 §결정 1/2/3 (배포 리뷰 lane mandatory smoke / 성능 비교 / cutover 사후 검증) cross-ref.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  deploy-lane-presence:
    name: Verify deploy lane presence (Phase 2 wire — ADR-087 Amd 2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check phase + gate labels
        id: labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const isPhase2 = labels.some(l => l === 'phase:종합' || l === 'gate:design-review-pass');
            // Pre-Phase 2 영역 (요구사항 / 설계 / 설계리뷰 등) = SKIP (deploy lane 영역 외)
            if (!isPhase2) {
              core.info(`Phase 2 label missing — deploy-lane-presence not required (current labels: ${labels.join(',')})`);
              core.setOutput('required', 'false');
              return;
            }
            core.info('Phase 2 PR detected — deploy lane presence gate enforced');
            core.setOutput('required', 'true');

      - name: Deploy lane presence gate (Phase 2 only)
        if: steps.labels.outputs.required == 'true'
        run: |
          # Phase 2 PR — deploy lane evidence 의무
          # ADR-087 §결정 1 — Epic close → Deploy trigger
          # 본 workflow 는 declarative gate; 실 deploy trigger 는 auto-deploy.yml.
          echo "Phase 2 PR detected — deploy lane evidence 의무 (ADR-087 §결정 1)"
          # Wave 2 carrier 별 sub-CFP 확장 영역:
          # - Change Plan §13 deploy_required: bool
          # - Story §14 Deploy Lane Evidence row presence
          # - mechanical_enforcement_actions[] deploy-lane-presence entry
          echo "Phase 2 declarative gate PASS (Wave 2 evidence check = 별 sub-CFP carrier)"

      - name: Skip (pre-Phase 2 영역)
        if: steps.labels.outputs.required == 'false'
        run: |
          echo "deploy-lane-presence SKIP (pre-Phase 2 영역, label gate 미충족)"
