name: Atlassian tool drift check (warning mode)
# CFP-1256 / ADR-103 §결정 3 Option B mitigation — atlassian-tool-drift mechanical lint
# ADR-060 §결정 5 — warning-tier (continue-on-error, non-required check, PR merge 미차단)
# Bypass channel: hotfix-bypass:atlassian-tool-drift label (ADR-024 Amendment 3 §결정 6.A)
#
# 검사: docs/atlassian-tool-snapshot.txt ↔ .claude/settings.json permissions.deny 비교
#   - snapshot tool 중 deny 누락 = allow-by-omission drift warning
#   - snapshot placeholder 시 advisory (exit 0)
#
# 승격 path (warning → blocking-on-pr):
#   1. 본 workflow continue-on-error: true 제거
#   2. branch protection required_status_checks.contexts 에 본 job 추가
#   3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d) + evidence-checks-registry.yaml)
#   4. pattern_count >= 2 재발 시 follow-up CFP MUST promote (ADR-103 §결정 3)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'docs/atlassian-tool-snapshot.txt'
      - '.claude/settings.json'
  push:
    branches: [main]
    paths:
      - 'docs/atlassian-tool-snapshot.txt'
      - '.claude/settings.json'

permissions:
  pull-requests: write
  contents: read

jobs:
  atlassian-tool-drift:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — lint fail 이 PR merge 차단하지 않음
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Check bypass label
        id: bypass
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "labels=$labels"
          case ",$labels," in
            *,hotfix-bypass:atlassian-tool-drift,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run atlassian-tool-drift lint
        id: lint
        if: steps.bypass.outputs.bypass != 'true'
        run: |
          set +e
          bash scripts/check-atlassian-tool-drift.sh 2>&1 | tee /tmp/drift-lint.out
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit 0  # continue-on-error 정합 — fail 이어도 다음 step 진행

      - name: Post lint result comment (PR only)
        if: github.event_name == 'pull_request' && steps.bypass.outputs.bypass != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/drift-lint.out 2>/dev/null || echo '(lint output 부재)')"
          if [ "${LINT_STATUS:-1}" = "0" ]; then
            HEADER="## ✓ Atlassian tool drift check — PASS (warning mode)"
            FOOTER="allow-by-omission drift 없음. ADR-103 §결정 3 Option B mitigation 정합."
          else
            HEADER="## ⚠ Atlassian tool drift check — 경고 감지 (warning mode)"
            FOOTER=$'**warning mode (CFP-1256 / ADR-060 §결정 5)**: lint fail 이 PR merge 를 차단하지 않습니다.\n\nsnapshot tool 이 .claude/settings.json permissions.deny 에 누락 = allow-by-omission drift.\ndocs/atlassian-tool-snapshot.txt 갱신 또는 deny 열거 추가 후 재실행 필요.\n\n**hotfix bypass channel** (ADR-024 Amendment 3): 운영 장애 hotfix 시 `hotfix-bypass:atlassian-tool-drift` label 부착.'
          fi
          BODY=$(printf '%s\n\n```\n%s\n```\n\n%s\n\n%s' \
            "$HEADER" "$LINT_OUT" "$FOOTER" \
            "> ⓘ 본 workflow = **warning mode** (continue-on-error). PR merge 미차단. 승격 gate (ADR-060 §결정 6) 통과 후 blocking 전환.")
          gh pr comment "$PR_NUMBER" --body "$BODY"
