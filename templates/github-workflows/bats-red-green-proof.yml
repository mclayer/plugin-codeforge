# CFP-1334 Phase 2 carrier — bats fixture RED→GREEN proof presence lint
# (warning tier, ADR-060 framework, evidence-checks-registry entry SSOT).
#
# Scope: tests/**/*.bats fixture file 의 RED→GREEN proof artifact marker
# (5-marker grep-presence heuristic) ≥3/5 verify. <3/5 → advisory warning.
#
# Detail SSOT:
#   - scripts/lib/check_bats_red_green_proof.py (Python lint logic)
#   - scripts/check-bats-red-green-proof.sh (8-line thin wrapper, ADR-061 §결정 1 + Amendment 1 §결정 6.A)
#   - docs/evidence-checks-registry.yaml (entry: bats-red-green-proof-presence, current_tier: warning)
#   - docs/domain-knowledge/domain/test-discipline/red-green-stash-proof-pattern.md (narrative SSOT)
#
# Bypass: hotfix-bypass:bats-red-green-proof (per label-registry-v2 family + ADR-024 Amendment 3).

name: bats RED→GREEN proof presence (warning mode)

on:
  pull_request:
    paths:
      - 'tests/**/*.bats'
      - 'scripts/check-bats-red-green-proof.sh'
      - 'scripts/lib/check_bats_red_green_proof.py'
      - 'docs/evidence-checks-registry.yaml'
  workflow_dispatch:

permissions:
  pull-requests: read
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    continue-on-error: true   # warning tier (ADR-060 framework default for first-introduction)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: bypass label check (early exit on hotfix-bypass:bats-red-green-proof)
        id: bypass
        run: |
          if [ "${{ contains(github.event.pull_request.labels.*.name, 'hotfix-bypass:bats-red-green-proof') }}" = "true" ]; then
            echo "[bypass] hotfix-bypass:bats-red-green-proof label active — skip"
            echo "bypassed=true" >> "$GITHUB_OUTPUT"
          else
            echo "bypassed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run bats RED→GREEN proof presence check
        if: steps.bypass.outputs.bypassed != 'true'
        run: |
          if [ -n "${BYPASS_BATS_RED_GREEN_PROOF:-}" ]; then
            echo "[bypass] BYPASS_BATS_RED_GREEN_PROOF=${BYPASS_BATS_RED_GREEN_PROOF}"
            exit 0
          fi
          bash scripts/check-bats-red-green-proof.sh
