name: inter-plugin-contracts-parity
# CFP-894 / ADR-060 §결정 6 — MANIFEST↔frontmatter parity lint
# Tier: warning (continue-on-error, non-required check)
# Bypass channel: hotfix-bypass:inter-plugin-contracts-parity label (ADR-024 Amendment 3 + ADR-060 §결정 7)
#
# 승격 path (warning → blocking-on-pr):
#   1. 본 workflow 의 `continue-on-error: true` 제거
#   2. branch protection `required_status_checks.contexts` 에 본 workflow job name 추가
#   3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d) + evidence-checks-registry.yaml promotion_criteria)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'docs/inter-plugin-contracts/**'
      - 'scripts/check-inter-plugin-contracts-parity.sh'
      - 'scripts/lib/check_inter_plugin_contracts_parity.py'
      - 'templates/github-workflows/inter-plugin-contracts-parity.yml'
      - '.github/workflows/inter-plugin-contracts-parity.yml'

permissions:
  pull-requests: write
  contents: read

jobs:
  inter-plugin-contracts-parity:
    runs-on: ubuntu-latest
    continue-on-error: true  # warning tier (ADR-060 §결정 5)
    steps:
      - uses: actions/checkout@v4

      - name: Install pyyaml
        run: python3 -m pip install --user pyyaml

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          case ",$labels," in
            *,hotfix-bypass:inter-plugin-contracts-parity,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run parity lint
        id: lint
        if: steps.bypass.outputs.bypass == 'false'
        run: |
          set +e
          bash scripts/check-inter-plugin-contracts-parity.sh 2>&1 | tee /tmp/lint.out
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit 0  # continue-on-error 정합

      - name: Post lint result comment (sticky)
        if: steps.bypass.outputs.bypass == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/lint.out 2>/dev/null || echo '(lint output 부재)')"
          if [ "${LINT_STATUS:-1}" = "0" ]; then
            HEADER="## ✓ inter-plugin-contracts-parity — PASS (warning mode)"
            FOOTER="INV-1 parity OK. MANIFEST.yaml ↔ wrapper sibling frontmatter contract_version byte-identical."
          else
            HEADER="## ⚠ inter-plugin-contracts-parity — INV-1 drift 감지 (warning mode)"
            FOOTER=$'**warning mode (CFP-894 / ADR-060 §결정 5)**: lint fail 이 PR merge 를 차단하지 않습니다. INV-1 parity drift = MANIFEST row 의 contract_version ↔ wrapper sibling frontmatter contract_version 불일치 (CFP-42 backfill 류 silent drift 검출).\n\n**hotfix bypass channel** (ADR-024 Amendment 3): 운영 hotfix 시 `hotfix-bypass:inter-plugin-contracts-parity` label 부착 → lint skip + audit comment 자동 발의.'
          fi
          BODY=$(printf '%s\n\n```\n%s\n```\n\n%s\n\n%s' \
            "$HEADER" "$LINT_OUT" "$FOOTER" \
            "> ⓘ 본 workflow = **warning mode** (continue-on-error). PR merge 미차단. 승격 gate (ADR-060 §결정 6) 통과 후 blocking 전환.")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Emit bypass audit comment (label applied)
        if: steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' 섹션 부재 — 후속 보완 의무)"
          fi
          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:inter-plugin-contracts-parity")] | last | .actor.login' \
            2>/dev/null || echo "unknown")
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label_applied_by=${LABEL_USER} reason=${REASON} timestamp=${TS}"
          BODY=$(printf '%s\n\n%s' \
            "$AUDIT" \
            "> ⓘ ADR-024 Amendment 3 §결정 6.C — audit trail 3중 안전망 1차 (audit comment 자동 발의).")
          gh pr comment "$PR_NUMBER" --body "$BODY"
