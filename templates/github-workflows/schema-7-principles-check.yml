name: Schema 7 principles self-check (Phase 1 declarative seed)
# CFP-1059 Story-1 / ADR-089 §결정 1 — Schema 변경 7 원칙 mandatory invariant
# Tier: warning (continue-on-error, declaration-only Wave 1)
# Bypass channel: hotfix-bypass:bidirectional-smoke label (label-registry-v2.42)
#   note: 단일 bypass family — Schema 변경 영역 common umbrella (bidirectional-smoke 와 분담)
#
# Phase 1 declarative seed (S2/S3 wire pending):
#   - 실제 7 원칙 self-check 로직 (원칙 1-7 검증 + ADR-068 I-5 dimensional empirical grounding
#     hard limit annotation [empirical-source: ...]) = scripts/check-schema-7-principles.sh
#     (sibling carrier Story-7 mechanical wire 영역) 후 wire.
#   - 본 file = ADR-089 mechanical_enforcement_actions: [schema-change-7-principles-self-check]
#     declaration anchor.
#
# ADR-089 §결정 1 7 원칙 (mechanical anchor):
#   원칙 1 — backward-compatible 우선 (additive 우선, drop 후속)
#   원칙 2 — 단방향 변경 (한 PR 안 add+drop 동시 금지)
#   원칙 3 — compatibility window 유지 (bidirectional-smoke.yml 분담 영역)
#   원칙 4 — fail-loud (silent fallback / safe-default 차단)
#   원칙 5 — rollback path 명시 (downgrade 정책 사전 정의)
#   원칙 6 — empirical evidence (ADR-068 I-5 dimensional grounding)
#   원칙 7 — hard limit (column 100+ / row 1억+ / lock 5분+ / depth 7+)
#
# ADR-068 I-5 cross-ref:
#   - 7 원칙 중 원칙 6+7 = dimensional empirical grounding (latency / scale / cardinality /
#     throughput / cost / accuracy / lifecycle / volume / rate / count) annotation 의무
#
# 승격 path:
#   warning → blocking-on-pr 승격 시 CFP-NNN carrier PR 가 다음 변경 동반 의무:
#     1. 본 workflow 의 `continue-on-error: true` 제거
#     2. branch protection required_status_checks 에 본 workflow job name 추가
#     3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d))
#     4. 7 원칙 self-check 표 schema (Change Plan §13 row append) codify

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'migrations/**'
      - 'schema/**'
      - 'docs/change-plans/**'  # §11 데이터 마이그레이션 영역
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  schema-7-principles-declarative-seed:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — Phase 1 declarative seed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Phase 1 declarative seed placeholder
        run: |
          set -euo pipefail
          echo "=== Schema 7 principles self-check (Phase 1 declarative seed) ==="
          echo "ADR-089 §결정 1 mechanical_enforcement_actions anchor"
          echo "mechanical action: schema-change-7-principles-self-check (declaration-only Wave 1)"
          echo ""
          echo "Actual 7-principle verification (원칙 1-7 + ADR-068 I-5 dimensional annotation)"
          echo "  = scripts/check-schema-7-principles.sh (sibling carrier Story-7 mechanical wire 영역) 후 wire."
          echo ""
          echo "Phase 1 declarative seed — S2/S3 wire pending"
          exit 0
