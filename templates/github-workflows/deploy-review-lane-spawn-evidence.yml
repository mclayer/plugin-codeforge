name: Deploy Review lane spawn evidence (Phase 1 declarative seed)
# CFP-1059 Story-1 / ADR-088 mechanical_enforcement_actions — Deploy Review lane spawn 시 evidence lint
# Tier: warning (continue-on-error, declaration-only Wave 1)
# Bypass channel: hotfix-bypass:deploy-trigger label (label-registry-v2.42)
#   note: 본 spawn evidence 용 별도 namespace label = sibling/별 carrier 영역
#     (CFP-1059 batch 외 — deploy-trigger umbrella 안 잠정)
#
# Phase 1 declarative seed (S2/S3 wire pending):
#   - 실제 spawn evidence lint (Story §14 Lane Evidence row append + ProductionEvidenceDeputy
#     ownership 이관 영역 검증 + ADR-072 Amendment N production-cutover-evidence cross-ref)
#     = scripts/check-deploy-review-lane-spawn-evidence.sh (sibling carrier — codeforge-deploy-review
#     plugin seed Story-N) 후 wire.
#   - 본 file = ADR-088 mechanical_enforcement_actions: [deploy-review-lane-spawn-evidence]
#     declaration anchor.
#
# ADR-088 spawn evidence binding:
#   - Deploy Review lane spawn 시 Story §14 Lane Evidence row append 의무
#   - ProductionEvidenceDeputy ownership 이관 (codeforge-design → codeforge-deploy-review)
#     영역 cross-validation (ADR-072 Amendment N + ADR-014 sibling)
#   - cascade trigger chain anchor: Epic close → auto-deploy.yml → DeployAgent → 배포 lane
#     → 배포 리뷰 lane (본 evidence anchor) → ProductionEvidenceDeputy
#
# 승격 path:
#   warning → blocking-on-pr 승격 시 CFP-NNN carrier PR 가 다음 변경 동반 의무:
#     1. 본 workflow 의 `continue-on-error: true` 제거
#     2. branch protection required_status_checks 에 본 workflow job name 추가
#     3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d))
#     4. codeforge-deploy-review plugin seed + ProductionEvidenceDeputy ownership 이관 merge 선행

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'docs/stories/**'  # Story §14 Lane Evidence row append 검증 영역
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-review-lane-spawn-evidence-declarative-seed:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — Phase 1 declarative seed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Phase 1 declarative seed placeholder
        run: |
          set -euo pipefail
          echo "=== Deploy Review lane spawn evidence (Phase 1 declarative seed) ==="
          echo "ADR-088 mechanical_enforcement_actions anchor"
          echo "mechanical action: deploy-review-lane-spawn-evidence (declaration-only Wave 1)"
          echo ""
          echo "Actual spawn evidence lint (§14 Lane Evidence row append + ProductionEvidenceDeputy"
          echo "  ownership 이관 cross-validate + ADR-072 cross-ref) ="
          echo "  scripts/check-deploy-review-lane-spawn-evidence.sh (sibling carrier —"
          echo "  codeforge-deploy-review plugin seed Story-N) 후 wire."
          echo ""
          echo "Phase 1 declarative seed — S2/S3 wire pending"
          exit 0
