name: dialog-declare-schema

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true  # warning tier (ADR-060 §결정 5 default — 첫 도입 = warning mode)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run dialog declare schema lint
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          bash scripts/check-dialog-declare-schema.sh ${{ github.event.pull_request.number }}
