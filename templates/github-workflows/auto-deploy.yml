name: Auto-deploy trigger
# CFP-1059-S6 / ADR-087 §결정 1 + ADR-026 Amendment 6 — Epic close -> Deploy lane trigger
# Tier: warning (continue-on-error, ADR-060 §결정 5)
# Bypass channel: hotfix-bypass:deploy-trigger label (label-registry-v2.42)
#
# S6 actual job body (declarative seed -> actual wire):
#   Epic close detection (workflow_run chain from post-merge-followup.yml)
#   + project.yaml deploy.* config 적용
#   + DeployAgent spawn signal (codeforge-deploy plugin)
#
# Cascade chain (ADR-088 §결정 1):
#   Epic close -> auto-deploy.yml (본 file) -> DeployAgent spawn -> 배포 lane -> 배포 리뷰 lane -> ProductionEvidenceDeputy
#
# §7.5 secret: DOCKER_HUB_TOKEN / SSH_KEY_PATH = env var only (::add-mask:: 적용)
#
# 승격 path (warning -> blocking-on-pr):
#   별 CFP carrier PR 필요 (ADR-060 §결정 6 evidence gate 3 산출물 + codeforge-deploy seed merge 선행)

on:
  workflow_run:
    workflows: ["Post-merge followup"]
    types: [completed]
  workflow_dispatch:
    inputs:
      epic_key:
        description: 'Epic Issue KEY (e.g. CFP-1059) — manual trigger'
        required: false
        type: string
      force_deploy:
        description: '강제 배포 (Epic close 미검출 시 override)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  auto-deploy:
    runs-on: ubuntu-latest
    # warning tier (ADR-060 §결정 5) — actual job body with continue-on-error
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mask secrets
        run: |
          # §7.5 secret masking — log leak 방지
          if [[ -n "${DOCKER_HUB_TOKEN:-}" ]]; then
            echo "::add-mask::${DOCKER_HUB_TOKEN}"
          fi
          if [[ -n "${SSH_KEY_PASSPHRASE:-}" ]]; then
            echo "::add-mask::${SSH_KEY_PASSPHRASE}"
          fi
        env:
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
          SSH_KEY_PASSPHRASE: ${{ secrets.SSH_KEY_PASSPHRASE }}

      - name: Detect Epic close trigger
        id: epic-detect
        run: |
          set -euo pipefail
          echo "=== Auto-deploy: Epic close detection ==="

          EPIC_KEY="${{ github.event.inputs.epic_key }}"
          FORCE_DEPLOY="${{ github.event.inputs.force_deploy }}"
          WORKFLOW_CONCLUSION="${{ github.event.workflow_run.conclusion }}"

          # workflow_run 이벤트: post-merge-followup 완료 확인
          if [[ -n "${WORKFLOW_CONCLUSION}" ]]; then
            if [[ "${WORKFLOW_CONCLUSION}" != "success" ]]; then
              echo "::warning::post-merge-followup 미완료 (${WORKFLOW_CONCLUSION}) — deploy skip"
              echo "deploy_trigger=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            echo "::notice::post-merge-followup success — Epic close 감지 시도"
          fi

          # project.yaml deploy.* config 읽기 (consumer overlay 주입)
          PROJECT_YAML=".claude/_overlay/project.yaml"
          if [[ -f "${PROJECT_YAML}" ]]; then
            echo "::notice::project.yaml 발견: ${PROJECT_YAML}"
            # deploy.enabled, deploy.retention_hours, deploy.ssh_targets 등
            DEPLOY_ENABLED=$(python3 -c "
          import yaml, sys
          with open('${PROJECT_YAML}') as f:
              cfg = yaml.safe_load(f)
          print(cfg.get('deploy', {}).get('enabled', False))
          " 2>/dev/null || echo "false")
            echo "deploy_enabled=${DEPLOY_ENABLED}" >> "${GITHUB_OUTPUT}"
          else
            echo "::warning::project.yaml 미존재 — consumer overlay 필요"
            echo "deploy_enabled=false" >> "${GITHUB_OUTPUT}"
          fi

          echo "epic_key=${EPIC_KEY}" >> "${GITHUB_OUTPUT}"
          echo "deploy_trigger=true" >> "${GITHUB_OUTPUT}"

      - name: Deploy signal (auto-version-bump + DeployAgent spawn)
        if: steps.epic-detect.outputs.deploy_trigger == 'true'
        run: |
          set -euo pipefail
          echo "=== Auto-deploy: version bump + DeployAgent spawn signal ==="
          echo "epic_key=${{ steps.epic-detect.outputs.epic_key }}"
          echo "deploy_enabled=${{ steps.epic-detect.outputs.deploy_enabled }}"

          # auto-version-bump.sh invoke (실 환경: project.yaml 기반)
          # [empirical-source: ADR-026 Amendment 6 — Epic close -> semver bump]
          if [[ -f "templates/deployment/auto-version-bump.sh" ]]; then
            echo "::notice::auto-version-bump.sh 발견 — version bump 실행 가능"
            # 실 환경: auto-version-bump.sh --repo-path . --current-version <ver> --bump-type minor
            echo "[INFO] version bump signal: templates/deployment/auto-version-bump.sh (consumer 환경에서 실행)"
          fi

          # DeployAgent spawn signal (codeforge-deploy plugin trigger)
          echo "[INFO] DeployAgent spawn signal 발송"
          echo "[INFO] cascade chain: auto-deploy -> DeployAgent -> 배포 lane -> 배포 리뷰 lane"
          echo "[INFO] ADR-087 mechanical_enforcement_actions: [deploy-lane-spawn-evidence]"
          echo "[INFO] warning tier (ADR-060 §결정 5) — blocking-on-pr 승격 = 별 CFP"
