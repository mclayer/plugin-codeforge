name: Atomic upgrade zero-drift (warning mode)
# CFP-744 / ADR-037 Amendment 1 / ADR-060 — evidence-enforceable framework
# Tier: warning (continue-on-error, non-required check)
# Bypass channel: hotfix-bypass:atomic-upgrade-zero-drift label
#   (ADR-024 Amendment 3 per-entry namespace + ADR-060 §결정 16)
#
# 의미: codeforge family 7 plugin (codeforge + codeforge-{requirements,design,
#   review,develop,test,pmo}) atomic upgrade `--apply` 완료 후 consumer-side
#   installed version 고정 ↔ marketplace SSOT drift 0 (none) invariant.
#   detect = scripts/check-codeforge-version-drift.sh --plugin <codeforge-N> 7회
#   (F-002 옵션 A — codex/superpowers 외부 marketplace 제외, 7-name 구조적 배제).
#   실 enforcement carrier = scripts/atomic-upgrade-7-plugins.sh post-atomic gate.
#   marketplace-parity entry (wrapper-side publishing-time mirrored-field) 와는
#   의미 disjoint — 본 entry = consumer-side runtime 0-drift invariant 자체.
#
# 승격 path (warning → blocking-on-pr):
#   CFP-NNN carrier PR 가 다음 동반 의무:
#     1. 본 workflow 의 continue-on-error: true 제거
#     2. branch protection required_status_checks.contexts 에 job name 추가
#        (ADR-024 Amendment 2 / branch-protection-manifest.yaml SSOT)
#     3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d) + evidence-checks-registry
#        promotion_criteria: pr_cumulative_min 20 / failure_threshold 0)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'scripts/atomic-upgrade-7-plugins.sh'
      - 'scripts/codeforge-upgrade.sh'
      - 'scripts/codeforge-upgrade.ps1'
      - 'scripts/check-codeforge-version-drift.sh'
      - 'docs/evidence-checks-registry.yaml'
      - 'docs/adr/ADR-037-plugin-version-bump-rule.md'

permissions:
  pull-requests: write
  contents: read

jobs:
  atomic-upgrade-zero-drift:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — lint fail 이 PR merge 차단하지 않음.
    # required_status_checks.contexts 부착 X.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "labels=$labels"
          case ",$labels," in
            *,hotfix-bypass:atomic-upgrade-zero-drift,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Static contract assertion (atomic-upgrade-7-plugins.sh 정합)
        id: lint
        if: steps.bypass.outputs.bypass == 'false'
        run: |
          set +e
          # warning mode — atomic-upgrade-7-plugins.sh 의 0-drift gate 정합 정적 검증:
          #   (1) script 실재 + executable (git mode 100755)
          #   (2) check-codeforge-version-drift.sh --plugin 7회 invocation 위임 (§4.4)
          #   (3) drift 로직 재구현 0 (semantic 분산 금지 — §4.4 ownership)
          #   (4) 7-name FAMILY loop = codex/superpowers 구조적 배제 (F-002 옵션 A)
          OUT=""
          STATUS=0
          SCRIPT="scripts/atomic-upgrade-7-plugins.sh"
          if [ ! -f "$SCRIPT" ]; then
            OUT="FAIL: $SCRIPT 부재 (Phase 2 carrier 미land)"
            STATUS=1
          else
            MODE=$(git ls-files -s "$SCRIPT" | awk '{print $1}')
            if [ "$MODE" != "100755" ]; then
              OUT="${OUT}WARN: $SCRIPT git-mode=$MODE (100755 기대)\n"
              STATUS=1
            fi
            if ! grep -qF "check-codeforge-version-drift.sh" "$SCRIPT" || ! grep -qF -- "--plugin" "$SCRIPT"; then
              OUT="${OUT}FAIL: drift check --plugin 7회 위임 참조 부재 (§4.4)\n"
              STATUS=1
            fi
            if grep -qE '^(drift_classify|semver_cmp|installed_version|marketplace_version)[[:space:]]*\(\)' "$SCRIPT"; then
              OUT="${OUT}FAIL: drift 로직 재구현 감지 (§4.4 semantic 분산 금지)\n"
              STATUS=1
            fi
            if grep -qE '\b(codex|superpowers)\b' "$SCRIPT"; then
              OUT="${OUT}FAIL: FAMILY loop 에 codex/superpowers 포함 (F-002 옵션 A 위반)\n"
              STATUS=1
            fi
            if [ "$STATUS" -eq 0 ]; then
              OUT="OK: atomic-upgrade-7-plugins.sh 0-drift gate 정합 PASS (ADR-037 Amendment 1)"
            fi
          fi
          printf '%b\n' "$OUT" | tee /tmp/azd.out
          echo "exit_status=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0  # continue-on-error 정합

      - name: Post lint result comment (sticky)
        if: steps.bypass.outputs.bypass == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/azd.out 2>/dev/null || echo '(lint output 부재)')"
          if [ "${LINT_STATUS:-1}" = "0" ]; then
            HEADER="## ✓ Atomic upgrade zero-drift — PASS (warning mode)"
            FOOTER="ADR-037 Amendment 1 0-drift invariant 정합 (atomic-upgrade-7-plugins.sh post-atomic gate)."
          else
            HEADER="## ⚠ Atomic upgrade zero-drift — 정합 위반 감지 (warning mode)"
            FOOTER=$'**warning mode (CFP-744 / ADR-060 §결정 5)**: lint fail 이 PR merge 를 차단하지 않습니다. 의도된 결과인지 확인 + 다음 commit 으로 해소 또는 bypass label 부착.\n\n**hotfix bypass channel** (ADR-024 Amendment 3): 운영 장애 hotfix 시 `hotfix-bypass:atomic-upgrade-zero-drift` label 부착 → lint skip + audit comment 자동 발의 (권한자 = repo admin).'
          fi
          BODY=$(printf '%s\n\n```\n%s\n```\n\n%s\n\n%s' \
            "$HEADER" "$LINT_OUT" "$FOOTER" \
            "> ⓘ 본 workflow = **warning mode** (continue-on-error). PR merge 미차단. 승격 gate (ADR-060 §결정 6) 통과 후 blocking 전환.")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Emit bypass audit comment (label applied)
        if: steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # Schema: ADR-060 §결정 8 verbatim
          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' 섹션 부재 — 후속 보완 의무)"
          fi
          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:atomic-upgrade-zero-drift")] | last | .actor.login' \
            2>/dev/null || echo "unknown")
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label_applied_by=${LABEL_USER} reason=${REASON} check=atomic-upgrade-zero-drift timestamp=${TS}"
          BODY=$(printf '%s\n\n%s' \
            "$AUDIT" \
            "> ⓘ ADR-024 Amendment 3 §결정 6.C — audit trail 3중 안전망 1차 (audit comment 자동 발의). assertion lint = \`scripts/check-bypass-audit-comment.sh\`.")
          gh pr comment "$PR_NUMBER" --body "$BODY"
