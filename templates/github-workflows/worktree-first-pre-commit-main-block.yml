name: worktree-first pre-commit main-block hook check (blocking-on-pr mode)
# CFP-426 / ADR-040 Amendment 3 ¬ßÍ≤įž†ē 7 / ADR-060 ¬ßÍ≤įž†ē 5
# Tier: blocking-on-pr (continue-on-error: false, required check ‚ÄĒ CFP-531 / ADR-040 Amendment 5)
# Bypass channel: hotfix-bypass:worktree-pre-commit-main-block label
#
# CFP-531 Amendment 5 ‚ÄĒ actual warning ‚Üí blocking-on-pr žäĻÍ≤© (2026-05-13).

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'templates/.git-hooks/pre-commit*'
      - '.git-hooks/pre-commit*'
      - 'scripts/check-worktree-first-pre-commit-main-block.sh'
      - '.github/workflows/worktree-first-pre-commit-main-block.yml'
      - 'templates/github-workflows/worktree-first-pre-commit-main-block.yml'

permissions:
  pull-requests: write
  contents: read

jobs:
  worktree-first-pre-commit-main-block:
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON_LINUX_JSON || '["ubuntu-latest"]') }}
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "labels=$labels"
          case ",$labels," in
            *,hotfix-bypass:worktree-pre-commit-main-block,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run worktree-first pre-commit-main-block lint
        id: lint
        if: steps.bypass.outputs.bypass == 'false'
        run: |
          set +e
          bash scripts/check-worktree-first-pre-commit-main-block.sh 2>&1 | tee /tmp/lint.out
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit $status  # blocking-on-pr mode ‚ÄĒ lint fail žčú step fail propagation (CFP-531)

      - name: Post lint result comment (sticky)
        # CFP-531 FIX iter 2 (CodeReview F-1): if always() ensure audit trail comment runs even on lint failure
        if: always() && steps.bypass.outputs.bypass == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/lint.out 2>/dev/null || echo '(lint output Ž∂Äžě¨)')"
          if [ "${LINT_STATUS:-1}" = "0" ]; then
            HEADER="## worktree-first pre-commit-main-block lint ‚ÄĒ PASS (enforce mode, CFP-531)"
            FOOTER="blocking-on-pr mode ‚ÄĒ lint PASS. pre-commit-main-block hook ž†ēŪē© ŪôēžĚłŽź®."
          else
            HEADER="## worktree-first pre-commit-main-block lint ‚ÄĒ violation ÍįźžßÄ (enforce mode)"
            FOOTER=$'**blocking-on-pr mode (CFP-531 / ADR-040 Amendment 5)**: lint fail žĚī PR merge Ž•ľ žį®Žč®Ūē©ŽčąŽč§.\n\n**hotfix bypass channel**: `hotfix-bypass:worktree-pre-commit-main-block` label Ž∂Äžį© žčú lint skip + audit comment žěźŽŹô ŽįúžĚė.'
          fi
          BODY=$(printf '%s\n\n```\n%s\n```\n\n%s\n\n%s' \
            "$HEADER" "$LINT_OUT" "$FOOTER" \
            "> Ž≥ł workflow = blocking-on-pr mode (continue-on-error: false, CFP-531 / ADR-040 Amendment 5). PR merge žį®Žč® ŪôúžĄĪ.")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Emit bypass audit comment (label applied)
        if: steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' žĄĻžÖė Ž∂Äžě¨ ‚ÄĒ ŪõĄžÜć Ž≥īžôĄ žĚėŽ¨ī)"
          fi
          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:worktree-pre-commit-main-block")] | last | .actor.login' \
            2>/dev/null || echo "unknown")
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label_applied_by=${LABEL_USER} reason=${REASON} ADR_files=(N/A ‚ÄĒ worktree-first lint) timestamp=${TS}"
          BODY=$(printf '%s\n\n%s' \
            "$AUDIT" \
            "> ADR-024 Amendment 3 ¬ßÍ≤įž†ē 6.C ‚ÄĒ audit comment žěźŽŹô ŽįúžĚė. assertion lint = \`scripts/check-bypass-audit-comment.sh\`.")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Audit assertion (bypass label Ž∂Äžį© žčú)
        if: steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          bash scripts/check-bypass-audit-comment.sh
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "audit assertion FAIL (warning mode ‚ÄĒ PR merge ŽĮłžį®Žč®)"
          fi
          exit 0
