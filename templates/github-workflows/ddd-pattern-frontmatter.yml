name: DDD pattern frontmatter (warning mode)
# CFP-1117-S3 / ADR-091 §결정 5 + §결정 6 — DDD vocabulary enforcement layer (Template lint tier)
# Tier: warning (continue-on-error, non-required check)
# Bypass channel: hotfix-bypass:ddd-pattern-frontmatter label (ADR-024 Amendment 3 + ADR-060 §결정 7)
# vocabulary theater 차단 forcing function (ADR-091 §결정 7 INV-5) mechanical wire.
#
# === scope (cross-plugin lint) ===
# ArchitectLane agent file = codeforge-design plugin (별 repo, wrapper = 0 core agent ADR-009).
# 본 workflow 는 design repo 를 checkout 후 agent frontmatter 검사 (path-parameterized lint).
# design plugin repo 자체 CI 도 동일 script 호출 가능 (canonical = wrapper script).
# clone 실패 (PAT 부재 / 권한) = graceful degradation (warning + skip, PR merge 미차단).
#
# 승격 path (warning → blocking-on-pr):
#   1. 본 workflow 의 `continue-on-error: true` 제거
#   2. branch protection `required_status_checks.contexts` 에 본 workflow job name 추가
#   3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d) + S2 14 agent frontmatter land 후 0 violation)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'scripts/check-ddd-pattern-frontmatter.sh'
      - 'scripts/lib/check_ddd_pattern_frontmatter.py'
      - 'docs/adr/ADR-091-*.md'
  workflow_dispatch: {}

permissions:
  pull-requests: write
  contents: read

jobs:
  ddd-pattern-frontmatter:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5 / ADR-091 §결정 6 Template lint tier) — lint fail 이 PR merge 차단하지 않음.
    continue-on-error: true
    steps:
      - name: Checkout wrapper (lint script SSOT)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pyyaml
        run: python3 -m pip install --user pyyaml

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [ -z "${PR_NUMBER:-}" ]; then
            echo "bypass=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "labels=$labels"
          case ",$labels," in
            *,hotfix-bypass:ddd-pattern-frontmatter,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Checkout codeforge-design plugin (cross-plugin agent file scope)
        id: clone_design
        if: steps.bypass.outputs.bypass == 'false'
        continue-on-error: true   # clone 실패 = graceful degradation (PAT 부재 / 권한)
        uses: actions/checkout@v4
        with:
          repository: mclayer/plugin-codeforge-design
          path: .design-plugin
          fetch-depth: 1
          # token: ${{ secrets.CODEFORGE_CROSS_REPO_PAT }}  # private repo 시 PAT 필요 (CFP-521 / ADR-066)

      - name: Run DDD pattern frontmatter lint
        id: lint
        if: steps.bypass.outputs.bypass == 'false'
        run: |
          set +e
          if [ -d .design-plugin/agents ]; then
            bash scripts/check-ddd-pattern-frontmatter.sh .design-plugin/agents/*.md 2>&1 | tee /tmp/lint.out
            status=${PIPESTATUS[0]}
          else
            echo "⚠ codeforge-design plugin clone 부재 (clone step 실패 — PAT/권한) — DDD pattern frontmatter lint skip (graceful degradation)" | tee /tmp/lint.out
            status=0  # clone 미달 = warning skip, PR merge 미차단
          fi
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit 0  # continue-on-error 정합

      - name: Post lint result comment (sticky)
        if: steps.bypass.outputs.bypass == 'false' && github.event.pull_request.number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/lint.out 2>/dev/null || echo '(lint output 부재)')"
          if [ "${LINT_STATUS:-1}" = "0" ]; then
            HEADER="## ✓ DDD pattern frontmatter lint — PASS (warning mode)"
            FOOTER="violation 0건. ADR-091 §결정 5 ArchitectLane agent frontmatter (bounded_context + ddd_pattern) 정합."
          else
            HEADER="## ⚠ DDD pattern frontmatter lint — violation 감지 (warning mode)"
            FOOTER=$'**warning mode (ADR-091 §결정 6 Template lint tier / ADR-060 §결정 5)**: lint fail 이 PR merge 를 차단하지 않습니다. design plugin agent frontmatter 에 bounded_context + ddd_pattern field 추가 (S2 #1119 scope) 또는 bypass label 부착.\n\n**hotfix bypass channel** (ADR-024 Amendment 3): `hotfix-bypass:ddd-pattern-frontmatter` label 부착 → lint skip + audit comment 자동 발의 (권한자 = repo admin).'
          fi
          BODY=$(printf '%s\n\n```\n%s\n```\n\n%s\n\n%s' \
            "$HEADER" "$LINT_OUT" "$FOOTER" \
            "> ⓘ 본 workflow = **warning mode** (continue-on-error). cross-plugin scope (codeforge-design agents/*.md). PR merge 미차단. vocabulary theater 차단 forcing function (ADR-091 §결정 7 INV-5).")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Emit bypass audit comment (label applied)
        if: steps.bypass.outputs.bypass == 'true' && github.event.pull_request.number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' 섹션 부재 — 후속 보완 의무)"
          fi
          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:ddd-pattern-frontmatter")] | last | .actor.login' \
            2>/dev/null || echo "unknown")
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label_applied_by=${LABEL_USER} reason=${REASON} check=ddd-pattern-frontmatter timestamp=${TS}"
          BODY=$(printf '%s\n\n%s' \
            "$AUDIT" \
            "> ⓘ ADR-024 Amendment 3 §결정 6.C — audit trail 자동 발의. ADR-091 §결정 6 enforcement layer warning tier.")
          gh pr comment "$PR_NUMBER" --body "$BODY"
