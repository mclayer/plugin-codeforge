name: ac-mapping-cross-ref-check (CFP-491 / ADR-060 §결정 5 warning mode)

on:
  pull_request:
    paths:
      - docs/stories/**.md

jobs:
  ac-mapping-check:
    runs-on: ubuntu-latest
    continue-on-error: true  # warning tier — PR-block 회피 (ADR-060 §결정 5)
    steps:
      - uses: actions/checkout@v4

      - name: Check hotfix-bypass label
        id: bypass
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const bypass = labels.includes('hotfix-bypass:ac-mapping');
            console.log(`Bypass label present: ${bypass}`);
            return bypass;

      - name: AC mapping cross-ref check
        if: steps.bypass.outputs.result != 'true'
        run: |
          files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'docs/stories/**.md' || true)
          if [[ -z "$files" ]]; then
            echo "변경된 Story file 없음 — skip"
            exit 0
          fi
          mapfile -t file_arr <<< "$files"
          bash scripts/check-impl-manifest-ac-mapping.sh "${file_arr[@]}"

      - name: Audit comment (bypass label)
        if: steps.bypass.outputs.result == 'true'
        run: bash scripts/check-bypass-audit-comment.sh "ac-mapping"
