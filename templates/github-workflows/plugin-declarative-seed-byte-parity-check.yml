name: Plugin declarative seed byte-parity check (warning mode)
# CFP-1367 / ADR-107 Amendment 1 §결정 1 — F1 plugin-declarative-seed-byte-parity-check
# ADR-060 §결정 5 — warning-tier (continue-on-error, non-required check, PR merge 미차단)
# Bypass channel: hotfix-bypass:plugin-declarative-seed-byte-parity label (ADR-024 Amendment 8 per-entry namespace)
#
# 검사: wrapper SSOT (docs/project-config-schema.md) ↔ plugin declarative seed
#       (Wave 1 scope: codeforge-deploy templates/deploy-mechanism.md) schema 구조 byte-parity 정적 검사.
#       drift 발견 시 → [WARN] advisory (warning-tier, PR merge 미차단)
#
# Wave 1 paths filter: docs/project-config-schema.md 변경 시 트리거
# 승격 path (warning → blocking-on-pr):
#   1. 본 workflow continue-on-error: true 제거
#   2. branch protection required_status_checks.contexts 에 본 job 추가
#   3. evidence 3 산출물 제출 (ADR-060 §결정 6 + evidence-checks-registry.yaml)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'docs/project-config-schema.md'
  workflow_dispatch:
    inputs:
      ssot_file:
        description: 'Wrapper SSOT file path (default: docs/project-config-schema.md)'
        required: false
        default: 'docs/project-config-schema.md'
      plugin_file:
        description: 'Plugin seed file path (default: Wave 1 mapping)'
        required: false
        default: ''

permissions:
  pull-requests: write
  contents: read

jobs:
  plugin-declarative-seed-byte-parity:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — lint fail 이 PR merge 차단하지 않음.
    # required_status_checks.contexts 부착 X.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pyyaml
        run: python3 -m pip install --user pyyaml

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [ -z "${PR_NUMBER:-}" ]; then
            echo "bypass=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "labels=$labels"
          case ",$labels," in
            *,hotfix-bypass:plugin-declarative-seed-byte-parity,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run plugin declarative seed byte-parity lint
        id: lint
        if: steps.bypass.outputs.bypass == 'false'
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          set +e
          SSOT_FILE="${{ inputs.ssot_file || 'docs/project-config-schema.md' }}"
          PLUGIN_FILE="${{ inputs.plugin_file || '' }}"
          if [ -n "$PLUGIN_FILE" ]; then
            python3 scripts/lib/check_plugin_declarative_seed_byte_parity.py \
              --ssot-file "$SSOT_FILE" \
              --plugin-file "$PLUGIN_FILE" 2>&1 | tee /tmp/lint.out
          else
            python3 scripts/lib/check_plugin_declarative_seed_byte_parity.py \
              --ssot-file "$SSOT_FILE" 2>&1 | tee /tmp/lint.out
          fi
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit 0  # continue-on-error 정합 — fail 이어도 다음 step 진행

      - name: Post lint result comment (sticky)
        if: steps.bypass.outputs.bypass == 'false' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/lint.out 2>/dev/null || echo '(lint output 부재)')"
          if [ "${LINT_STATUS:-1}" = "0" ]; then
            HEADER="## ✓ Plugin declarative seed byte-parity check — PASS (warning mode)"
            FOOTER="byte-parity 정합 확인. ADR-107 Amendment 1 §결정 1 정합."
          else
            HEADER="## ⚠ Plugin declarative seed byte-parity check — drift 감지 (warning mode)"
            FOOTER=$'**warning mode (CFP-1367 / ADR-060 §결정 5)**: lint fail 이 PR merge 를 차단하지 않습니다.\n\nwrapper SSOT ↔ plugin declarative seed 구조 drift 감지 — Path A (mirror update) 또는 Path B (single-SSOT deprecate / Wave A S2 d-B 선례) 적용 권고.\n\n**hotfix bypass channel** (ADR-024 Amendment 8): `hotfix-bypass:plugin-declarative-seed-byte-parity` label 부착 → lint skip + audit comment 자동 발의.'
          fi
          BODY=$(printf '%s\n\n```\n%s\n```\n\n%s\n\n%s' \
            "$HEADER" "$LINT_OUT" "$FOOTER" \
            "> ⓘ 본 workflow = **warning mode** (continue-on-error). PR merge 미차단. 승격 gate (ADR-060 §결정 6) 통과 후 blocking 전환.")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Emit bypass audit comment (label applied)
        if: steps.bypass.outputs.bypass == 'true' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' 섹션 부재 — 후속 보완 의무)"
          fi
          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:plugin-declarative-seed-byte-parity")] | last | .actor.login' \
            2>/dev/null || echo "unknown")
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label_applied_by=${LABEL_USER} reason=${REASON} timestamp=${TS}"
          BODY=$(printf '%s\n\n%s' \
            "$AUDIT" \
            "> ⓘ ADR-024 Amendment 8 §결정 6.A — audit trail 자동 발의. bypass label: hotfix-bypass:plugin-declarative-seed-byte-parity.")
          gh pr comment "$PR_NUMBER" --body "$BODY"
