name: stale-local-main-checkout-divergence-check
# CFP-1410 Phase 2 / ADR-073 Amendment 9 — stale-local-main-checkout mechanical check
# Tier: warning (ADR-060 evidence-enforceable, continue-on-error: true)
# evidence-checks-registry.yaml entry: stale-local-main-checkout-divergence-check
#
# 검증:
#   PR open 시점 — 로컬 main 브랜치가 origin/main 대비 stale(diverged)한지 검사.
#   feature branch 환경에서는 EC-5 처리로 silent skip (정상 divergence 영역).
#
# 트리거:
#   pull_request: opened, synchronize, reopened (PR-time check)
#   workflow_dispatch: manual ad-hoc verification
#
# Hotfix bypass:
#   hotfix-bypass:stale-local-main-checkout-divergence-check label 부착 시 skip
#   (ADR-024 Amendment 3 hotfix-bypass family 75번째 member — label-registry-v2 v2.54)
#
# Permissions: deny-all top-level + job minimal (CFP-530 / ADR-060 Amendment 8)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions: {}  # top-level deny-all (CFP-530 / ADR-060 Amendment 8)

jobs:
  stale-local-main-checkout:
    runs-on: ubuntu-latest
    continue-on-error: true  # warning tier — check does not block CI
    permissions:
      contents: read  # checkout + git fetch

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run stale-local-main-checkout check
        env:
          CODEFORGE_STALE_THRESHOLD: ${{ vars.CODEFORGE_STALE_THRESHOLD || '1' }}
          CODEFORGE_STALE_FETCH_TIMEOUT_SEC: ${{ vars.CODEFORGE_STALE_FETCH_TIMEOUT_SEC || '10' }}
        run: |
          chmod +x scripts/check-stale-local-main-checkout.sh
          bash scripts/check-stale-local-main-checkout.sh 2>&1 || {
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 2 ]; then
              echo "::warning::stale-local-main-checkout SETUP error (exit 2) — Python dependency or script absent"
            fi
            exit 0  # warning tier: non-blocking
          }
