name: Sub-issue from Impl Manifest

on:
  pull_request:
    types: [synchronize, opened]
    paths:
      - 'docs/stories/**'

permissions:
  contents: read
  issues: write

jobs:
  generate-subissues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse §8.5 Impl Manifest table
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            const baseSha = context.payload.pull_request.base.sha;
            const headSha = context.payload.pull_request.head.sha;

            const files = execSync(`git diff --name-only ${baseSha} ${headSha} -- 'docs/stories/*.md'`)
                          .toString().trim().split('\n').filter(Boolean);

            // 셀 정규화: 좌우 backtick·공백 제거
            const stripCell = (s) => s.replace(/^\s*`?/, '').replace(/`?\s*$/, '').trim();

            for (const f of files) {
              const content = fs.readFileSync(f, 'utf8');

              // §8.5만 추출 (§8.5 시작 ~ §9. 또는 §8.6 또는 EOF)
              const m = content.match(/##\s*8\.5[^\n]*\n([\s\S]*?)(?=\n##\s*(?:8\.[6-9]|9\.)|$)/);
              if (!m) continue;
              const tableBody = m[1];

              // Story 키는 docs file 경로 basename
              const storyKey = path.basename(f, '.md');

              // 부모 Story Issue 번호: docs file 본문의 `- **Issue**: #N` 패턴에서 추출
              // (story-init.yml이 자동 삽입). 없으면 search fallback.
              let parentIssueNumber = null;
              const issueMatch = content.match(/^\s*-\s*\*\*Issue\*\*:\s*#(\d+)/m);
              if (issueMatch) {
                parentIssueNumber = parseInt(issueMatch[1], 10);
              } else {
                // Fallback: 파일 경로(KEY) → docs link로 변환된 Issue body 검색
                const { data: search } = await github.rest.search.issuesAndPullRequests({
                  q: `repo:${context.repo.owner}/${context.repo.repo} is:issue label:type:story in:body "docs/stories/${storyKey}.md"`
                });
                if (search.total_count > 0) {
                  parentIssueNumber = search.items[0].number;
                }
              }

              // 테이블 행 파싱
              const allLines = tableBody.split('\n');
              const rowLines = allLines.filter(line => line.match(/^\|/) && !line.match(/^\|[\s|:-]+\|$/));
              // header 제외 (첫 행)
              const dataRows = rowLines.slice(1);

              for (const row of dataRows) {
                const cells = row.split('|').slice(1, -1).map(stripCell);
                if (cells.length < 1) continue;
                const filePath = cells[0];
                if (!filePath) continue;
                const description = cells[5] || cells[1] || '';

                const expectedTitle = `[${storyKey}] impl: ${filePath}`;

                // 중복 sub-issue 방지: 정확히 같은 제목 검색
                const { data: existing } = await github.rest.search.issuesAndPullRequests({
                  q: `repo:${context.repo.owner}/${context.repo.repo} is:issue label:impl-manifest in:title "${expectedTitle}"`
                });
                if (existing.total_count > 0) continue;

                const { data: subIssue } = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: expectedTitle,
                  body: `Parent Story: ${storyKey} (Issue #${parentIssueNumber || 'unknown'})\nFile: \`${filePath}\`\nResponsibility: ${description}\n\n_Auto-generated by subissue-from-impl-manifest.yml_`,
                  labels: ['impl-manifest']
                });

                // GraphQL addSubIssue로 parent ↔ sub 관계 (parent를 찾았을 때만)
                if (parentIssueNumber !== null) {
                  try {
                    const { data: parentIssue } = await github.rest.issues.get({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: parentIssueNumber
                    });
                    await github.graphql(`
                      mutation AddSubIssue($parentId: ID!, $childId: ID!) {
                        addSubIssue(input: {issueId: $parentId, subIssueId: $childId}) {
                          subIssue { id }
                        }
                      }
                    `, {
                      parentId: parentIssue.node_id,
                      childId: subIssue.node_id
                    });
                  } catch (e) {
                    core.warning(`addSubIssue failed for #${subIssue.number}: ${e.message}`);
                  }
                } else {
                  core.warning(`No parent Story Issue found for ${storyKey} — sub-issue #${subIssue.number} created without link`);
                }

                core.notice(`Created sub-issue #${subIssue.number} for ${filePath}`);
              }
            }
