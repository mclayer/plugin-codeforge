name: workflow-yaml-parse (CFP-583 / ADR-060 Amendment 9 §결정 22)
# CFP-583 / ADR-060 Amendment 9 §결정 22 — workflow yml YAML parse validation gate
# Tier: warning (continue-on-error: true, non-required check)
# Bypass channel: hotfix-bypass:workflow-yaml-parse label (ADR-024 Amendment 3 + ADR-060 §결정 7)
# Dual validation: PyYAML safe_load + actionlint (optional, skip if binary absent)
#
# Scope: .github/workflows/*.yml + templates/github-workflows/*.yml (both dirs)
#
# 승격 path:
#   warning → blocking-on-pr 승격 시 CFP-NNN carrier PR 가 다음 변경 동반 의무:
#     1. 본 workflow 의 `continue-on-error: true` 제거
#     2. branch protection `required_status_checks.contexts` 에 본 workflow job name 추가
#        (ADR-024 Amendment 2 / branch-protection-manifest.yaml SSOT 정합)
#     3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d) + evidence-checks-registry.yaml promotion_criteria)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/**.yml'
      - 'templates/github-workflows/**.yml'
      - 'scripts/check-workflow-yaml-parse.sh'

permissions:
  pull-requests: write
  contents: read

jobs:
  workflow-yaml-parse:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — lint fail 이 PR merge 차단하지 않음.
    # required_status_checks.contexts 부착 X.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Install actionlint (optional)
        run: |
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) latest 2>/dev/null || true
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          if echo ",${LABELS}," | grep -q ",hotfix-bypass:workflow-yaml-parse,"; then
            echo "bypass=true" >> "$GITHUB_OUTPUT"
          else
            echo "bypass=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run YAML parse lint
        id: lint
        if: steps.bypass.outputs.bypass != 'true'
        run: |
          set +e
          bash scripts/check-workflow-yaml-parse.sh 2>&1 | tee /tmp/lint.out
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit 0  # continue-on-error 정합 — fail 이어도 다음 step 진행

      - name: Post lint result comment
        if: steps.bypass.outputs.bypass != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/lint.out 2>/dev/null || echo '(lint output 부재)')"
          if [ "${LINT_STATUS:-1}" = "0" ]; then
            HEADER="## OK workflow-yaml-parse — PASS (warning mode)"
            FOOTER="violation 0건. 모든 workflow yml PyYAML safe_load PASS."
          else
            HEADER="## WARN workflow-yaml-parse — YAML parse FAIL 감지 (warning mode)"
            FOOTER=$(printf '%s\n\n%s' \
              "**warning mode (CFP-583 / ADR-060 §결정 5)**: lint fail 이 PR merge 를 차단하지 않습니다. YAML ScannerError 유발 anti-pattern (multi-line BODY heredoc + backtick fence + variable interpolation) 을 printf format 패턴으로 교체하세요." \
              "**hotfix bypass channel** (ADR-024 Amendment 3): hotfix-bypass:workflow-yaml-parse label 부착 → lint skip + audit comment 자동 발의.")
          fi
          BODY=$(printf '%s\n\n```\n%s\n```\n\n%s\n\n%s' \
            "$HEADER" "$LINT_OUT" "$FOOTER" \
            "> i 본 workflow = **warning mode** (continue-on-error). PR merge 미차단. 승격 gate (ADR-060 §결정 6) 통과 후 blocking 전환.")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Audit comment (bypass label 부착 시)
        if: steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          AUDIT=$(printf '[hotfix-bypass-audit] PR=%s entry=workflow-yaml-parse timestamp=%s' \
            "$PR_NUMBER" "$TS")
          gh pr comment "$PR_NUMBER" --body "$AUDIT"
