name: Story Init

# Consumer-distributable single-repo flavor (CFP-65 / F2 Phase 1).
# story_key_prefix 는 project.yaml `github.story_key_prefix` 에서 fetch (yq 우선 + Python fallback).
# Path = docs/stories/<KEY>.md (single-repo 가정 — codeforge family monorepo flavor 는 internal-docs 별도 유지).

on:
  issues:
    types: [opened, labeled]   # was: [opened]  — CFP-280 race fix

permissions:
  contents: write
  issues: write
  pull-requests: write

# CFP-260 / ADR-036 Option B safety net — per-Issue concurrency group.
# 같은 Issue 의 reopen / re-trigger race 만 직렬화. 병렬 Issue (다른 #) 는 영향 없음.
concurrency:
  group: story-init-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  story-init:
    if: contains(github.event.issue.labels.*.name, 'type:story') && contains(github.event.issue.labels.*.name, 'phase:요구사항')
    runs-on: ubuntu-latest
    env:
      ISSUE_TITLE: ${{ github.event.issue.title }}
      ISSUE_BODY: ${{ github.event.issue.body }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read project.yaml story_key_prefix
        id: project_config
        shell: bash
        run: |
          set -euo pipefail
          cfg=".claude/_overlay/project.yaml"

          if [[ ! -f "$cfg" ]]; then
            echo "::error::missing $cfg — consumer-guide §3a 참조"
            exit 1
          fi

          if command -v yq >/dev/null 2>&1; then
            story_key_prefix="$(yq -r '.github.story_key_prefix // ""' "$cfg")"
          else
            story_key_prefix="$(python3 - "$cfg" <<'PY'
          import re, sys
          path = sys.argv[1]
          in_github = False
          for raw in open(path, encoding="utf-8"):
              line = raw.rstrip("\n")
              if re.match(r"^[A-Za-z_][\w-]*:\s*$", line):
                  in_github = line.split(":", 1)[0] == "github"
                  continue
              if in_github:
                  m = re.match(r"^\s{2}story_key_prefix:\s*(.*?)\s*$", line)
                  if m:
                      print(m.group(1).strip().strip('"').strip("'"))
                      break
          PY
          )"
          fi

          if [[ -z "$story_key_prefix" ]]; then
            echo "::error::github.story_key_prefix missing in $cfg — project-config-schema.md §1 참조"
            exit 1
          fi

          echo "story_key_prefix=$story_key_prefix" >> "$GITHUB_OUTPUT"

      - name: Compute story key (CFP-260 / ADR-036 Option B — KEY = PREFIX-Issue#)
        id: key
        env:
          PREFIX: ${{ steps.project_config.outputs.story_key_prefix }}
        run: |
          # CFP-260 / ADR-036 결정 1: GitHub atomic Issue numbering 위임.
          # 기존 file-system scan + max+1 방식 (race-prone) 제거.
          # 결과: race window 0, brainstorming 시점 KEY 사전 확보 (cfp-reserve.yml) 와 정합.
          # CFP-280 Iter 2 NF3 fix: `mkdir -p docs/stories` (Iter 0 file-system check 잔재) 제거 — branch creation step 이 directory 자동 생성.
          echo "key=${PREFIX}-${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

          PYOUT=$(python3 - <<'PYEOF'
          import os, re
          title = os.environ.get("ISSUE_TITLE", "")
          title_clean = re.sub(r"^\[STORY\]\s*", "", title).strip()
          slug = re.sub(r"[^A-Za-z0-9가-힣]+", "-", title_clean, flags=re.UNICODE)
          slug = slug.strip("-")[:40].rstrip("-")
          print(slug)
          print(title_clean)
          PYEOF
          )
          SLUG=$(printf '%s' "$PYOUT" | sed -n '1p')
          TITLE_CLEAN=$(printf '%s' "$PYOUT" | sed -n '2p')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          {
            echo "title_clean<<TITLE_EOF"
            printf '%s\n' "$TITLE_CLEAN"
            echo "TITLE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Skip if first firing already published (CFP-280 Iter 1 FIX — branch-existence guard)
        id: existence_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEY: ${{ steps.key.outputs.key }}
          SLUG: ${{ steps.key.outputs.slug }}
        run: |
          # CFP-280 Iter 1 FIX (DesignReview F1):
          # 첫 firing 의 substantive marker = remote feat branch creation (`git push origin feat/${KEY}-${SLUG}`).
          # Story file 자체는 feat branch 위에만 존재 → base ref (main) checkout 에서 file-system check (`-f`) 는
          # 영구적 false → dedup 미발동 → second-firing substantive work 중복 → branch push reject / PR duplicate reject.
          # Fix: GitHub REST API 로 remote branch 존재 검사 (atomic + cross-firing visible).
          BRANCH="feat/${KEY}-${SLUG}"
          if gh api "repos/${GITHUB_REPOSITORY}/branches/${BRANCH}" --silent 2>/dev/null; then
            echo "::notice::Remote branch ${BRANCH} already exists — skipping (idempotent re-entry, CFP-280 Iter 1 FIX)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Parse user requirement from Issue body
        id: parse
        if: steps.existence_check.outputs.skip != 'true'
        run: |
          REQ=$(printf '%s' "$ISSUE_BODY" \
                 | awk '/^### 사용자 요구사항/{flag=1; next} /^### /{flag=0} flag' \
                 | sed '/^$/d')
          {
            echo "requirement<<REQ_EOF"
            printf '%s\n' "$REQ"
            echo "REQ_EOF"
          } >> "$GITHUB_OUTPUT"

          MILESTONE=$(printf '%s' "$ISSUE_BODY" \
                       | awk '/^### Epic Milestone/{flag=1; next} /^### /{flag=0} flag' \
                       | sed '/^$/d' | head -1)
          echo "milestone=$MILESTONE" >> "$GITHUB_OUTPUT"

          COMPONENT=$(printf '%s' "$ISSUE_BODY" \
                        | awk '/^### Component/{flag=1; next} /^### /{flag=0} flag' \
                        | sed '/^$/d' | head -1)
          echo "component=$COMPONENT" >> "$GITHUB_OUTPUT"

      - name: Create branch + docs/stories/<KEY>.md
        if: steps.existence_check.outputs.skip != 'true'
        env:
          KEY: ${{ steps.key.outputs.key }}
          SLUG: ${{ steps.key.outputs.slug }}
          TITLE_CLEAN: ${{ steps.key.outputs.title_clean }}
          REQUIREMENT: ${{ steps.parse.outputs.requirement }}
        run: |
          BRANCH="feat/${KEY}-${SLUG}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          mkdir -p docs/stories
          {
            cat <<FRONTMATTER_EOF
          ---
          story_key: ${KEY}
          story_issues:
            - repo: ${GITHUB_REPOSITORY}
              number: ${ISSUE_NUMBER}
          status: phase:요구사항
          ---
          FRONTMATTER_EOF
            printf '\n# %s: %s\n\n' "$KEY" "$TITLE_CLEAN"
            printf -- '- **Issue**: #%s\n' "$ISSUE_NUMBER"
            printf -- '- **Status**: phase:요구사항\n\n'
            printf '## 1. 사용자 요구사항 (verbatim — Phase 2 후속 CFP 까지 CODEOWNERS manual review 로 변경 차단)\n\n'
            printf '%s\n\n' "$REQUIREMENT"
            cat <<'TPL_EOF'
          ## 2. 도메인 해석

          *(DomainAgent 작성 예정 — placeholder)*

          ## 3. 관련 ADR

          *(RequirementsPL 작성 예정 — placeholder)*

          ## 4. 관련 코드 경로

          *(RequirementsPL 작성 예정 — placeholder)*

          ## 5. 요구사항 확장 해석

          *(RequirementsAnalyst 작성 예정 — placeholder)*

          ## 6. 외부 지식 배경

          *(Researcher 작성 예정 — placeholder)*

          ## 7. 설계 서사

          *(Architect 작성 예정 — placeholder)*

          ## 8. 개발 서사

          *(DeveloperPL 작성 예정 — Phase 2 PR에서)*

          ## 9. 품질 게이트 이력

          *(Review/Test PL 작성 예정 — Phase 2 PR에서)*

          ## 10. FIX Ledger

          | Iter | 시각 | 레인 | 트리거 | 원인 판정 | 재실행 범위 | RESET? |
          |------|------|------|--------|-----------|-------------|--------|

          *(FIX 발생 시 append)*

          ## 11. 회고

          *(PMOAgent 작성 예정 — Story 완료 시)*
          TPL_EOF
          } > "docs/stories/${KEY}.md"

          git add "docs/stories/${KEY}.md"
          git commit -m "[${KEY}] feat: Story init — §1 verbatim, §2-11 placeholder"
          git push origin "$BRANCH"

      - name: Create Phase 1 PR
        if: steps.existence_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEY: ${{ steps.key.outputs.key }}
          SLUG: ${{ steps.key.outputs.slug }}
          TITLE_CLEAN: ${{ steps.key.outputs.title_clean }}
        run: |
          BRANCH="feat/${KEY}-${SLUG}"
          BASE="main"

          BODY=$(printf 'Story SSOT: `docs/stories/%s.md`\n\nThis is the Phase 1 PR (요구사항+설계+설계리뷰 lane). architect team CODEOWNERS auto-review attached.\n\nRelated: #%s\n' "$KEY" "$ISSUE_NUMBER")

          gh pr create \
            --base "$BASE" \
            --head "$BRANCH" \
            --title "[${KEY}] ${TITLE_CLEAN}" \
            --body "$BODY" \
            --label "type:story,phase:요구사항"

      - name: Update Issue body to docs link
        if: steps.existence_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEY: ${{ steps.key.outputs.key }}
        run: |
          BASE="main"
          gh issue edit "$ISSUE_NUMBER" \
            --body "Story SSOT: [\`docs/stories/${KEY}.md\`](../blob/${BASE}/docs/stories/${KEY}.md)"

      - name: Assign Milestone (if specified)
        if: steps.existence_check.outputs.skip != 'true' && steps.parse.outputs.milestone != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MILESTONE: ${{ steps.parse.outputs.milestone }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --milestone "$MILESTONE"

      - name: Add component label
        if: steps.existence_check.outputs.skip != 'true' && steps.parse.outputs.component != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMPONENT: ${{ steps.parse.outputs.component }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --add-label "component:$COMPONENT"
