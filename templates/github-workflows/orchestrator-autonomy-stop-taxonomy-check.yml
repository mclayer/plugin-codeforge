name: Orchestrator autonomy stop taxonomy lint (warning mode)
# CFP-2573 / ADR-144 §결정 7 — orchestrator 자율성 stop taxonomy lint 실행 채널 (consolidated).
# 검사 대상:
#   (L1) vague-pause taxonomy presence — ADR-025 §결정 7 행 + §결정 10 subclass 회귀 방어.
#   (L3) subagent-wait liveness + delivery-gap discipline presence (self-test 확장 자기검증).
#   (AC-6) tier 정직 meta-gate — measurement/advisory lever 가 자기 tier 만 주장하는지(긍정 enforcement 언어 0) 검사.
# Tier: warning (non-required, ADR-060 §결정 5) — advisory/measurement, blocking 승격 = ADR-060 evidence-gate.
#   branch protection 6-tuple 미추가 (순수 warning, PR merge 무차단).
# byte-identical template mirror (ADR-005): templates/github-workflows/ ↔ .github/workflows/ 동일 바이트.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'archive/adr/**'
      - 'scripts/**'
      - 'hooks/**'
      - 'docs/orchestrator-playbook.md'
      - '.github/workflows/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  orchestrator-autonomy-stop-taxonomy:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — lint fail 이 PR merge 차단하지 않음. required_status_checks.contexts 부착 X.
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Self-test — vague-pause taxonomy presence (L1, RED→GREEN discriminating)
        run: bash scripts/check-vague-pause-taxonomy-presence.sh --self-test

      - name: Self-test — tier honesty meta-gate (AC-6 mutation oracle)
        run: python3 scripts/check-tier-honesty.py --self-test

      - name: Self-test — subagent wait liveness + delivery-gap discipline (L3 확장 자기검증)
        run: bash scripts/check-subagent-wait-liveness-presence.sh --self-test

      - name: QADev test — vague-pause taxonomy presence
        if: hashFiles('tests/scripts/test_check-vague-pause-taxonomy-presence.sh') != ''
        run: bash tests/scripts/test_check-vague-pause-taxonomy-presence.sh

      - name: QADev test — tier honesty meta-gate
        if: hashFiles('tests/scripts/test_check-tier-honesty.sh') != ''
        run: bash tests/scripts/test_check-tier-honesty.sh

      - name: QADev test — stop-event aggregate (L5)
        if: hashFiles('tests/scripts/test_aggregate-stop-event.sh') != ''
        run: bash tests/scripts/test_aggregate-stop-event.sh

      - name: QADev test — subagent wait liveness presence (L3)
        if: hashFiles('tests/scripts/test_check-subagent-wait-liveness-presence.sh') != ''
        run: bash tests/scripts/test_check-subagent-wait-liveness-presence.sh

      - name: Run vague-pause taxonomy presence lint
        run: bash scripts/check-vague-pause-taxonomy-presence.sh
        continue-on-error: true

      - name: Run tier honesty meta-gate lint
        run: python3 scripts/check-tier-honesty.py
        continue-on-error: true
