name: Dependency order check (Phase 1 declarative seed)
# CFP-1059 Story-1 / ADR-090 §결정 2 — 양 layer 변경 순서 invariant
# Tier: warning (continue-on-error, declaration-only Wave 1)
# Bypass channel: hotfix-bypass:dependency-order label (label-registry-v2.42)
#
# Phase 1 declarative seed (S2/S3 wire pending):
#   - 실제 order enforcement 로직 (source-first expand / leaf-first contract 순서 invariant
#     검증) = scripts/check-dependency-order.sh (sibling carrier Story-7 mechanical wire 영역) 후 wire.
#   - 본 file = ADR-090 mechanical_enforcement_actions: [dependency-order-enforce]
#     declaration anchor.
#
# ADR-090 §결정 2 binding:
#   - 양 layer 동시 변경 시 변경 순서 invariant:
#     · expand (확장) = source-first (예: schema 신규 column 먼저, code 후속)
#     · contract (수축) = leaf-first (예: code 의 column 참조 제거 먼저, schema drop 후속)
#   - 위반 시 deployment 시 stale-leaf reference / pre-existing fail-loud 영역 risk surface
#   - cross-layer-impact-check.yml (별 workflow) = 한 layer 미반영 영역 / 본 workflow = 양 layer 동시 변경 순서 영역 (disjoint scope)
#
# 승격 path:
#   warning → blocking-on-pr 승격 시 CFP-NNN carrier PR 가 다음 변경 동반 의무:
#     1. 본 workflow 의 `continue-on-error: true` 제거
#     2. branch protection required_status_checks 에 본 workflow job name 추가
#     3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d))
#     4. expand/contract 분류 logic 정의 (project.yaml dependency_order_policy: 영역)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-order-declarative-seed:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — Phase 1 declarative seed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Phase 1 declarative seed placeholder
        run: |
          set -euo pipefail
          echo "=== Dependency order check (Phase 1 declarative seed) ==="
          echo "ADR-090 §결정 2 mechanical_enforcement_actions anchor"
          echo "mechanical action: dependency-order-enforce (declaration-only Wave 1)"
          echo ""
          echo "Actual order enforcement (source-first expand / leaf-first contract invariant)"
          echo "  = scripts/check-dependency-order.sh (sibling carrier Story-7 mechanical wire 영역) 후 wire."
          echo ""
          echo "Phase 1 declarative seed — S2/S3 wire pending"
          exit 0
