# BEGIN wrapper-managed
# CFP-1057 / ADR-085 §결정 2 — active_sessions[] field presence-grep workflow
# evidence-checks-registry entry: active-sessions-presence (warning tier)
name: active-sessions-presence
on:
  pull_request:
    paths:
      - 'docs/stories/**/*.md'
      - 'wrapper/stories/**/*.md'
      - 'docs/stories/CFP-*.md'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    continue-on-error: true  # warning tier (ADR-060 §결정 5)
    steps:
      - uses: actions/checkout@v4
      - name: Check active_sessions[] presence on touched Story files
        run: |
          set -euo pipefail
          changed=$(git diff --name-only origin/main...HEAD -- '*.md' | grep -E '(docs|wrapper)/stories/CFP-[0-9]+\.md$' || true)
          if [[ -z "$changed" ]]; then
            echo "::notice::no Story files touched — skip"
            exit 0
          fi
          fail=0
          for f in $changed; do
            [[ -f "$f" ]] || continue
            bash scripts/check-active-sessions-presence.sh --story-file "$f" || fail=$?
          done
          exit $fail
# END wrapper-managed
