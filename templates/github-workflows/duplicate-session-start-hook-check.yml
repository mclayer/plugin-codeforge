name: duplicate-session-start-hook-check
# CFP-475 / ADR-038 Amendment 3 §결정 12 (one-channel rule mechanical lint CI gate)
# Tier: warning (continue-on-error, non-required check)
# Bypass channel: hotfix-bypass:duplicate-session-start-hook label (ADR-024 Amendment 3 + ADR-060 §결정 7)
#
# 승격 path:
#   warning → blocking-on-pr 승격 시 CFP-NNN carrier PR 가 다음 변경 동반 의무:
#     1. 본 workflow 의 `continue-on-error: true` 제거
#     2. branch protection `required_status_checks.contexts` 에 본 workflow job name 추가
#        (ADR-024 Amendment 2 / branch-protection-manifest.yaml SSOT 정합)
#     3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d) + evidence-checks-registry.yaml promotion_criteria)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - '.claude/settings.json'
      - 'hooks/hooks.json'
      - 'scripts/check-no-duplicate-session-start-hook.sh'
      - 'templates/github-workflows/duplicate-session-start-hook-check.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  duplicate-session-start-hook-check:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — lint fail 이 PR merge 차단하지 않음.
    # required_status_checks.contexts 부착 X.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "labels=$labels"
          case ",$labels," in
            *,hotfix-bypass:duplicate-session-start-hook,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run lint
        id: lint
        if: steps.bypass.outputs.bypass != 'true'
        run: |
          set +e
          bash scripts/check-no-duplicate-session-start-hook.sh 2>&1 | tee /tmp/lint.out
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit 0  # continue-on-error 정합 — fail 이어도 다음 step 진행

      - name: Post warning comment on PR
        if: steps.bypass.outputs.bypass != 'true' && steps.lint.outputs.exit_status == '2'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/lint.out 2>/dev/null || echo '(lint output 부재)')"
          HEADER="## duplicate-session-start-hook-check — WARNING (warning mode)"
          DETAIL=$(printf '%s\n\n%s\n\n%s\n\n%s\n\n%s' \
            "**prereq-check entry 가 .claude/settings.json 과 hooks/hooks.json 양 channel 에 동시 정의 감지.**" \
            "Fix: .claude/settings.json 의 hooks.SessionStart[] 안 command 가 check-codeforge-prereq.sh 를 포함한 entry 삭제. plugin-root hooks/hooks.json 이 SSOT (ADR-038 Amendment 3 §결정 10)." \
            "> ⓘ 본 workflow = **warning mode** (continue-on-error). PR merge 미차단. 승격 gate (ADR-060 §결정 6) 통과 후 blocking 전환." \
            "**hotfix bypass channel** (ADR-024 Amendment 3): hotfix-bypass:duplicate-session-start-hook label 부착 → lint skip + audit comment 자동 발의.")
          BODY=$(printf '%s\n\n```\n%s\n```\n\n%s' "$HEADER" "$LINT_OUT" "$DETAIL")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Emit bypass audit comment (label applied)
        if: steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:duplicate-session-start-hook")] | last | .actor.login' \
            2>/dev/null || echo "unknown")

          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' 섹션 부재 — 후속 보완 의무)"
          fi

          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label=hotfix-bypass:duplicate-session-start-hook label_applied_by=${LABEL_USER} reason=${REASON} timestamp=${TS}"

          BODY=$(printf '%s\n\n%s' \
            "$AUDIT" \
            "> ⓘ ADR-024 Amendment 3 §결정 6.C — audit trail 3중 안전망 1차 (audit comment 자동 발의). Bypass label = \`hotfix-bypass:duplicate-session-start-hook\`. Reason justification required within 24h (ADR-063 atomic invariant audit comment pattern align).")
          gh pr comment "$PR_NUMBER" --body "$BODY"
