name: Cross-plugin ownership verify (warning mode)
# CFP-841 / ADR-082 Amendment 1 §결정 6 scope(d) — cross-plugin ownership queryable lint
# Tier: warning (continue-on-error, non-required check)
# Bypass channel: hotfix-bypass:cross-plugin-ownership-verify label (ADR-024 Amendment 7)
#
# ChangeImpactAgent Phase 0 mapping artifact 의 templates/* / docs/adr/* / docs/change-plans/*
# wrapper-local 단정 line 이 [ownership-verified: <yaml-query-path>] annotation 부재 시 flag.
# 13B 4-way drift-sync invariant: yaml cross_plugin_doc_ownership (canonical) vs
# SKILL.md vs story-page-structure.md vs lint regex (yaml-as-SSOT single-direction).
#
# 승격 path:
#   warning → blocking-on-pr 승격 시 CFP-NNN carrier PR 가 다음 변경 동반 의무:
#     1. 본 workflow 의 `continue-on-error: true` 제거
#     2. branch protection required_status_checks 에 본 workflow job name 추가
#     3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d))

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'docs/change-plans/*.md'
      - 'docs/stories/*.md'
      - 'docs/domain-knowledge/domain/governance-principle/lane-self-write-ownership-matrix.yaml'
      - 'skills/lane-self-write-boundary/SKILL.md'

permissions:
  pull-requests: write
  contents: read

jobs:
  cross-plugin-ownership-verify:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — lint fail 이 PR merge 차단하지 않음.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: changed
        run: |
          set -euo pipefail
          git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^(docs/(change-plans|stories)/.*\.md|docs/domain-knowledge/domain/governance-principle/lane-self-write-ownership-matrix\.yaml|skills/lane-self-write-boundary/SKILL\.md)$' \
            > /tmp/changed_files.txt || true
          if [ -s /tmp/changed_files.txt ]; then
            echo "has_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "=== Changed files ==="
          cat /tmp/changed_files.txt || echo "(none)"

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "labels=$labels"
          case ",$labels," in
            *,hotfix-bypass:cross-plugin-ownership-verify,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Install dependencies
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'false'
        run: python3 -m pip install --user pyyaml 2>/dev/null || true

      - name: Run 13B 4-way sync check
        id: sync_check
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'false'
        run: |
          set +e
          bash scripts/check-cross-plugin-ownership-verify.sh --check-4way-sync 2>&1 | tee /tmp/sync.out
          echo "sync_status=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run cross-plugin ownership lint
        id: lint
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'false'
        run: |
          set +e
          mapfile -t files < /tmp/changed_files.txt
          # filter to .md files only for ownership annotation check
          md_files=()
          for f in "${files[@]}"; do
            [[ "$f" == *.md ]] && md_files+=("$f")
          done
          if [ ${#md_files[@]} -gt 0 ]; then
            bash scripts/check-cross-plugin-ownership-verify.sh "${md_files[@]}" 2>&1 | tee /tmp/lint.out
            echo "exit_status=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          else
            echo "PASS: no .md files to scan" > /tmp/lint.out
            echo "exit_status=0" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Post lint result comment
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
          SYNC_STATUS: ${{ steps.sync_check.outputs.sync_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/lint.out 2>/dev/null || echo '(lint output absent)')"
          SYNC_OUT="$(cat /tmp/sync.out 2>/dev/null || echo '(sync output absent)')"
          OVERALL_STATUS="0"
          [ "${LINT_STATUS:-1}" != "0" ] && OVERALL_STATUS="1"
          [ "${SYNC_STATUS:-1}" != "0" ] && OVERALL_STATUS="1"
          if [ "$OVERALL_STATUS" = "0" ]; then
            HEADER="## cross-plugin-ownership-verify -- PASS (warning mode)"
            FOOTER="violation 0 -- ADR-082 Amendment 1 §결정 6 scope(d) + 13B 4-way sync satisfied."
          else
            HEADER="## cross-plugin-ownership-verify -- violation detected (warning mode)"
            FOOTER="**warning mode**: lint fail 이 PR merge 를 차단하지 않습니다. [ownership-verified: ...] annotation 부착 필요."$'\n\n'"**bypass**: hotfix-bypass:cross-plugin-ownership-verify label (ADR-024 Amendment 7)."
          fi
          BODY=$(printf '%s\n\n**Ownership lint:**\n```\n%s\n```\n\n**13B 4-way sync:**\n```\n%s\n```\n\n%s\n\n%s' \
            "$HEADER" "$LINT_OUT" "$SYNC_OUT" "$FOOTER" \
            "> warning mode (continue-on-error). PR merge not blocked.")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Emit bypass audit comment
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' section absent)"
          fi
          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:cross-plugin-ownership-verify")] | last | .actor.login' \
            2>/dev/null || echo "unknown")
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label_applied_by=${LABEL_USER} reason=${REASON} timestamp=${TS}"
          gh pr comment "$PR_NUMBER" --body "$AUDIT"

      - name: Audit assertion
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          bash scripts/check-bypass-audit-comment.sh
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "WARN: audit assertion FAIL (warning mode)"
          fi
          exit 0
