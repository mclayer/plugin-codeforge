name: Codex origin/main directive presence lint (warning mode)
# CFP-1412 / ADR-081 Amendment 8 §결정 D9 / ADR-060 §결정 28
# Tier: warning (continue-on-error: true, non-required check)
# Bypass channel: hotfix-bypass:codex-origin-main-directive-check label (ADR-024 Amendment N)
#
# Checks Codex worker spawn-prompt body files for [ORIGIN-MAIN-DIRECTIVE] block
# OR valid [origin-main-directive-fallback: <enum>] marker presence.
#
# Fallback enum closed-set 3 values (ADR-081 Amendment 8 D9 SSOT):
#   network_scope_offline
#   legacy_prompt_format
#   intentional_working_tree_verify
#
# SecurityArch §7.2 TH-2 constraint: permissions: contents: read only (no PR write).
# No CODEFORGE_CROSS_REPO_PAT in lint output (PAT guard).
#
# Carrier: CFP-1412 / dual-binding: ADR-081 Amendment 8 (declaration source) +
#                                   ADR-060 (enforcement source)
#
# Promotion path (ADR-060 §결정 28.E):
#   warning -> blocking-on-pr: remove continue-on-error + branch protection update
#   (requires pr_cumulative_min: 20 evidence gate, ADR-060 §결정 6(b))

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: codex-origin-main-directive-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  codex-origin-main-directive-check:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 28 / §결정 5) — lint fail does NOT block PR merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check bypass label
        id: bypass
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          set +x  # SecurityArch TH-2: no debug trace
          labels="${PR_LABELS:-}"
          case ",$labels," in
            *,hotfix-bypass:codex-origin-main-directive-check,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              echo "::notice::hotfix-bypass:codex-origin-main-directive-check detected — codex-origin-main-directive-check lint bypassed (ADR-024)"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run codex-origin-main-directive-check lint
        id: lint
        if: steps.bypass.outputs.bypass == 'false'
        run: |
          set +x  # SecurityArch TH-2: no debug trace (PAT guard)
          set +e
          # Lint changed files that could contain Codex worker spawn prompts
          # Discovery: scan PR diff for files matching Codex spawn-prompt patterns
          # (warning tier = advisory only)

          # Step (a) graceful degradation: detect fail-mode -> declare (playbook §3.10.1-bis)
          # Step (b) verify-before-trust: ADR-070 §결정 D1 substitution scope 3-path enum
          # Step (c) Story §10 marker: [origin-main-directive-fallback: <enum>] presence

          # Scan PR diff for Codex spawn-prompt body files (heuristic)
          CHANGED_FILES="$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || true)"

          if [ -z "$CHANGED_FILES" ]; then
            echo "::notice::codex-origin-main-directive-check: no changed files detected — PASS (advisory)"
            echo "exit_status=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Content pre-screen: filter to spawn-prompt candidate files only
          # Reduces blast surface — only files with Codex worker spawn-prompt markers are linted.
          CANDIDATE_FILES=$(echo "$CHANGED_FILES" | while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -f "$f" ] || continue
            grep -l -E "(ORIGIN-MAIN-DIRECTIVE|origin-main-directive-fallback|Codex Worker Spawn Prompt|spawn prompt boilerplate)" "$f" 2>/dev/null || true
          done)

          if [ -z "$CANDIDATE_FILES" ]; then
            echo "::notice::codex-origin-main-directive-check: no Codex worker spawn-prompt candidates in PR diff — lint scope empty, PASS (advisory)"
            echo "exit_status=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Run lint only on candidate spawn-prompt files (warning tier — non-blocking)
          MAX_EXIT=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            python3 scripts/lib/check_codex_origin_main_directive_presence.py "$f" 2>&1 || {
              status=$?
              if [ "$status" -gt "$MAX_EXIT" ]; then
                MAX_EXIT="$status"
              fi
            }
          done <<< "$CANDIDATE_FILES"

          echo "exit_status=$MAX_EXIT" >> "$GITHUB_OUTPUT"
          # warning tier: always exit 0 (continue-on-error + warning-tier semantic)
          exit 0

      - name: Emit lint summary
        if: steps.bypass.outputs.bypass == 'false' && always()
        env:
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set +x  # SecurityArch TH-2
          status="${LINT_STATUS:-0}"
          if [ "$status" = "0" ]; then
            echo "::notice::codex-origin-main-directive-check: PASS — [ORIGIN-MAIN-DIRECTIVE] block or valid fallback marker present (ADR-081 Amendment 8 §결정 D9)"
          elif [ "$status" = "1" ]; then
            echo "::warning::codex-origin-main-directive-check: WARNING — [ORIGIN-MAIN-DIRECTIVE] block absent AND no valid fallback marker in Codex worker spawn-prompt body. Add: (a) [ORIGIN-MAIN-DIRECTIVE] block, or (b) [origin-main-directive-fallback: network_scope_offline|legacy_prompt_format|intentional_working_tree_verify] (ADR-081 Amendment 8 §결정 D9). hotfix bypass: hotfix-bypass:codex-origin-main-directive-check label."
          else
            echo "::warning::codex-origin-main-directive-check: META-ERROR (exit $status) — lint infrastructure issue. Non-blocking (warning tier)."
          fi
