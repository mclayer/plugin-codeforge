name: Evidence registry schema validation (warning mode)
# CFP-455 / ADR-060 Amendment 2 / evidence-check-registry v1.1 — schema validation lint workflow
# Tier: warning (continue-on-error, non-required check) — §결정 5 첫 도입
# Bypass channel: omit (§결정 16 — warning tier = bypass_label optional / 미사용)
#
# 검증 대상:
#   docs/evidence-checks-registry.yaml — 6 schema validation rule (a-f)
#   docs/inter-plugin-contracts/evidence-check-registry-v1.md — schema doc trigger path
#
# Exit code 3-tier (§결정 15 verbatim):
#   - exit 0 = PASS (violation 0)
#   - exit 1 = validation FAIL (registry yaml schema 위반)
#   - exit 2 = META-ERROR (pyyaml 미설치 / file 부재 / unexpected exception)
#
# 승격 path:
#   warning → blocking-on-pr 승격 시 CFP-NNN carrier PR 가 다음 변경 동반 의무:
#     1. 본 workflow 의 `continue-on-error: true` 제거
#     2. branch protection `required_status_checks.contexts` 에 본 workflow job name 추가
#        (ADR-024 Amendment 2 / branch-protection-manifest.yaml SSOT 정합)
#     3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d) + evidence-checks-registry.yaml promotion_criteria)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'docs/evidence-checks-registry.yaml'
      - 'docs/inter-plugin-contracts/evidence-check-registry-v1.md'

permissions:
  pull-requests: write
  contents: read

jobs:
  evidence-registry-check:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — lint fail 이 PR merge 차단하지 않음.
    # required_status_checks.contexts 부착 X.
    continue-on-error: true
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pyyaml
        run: python3 -m pip install --user pyyaml

      - name: Run evidence registry schema lint
        id: lint
        run: |
          set +e
          bash scripts/check-evidence-registry.sh 2>&1 | tee /tmp/lint.out
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          # warning mode — continue-on-error 정합. exit 0 으로 normalize.
          exit 0

      - name: Post lint result comment (sticky)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/lint.out 2>/dev/null || echo '(lint output 부재)')"
          case "${LINT_STATUS:-2}" in
            0)
              HEADER="## PASS — Evidence registry schema lint (warning mode)"
              FOOTER="violation 0건. ADR-060 Amendment 2 §결정 3 + schema v1.1 정합."
              ;;
            1)
              HEADER="## WARN — Evidence registry schema lint validation FAIL (warning mode)"
              FOOTER="**warning mode (CFP-455 / ADR-060 §결정 5)**: lint fail 이 PR merge 를 차단하지 않습니다. 의도된 결과인지 확인 + 다음 commit 으로 해소. schema 위반 시 즉시 fail (ADR-060 Amendment 2 §결정 17 — immediate fail 정합). 승격 carrier 시점 = blocking-on-pr 전환."
              ;;
            2)
              HEADER="## WARN — Evidence registry schema lint META-ERROR (warning mode)"
              FOOTER="**META-ERROR (ADR-060 Amendment 2 §결정 15)**: validation FAIL 과 분리된 meta-error. pyyaml 미설치 / registry yaml file 부재 / unexpected exception 등. PR merge 미차단 but workflow 운영 이상."
              ;;
            *)
              HEADER="## WARN — Evidence registry schema lint unknown status (warning mode)"
              FOOTER="lint exit status = ${LINT_STATUS}. ADR-060 Amendment 2 §결정 15 exit code 3-tier 정합 검증 필요."
              ;;
          esac
          {
            printf '%s\n\n' "$HEADER"
            printf '```\n%s\n```\n\n' "$LINT_OUT"
            printf '%s\n\n' "$FOOTER"
            printf '> Note: 본 workflow = **warning mode** (continue-on-error). PR merge 미차단. 승격 gate (ADR-060 §결정 6) 통과 후 blocking 전환. registry tier = warning / bypass_label omit (§결정 16 정합).\n'
          } > /tmp/pr-comment.md
          gh pr comment "$PR_NUMBER" --body-file /tmp/pr-comment.md
