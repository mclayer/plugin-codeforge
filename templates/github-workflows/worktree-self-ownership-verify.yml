name: worktree-self-ownership-verify
# CFP-1366 / ADR-073 Amendment 3 §결정 1-D — Worktree self-ownership verify Wave 2 mechanical check
# Tier: warning (ADR-060 evidence-enforceable, continue-on-error: true)
# evidence-checks-registry entry: worktree-self-ownership-verify
#
# 검증:
#   PR body / commit message 안 parallel_session_conflict 또는 동형 ownership claim 발화 시
#   paired verified-via: git worktree list / git reflog annotation presence-grep.
#   Wave 1 declaration (CFP-689 ADR-073 Amd 3) → Wave 2 mechanical wire (CFP-1366).
#
# Hotfix bypass:
#   hotfix-bypass:worktree-self-ownership-verify label 부착 시 skip
#
# Permissions: deny-all top-level (CFP-530 / ADR-060 Amendment 8)

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions: {}

jobs:
  worktree-self-ownership:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            labels=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name' || echo "")
            if echo "$labels" | grep -q "hotfix-bypass:worktree-self-ownership-verify"; then
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              echo "::warning::Bypass label hotfix-bypass:worktree-self-ownership-verify detected — skip"
            fi
          fi

      - name: Fetch PR body
        if: steps.bypass.outputs.bypass != 'true' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr view ${{ github.event.pull_request.number }} --json body --jq '.body' > pr_body.txt || echo "" > pr_body.txt

      - name: Run worktree self-ownership verify
        if: steps.bypass.outputs.bypass != 'true' && github.event_name == 'pull_request'
        run: |
          bash scripts/check-worktree-self-ownership.sh --input-file pr_body.txt || exit_code=$?
          if [ "${exit_code:-0}" -eq 1 ]; then
            echo "::warning::ownership claim found but verified-via annotation missing — see ADR-073 Amd 3 §결정 1-D"
          elif [ "${exit_code:-0}" -ne 0 ]; then
            echo "::error::setup error in check-worktree-self-ownership.sh (exit ${exit_code})"
            exit "${exit_code}"
          fi
