name: Story Init Logic Check
# CFP-2252 (S4) + CFP-2423 (S3) — story-init.yml 정규화·라우팅·트리거 로직 truth-table CI-gate.
#
# 목적: story-init.yml 의 3 로직을 Python harness 로 재구현해 결정적으로 검증:
#   1. trigger if-expression (ADR-049 Amd2 §3.2) — TC-6~11 + baseline (CFP-2252)
#   2. component routing (ADR-069 Amd1 §3.2) — TC-ROUTE-1~8 (CFP-2423)
#   3. helper YAML 입출력 — TC-HELPER-1~8 (CFP-2423)
# tier: non-required (advisory gate — branch protection required contexts 미등재).
# Security: third-party actions 는 SHA-pinned (CFP-300 policy).

on:
  pull_request:
    paths:
      - '.github/workflows/story-init.yml'
      - 'templates/github-workflows/story-init.yml'
      - 'scripts/lib/eval_story_init_trigger_expr.py'
      - 'scripts/lib/eval_story_init_component_routing.py'
      - 'scripts/lib/workflow_story_init_project_config_repos.py'
      - '.github/workflows/story-init-trigger-expr-check.yml'
      - 'templates/github-workflows/story-init-trigger-expr-check.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  trigger-expr-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      - name: Install PyYAML (helper self-test 의존)
        run: python3 -m pip install --user pyyaml

      - name: Run trigger-expr truth-table self-test (TC-6~11 + baseline — CFP-2252 F5)
        run: |
          # stdlib only — node 의존 0 (self-host 안전). 11 truth-table case 평가.
          python3 scripts/lib/eval_story_init_trigger_expr.py --self-test

      - name: Run component-routing truth-table self-test (TC-ROUTE-1~8 — CFP-2423 §8.2)
        run: |
          # stdlib only. 8 truth-table case: AC-1/3/4 분기 + 정규화(lowercase+trim) + dedup
          python3 scripts/lib/eval_story_init_component_routing.py --self-test

      - name: Run helper YAML validation self-test (TC-HELPER-1~8 — CFP-2423 §8.3)
        run: |
          # PyYAML 의존 (위 Install PyYAML step). 8 fixture case: repos[] 구조 + 정규화 + 편집 에러 대응
          python3 scripts/lib/workflow_story_init_project_config_repos.py --self-test
