name: architecture-drift-weekly
# CFP-950 / EPIC-RESULTS-CFP-756 §11 carrier #4 — architecture-drift weekly cron backstop
# Tier: warning (ADR-060 evidence-enforceable, continue-on-error: true)
#
# 검증:
#   docs/architecture/**/*.md drift mechanical lint (full-repo scan)
#   PR-time architecture-drift.yml 의 사후 backstop — parallel session merge race detect 안전망
#
# 트리거:
#   schedule: weekly Monday 02:00 UTC (= 11:00 KST 화요일 새벽)
#   workflow_dispatch: manual override for ad-hoc verification
#
# Precedent: marketplace-drift-detection.yml (CFP-627 / ADR-063 Amendment 3 §결정 13) 동형 패턴
#
# Hotfix bypass: 본 sub-PR 미포함 — 별도 후속 carrier (label 신설 + bypass mechanism)
#
# Permissions: minimum (top-level deny-all + job override, CFP-530 / ADR-060 Amendment 8)

on:
  schedule:
    - cron: '0 2 * * 1'  # Monday 02:00 UTC (= 11:00 KST 화요일)
  workflow_dispatch:     # Manual override for ad-hoc verification

permissions: {}  # top-level deny-all

jobs:
  drift-detection:
    runs-on: ubuntu-latest
    continue-on-error: true  # warning tier — drift does not block CI
    permissions:
      contents: read   # repo read
      issues: write    # Issue auto-create on drift

    concurrency:
      group: architecture-drift-weekly
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run architecture-drift mechanical lint
        id: drift_check
        run: |
          chmod +x scripts/check-architecture-drift.sh
          set +e
          OUTPUT=$(bash scripts/check-architecture-drift.sh 2>&1)
          RC=$?
          set -e
          echo "rc=$RC" >> "$GITHUB_OUTPUT"
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          # Echo to log for visibility
          echo "$OUTPUT"
          exit 0  # do not fail the job — Issue creation downstream

      - name: Create / update drift Issue (on non-zero exit)
        if: steps.drift_check.outputs.rc != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const rc = '${{ steps.drift_check.outputs.rc }}';
            const output = `${{ steps.drift_check.outputs.output }}`;
            const title = `[architecture-drift-weekly] drift detected (rc=${rc})`;
            const body = [
              '## Origin',
              '',
              `Weekly cron backstop (CFP-950) detected architecture-drift on \`docs/architecture/**/*.md\`. rc=\`${rc}\`.`,
              '',
              '## Output (truncated)',
              '',
              '```',
              output.substring(0, 4000),
              '```',
              '',
              '## Action',
              '',
              '- PR-time `architecture-drift.yml` 가 평소 1차 안전망. 본 cron 은 parallel session merge race 사후 backstop.',
              '- 본 Issue 는 dedup-by-title — drift 잔존 시 다음 cron run 이 동일 title 재발견하면 comment 추가 가능.',
              '- 해소 후 manual close (또는 다음 cron run 에서 자동 close 향후 강화 영역).',
              '',
              '## Cross-ref',
              '',
              '- CFP-950 (carrier Issue)',
              '- CFP-923 / ADR-078 Amendment 1 (Story-4 PR-time lint)',
              '- marketplace-drift-detection.yml (CFP-627 precedent)',
              '',
              `Generated: ${new Date().toISOString()}`,
            ].join('\n');

            // Dedup: search existing open Issue with same title
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'type:bug',
              per_page: 30,
            });
            const found = existing.data.find(i => i.title === title);

            if (found) {
              core.info(`Existing Issue #${found.number} found — appending audit comment.`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: found.number,
                body: `Re-detected on weekly cron: rc=${rc} (run: ${context.runId})`,
              });
            } else {
              const newIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['type:bug', 'plugin:wrapper', 'component:docs', 'priority:P3', 'from-cfp-950'],
              });
              core.info(`Created Issue #${newIssue.data.number}`);
            }
