# Live Secret Policy — vault path / runtime injection / no-checked-in 검증
# Security: third-party actions are SHA-pinned per CFP-300 policy.
#
# 정책: ADR-008 D1-D3 의 codeforge-level enforcement.
#       (1) 1Password vault path shape verify
#       (2) per-exchange + per-account isolation
#       (3) runtime-only injection (영구 저장 금지)
#       (4) .env.example raw key 부재 verify
#       (5) gitleaks + trufflehog 통합
#
# 사용 패턴 (Hybrid — Sonnet decider D8=A 1Password-only default):
#   - codeforge wrapper: reusable workflow (gate 구조 + check logic)
#   - consumer overlay: vault path regex + 거래소 list (Bithumb / Upbit / ...)
#
# Consumer 호출 예시 (mctrader):
#   .github/workflows/live-secret-policy.yml:
#     uses: mclayer/plugin-codeforge/templates/github-workflows/live-secret-policy.yml@main
#     with:
#       vault_path_regex: "^mctrader/live/(bithumb|upbit)/spot/(main|backup)/(connect_key|secret_key|access_key|jwt_signing_policy)$"
#       env_example_path: ".env.example"
#       gitleaks_enabled: true
#       trufflehog_enabled: true

name: Live Secret Policy (Hybrid — codeforge template + consumer vault regex)

on:
  workflow_call:
    inputs:
      vault_path_regex:
        description: "Consumer-defined vault path shape regex (per-exchange + per-account isolation)"
        required: true
        type: string
      env_example_path:
        description: "Path to .env.example (raw key value 부재 검증 대상)"
        required: false
        type: string
        default: ".env.example"
      gitleaks_enabled:
        description: "gitleaks scan 활성화"
        required: false
        type: boolean
        default: true
      trufflehog_enabled:
        description: "trufflehog scan 활성화"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  vault-path-shape:
    runs-on: ubuntu-latest
    name: Vault path shape verify (ADR-008 D2)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Search vault path references
        run: |
          # Source code / docs 에서 vault path reference 추출 (mctrader/live/... 패턴)
          # 실제 vault path 가 consumer-defined regex 매칭 의무
          paths=$(grep -rh -oE "[a-z][a-z0-9_-]*/live/[a-z][a-z0-9_-]*/[a-z][a-z0-9_-]*/[a-z][a-z0-9_-]*/[a-z_]+" \
                  --include="*.py" --include="*.md" --include="*.yml" --include="*.yaml" \
                  . 2>/dev/null | sort -u || true)
          if [ -z "$paths" ]; then
            echo "::notice::Vault path reference 발견 0건 — Live touching Story 가 아니거나 vault path 미참조"
            exit 0
          fi

          echo "Detected vault paths:"
          echo "$paths"

          # Consumer regex 매칭 검증
          violations=0
          while IFS= read -r path; do
            if ! echo "$path" | grep -qE "${{ inputs.vault_path_regex }}"; then
              echo "::error::Vault path shape 위반: $path"
              violations=$((violations + 1))
            fi
          done <<< "$paths"

          if [ $violations -gt 0 ]; then
            echo "::error::ADR-008 D2 per-exchange + per-account isolation 위반 — $violations 건"
            exit 1
          fi
          echo "Vault path shape PASS"

  env-example-no-raw-key:
    runs-on: ubuntu-latest
    name: .env.example raw key 부재 verify (ADR-008 D1)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Verify .env.example has no raw values
        run: |
          if [ ! -f "${{ inputs.env_example_path }}" ]; then
            echo "::notice::${{ inputs.env_example_path }} 부재 — skip"
            exit 0
          fi

          # .env.example 의 모든 라인이 KEY= 또는 KEY=<placeholder> 패턴 의무 (raw value 금지)
          # ADR-008 D1: ".env.example: key 이름만, 값 절대 미포함"
          violations=$(grep -nE '^[A-Z_][A-Z0-9_]*=[^<#$"'"'"']..*[a-zA-Z0-9]+' "${{ inputs.env_example_path }}" | grep -v "=$" || true)
          if [ -n "$violations" ]; then
            echo "::error::${{ inputs.env_example_path }} raw key value 발견:"
            echo "$violations"
            echo "::error::ADR-008 D1 위반 — placeholder만 허용 (KEY= 또는 KEY=<your_key_here>)"
            exit 1
          fi
          echo ".env.example raw key 부재 PASS"

  gitleaks-scan:
    runs-on: ubuntu-latest
    name: gitleaks scan (ADR-008 D9)
    if: ${{ inputs.gitleaks_enabled }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trufflehog-scan:
    runs-on: ubuntu-latest
    name: trufflehog scan (ADR-008 D9)
    if: ${{ inputs.trufflehog_enabled }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Run trufflehog
        uses: trufflesecurity/trufflehog@ba0a524d6e51744d9d4e306bc57ac5d6ca5173ea # main (2026-05-09) — TODO: re-pin when stable release tag available
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || 'main' }}
          head: ${{ github.event.pull_request.head.sha || 'HEAD' }}
          extra_args: --only-verified
