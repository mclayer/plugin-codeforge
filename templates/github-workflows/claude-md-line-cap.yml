name: claude-md-line-cap (CFP-506 / ADR-012 §결정 6 / ADR-060 Amendment 5)

on:
  pull_request:
    paths:
      - CLAUDE.md
      - scripts/check-claude-md-line-cap.sh
      - templates/github-workflows/claude-md-line-cap.yml
      - .github/workflows/claude-md-line-cap.yml

permissions:
  contents: read

jobs:
  line-cap:
    runs-on: ubuntu-latest
    continue-on-error: true  # warning tier — PR-block 회피 (ADR-060 §결정 5)
    steps:
      - uses: actions/checkout@v4

      - name: Check hotfix-bypass label
        id: bypass
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const bypass = labels.includes('hotfix-bypass:claude-md-line-cap');
            console.log(`Bypass label present: ${bypass}`);
            return bypass;

      - name: Line cap check
        if: steps.bypass.outputs.result != 'true'
        run: bash scripts/check-claude-md-line-cap.sh

      - name: Audit comment (bypass label)
        if: steps.bypass.outputs.result == 'true'
        run: bash scripts/check-bypass-audit-comment.sh "claude-md-line-cap"
