name: canary-auto-promote
# CFP-1196 / ADR-105 §결정 3 — canary auto-promote mechanism
# ADR-106 Amendment 1 §결정 1 단계 2: 사후 알림 Issue (ops-signal label)
# ADR-087 §결정 5: blue-green atomic swap (deploy lane)
# Tier: warning (ADR-060 evidence-enforceable, continue-on-error: true)
# evidence-checks-registry.yaml entry: canary-auto-promote
#
# 안전장치 4 AND (ADR-105 §결정 3):
#   1. criteria 4-tuple all pass OR (pass + n_a) — CFP-991 aggregation verbatim 재사용
#   2. 3시간 보존 window 내 (기존 L2 hook check_within_retention 위임)
#   3. 사후 알림 mechanism 가용 (pre-promote check — GH_TOKEN + gh CLI, 0 API call)
#   4. kill-switch off (.codeforge/auto-promote.disabled 부재 AND auto_promote_enabled=true)
#
# Trigger 채널 3종 (D1):
#   primary:  deploy lane 후속 trigger (배포 직후 canary 시작 — progressive delivery 정합)
#   common:   workflow_dispatch (수동 ad-hoc)
#   backstop: cron 24h (missed canary 사후 정리 — §3.4 F-1196-2)
#             ⚠️ cron 주기(24h) > retention(3h): backstop = in-window promote 미보장.
#             보존 만료 후 도착 시 → promote 금지 + hotfix 안내 Issue (EC-7)
#
# Wrapper-self-app: N/A (ADR-104 §결정 4 / ADR-072 §결정 6 Tier-1 declare-time exemption)
#   wrapper repo = declarative SSOT only. 실 canary = consumer 환경.
#   wrapper 에서 실행 시 fast-pass exit 0 (canary-auto-promote.sh §3.8).
#
# 3-layer disjoint (중복 0 — TC-7 grep 검증):
#   L1 criteria 정의 (CFP-991 check-canary-compatibility.sh + helper) = 읽어 재사용
#   L2 deploy/rollback (CFP-1059 deploy_blue_green.py / auto-rollback-hook.sh) = 호출만
#   L3 canary 오케스트레이션 = 본 workflow + canary-auto-promote.sh + canary_auto_promote.py
#
# Hotfix bypass:
#   hotfix-bypass:canary-auto-promote label 부착 시 skip + audit comment
#   (ADR-024 Amendment 3 hotfix-bypass family, label-registry-v2 신규 member)
#
# 답습 source: rollback-signal-monitor.yml (CFP-1193) — byte-pattern verbatim
#   schedule cron + workflow_dispatch + permissions deny-all + concurrency + continue-on-error
#
# §7.4 empirical-source:
#   24h cron rate: rollback-signal-monitor.yml cron '0 0 * * *' 답습 (dimension: rate)
#   3h retention: ADR-087 §결정 5 (dimension: lifecycle)
#
# Permissions: minimum (top-level deny-all + job override, ADR-060 Amendment 8)

on:
  workflow_run:
    workflows: ["auto-deploy"]   # deploy lane 후속 trigger (D1 primary — ADR-087 §결정 1)
    types: [completed]
    branches: [main]
  schedule:
    - cron: '0 0 * * *'   # 24h UTC daily (backstop — §3.4 F-1196-2 사후 정리)
  workflow_dispatch:       # 수동 ad-hoc

permissions: {}  # top-level deny-all

jobs:
  canary-auto-promote:
    runs-on: ubuntu-latest
    continue-on-error: true   # warning tier — ADR-060 (promote 실패 시 CI 차단 0)
    # deploy 후속 trigger 시 성공한 배포에만 canary 시작
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read           # 스크립트 / config 파일 읽기
      issues: write            # ops-signal Issue 발의 (ADR-106 §결정 1 단계 2)

    concurrency:
      group: canary-auto-promote
      cancel-in-progress: false   # 진행 중 run 완료 보장 (race 차단)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check hotfix-bypass label
        id: bypass
        # hotfix-bypass:canary-auto-promote label 부착 시 skip
        # ADR-024 Amendment 3 hotfix-bypass family member (label-registry-v2)
        run: |
          echo "bypass=false" >> "$GITHUB_OUTPUT"
          # TODO: bypass label 실 체크 (sub-PR carrier — evidence-checks-registry 승격 시)

      - name: Run canary auto-promote
        if: steps.bypass.outputs.bypass != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # consumer 측 criteria gate_state 주입 (Actions vars / project.yaml)
          _CFP1196_MOCK_FUNCTIONAL: ${{ vars.CANARY_FUNCTIONAL_GATE_STATE || 'n_a' }}
          _CFP1196_MOCK_SECURITY: ${{ vars.CANARY_SECURITY_GATE_STATE || 'n_a' }}
          _CFP1196_MOCK_MONITORING: ${{ vars.CANARY_MONITORING_GATE_STATE || 'n_a' }}
          _CFP1196_MOCK_TESTING: ${{ vars.CANARY_TESTING_GATE_STATE || 'n_a' }}
          # L2 보존 기간 mock (consumer 환경 — hook check_within_retention 위임)
          _CFP1059_MOCK_WITHIN_RETENTION: ${{ vars.CANARY_WITHIN_RETENTION || '1' }}
          # test override (dry-run)
          _CFP1196_SKIP_ISSUE_CREATE: ${{ vars.CFP1196_SKIP_ISSUE_CREATE || '' }}
        run: |
          chmod +x scripts/canary-auto-promote.sh
          # wrapper repo fast-pass: GITHUB_REPOSITORY = mclayer/plugin-codeforge → exit 0
          bash scripts/canary-auto-promote.sh \
            --repo "${GITHUB_REPOSITORY:-}" \
            --image "${DEPLOY_IMAGE:-placeholder}" \
            --host-list "${DEPLOY_HOST_LIST:-localhost}" \
            --canary-subset "${DEPLOY_CANARY_SUBSET:-}" \
            --retention-hours "${DEPLOY_RETENTION_HOURS:-3}"

      - name: Bypass audit comment
        if: steps.bypass.outputs.bypass == 'true'
        run: |
          echo "canary-auto-promote bypass active"
          echo "hotfix-bypass:canary-auto-promote label 감지 — audit comment 발의 (sub-PR carrier)"
