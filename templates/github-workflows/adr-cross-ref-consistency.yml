name: ADR cross-ref consistency lint (warning mode)
# CFP-2478 / ADR-068 Amendment 7 — layer A 결정론 cross-document sweep (warning-tier)
# 5 검사: (a)cross-ADR 존재 / (b)phantom ID ownership / (c)enum SSOT / (d)버전 opt-in / (e)content-anchor
# Tier: warning (continue-on-error, non-required check)
# Bypass channel: hotfix-bypass:boundary-wording (ADR-024 §결정 6.A per-entry namespace)
#
# 스코프 (구현리뷰 CFP-2478): PR diff(changed ADR/doc 파일)만 스캔 — cry-wolf 차단 (adoption 생존).
#   whole-repo 전수 audit 는 on-demand mode (로컬 `bash scripts/check-adr-cross-ref-consistency.sh .`)
#   로 보존. PR 마다 전수 270+ warning = noise → 변경분 한정 (Story §6 CE-6 / §7.6 FP calibration).
#
# 승격 path:
#   warning → blocking-on-pr 승격 시 CFP-NNN carrier PR 가 다음 변경 동반 의무:
#     1. 본 workflow 의 continue-on-error: true 제거
#     2. branch protection required_status_checks.contexts 에 본 workflow job name 추가
#     3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d) + evidence-checks-registry promotion_criteria)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**/*.md'
      - '**/*.yml'
      - '**/*.yaml'
      - 'archive/adr/**'
      - 'docs/**'
      - 'scripts/**'
      - 'templates/**'
      - '.github/workflows/**'

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  adr-cross-ref-consistency:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — lint fail 이 PR merge 차단하지 않음.
    # required_status_checks.contexts 부착 X.
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0  # changed-files diff = base..head 비교 위해 전 이력 필요

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Run self-test (inline fixture)
        run: bash scripts/check-adr-cross-ref-consistency.sh --self-test

      - name: Resolve PR changed scannable files (changed-files scope — cry-wolf 차단)
        id: changed
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          # md/yml/yaml + archive/adr|docs 영역 changed 파일만 (스캔 대상 확장자)
          CHANGED="$(git diff --name-only --diff-filter=ACMR "$BASE" "$HEAD" \
            | grep -E '\.(md|ya?ml)$' \
            | grep -E '^(archive/adr/|docs/)' || true)"
          if [ -z "$CHANGED" ]; then
            echo "no_files=true" >> "$GITHUB_OUTPUT"
            echo "변경된 ADR/doc 스캔 대상 파일 0건 — lint skip"
          else
            echo "no_files=false" >> "$GITHUB_OUTPUT"
            # 개행 구분 목록을 멀티라인 출력으로 저장
            {
              echo "files<<EOF"
              echo "$CHANGED"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "스캔 대상 (changed):"
            echo "$CHANGED"
          fi

      - name: Run ADR cross-ref consistency lint (changed files only)
        id: lint
        if: steps.changed.outputs.no_files == 'false'
        run: |
          # changed-files 목록을 인자로 전달 (whole-repo 전수 아님 — PR diff 한정)
          mapfile -t FILES <<< "${{ steps.changed.outputs.files }}"
          bash scripts/check-adr-cross-ref-consistency.sh "${FILES[@]}" 2>&1 | tee lint-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Post warning comment
        if: steps.lint.outcome == 'failure'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('lint-output.txt', 'utf8');
            const body = [
              '## ADR cross-ref consistency lint — warning',
              '',
              '> ADR-060 warning-tier (CFP-2478). PR merge 차단 아님.',
              '> scope: PR 변경분(changed ADR/doc) 한정. whole-repo audit = 로컬 on-demand.',
              '> bypass: `hotfix-bypass:boundary-wording` label 부착.',
              '',
              '```',
              output.slice(0, 3000),
              '```',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
