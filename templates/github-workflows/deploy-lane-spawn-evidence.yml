name: Deploy lane spawn evidence (Phase 1 declarative seed)
# CFP-1059 Story-1 / ADR-087 mechanical_enforcement_actions — Deploy lane spawn 시 evidence lint
# Tier: warning (continue-on-error, declaration-only Wave 1)
# Bypass channel: hotfix-bypass:deploy-trigger label (label-registry-v2.42)
#   note: 본 spawn evidence 용 별도 namespace label = sibling/별 carrier 영역
#     (CFP-1059 batch 외 — deploy-trigger umbrella 안 잠정)
#
# Phase 1 declarative seed (S2/S3 wire pending):
#   - 실제 spawn evidence lint (Story §14 Lane Evidence row append 검증 + worktree-first ADR-040 정합
#     + agent_id presence + spawned_at/returned_at UTC timestamp) = scripts/check-deploy-lane-spawn-evidence.sh
#     (sibling carrier — codeforge-deploy plugin seed Story-N) 후 wire.
#   - 본 file = ADR-087 mechanical_enforcement_actions: [deploy-lane-spawn-evidence]
#     declaration anchor.
#
# ADR-087 spawn evidence binding (ADR-031 precedent 답습):
#   - Deploy lane spawn 시 Story §14 Lane Evidence row append 의무 (existing 6 lane pattern)
#   - worktree-first ADR-040 정합 (cwd = isolated worktree path, agent prompt git -C <worktree> 강제)
#   - agent_id + spawned_at + returned_at + outcome (PASS/FIX/ESCALATE) 4-field invariant
#
# 승격 path:
#   warning → blocking-on-pr 승격 시 CFP-NNN carrier PR 가 다음 변경 동반 의무:
#     1. 본 workflow 의 `continue-on-error: true` 제거
#     2. branch protection required_status_checks 에 본 workflow job name 추가
#     3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d))
#     4. codeforge-deploy plugin DeployAgent seed merge 선행

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'docs/stories/**'  # Story §14 Lane Evidence row append 검증 영역
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-lane-spawn-evidence-declarative-seed:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — Phase 1 declarative seed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Phase 1 declarative seed placeholder
        run: |
          set -euo pipefail
          echo "=== Deploy lane spawn evidence (Phase 1 declarative seed) ==="
          echo "ADR-087 mechanical_enforcement_actions anchor"
          echo "mechanical action: deploy-lane-spawn-evidence (declaration-only Wave 1)"
          echo ""
          echo "Actual spawn evidence lint (§14 Lane Evidence row append + worktree-first"
          echo "  + agent_id/timestamp invariant) = scripts/check-deploy-lane-spawn-evidence.sh"
          echo "  (sibling carrier — codeforge-deploy plugin seed Story-N) 후 wire."
          echo ""
          echo "Phase 1 declarative seed — S2/S3 wire pending"
          exit 0
