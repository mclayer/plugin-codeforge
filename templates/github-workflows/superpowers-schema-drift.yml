name: superpowers-schema-drift

on:
  # Quarterly check (1st day of every 3rd month at 00:00 UTC)
  schedule:
    - cron: '0 0 1 */3 *'
  # Manual trigger
  workflow_dispatch:
  # Also trigger on snapshot or SSOT changes (sanity check)
  pull_request:
    paths:
      - 'templates/superpowers-skill-snapshot.txt'
      - 'docs/superpowers-integration.md'
      - 'scripts/check-superpowers-schema-drift.sh'
      - 'scripts/test-check-superpowers-schema-drift.sh'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run schema drift self-test (3 fixture)
        run: bash scripts/test-check-superpowers-schema-drift.sh
      - name: Run drift check on wrapper repo state (no local install in CI — check 1 only)
        run: bash scripts/check-superpowers-schema-drift.sh
      - name: Open issue if drift detected (scheduled run only)
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CFP-121] superpowers schema drift detected (${new Date().toISOString().slice(0,10)})`,
              body: `Quarterly schema drift check failed. See workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nLikely cause: superpowers plugin updated with new skill set. Update \`templates/superpowers-skill-snapshot.txt\` and \`docs/superpowers-integration.md §2\` accordingly.`,
              labels: ['type:story']
            });
