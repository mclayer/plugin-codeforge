name: numeric-claim-write-time-verify
# CFP-1612 / ADR-082 Amendment 25 sub-scope 1-N — numeric claim write-time verify
# Tier: warning (ADR-060 evidence-enforceable, continue-on-error: true)
# evidence-checks-registry.yaml entry: numeric-claim-write-time-verify
#
# 검증:
#   PR open 시점 + workflow_dispatch — governance document 안 숫자 주장(numeric claim)
#   ADR-082 §결정 1-K 4-step verify-before-write mandate 준수 여부:
#     Step 1: numeric claim 감지 (6 dimension closed-set)
#     Step 2: inline source command hint 존재 여부 검사
#     Step 3: source command 명시 시 cross-verify
#     Step 4: verdict emit
#
# 6 numeric claim dimension (closed-set):
#   1. line_count    — "+93 lines", "+101 lines", "~400 LOC"
#   2. file_count    — "10 file", "14 file", "5 files changed"
#   3. api_count     — "5 endpoints", "8 methods"
#   4. pattern_count — "pattern_count 5 reach", "5 incidents"
#   5. commit_count  — "5 commits drift", "3 commits ahead"
#   6. row_count     — "127번째 entry", "99번째 family member"
#
# FP guard 4종:
#   1. templates/** canonical example 면제
#   2. tests/** bats fixture 면제
#   3. scripts/** 면제
#   4. docs/stories/ + docs/change-plans/ path-only scope
#
# 트리거 (D2 dual trigger split — production-cutover-evidence.yml precedent):
#   pull_request: opened/synchronize/reopened
#   workflow_dispatch: 수동 ad-hoc 실행
#
# Hotfix bypass:
#   hotfix-bypass:numeric-claim-write-time-verify label 부착 시 skip + audit comment
#   (ADR-024 Amendment N §결정 6.A per-entry namespace, 101번째 family member)
#
# Graceful degradation 3 fail-mode:
#   401_fail_closed:  subprocess 환경 오류 → exit 2 (SETUP error, warning 발화)
#   429_fail_open:    transient error → exit 0 (continue-on-error + warning)
#   5xx_noop:         I/O 오류 → exit 0 (advisory stderr marker)
#
# Permissions: deny-all top-level + per-job least-privilege (ADR-060 Amendment 8)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions: {}  # top-level deny-all

jobs:
  numeric-claim-write-time-verify:
    runs-on: ubuntu-latest
    continue-on-error: true  # warning tier — does not block CI (ADR-060 §결정 5)
    permissions:
      contents: read       # git checkout + file read
      pull-requests: write # bypass audit comment

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git diff

      - name: Check hotfix-bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            LABELS=$(gh pr view ${{ github.event.pull_request.number }} \
              --json labels --jq '[.labels[].name] | @json' 2>/dev/null || echo '[]')
            if echo "$LABELS" | grep -q "hotfix-bypass:numeric-claim-write-time-verify"; then
              echo "bypass=true" >> "$GITHUB_OUTPUT"
            else
              echo "bypass=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "bypass=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bypass audit comment
        if: steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "[numeric-claim-write-time-verify] hotfix-bypass:numeric-claim-write-time-verify active — lint check skipped"
          echo "[bypass-justification] hotfix-bypass:numeric-claim-write-time-verify applied on PR #${{ github.event.pull_request.number }}"
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "[numeric-claim-write-time-verify] bypass active — hotfix-bypass:numeric-claim-write-time-verify label detected. Audit trail: $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              2>/dev/null || true
          fi

      - name: Setup Python
        if: steps.bypass.outputs.bypass != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run numeric claim write-time verify (Story files)
        if: steps.bypass.outputs.bypass != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/check-numeric-claim-write-time-verify.sh

          # Find Story files changed in this PR (docs/stories/**/*.md scope)
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            CHANGED_STORIES=$(git diff --name-only origin/${{ github.base_ref || 'main' }}...HEAD \
              -- 'docs/stories/*.md' 'docs/stories/**/*.md' 2>/dev/null || echo "")
          else
            # workflow_dispatch: scan all Story files
            CHANGED_STORIES=$(find docs/stories -name '*.md' 2>/dev/null || echo "")
          fi

          if [ -z "$CHANGED_STORIES" ]; then
            echo "[numeric-claim-write-time-verify] No Story files changed — Story lint skipped"
            exit 0
          fi

          WARN_COUNT=0
          while IFS= read -r story_path; do
            [ -z "$story_path" ] && continue
            echo "[numeric-claim-write-time-verify] Linting Story file: $story_path"
            bash scripts/check-numeric-claim-write-time-verify.sh \
              --mode=audit \
              --story-file="$story_path" \
              2>&1 || {
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 1 ]; then
                echo "::warning::numeric-claim-write-time-verify WARNING: $story_path — numeric claim missing source hint"
                WARN_COUNT=$((WARN_COUNT + 1))
              elif [ $EXIT_CODE -eq 2 ]; then
                echo "::warning::numeric-claim-write-time-verify ENVIRONMENT_ERROR: $story_path"
              fi
            }
          done <<< "$CHANGED_STORIES"

          if [ "$WARN_COUNT" -gt 0 ]; then
            echo "::warning::numeric-claim-write-time-verify: $WARN_COUNT Story file(s) have unverified numeric claims"
          fi
          exit 0  # warning tier: non-blocking

      - name: Run numeric claim write-time verify (Change Plan files)
        if: steps.bypass.outputs.bypass != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find Change Plan files changed in this PR
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            CHANGED_PLANS=$(git diff --name-only origin/${{ github.base_ref || 'main' }}...HEAD \
              -- 'docs/change-plans/*.md' 'docs/change-plans/**/*.md' 2>/dev/null || echo "")
          else
            CHANGED_PLANS=$(find docs/change-plans -name '*.md' 2>/dev/null || echo "")
          fi

          if [ -z "$CHANGED_PLANS" ]; then
            echo "[numeric-claim-write-time-verify] No Change Plan files changed — Change Plan lint skipped"
            exit 0
          fi

          WARN_COUNT=0
          while IFS= read -r plan_path; do
            [ -z "$plan_path" ] && continue
            echo "[numeric-claim-write-time-verify] Linting Change Plan file: $plan_path"
            bash scripts/check-numeric-claim-write-time-verify.sh \
              --mode=audit \
              --change-plan="$plan_path" \
              2>&1 || {
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 1 ]; then
                echo "::warning::numeric-claim-write-time-verify WARNING: $plan_path — numeric claim missing source hint"
                WARN_COUNT=$((WARN_COUNT + 1))
              elif [ $EXIT_CODE -eq 2 ]; then
                echo "::warning::numeric-claim-write-time-verify ENVIRONMENT_ERROR: $plan_path"
              fi
            }
          done <<< "$CHANGED_PLANS"

          if [ "$WARN_COUNT" -gt 0 ]; then
            echo "::warning::numeric-claim-write-time-verify: $WARN_COUNT Change Plan file(s) have unverified numeric claims"
          fi
          exit 0  # warning tier: non-blocking
