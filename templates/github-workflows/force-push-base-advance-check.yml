name: Force-push Base-advance Check (CFP-2490 / ADR-135 — Epic CFP-2481 E2)
# Security: third-party actions are SHA-pinned per CFP-300 policy.

# Warning-tier (non-blocking) own-branch force-push base-advance 사후 detect (L2 채널).
#
# force-push 는 발생 시점에 이미 origin 이 변경된 후라 CI 는 **차단 불가능** — 사후 가시화(warning)
# 만 가능 (ADR-135 §결정 2). 진짜 pre-flight 차단은 L1 local pre-push hook(opt-in)
# (templates/.claude/hooks/pre-push.sh.sample, PRE_PUSH_BASE_CHECK=1). 본 workflow 는 PR head 가
# base(origin/main) 의 advance 를 미반영(base-advance / divergence)한 채 열려 force-push 시
# sibling commit ancestry corruption 위험이 있는 상태를 사후 warning 으로 표면화한다.
#
# Bypass 2종:
#   - env BYPASS_FORCE_PUSH_BASE_ADVANCE=1 (스크립트 호출 step skip)
#   - label hotfix-bypass:force-push-base-advance (본 workflow 가 detect step skip)
#
# Graceful degradation: check 스크립트가 SHA 부재(shallow checkout / fetch 실패) → exit 0
#   (advisory degrade) 처리하므로 비차단. python3/git 부재(exit 2) 도 `|| true` +
#   continue-on-error 로 비차단 보장.
#
# de-bloat 재발 방지 (ADR-135 §결정 6 / CFP-2381 reconcile gate): live workflow +
#   detect_command path 실존(scripts/check-force-push-base-advance.sh + scripts/lib/*.py) +
#   discriminating self-test(tests/scripts/test_check-force-push-base-advance.sh) 3-종 동반.
#
# byte-identical (ADR-005): templates/github-workflows/force-push-base-advance-check.yml ↔
#   .github/workflows/force-push-base-advance-check.yml 동일 bytes (parallel-work-sentinel-check.yml precedent).

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  force-push-base-advance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0   # base/head ancestry 비교 — full history 필요

      - name: Bypass note (label present)
        if: ${{ contains(github.event.pull_request.labels.*.name, 'hotfix-bypass:force-push-base-advance') }}
        run: |
          echo "::notice::hotfix-bypass:force-push-base-advance label 감지 — force-push base-advance detect skip (audit: check-bypass-audit-comment.sh 마커 패턴 의무)."

      - name: Run force-push base-advance detect (warning-tier, 비차단)
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'hotfix-bypass:force-push-base-advance') }}
        continue-on-error: true
        env:
          # base/head SHA = git ancestry 실측 입력 (PR-body-proxy 아님 = 위조 곤란).
          #   env-injection only — run inline 보간 금지 (fork-PR shell injection 차단, §7.1).
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -uo pipefail
          if [ -n "${BYPASS_FORCE_PUSH_BASE_ADVANCE:-}" ]; then
            echo "::notice::BYPASS_FORCE_PUSH_BASE_ADVANCE=1 — force-push base-advance detect skip."
            exit 0
          fi
          if [ ! -f scripts/check-force-push-base-advance.sh ]; then
            echo "::warning::scripts/check-force-push-base-advance.sh 부재 — consumer-scripts manifest copy 누락. graceful skip."
            exit 0
          fi
          OUT="$(bash scripts/check-force-push-base-advance.sh 2>&1 || true)"
          echo "$OUT"
          echo "## Force-push Base-advance Check (warning-tier, non-blocking)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$OUT" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # CFP-2490 — discriminating self-test (mutation 생존 0). base-advance/divergence detect 가
  # hollow 가 아님을 보증: base-advance fixture 는 detect 되고 clean fixture 는 PASS + always-PASS
  # mutant 주입 시 RED. wrapper-self 전용 게이트 — `if: github.repository == 'mclayer/plugin-codeforge'`
  # 라 consumer 로 byte-identical 전파돼도 consumer repository 에선 skip
  # (parallel-work-sentinel-check.yml discriminating test job 답습). 본체는 stdlib(re/os/subprocess)만
  # 사용 + git fixture seam → PyYAML/gh 인증 불요.
  force-push-base-advance-test:
    name: force-push-base-advance discriminating test (mutation 생존 0)
    if: github.repository == 'mclayer/plugin-codeforge'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Run test_check-force-push-base-advance.sh (회귀 시 exit 1 차단)
        run: bash tests/scripts/test_check-force-push-base-advance.sh
