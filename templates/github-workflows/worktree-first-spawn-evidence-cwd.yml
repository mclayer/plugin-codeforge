name: worktree-first spawn evidence cwd check (blocking-on-pr mode)
# CFP-426 / ADR-040 Amendment 3 §결정 7 / ADR-031 §결정 4 / ADR-060 §결정 5
# Tier: blocking-on-pr (continue-on-error: false, required check — CFP-531 / ADR-040 Amendment 5)
# Bypass channel: hotfix-bypass:worktree-spawn-evidence-cwd label
#
# CFP-531 Amendment 5 — actual warning → blocking-on-pr 승격 (2026-05-13).
# §14 Lane Evidence row 의 `Working dir:` field 가 worktree path 또는
# `N/A — <30자 이상 사유>` (ADR-031 §결정 4 bypass mechanism) 인지 검증.
# CFP-843 Amendment 6 — write-target-path scope 확장: agent transcript Write/Edit tool target path
# + agent-internal git write target path 의 worktree-membership 추가 검증 (2026-05-17).

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'docs/stories/**.md'
      - 'scripts/check-worktree-first-spawn-evidence-cwd.sh'
      - 'scripts/check-write-target-membership.sh'
      - 'scripts/check-write-target-membership.py'
      - 'scripts/check-probe-sandbox-env.sh'
      - '.github/workflows/worktree-first-spawn-evidence-cwd.yml'
      - 'templates/github-workflows/worktree-first-spawn-evidence-cwd.yml'

permissions:
  pull-requests: write
  contents: read

jobs:
  worktree-first-spawn-evidence-cwd:
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON_LINUX_JSON || '["ubuntu-latest"]') }}
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "labels=$labels"
          case ",$labels," in
            *,hotfix-bypass:worktree-spawn-evidence-cwd,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run worktree-first spawn-evidence-cwd lint
        id: lint
        if: steps.bypass.outputs.bypass == 'false'
        run: |
          set +e
          bash scripts/check-worktree-first-spawn-evidence-cwd.sh 2>&1 | tee /tmp/lint.out
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit $status  # blocking-on-pr mode — lint fail 시 step fail propagation (CFP-531)

      - name: Run write-target-membership lint (warning sub-tier, non-blocking)
        # CFP-843 Amendment 6 §결정 7.J.2 Phase 2 — agent-internal write-target-path scope 확장
        # Tier: warning sub-tier (Change Plan §3.2 + §9 "scope 확장 부분만 warning sub-tier" 정합)
        # 기존 CWD check (위 step) = blocking-on-pr 유지, 신규 write-target-path check = non-blocking
        # WRITE_TARGET_PATHS 미설정 시 graceful skip (post-hoc scan — Phase 2 env-injection model)
        if: steps.bypass.outputs.bypass == 'false'
        continue-on-error: true  # warning sub-tier — exit fail propagation 차단 (blocking-on-pr 미격상)
        run: |
          set +e
          bash scripts/check-write-target-membership.sh 2>&1 | tee /tmp/write-target-lint.out
          status=${PIPESTATUS[0]}
          echo "[write-target-membership] exit_status=$status (warning sub-tier — non-blocking)"
          exit 0  # warning tier — always exit 0 (continue-on-error 이중 보호)

      - name: Post lint result comment (sticky)
        # CFP-531 FIX iter 2 (CodeReview F-1): if always() ensure audit trail comment runs even on lint failure
        if: always() && steps.bypass.outputs.bypass == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/lint.out 2>/dev/null || echo '(lint output 부재)')"
          if [ "${LINT_STATUS:-1}" = "0" ]; then
            HEADER="## worktree-first spawn-evidence-cwd lint — PASS (enforce mode, CFP-531)"
            FOOTER="blocking-on-pr mode — lint PASS. §14 Lane Evidence cwd 필드 정합 확인됨."
          else
            HEADER="## worktree-first spawn-evidence-cwd lint — violation 감지 (enforce mode)"
            FOOTER=$'**blocking-on-pr mode (CFP-531 / ADR-040 Amendment 5)**: lint fail 이 PR merge 를 차단합니다.\n\n**hotfix bypass channel**: `hotfix-bypass:worktree-spawn-evidence-cwd` label 부착 시 lint skip + audit comment 자동 발의.\n\n**ADR-031 §결정 4 bypass mechanism**: `Working dir: N/A — <30자 이상 사유>` 패턴 허용 (false-positive 회피).'
          fi
          BODY=$(printf '%s\n\n```\n%s\n```\n\n%s\n\n%s' \
            "$HEADER" "$LINT_OUT" "$FOOTER" \
            "> 본 workflow = blocking-on-pr mode (continue-on-error: false, CFP-531 / ADR-040 Amendment 5). PR merge 차단 활성.")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Emit bypass audit comment (label applied)
        if: steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' 섹션 부재 — 후속 보완 의무)"
          fi
          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:worktree-spawn-evidence-cwd")] | last | .actor.login' \
            2>/dev/null || echo "unknown")
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label_applied_by=${LABEL_USER} reason=${REASON} ADR_files=(N/A — worktree-first lint) timestamp=${TS}"
          BODY=$(printf '%s\n\n%s' \
            "$AUDIT" \
            "> ADR-024 Amendment 3 §결정 6.C — audit comment 자동 발의. assertion lint = \`scripts/check-bypass-audit-comment.sh\`.")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Audit assertion (bypass label 부착 시)
        if: steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          bash scripts/check-bypass-audit-comment.sh
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "audit assertion FAIL (warning mode — PR merge 미차단)"
          fi
          exit 0
