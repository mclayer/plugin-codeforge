name: worktree-first spawn evidence cwd check (warning mode)
# CFP-426 / ADR-040 Amendment 3 В§кІ°м • 7 / ADR-031 В§кІ°м • 4 / ADR-060 В§кІ°м • 5
# Tier: warning (continue-on-error, non-required check)
# Bypass channel: hotfix-bypass:worktree-spawn-evidence-cwd label
#
# Story 1 skeleton вҖ” actual wire мІ« мӮ¬лЎҖ = Story 2 (CFP-427).
# В§14 Lane Evidence row мқҳ `Working dir:` field к°Җ worktree path лҳҗлҠ”
# `N/A вҖ” <30мһҗ мқҙмғҒ мӮ¬мң >` (ADR-031 В§кІ°м • 4 bypass mechanism) мқём§Җ кІҖмҰқ.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'docs/stories/**.md'
      - 'scripts/check-worktree-first-spawn-evidence-cwd.sh'

permissions:
  pull-requests: write
  contents: read

jobs:
  worktree-first-spawn-evidence-cwd:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "labels=$labels"
          case ",$labels," in
            *,hotfix-bypass:worktree-spawn-evidence-cwd,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run worktree-first spawn-evidence-cwd lint
        id: lint
        if: steps.bypass.outputs.bypass == 'false'
        run: |
          set +e
          bash scripts/check-worktree-first-spawn-evidence-cwd.sh 2>&1 | tee /tmp/lint.out
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Post lint result comment (sticky)
        if: steps.bypass.outputs.bypass == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/lint.out 2>/dev/null || echo '(lint output л¶Җмһ¬)')"
          if [ "${LINT_STATUS:-1}" = "0" ]; then
            HEADER="## worktree-first spawn-evidence-cwd lint вҖ” PASS (warning mode, Story 1 skeleton)"
            FOOTER="skeleton mode вҖ” actual wire мІ« мӮ¬лЎҖ = Story 2 (CFP-427)."
          else
            HEADER="## worktree-first spawn-evidence-cwd lint вҖ” violation к°җм§Җ (warning mode)"
            FOOTER=$'**warning mode**: lint fail мқҙ PR merge лҘј м°ЁлӢЁн•ҳм§Җ м•ҠмҠөлӢҲлӢӨ.\n\n**hotfix bypass channel**: `hotfix-bypass:worktree-spawn-evidence-cwd` label л¶Җм°© мӢң lint skip + audit comment мһҗлҸҷ л°ңмқҳ.\n\n**ADR-031 В§кІ°м • 4 bypass mechanism**: `Working dir: N/A вҖ” <30мһҗ мқҙмғҒ мӮ¬мң >` нҢЁн„ҙ н—Ҳмҡ© (false-positive нҡҢн”ј).'
          fi
          BODY="${HEADER}

\`\`\`
${LINT_OUT}
\`\`\`

${FOOTER}

> warning mode (continue-on-error). мҠ№кІ© gate нҶөкіј нӣ„ blocking м „нҷҳ (Story 4 CFP-429 мұ…мһ„)."
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Emit bypass audit comment (label applied)
        if: steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' м„№м…ҳ л¶Җмһ¬ вҖ” нӣ„мҶҚ ліҙмҷ„ мқҳл¬ҙ)"
          fi
          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:worktree-spawn-evidence-cwd")] | last | .actor.login' \
            2>/dev/null || echo "unknown")
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label_applied_by=${LABEL_USER} reason=${REASON} ADR_files=(N/A вҖ” worktree-first lint) timestamp=${TS}"
          BODY="${AUDIT}

> ADR-024 Amendment 3 В§кІ°м • 6.C вҖ” audit comment мһҗлҸҷ л°ңмқҳ. assertion lint = \`scripts/check-bypass-audit-comment.sh\`."
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Audit assertion (bypass label л¶Җм°© мӢң)
        if: steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          bash scripts/check-bypass-audit-comment.sh
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "audit assertion FAIL (warning mode вҖ” PR merge лҜём°ЁлӢЁ)"
          fi
          exit 0
