name: responsibility-marker-drift-check
# CFP-2428 / ADR-131 Amendment 1 (Epic CFP-2418 deferred FU) — declared-marker layer(L1 코드→책임) drift 게이트 (warning-tier).
#
# consumer overlay project.yaml 의 repo_topology.responsibility_markers 섹션(CFP-2428 가 docs/project-config-schema.md
# 에 sibling 신설)을 읽어, 선언마커(L1)가 토폴로지(L2 responsibilities[]) 및 파일시스템(L3)과 transitive 일관성을
# 유지하는지 *구조적으로만* 대조하고 drift 3종을 surface:
#   (a) unmarked   L2 책임 R 이 L1 manifest 에 entry 0 (set-diff topology − markers) → exit 1
#   (b) 불일치     repo 지정 marker entry 의 marker.repo ≠ topology.owner_repo[R] (문자열 동등) → exit 1
#   (c) stale      marker entry path/glob 이 fs 에 부재 (os.path.exists / glob.glob 0건) → exit 1
#   + layer 분리   repo_topology 미주입 / applicable!=true / markers 미주입·빈맵 = 정책 공백 fail-open(exit 0)
#   + 역방향 고아  marker.responsibility 가 topology 에 없음 = ::notice:: 만 (warning 아님, drift 카운트 0)
# 기계(구조 대조) vs 사람(의미정합 attestation — review-responsibility 매트릭스 행 d) 판정 분리
#   (ADR-131 §결정4 / ADR-119 검사연극 금지). 의미정합('R 이 의미상 옳은 레포인가')은 리뷰어 위임.
# disjoint from CFP-2422 L2 게이트 (L1 marker vs L2 topology — 같은 부모 repo_topology, 검사 명제 비중첩).
#
# single-root (.github only) governance 도구라 .github-only 정합이나, Story §1 verbatim =
#   templates/github-workflows/ + .github/workflows/ 양쪽 byte-identical write (ADR-005 정합 안전).
#   invariant-check.yml parity loop = templates → .github 단방향 검증 (byte-identical 이라 drift 0).
#
# graceful-degradation (change-plan §3.2 / §7.1 — 2-tier 엄격 분리):
#   data-absence(A)=fail-open(스크립트 EXIT 0, honest 분류 ::notice::) / setup-error(B)=fail-closed(EXIT 2).
#   path-filter / `on.paths` skip 금지 (비협상, InfraOp P0) — required check "Pending(expected)" 영구
#     차단 회피 + 게이트 핵심 케이스(diff 가 marker yaml 안 건드려도 코드 이동으로 stale 유발하는 PR) 구조적
#     놓침 회피. 스크립트가 내부에서 data-absence 를 EXIT 0 처리 (워크플로 `if:` skip 아님, path-filter 절대 아님).
#
# injection-safe: on: pull_request (NOT pull_request_target — fork PR base secret 미노출) +
#   permissions: contents:read (write/secret 0). repo 내 파일(consumer overlay + fs-stat)만 read —
#   외부 mutable 입력 0 (overlay 값 shell-interpolate 0 — Python 본체가 yaml.safe_load 파싱, fork-PR injection 차단).
#
# offline-first: drift 검사 입력 = repo 내 overlay yaml + fs-stat, gh api 호출 0 (§7.4.4 N/A 전제).
#
# Non-required workflow (branch protection 6-tuple 무변경, merge 미차단). warning-tier: lint job 은
#   위반 검출 시 경고 표시하되 continue-on-error 로 job 성공(비차단). main 7일 green → required 등록은
#   별 후속 Story (transition Story = continue-on-error 1줄 제거 + contexts 1개 추가 최소 surface).

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  responsibility-marker-drift:
    name: responsibility-marker-drift (warning-tier)
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON_LINUX_JSON || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Run check-responsibility-marker-drift.sh (warning, 비차단)
        continue-on-error: true
        run: bash scripts/check-responsibility-marker-drift.sh

  responsibility-marker-drift-test:
    name: responsibility-marker-drift discriminating test (mutation 생존 0)
    if: github.repository == 'mclayer/plugin-codeforge'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Run test_check-responsibility-marker-drift.sh (회귀 시 exit 1 차단)
        run: bash tests/scripts/test_check-responsibility-marker-drift.sh
