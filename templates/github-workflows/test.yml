# test.yml — 구현 테스트 workflow 템플릿 (CFP-367 / ADR-055)
# Consumer 사용법: .github/workflows/test.yml로 복사 후 runner/path 수정
#
# CI gate 통과 조건:
#   - unit-tests PASS
#   - integration-tests PASS (docker-compose.test.yml 없으면 warning + skip)

name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        # Consumer: 경로를 자신의 구조에 맞게 수정 (예: tests/unit/, test/, src/tests/)
        # No Python tests in path → skip (doc-only fast-path support, exit 0)
        run: |
          if find tests/unit -name "*.py" -not -name "__init__.py" 2>/dev/null | head -1 | grep -q .; then
            pytest tests/unit/ -v --tb=short
          else
            echo "[OK] No Python tests in tests/unit/ -- skipping pytest (doc-only fast-path support, exit 0)"
          fi

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests      # unit 통과 후 실행
    if: always()           # unit FAIL도 integration 독립 실행 (별도 리포팅)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check docker-compose.test.yml
        id: check_compose
        run: |
          if [ -f "docker-compose.test.yml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::docker-compose.test.yml not found — integration tests skipped (§8.6 exempt or InfraEngineerAgent pending)"
          fi

      - name: Start test environment
        if: steps.check_compose.outputs.exists == 'true'
        run: docker-compose -f docker-compose.test.yml up -d --wait

      - name: Run integration tests
        if: steps.check_compose.outputs.exists == 'true'
        # Consumer: timeout 초 단위로 환경에 맞게 조정, 경로도 자신의 구조로 수정
        run: pytest tests/integration/ --timeout=300 -v --tb=short

      - name: Teardown test environment
        if: always() && steps.check_compose.outputs.exists == 'true'
        run: docker-compose -f docker-compose.test.yml down
