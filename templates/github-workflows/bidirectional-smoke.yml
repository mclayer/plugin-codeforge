name: Bidirectional smoke verify (Phase 1 declarative seed)
# CFP-1059 Story-1 / ADR-089 §결정 4 — 양방향 smoke 검증 (옛 코드 / 새 schema + 새 코드 / 옛 schema)
# Tier: warning (continue-on-error, declaration-only Wave 1)
# Bypass channel: hotfix-bypass:bidirectional-smoke label (label-registry-v2.42)
#
# Phase 1 declarative seed (S2/S3 wire pending):
#   - 실제 smoke 검증 (4 combination matrix: code_old×schema_new + code_new×schema_old +
#     code_new×schema_new + code_old×schema_old) = codeforge-deploy-review plugin seed
#     (sibling carrier Story-N) + Schema 7 원칙 §결정 1 원칙 3 (compatibility window) 후 wire.
#   - 본 file = ADR-089 mechanical_enforcement_actions: [schema-change-7-principles-self-check]
#     declaration anchor 의 양방향 smoke 영역 binding.
#
# ADR-089 §결정 4 binding:
#   - 양방향 = forward (옛 코드 / 새 schema) + backward (새 코드 / 옛 schema)
#   - Schema 7 원칙 중 원칙 3 (compatibility window) 의 mechanical anchor
#   - §결정 1 원칙 7 hard limit (column 100+ / row 1억+ / lock 5분+ / depth 7+) self-check binding
#
# 승격 path:
#   warning → blocking-on-pr 승격 시 CFP-NNN carrier PR 가 다음 변경 동반 의무:
#     1. 본 workflow 의 `continue-on-error: true` 제거
#     2. branch protection required_status_checks 에 본 workflow job name 추가
#     3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d))
#     4. Schema migration script + smoke fixture pair (bats) 제출

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'migrations/**'
      - 'schema/**'
      - 'src/**'  # code layer (sibling layer of schema)
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  bidirectional-smoke-declarative-seed:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — Phase 1 declarative seed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Phase 1 declarative seed placeholder
        run: |
          set -euo pipefail
          echo "=== Bidirectional smoke verify (Phase 1 declarative seed) ==="
          echo "ADR-089 §결정 4 mechanical_enforcement_actions anchor"
          echo "mechanical action: schema-change-7-principles-self-check (declaration-only Wave 1)"
          echo ""
          echo "Actual smoke matrix (4 combination): code_old×schema_new + code_new×schema_old"
          echo "  + code_new×schema_new + code_old×schema_old"
          echo "  = codeforge-deploy-review plugin seed + Schema 7 원칙 §결정 1 원칙 3 후 wire."
          echo ""
          echo "Phase 1 declarative seed — S2/S3 wire pending"
          exit 0
