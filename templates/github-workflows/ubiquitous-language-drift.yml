name: Ubiquitous Language drift (warning mode)
# CFP-1117-S3 / ADR-091 §결정 4 + §결정 6 — DDD vocabulary enforcement layer (Template lint tier)
# Tier: warning (continue-on-error, non-required check)
# Bypass channel: hotfix-bypass:ubiquitous-language-drift label (ADR-024 Amendment 3 + ADR-060 §결정 7)
# vocabulary theater 차단 forcing function (ADR-091 §결정 7 INV-5) mechanical wire.
#
# 승격 path (warning → blocking-on-pr):
#   1. 본 workflow 의 `continue-on-error: true` 제거
#   2. branch protection `required_status_checks.contexts` 에 본 workflow job name 추가
#   3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d) + evidence-checks-registry.yaml promotion_criteria)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'docs/glossary.md'
      - 'docs/stories/*.md'

permissions:
  pull-requests: write
  contents: read

jobs:
  ubiquitous-language-drift:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5 / ADR-091 §결정 6 Template lint tier) — lint fail 이 PR merge 차단하지 않음.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pyyaml
        run: python3 -m pip install --user pyyaml

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "labels=$labels"
          case ",$labels," in
            *,hotfix-bypass:ubiquitous-language-drift,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run ubiquitous language drift lint
        id: lint
        if: steps.bypass.outputs.bypass == 'false'
        run: |
          set +e
          bash scripts/check-ubiquitous-language.sh 2>&1 | tee /tmp/lint.out
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit 0  # continue-on-error 정합 — fail 이어도 다음 step 진행

      - name: Post lint result comment (sticky)
        if: steps.bypass.outputs.bypass == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/lint.out 2>/dev/null || echo '(lint output 부재)')"
          if [ "${LINT_STATUS:-1}" = "0" ]; then
            HEADER="## ✓ Ubiquitous Language drift lint — PASS (warning mode)"
            FOOTER="drift 0건. ADR-091 §결정 4 Published Language SSOT (docs/glossary.md) 정합."
          else
            HEADER="## ⚠ Ubiquitous Language drift lint — drift 감지 (warning mode)"
            FOOTER=$'**warning mode (ADR-091 §결정 6 Template lint tier / ADR-060 §결정 5)**: lint fail 이 PR merge 를 차단하지 않습니다. glossary anchor 추가 또는 term 정정으로 해소 또는 bypass label 부착.\n\n**hotfix bypass channel** (ADR-024 Amendment 3): `hotfix-bypass:ubiquitous-language-drift` label 부착 → lint skip + audit comment 자동 발의 (권한자 = repo admin).'
          fi
          BODY=$(printf '%s\n\n```\n%s\n```\n\n%s\n\n%s' \
            "$HEADER" "$LINT_OUT" "$FOOTER" \
            "> ⓘ 본 workflow = **warning mode** (continue-on-error). PR merge 미차단. 승격 gate (ADR-060 §결정 6) 통과 후 blocking 전환. vocabulary theater 차단 forcing function (ADR-091 §결정 7 INV-5).")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Emit bypass audit comment (label applied)
        if: steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # Schema: ADR-060 §결정 8 verbatim
          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' 섹션 부재 — 후속 보완 의무)"
          fi
          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:ubiquitous-language-drift")] | last | .actor.login' \
            2>/dev/null || echo "unknown")
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label_applied_by=${LABEL_USER} reason=${REASON} check=ubiquitous-language-drift timestamp=${TS}"
          BODY=$(printf '%s\n\n%s' \
            "$AUDIT" \
            "> ⓘ ADR-024 Amendment 3 §결정 6.C — audit trail 자동 발의. ADR-091 §결정 6 enforcement layer warning tier.")
          gh pr comment "$PR_NUMBER" --body "$BODY"
