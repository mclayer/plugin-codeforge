name: Runtime hook presence check (warning mode — Wave 1)
# CFP-1745 / ADR-115 §결정 2·3·5 — runtime hook presence evidence gate
# Epic CFP-1740 Story-5: evidence-gate 4 entry
# ADR-060 §결정 5 default warning mode (first introduction = warning tier)
# Tier: warning (continue-on-error: true, non-required check)
# Bypass: hotfix-bypass:runtime-hook-presence label (108번째 family member)
#
# 4 entry 단일 bypass family 공유:
#   runtime-hook-userprompt-presence (ADR-115 §결정 2 — UserPromptSubmit)
#   runtime-hook-pretooluse-agent-presence (ADR-115 §결정 3 — PreToolUse:Agent)
#   runtime-hook-stop-presence (ADR-115 §결정 5 — Stop)
#   runtime-hook-subagentstop-presence (ADR-115 §결정 5 — SubagentStop)
#
# Detection: hooks/hooks.json jq/python3 파싱 → 4 hook entry presence verify
# Script: scripts/check-runtime-hook-presence.sh (ADR-061 bash convention, jq/python3 -c 5줄 이내)
#
# 한계 명시: Stop/SubagentStop hook 이 Claude Code harness platform bug #10412 로 인해
#   plugin-deploy 후 간헐적으로 발화 중단될 수 있음 — hotfix-bypass:runtime-hook-presence 사용.
#
# Wave 1 mechanical wire (scripts/check-runtime-hook-presence.sh 포함) — blocking-on-pr promotion = ADR-060 evidence gate
# (PR ≥ 20 + bypass 외 failure = 0 + sibling Story merged)
#
# Bypass audit: scripts/check-bypass-audit-comment.sh (ADR-024 Amendment 6/8 §결정 6.A 5 lint chain)

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled, edited]
    paths:
      - 'hooks/hooks.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: runtime-hook-presence-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  runtime-hook-presence-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Check bypass label
        id: bypass
        run: |
          labels='${{ toJson(github.event.pull_request.labels.*.name) }}'
          if echo "$labels" | grep -q 'hotfix-bypass:runtime-hook-presence'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::hotfix-bypass:runtime-hook-presence label detected — skipping runtime hook presence check"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.bypass.outputs.skip != 'true'

      - name: Check runtime hook presence (all 4 entries)
        if: steps.bypass.outputs.skip != 'true'
        run: |
          bash scripts/check-runtime-hook-presence.sh all

      - name: Bypass summary
        if: steps.bypass.outputs.skip == 'true'
        run: |
          echo "::notice::CFP-1745 runtime-hook-presence check skipped via hotfix-bypass label."
          echo "ADR-115 §결정 2·3·5 — runtime hook presence evidence gate (warning tier)."
          echo "Bypass: hotfix-bypass:runtime-hook-presence (108번째 family member, ADR-024 Amendment 6/8 audit-trailed exception channel)."
