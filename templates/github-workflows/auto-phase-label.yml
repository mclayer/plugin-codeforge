name: Auto phase label (warning mode)
# CFP-481 / ADR-060 / ADR-024 Amendment 4 — Evidence-enforceable framework 3rd warning-tier entry
# Tier: warning (continue-on-error, non-required check)
# Bypass channel: hotfix-bypass:auto-phase-label label (ADR-024 Amendment 3 + ADR-060 §결정 7)
# Trigger: pull_request types=[opened] only — 사용자 manual phase label 변경 권위 보존 (synchronize/labeled/reopened 미포함)
# Branch → phase mapping SSOT: ADR-024 Amendment 4 §결정 6.A.1
# Race 회피: concurrency.group 직렬화 + story-init.yml PR skip 가드
# Idempotency: PR body marker `<!-- attached_by_auto: true -->` presence dedup
#
# 4-tier inference fallback chain:
#   1순위 — Branch name 파싱 (cfp-NNN[/<lane>[/<sub>]] hierarchical)
#   2순위 — PR body `Related: #N` linked Issue label inheritance
#   3순위 — terminal default (cfp-NNN-docs-* → phase:설계-리뷰 / cfp-NNN-close → phase:reservation)
#   4순위 — phase:unclassified + warning audit comment
#
# 승격 path:
#   warning → blocking-on-pr 승격 시 CFP-NNN carrier PR 가 다음 변경 동반 의무:
#     1. 본 workflow 의 `continue-on-error: true` 제거
#     2. branch protection `required_status_checks.contexts` 에 본 workflow job name 추가
#        (ADR-024 Amendment 2 / branch-protection-manifest.yaml SSOT 정합)
#     3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d) + evidence-checks-registry.yaml promotion_criteria)

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write
  issues: read
  contents: read

# Race 직렬화 (Change Plan §3.2 / Story §7.2):
# - 본 workflow concurrency group `phase-label-auto-N` 직렬화 (story-init.yml `story-init-N` group 과 distinct)
# - phase-label-invariant.yml 와는 trigger event type 분리 (`pull_request:opened` vs `pull_request:labeled`)
#   → race 자체 미발생
concurrency:
  group: phase-label-auto-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  auto-phase-label:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — workflow fail 이 PR merge 차단하지 않음.
    # required_status_checks.contexts 부착 X.
    continue-on-error: true
    # Guard 1: story-init.yml 가 만든 PR 은 이미 phase:* label 부착 → skip (책임 분리, 중복 부착 회피)
    # Guard 2: hotfix-bypass:auto-phase-label label 부착 PR 은 skip (audit-trailed exception channel)
    if: |
      !contains(toJSON(github.event.pull_request.labels.*.name), '"phase:') &&
      !contains(github.event.pull_request.labels.*.name, 'hotfix-bypass:auto-phase-label')
    steps:
      - name: Infer phase label (4-tier fallback chain)
        id: infer
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const branch = pr.head.ref;
            const body = pr.body || '';

            // ─── Branch → phase mapping SSOT (ADR-024 Amendment 4 §결정 6.A.1 verbatim) ───
            const LANE_MAP = {
              'requirements':  'phase:요구사항',
              'design':        'phase:설계',
              'design-review': 'phase:설계-리뷰',
              'develop':       'phase:구현',
              'code-review':   'phase:구현-리뷰',
              'security-test': 'phase:보안-테스트'
            };

            // ─── 1순위: Branch name 파싱 (cfp-NNN[/<lane>[/<sub>]] hierarchical) ───
            // Sub-task branch (cfp-NNN/<lane>/<sub-name>) — lane prefix 만 매칭
            // 예: cfp-481/design/security-arch → phase:설계 (lane prefix `design` 매칭)
            const branchMatch = branch.match(/^cfp-\d+\/([a-z-]+)(?:\/.*)?$/i);
            if (branchMatch) {
              const lane = branchMatch[1].toLowerCase();
              if (LANE_MAP[lane]) {
                core.info(`[tier-1] branch=${branch} lane=${lane} → ${LANE_MAP[lane]}`);
                core.setOutput('phase', LANE_MAP[lane]);
                core.setOutput('tier', '1');
                core.setOutput('reason', `branch parse: cfp-NNN/${lane}`);
                return;
              }
              // Fix iter / retro / unknown lane → 2순위 fallback
              core.info(`[tier-1] branch=${branch} lane=${lane} not in LANE_MAP → fallback 2순위`);
            }

            // ─── 3순위 sub-check (1순위 fail + body marker 또는 close suffix) — 2순위보다 먼저 평가 가능 ───
            // doc-only fast-path: body marker `<!-- doc-only -->` 또는 branch suffix `-docs-*`
            // (ADR-054 §결정 4 정합 — terminal phase = phase:설계-리뷰)
            const isDocOnlyBranch = /^cfp-\d+-docs-/i.test(branch);
            const hasDocOnlyMarker = /<!--\s*doc-only\s*-->/i.test(body);
            // Epic close PR: branch suffix `-close` 또는 body Epic close 시그널
            // (ADR-020 Amendment 1 §결정 9 정합 — terminal phase = phase:reservation)
            const isCloseBranch = /^cfp-\d+-close(\b|$)/i.test(branch);

            // ─── 2순위: PR body `Related: #N` 파싱 → linked Issue 의 phase:* label 상속 ───
            // case-insensitive / multi-line / multiple Related lines / GitHub auto-link `#N` vs URL 4종 robust
            // (a) `Related: #N` 또는 `related: #N`
            const relatedRegex = /^[ \t]*related[ \t]*:[ \t]*#(\d+)[ \t]*$/gim;
            // (b) URL 형식: https://github.com/<owner>/<repo>/issues/N
            const urlRegex = /https?:\/\/github\.com\/[\w.-]+\/[\w.-]+\/issues\/(\d+)/gim;

            const relatedNumbers = [];
            let m;
            while ((m = relatedRegex.exec(body)) !== null) {
              relatedNumbers.push(parseInt(m[1], 10));
            }
            while ((m = urlRegex.exec(body)) !== null) {
              relatedNumbers.push(parseInt(m[1], 10));
            }

            // dedup + first-match policy (Change Plan §3.1 + §8.2 multiple-related fixture 정합)
            const uniqueRelated = [...new Set(relatedNumbers)];
            if (uniqueRelated.length > 0) {
              const firstIssue = uniqueRelated[0];
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: firstIssue
                });
                const phaseLabel = issue.labels
                  .map(l => typeof l === 'string' ? l : l.name)
                  .find(n => n && n.startsWith('phase:'));
                if (phaseLabel) {
                  core.info(`[tier-2] Related: #${firstIssue} → inherit ${phaseLabel}`);
                  core.setOutput('phase', phaseLabel);
                  core.setOutput('tier', '2');
                  let reason = `body Related: #${firstIssue} inherit`;
                  if (uniqueRelated.length > 1) {
                    reason += ` (multiple Related found, first match policy: [${uniqueRelated.join(',')}])`;
                  }
                  core.setOutput('reason', reason);
                  return;
                }
                core.info(`[tier-2] Related: #${firstIssue} found but no phase:* label → fallback 3순위`);
              } catch (e) {
                core.warning(`[tier-2] issues.get(${firstIssue}) failed: ${e.message} → fallback 3순위`);
              }
            }

            // ─── 3순위: terminal default ───
            if (isDocOnlyBranch || hasDocOnlyMarker) {
              core.info(`[tier-3] doc-only signal (branch=${branch} marker=${hasDocOnlyMarker}) → phase:설계-리뷰`);
              core.setOutput('phase', 'phase:설계-리뷰');
              core.setOutput('tier', '3');
              core.setOutput('reason', `doc-only fast-path terminal default (ADR-054)`);
              return;
            }
            if (isCloseBranch) {
              core.info(`[tier-3] Epic close branch (${branch}) → phase:reservation`);
              core.setOutput('phase', 'phase:reservation');
              core.setOutput('tier', '3');
              core.setOutput('reason', `Epic Phase N+1 close terminal default (ADR-020 Amendment 1)`);
              return;
            }

            // ─── 4순위: phase:unclassified + warning audit ───
            core.warning(`[tier-4] all inference 경로 fail (branch=${branch}) → phase:unclassified`);
            core.setOutput('phase', 'phase:unclassified');
            core.setOutput('tier', '4');
            core.setOutput('reason', `모든 inference 경로 fail (branch pattern + Related Issue + terminal default 모두 미매칭)`);

      - name: Apply phase label + idempotency guard
        if: steps.infer.outputs.phase != ''
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          INFERRED_PHASE: ${{ steps.infer.outputs.phase }}
          INFERRED_TIER: ${{ steps.infer.outputs.tier }}
          INFERRED_REASON: ${{ steps.infer.outputs.reason }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const phase = process.env.INFERRED_PHASE;
            const tier = process.env.INFERRED_TIER;
            const reason = process.env.INFERRED_REASON;
            const body = pr.body || '';

            // Idempotency: PR body marker `<!-- attached_by_auto: true -->` presence check
            // (Change Plan §3.4 Q-A2 결정 + §11.3 (a) file-existence marker)
            const MARKER = '<!-- attached_by_auto: true -->';
            if (body.includes(MARKER)) {
              core.info(`[idempotency] marker already present → skip label add + audit comment`);
              return;
            }

            // Add phase label (single-active invariant 은 phase-label-invariant.yml 가 enforce)
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: [phase]
            });
            core.notice(`attached ${phase} (tier ${tier}: ${reason})`);

            // Update PR body — append marker + audit block
            const auditBlock = `\n\n---\n${MARKER}\n<!-- attached_phase: ${phase} | tier: ${tier} | reason: ${reason} -->\n`;
            const newBody = body + auditBlock;
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              body: newBody
            });

            // Post audit comment ([Orchestrator] prefix 정합 — comment-prefix-registry-v1)
            const isWarnTier = tier === '4';
            const header = isWarnTier
              ? `## WARN [Orchestrator] auto-phase-label — tier 4 fallback (\`${phase}\` 부착, 작성자 manual 보완 권고)`
              : `## OK [Orchestrator] auto-phase-label — \`${phase}\` 부착 (tier ${tier})`;
            const tierDescription = {
              '1': 'Branch name 파싱 (1순위)',
              '2': 'PR body `Related: #N` linked Issue label 상속 (2순위)',
              '3': 'Terminal default (3순위)',
              '4': '모든 경로 fail — `phase:unclassified` warning fallback (4순위)'
            }[tier] || 'unknown';
            const tierFooter = isWarnTier
              ? `\n\n**Action required**: branch 명명 (\`cfp-NNN/<lane>\`) 또는 PR body \`Related: #N\` 추가 후 phase label 수동 정정. \`hotfix-bypass:auto-phase-label\` label 부착 시 본 workflow skip.`
              : `\n\n사용자 manual 변경 시 PR body \`<!-- attached_by_auto: true -->\` marker 제거 후 다음 PR open 에서 재발화.`;
            const body2 = `${header}\n\n` +
              `- **inference tier**: ${tierDescription}\n` +
              `- **reason**: ${reason}\n` +
              `- **attached label**: \`${phase}\`\n` +
              `- **idempotency marker**: 부착됨 (\`${MARKER}\`)\n` +
              `${tierFooter}\n\n` +
              `> i 본 workflow = **warning mode** (continue-on-error). PR merge 미차단. 승격 gate (ADR-060 §결정 6) 통과 후 blocking 전환.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: body2
            });

      - name: Emit bypass audit comment (label applied)
        if: contains(github.event.pull_request.labels.*.name, 'hotfix-bypass:auto-phase-label')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # Schema: ADR-060 §결정 8 verbatim
          # [hotfix-bypass-audit] PR=<n> label_applied_by=<user> reason=<reason>
          # scope_files=<paths> timestamp=<ISO8601>

          # bypass reason 추출 — PR description 의 `### Bypass reason` 섹션 본문
          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' 섹션 부재 — 후속 보완 의무)"
          fi

          # label applied_by — 가장 최근 labeled event 의 actor
          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:auto-phase-label")] | last | .actor.login' \
            2>/dev/null || echo "unknown")

          # ISO8601 UTC Z suffix (fix-event-v1 schema clarification 정합)
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label_applied_by=${LABEL_USER} reason=${REASON} scope_files=auto-phase-label-skip timestamp=${TS}"

          BODY="${AUDIT}

> i ADR-024 Amendment 3 §결정 6.C — audit trail 3중 안전망 1차 (audit comment 자동 발의). assertion lint = \`scripts/check-bypass-audit-comment.sh\`. quarterly merge 시 \`docs/audit/hotfix-bypass-log.md\` append (별도 carrier scope)."
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Audit assertion (bypass label 부착 시)
        if: contains(github.event.pull_request.labels.*.name, 'hotfix-bypass:auto-phase-label')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BYPASS_LABEL_PREFIX: 'hotfix-bypass:'
        run: |
          # warning mode 시점 — audit assertion fail 도 continue-on-error 정합.
          # enforce mode 진입 시 본 step 의 exit code 가 required check 결정.
          set +e
          bash scripts/check-bypass-audit-comment.sh
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "WARN audit assertion FAIL (warning mode — PR merge 미차단)"
          fi
          exit 0
