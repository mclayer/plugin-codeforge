name: Active-sessions presence lint (warning mode)
# CFP-2761 / ADR-085 Amendment 2 §결정10 + ADR-073 Amendment 21 — 세션 handoff mid-flight 산출물의
# ownership 표식이 참조하는 active_sessions 레지스트리(git_identity ↔ owner marker 대조 기준면)의
# presence 를 정적 검사. mid-flight-marker 의 owner marker 가 active_sessions 항목을 참조하므로,
# 참조 대상 레지스트리가 산출물에 실재(presence)하는지 tracked content 로 관측.
#   표식의 참됨(진짜 active session 인지 truth)은 강제하지 않음 (presence ≠ truth, honest-ceiling).
# Tier: warning (continue-on-error, non-required check — ADR-060 §결정 5 default). PR merge 미차단.
#   branch-protection 7-tuple 무변경 (required_status_checks.contexts 부착 X).
#
# CI-visibility 3분류(change-plan): 본 workflow = tracked content(PR diff 로 관측 가능) 분류.
#   local-state probe(worktree-self-ownership / lane-entry-ownership)는 hook-only(workflow:null) —
#   fresh-checkout PR runner 가 로컬 worktree·세션 상태 관측 불가 = hollow (anti-hollow CFP-2692 /
#   ADR-073 Amд20) → 별도 workflow YAML 미생성.
#
# consumer degradation: byte-identical template mirror(ADR-005)를 consumer 가 상속해도 코퍼스 부재 시
#   lint 는 honest no-op(exit 0)로 degrade — spurious RED 미발생 (byte-identical parity 유지).

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'scripts/lib/check_active_sessions_presence.py'
      - 'scripts/check-active-sessions-presence.sh'
      - 'templates/github-workflows/active-sessions-presence-check.yml'
      - '.github/workflows/active-sessions-presence-check.yml'
      - 'tests/scripts/test_check-active-sessions-presence.sh'
      - 'docs/stories/**'

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  active-sessions-presence-check:
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON_LINUX_JSON || '["ubuntu-latest"]') }}
    # warning mode (ADR-060 §결정 5) — lint fail 이 PR merge 차단하지 않음.
    # required_status_checks.contexts 부착 X (branch-protection 7-tuple 무변경).
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run discriminating self-test (QADev — presence 검출 / 정직 미검출 / mutation-kill)
        # tests/scripts/test_check-active-sessions-presence.sh: active_sessions 참조 대상 presence 검출 /
        # 정직 presence(레지스트리 실재) 미검출 오탐 0 + mutation-kill discriminating self-test.
        # wrapper-self only (ADR-136 Amd2 QADev tests/scripts 실행 채널 선례 동형).
        if: hashFiles('tests/scripts/test_check-active-sessions-presence.sh') != ''
        run: bash tests/scripts/test_check-active-sessions-presence.sh

      - name: Run active-sessions presence lint
        id: lint
        run: |
          bash scripts/check-active-sessions-presence.sh --repo-root . 2>&1 | tee lint-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Post warning comment (active-sessions presence 결손 검출)
        if: steps.lint.outcome == 'failure'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('lint-output.txt', 'utf8');
            const body = [
              '## Active-sessions presence lint — warning',
              '',
              '> CFP-2761 / ADR-085 Amendment 2 §결정10 + ADR-073 Amendment 21 warning-tier. PR merge 차단 아님.',
              '> mid-flight 산출물의 owner marker 가 참조하는 active_sessions 레지스트리(git_identity 대조 기준면)가 산출물에 결손.',
              '> presence ≠ truth (honest-ceiling): lint 은 참조 대상 presence 만 검사 — 진짜 active session 인지 참됨은 리뷰 lane 소관.',
              '> remediation: active_sessions 레지스트리 항목 부착 / owner marker 참조 정합.',
              '',
              '```',
              output.slice(0, 3000),
              '```',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
