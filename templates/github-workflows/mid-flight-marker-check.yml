name: Mid-flight marker staleness lint (warning mode)
# CFP-2761 / ADR-085 Amendment 2 §결정10 + ADR-073 Amendment 21 — 세션 handoff 시 생성되는
# mid-flight 산출물(docs/stories/** tracked content + archive/adr/ADR-RESERVATION.md 예약 row anchor)의
# ownership·freshness 표식(artifact-level provenance marker) 관례를 정적 검사.
#   tracked content(marker 1-3): owner ↔ active_sessions git_identity / KST-ts(ADR-079) /
#     status ∈ closed-set{draft, provisional, final}.
#   tracked anchor(marker 5): ADR-RESERVATION 예약 row 의 status + age proxy (narrow — owner/kst 미주장).
# 표식의 참됨(freshness truth)은 강제하지 않음 (presence ≠ truth, honest-ceiling:
#   예약-전 window 미커버 / owner·kst 미주장 = narrow anchor).
# Tier: warning (continue-on-error, non-required check — ADR-060 §결정 5 default). PR merge 미차단.
#   branch-protection 7-tuple 무변경 (required_status_checks.contexts 부착 X).
#
# CI-visibility 3분류(change-plan): tracked content(본 workflow — PR diff 로 관측 가능) /
#   local-state probe(worktree-self-ownership / lane-entry-ownership = hook-only, workflow:null —
#     fresh-checkout PR runner 가 로컬 worktree·세션 상태 관측 불가 = hollow, anti-hollow
#     CFP-2692 / ADR-073 Amд20 → workflow YAML 미생성) /
#   tracked anchor narrow(예약 row status+age proxy — owner/kst 미주장 honest-ceiling).
#
# consumer degradation: byte-identical template mirror(ADR-005)를 consumer 가 상속해도 코퍼스 부재 시
#   lint 는 honest no-op(exit 0)로 degrade — spurious RED 미발생 (byte-identical parity 유지).

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'scripts/lib/check_mid_flight_marker.py'
      - 'scripts/check-mid-flight-marker.sh'
      - 'templates/github-workflows/mid-flight-marker-check.yml'
      - '.github/workflows/mid-flight-marker-check.yml'
      - 'tests/scripts/test_check-mid-flight-marker.sh'
      - 'archive/adr/ADR-RESERVATION.md'
      - 'docs/stories/**'

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  mid-flight-marker-check:
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON_LINUX_JSON || '["ubuntu-latest"]') }}
    # warning mode (ADR-060 §결정 5) — lint fail 이 PR merge 차단하지 않음.
    # required_status_checks.contexts 부착 X (branch-protection 7-tuple 무변경).
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run discriminating self-test (QADev — 5유형 marker 검출 / 정직 미검출 / mutation-kill)
        # tests/scripts/test_check-mid-flight-marker.sh: 5유형 discriminating self-test (marker 1-3 tracked
        # content + marker 5 tracked anchor 검출 / 정직 marker 미검출 오탐 0) + MK-T3/T5 mutation-kill.
        # wrapper-self only (ADR-136 Amd2 QADev tests/scripts 실행 채널 선례 동형).
        if: hashFiles('tests/scripts/test_check-mid-flight-marker.sh') != ''
        run: bash tests/scripts/test_check-mid-flight-marker.sh

      - name: Run mid-flight marker staleness lint
        id: lint
        run: |
          bash scripts/check-mid-flight-marker.sh --repo-root . 2>&1 | tee lint-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Post warning comment (mid-flight marker staleness 검출)
        if: steps.lint.outcome == 'failure'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('lint-output.txt', 'utf8');
            const body = [
              '## Mid-flight marker staleness lint — warning',
              '',
              '> CFP-2761 / ADR-085 Amendment 2 §결정10 + ADR-073 Amendment 21 warning-tier. PR merge 차단 아님.',
              '> 세션 handoff mid-flight 산출물(docs/stories/** tracked content + ADR-RESERVATION 예약 row anchor)의 provenance marker(owner ↔ active_sessions git_identity / KST-ts ADR-079 / status ∈ {draft, provisional, final})가 누락·불일치.',
              '> presence ≠ truth (honest-ceiling): lint 은 표식 presence 만 검사 — freshness 참됨은 리뷰 lane 소관, 예약-전 window 미커버 / anchor 는 owner·kst 미주장(narrow).',
              '> remediation: artifact-level provenance marker 부착 / status closed-set 값 정정 / owner git_identity 정합.',
              '',
              '```',
              output.slice(0, 3000),
              '```',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
