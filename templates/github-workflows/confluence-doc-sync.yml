name: confluence-doc-sync

# gitвҶ’Confluence л¬ём„ң мһҗлҸҷ лҸҷкё°нҷ” (ADR-103 В§кІ°м • 1)
# premature л°ңлҸҷ л°©м§Җ: ATLASSIAN_API_TOKEN secret л¶Җмһ¬ мӢң graceful skip.
# A.4 cutover м—җм„ң secret мЈјмһ… + workflow_dispatch full_sync лЎң мІ« мӢӨ sync.

on:
  push:
    branches:
      - main
    paths:
      - 'docs/adr/**'
      - 'docs/inter-plugin-contracts/**'
      - 'docs/domain-knowledge/**'
      - 'docs/orchestrator-playbook.md'
  workflow_dispatch:
    inputs:
      full_sync:
        description: 'м „мІҙ sync м—¬л¶Җ (true = ліҖкІҪ м—¬л¶Җ л¬ҙкҙҖ м „ нҢҢмқј, false = changes-only)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read

jobs:
  confluence-sync:
    runs-on: ubuntu-latest
    steps:
      - name: secret presence guard (premature л°ңлҸҷ л°©м§Җ)
        id: secret-guard
        run: |
          if [ -z "${{ secrets.ATLASSIAN_API_TOKEN }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "secret лҜёмЈјмһ… вҖ” A.4 cutover лҢҖкё°. sync skip."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: checkout
        if: steps.secret-guard.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup python
        if: steps.secret-guard.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install mark
        if: steps.secret-guard.outputs.skip == 'false'
        run: |
          # mark (kovetskiy/mark) мөңмӢ  лҰҙлҰ¬мҠӨ м„Өм№ҳ
          MARK_VERSION=$(curl -s https://api.github.com/repos/kovetskiy/mark/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          curl -sSfL \
            "https://github.com/kovetskiy/mark/releases/download/${MARK_VERSION}/mark_Linux_x86_64.tar.gz" \
            | tar xz -C /usr/local/bin mark
          chmod +x /usr/local/bin/mark
          mark --version

      - name: determine sync scope
        if: steps.secret-guard.outputs.skip == 'false'
        id: sync-scope
        run: |
          FULL="${{ github.event.inputs.full_sync }}"
          if [ "$FULL" = "true" ]; then
            echo "changes_only=false" >> "$GITHUB_OUTPUT"
            echo "sync_files=all" >> "$GITHUB_OUTPUT"
          else
            echo "changes_only=true" >> "$GITHUB_OUTPUT"
            # push event кё°мӨҖ ліҖкІҪ нҢҢмқј лӘ©лЎқ мҲҳм§‘
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- \
              'docs/adr/**' 'docs/inter-plugin-contracts/**' \
              'docs/domain-knowledge/**' 'docs/orchestrator-playbook.md' \
              2>/dev/null || true)
            echo "sync_files=${CHANGED}" >> "$GITHUB_OUTPUT"
          fi

      - name: mark sync (gitвҶ’Confluence push)
        if: steps.secret-guard.outputs.skip == 'false'
        env:
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
          ATLASSIAN_USER_EMAIL: ${{ secrets.ATLASSIAN_USER_EMAIL }}
          CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY }}
        run: |
          CHANGES_ONLY_FLAG=""
          if [ "${{ steps.sync-scope.outputs.changes_only }}" = "true" ]; then
            CHANGES_ONLY_FLAG="--changes-only"
          fi

          # mark config нҢҢмқј нҷңмҡ© (mark.toml вҖ” behavior м„Өм •, credentials лҠ” CLI flag)
          find docs -name "*.md" | while read -r f; do
            mark \
              --config mark.toml \
              --username "$ATLASSIAN_USER_EMAIL" \
              --password "$ATLASSIAN_API_TOKEN" \
              --base-url "$CONFLUENCE_BASE_URL" \
              --space "$CONFLUENCE_SPACE_KEY" \
              $CHANGES_ONLY_FLAG \
              --minor-edit \
              -f "$f" || true
          done

      - name: 3-anchor stamp (write мҷ„лЈҢ нӣ„)
        if: steps.secret-guard.outputs.skip == 'false'
        env:
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
          ATLASSIAN_USER_EMAIL: ${{ secrets.ATLASSIAN_USER_EMAIL }}
          CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
        run: |
          # [hypothesis] H3: page-id л§Өн•‘мқҖ mark м¶ңл Ҙ лҳҗлҠ” лі„лҸ„ mapping нҢҢмқјлЎң м¶”нӣ„ кө¬нҳ„.
          # A.4 cutover м—җм„ң мӢӨ page-id лӘ©лЎқ нҷ•ліҙ нӣ„ stamp loop м¶”к°Җ.
          # нҳ„мһ¬лҠ” stamp мӨҖл№„ лӢЁкі„ (мҠӨнҒ¬лҰҪнҠё syntax кІҖмҰқ).
          python -m py_compile scripts/confluence-sync-3anchor.py
          echo "3-anchor stamp script syntax OK вҖ” page-id л§Өн•‘мқҖ A.4 cutover м—җм„ң мҷ„м„ұ."
