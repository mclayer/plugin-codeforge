name: Fix Ledger Sync

# Consumer-distributable single-repo flavor (CFP-67 / F2 Phase 2 split 1/2).
# Story §10 FIX Ledger row → Issue 의 [FIX #N] 코멘트 mirror + fix:<lane>-retry label 자동 부착.
# Path = docs/stories/*.md (single-repo). cross-repo PAT 의존 제거 (single-repo Issue mirror only).

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'docs/stories/*.md'
  push:
    branches: [main]
    paths:
      - 'docs/stories/*.md'

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse current §10 + sync new entries
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            let changed = [];
            if (context.eventName === 'pull_request') {
              const baseSha = context.payload.pull_request.base.sha;
              const headSha = context.payload.pull_request.head.sha;
              changed = execSync(`git diff --name-only ${baseSha} ${headSha} -- 'docs/stories/*.md'`)
                          .toString().trim().split('\n').filter(Boolean);
            } else {
              changed = execSync(`git diff --name-only HEAD^ HEAD -- 'docs/stories/*.md'`)
                          .toString().trim().split('\n').filter(Boolean);
            }

            const stripCell = (s) => s.replace(/^\s*`?/, '').replace(/`?\s*$/, '').trim();

            for (const f of changed) {
              if (!fs.existsSync(f)) continue;
              const content = fs.readFileSync(f, 'utf8');

              const m = content.match(/##\s*10\.[^\n]*\n([\s\S]*?)(?=\n##\s*11\.|$)/);
              if (!m) continue;
              const ledgerBody = m[1];

              const storyKey = path.basename(f, '.md');

              const issueMatch = content.match(/^\s*-\s*\*\*Issue\*\*:\s*#(\d+)/m);
              if (!issueMatch) {
                core.warning(`No Issue number in ${f} — skipping`);
                continue;
              }
              const issueNumber = parseInt(issueMatch[1], 10);

              const allRows = ledgerBody.split('\n')
                .filter(line => line.match(/^\|/) && !line.match(/^\|[\s|:-]+\|$/));
              if (allRows.length < 1) continue;
              const dataRows = allRows.slice(1);

              const events = [];
              for (const row of dataRows) {
                const cells = row.split('|').slice(1, -1).map(stripCell);
                if (cells.length < 6) continue;
                const iter = cells[0];
                if (!iter || !iter.match(/^\d+$/)) continue;
                events.push({
                  iter: parseInt(iter, 10),
                  ts: cells[1] || '',
                  lane: cells[2] || '',
                  trigger: cells[3] || '',
                  cause: cells[4] || '',
                  scope: cells[5] || '',
                  reset: cells[6] || ''
                });
              }

              if (events.length === 0) continue;

              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                per_page: 100
              });
              const existingFixIters = new Set();
              for (const c of comments) {
                const fm = c.body && c.body.match(/^\[FIX #(\d+)\]/);
                if (fm) existingFixIters.add(parseInt(fm[1], 10));
              }

              const laneToLabel = {
                '설계-리뷰': 'fix:설계-리뷰-retry',
                '구현-리뷰': 'fix:구현-리뷰-retry',
                '구현-테스트': 'fix:구현-테스트-retry',
                '보안-테스트': 'fix:보안-테스트-retry'
              };

              for (const e of events) {
                if (existingFixIters.has(e.iter)) continue;

                const resetNote = e.reset && e.reset !== '—'
                  ? `\n**RESET marker**: ${e.reset}`
                  : '';
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `[FIX #${e.iter}] **${e.lane}** — 트리거: ${e.trigger}\n원인 판정: ${e.cause}\n재실행 범위: ${e.scope}${resetNote}\n\nSource: \`${f}\` §10`
                });

                const label = laneToLabel[e.lane];
                if (label) {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    labels: [label]
                  });
                }
                core.notice(`Mirrored FIX #${e.iter} (${e.lane}) for Story ${storyKey} → Issue #${issueNumber}`);
              }
            }
