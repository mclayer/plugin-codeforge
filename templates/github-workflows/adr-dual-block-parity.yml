name: adr-dual-block-parity
# CFP-1648 / ADR-082 Amendment 28 sub-scope 1-Q — ADR dual-block parity lint
# Tier: warning (ADR-060 evidence-enforceable, continue-on-error: true)
# evidence-checks-registry.yaml entry: adr-dual-block-parity
#
# 검증:
#   docs/adr/ADR-*.md 파일의 frontmatter amendments[] / amendment_log[] 와
#   body ## Amendment N H2 section 의 양방향 parity 검증
#
# F-DR-001 P0 origin sentinel:
#   frontmatter amendment_log[] entry 존재 but body ## Amendment N section 부재
#   → WARNING 발화 (forward-prevention sentinel mechanical wire)
#
# Dual-block parity 3 invariant:
#   Block 1: amendments[] ↔ body H2 count + bidirectional membership
#   Block 2: amendment_log[] ↔ body H2 count + bidirectional membership (F-DR-001 P0)
#   Block 3: amendments[] ↔ amendment_log[] cross-count parity
#
# 트리거 (D2 dual trigger):
#   pull_request: docs/adr/** 변경 시 — opened/synchronize/reopened
#   workflow_dispatch: 수동 ad-hoc 전체 scan
#
# Hotfix bypass:
#   hotfix-bypass:adr-dual-block-parity label 부착 시 skip + audit comment
#   (ADR-024 Amendment N §결정 6.A per-entry namespace, 103번째 family member)
#
# Permissions: deny-all top-level + per-job least-privilege (ADR-060 Amendment 8)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'docs/adr/**'
  workflow_dispatch:

permissions: {}  # top-level deny-all

jobs:
  adr-dual-block-parity:
    runs-on: ubuntu-latest
    continue-on-error: true  # warning tier — does not block CI (ADR-060 §결정 5)
    permissions:
      contents: read       # git checkout + file read
      pull-requests: write # bypass audit comment

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git diff

      - name: Check hotfix-bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            LABELS=$(gh pr view ${{ github.event.pull_request.number }} \
              --json labels --jq '[.labels[].name] | @json' 2>/dev/null || echo '[]')
            if echo "$LABELS" | grep -q "hotfix-bypass:adr-dual-block-parity"; then
              echo "bypass=true" >> "$GITHUB_OUTPUT"
            else
              echo "bypass=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "bypass=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bypass audit comment
        if: steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "[adr-dual-block-parity] hotfix-bypass:adr-dual-block-parity active — lint check skipped"
          echo "[bypass-justification] hotfix-bypass:adr-dual-block-parity applied on PR #${{ github.event.pull_request.number }}"
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "[adr-dual-block-parity] bypass active — hotfix-bypass:adr-dual-block-parity label detected. Audit trail: $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              2>/dev/null || true
          fi

      - name: Setup Python
        if: steps.bypass.outputs.bypass != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run ADR dual-block parity lint
        if: steps.bypass.outputs.bypass != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/check-adr-dual-block-parity.sh

          # Determine ADR files to scan
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            # PR mode: scan only changed ADR files
            CHANGED_ADRS=$(git diff --name-only origin/${{ github.base_ref || 'main' }}...HEAD \
              -- 'docs/adr/ADR-*.md' 2>/dev/null || echo "")

            if [ -z "$CHANGED_ADRS" ]; then
              echo "[adr-dual-block-parity] No ADR files changed — parity check skipped"
              exit 0
            fi

            echo "[adr-dual-block-parity] Changed ADR files in PR:"
            echo "$CHANGED_ADRS"

            WARN_COUNT=0
            while IFS= read -r adr_path; do
              [ -z "$adr_path" ] && continue
              [ ! -f "$adr_path" ] && continue
              echo "[adr-dual-block-parity] Checking: $adr_path"
              bash scripts/check-adr-dual-block-parity.sh \
                --mode=audit \
                --adr-glob="$adr_path" \
                2>&1 || {
                EXIT_CODE=$?
                if [ $EXIT_CODE -eq 1 ]; then
                  echo "::warning::adr-dual-block-parity WARNING: $adr_path — amendments/amendment_log body parity drift (F-DR-001 P0 origin)"
                  WARN_COUNT=$((WARN_COUNT + 1))
                elif [ $EXIT_CODE -eq 2 ]; then
                  echo "::warning::adr-dual-block-parity ENVIRONMENT_ERROR: $adr_path"
                fi
              }
            done <<< "$CHANGED_ADRS"

            if [ "$WARN_COUNT" -gt 0 ]; then
              echo "::warning::adr-dual-block-parity: $WARN_COUNT ADR file(s) have dual-block parity drift"
            fi
          else
            # workflow_dispatch: full scan of all ADR files
            echo "[adr-dual-block-parity] Full scan mode (workflow_dispatch)"
            bash scripts/check-adr-dual-block-parity.sh \
              --mode=audit \
              2>&1 || {
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 1 ]; then
                echo "::warning::adr-dual-block-parity: 1+ ADR file(s) have dual-block parity drift (F-DR-001 P0 sentinel)"
              elif [ $EXIT_CODE -eq 2 ]; then
                echo "::warning::adr-dual-block-parity ENVIRONMENT_ERROR during full scan"
              fi
            }
          fi
          exit 0  # warning tier: non-blocking
