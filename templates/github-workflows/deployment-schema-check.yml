name: Deployment schema check (warning mode)
# CFP-1059-S5 / ADR-087 mechanical_enforcement_actions binding
# ADR-027 Consumer adoption protocol -- project.yaml deploy.* block schema enforcement
# ADR-060 Evidence-enforceable promotion framework -- warning tier
# Tier: warning (continue-on-error, non-required check)
# Bypass channel: hotfix-bypass:deployment-schema label (label-registry-v2 -- new family member)
#
# Validates: consumer overlay .claude/_overlay/project.yaml deploy.* block schema
#   - 5 sub-field presence + type (host_mapping / docker_hub / traefik / 1password / ssh_targets)
#   - yaml.safe_load based (ADR-070 verify-before-trust, ADR-089 fail-loud)
#   - Secret env-name only (value dereference 0 -- SS7 SecurityArch invariant)
#
# Dogfooding: wrapper repo has no deploy block -> PASS (opt-in skip -- correct)
#
# Promotion path:
#   warning -> blocking-on-pr: CFP-NNN carrier PR must include:
#     1. Remove `continue-on-error: true`
#     2. Add job name to branch protection required_status_checks
#     3. Submit evidence 3 artifacts (ADR-060 SS결정 6(d) + evidence-checks-registry.yaml)
#     4. evidence-checks-registry.yaml current_tier field update: warning -> blocking-on-pr

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - '.claude/_overlay/project.yaml'
  workflow_dispatch:
    inputs:
      overlay_path:
        description: 'Path to project.yaml overlay (default: .claude/_overlay/project.yaml)'
        required: false
        type: string

permissions:
  pull-requests: write
  contents: read

jobs:
  deployment-schema-check:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 SS결정 5) -- lint fail does not block PR merge.
    # required_status_checks.contexts not attached.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python + PyYAML
        run: |
          python3 -m pip install --user pyyaml

      - name: Resolve overlay path
        id: overlay
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.overlay_path }}" ]]; then
            OVERLAY="${{ inputs.overlay_path }}"
          else
            OVERLAY=".claude/_overlay/project.yaml"
          fi
          echo "path=${OVERLAY}" >> "$GITHUB_OUTPUT"
          echo "=== Overlay path: ${OVERLAY} ==="

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "bypassed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          labels=$(gh pr view "$PR_NUMBER" --json labels \
            --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          if echo "$labels" | grep -q "hotfix-bypass:deployment-schema"; then
            echo "bypassed=true" >> "$GITHUB_OUTPUT"
            echo "=== BYPASS active: hotfix-bypass:deployment-schema label detected ==="
          else
            echo "bypassed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run deployment schema validation
        if: steps.bypass.outputs.bypassed != 'true'
        env:
          OVERLAY_PATH: ${{ steps.overlay.outputs.path }}
        run: |
          set -euo pipefail
          echo "=== Validating deploy.* schema: ${OVERLAY_PATH} ==="
          bash scripts/check-deployment-schema.sh "${OVERLAY_PATH}"
          RESULT=$?
          echo "=== Exit code: ${RESULT} ==="
          if [[ "${RESULT}" -eq 1 ]]; then
            echo ""
            echo "=== SCHEMA VIOLATION DETECTED ==="
            echo "consumer overlay deploy.* block has schema errors."
            echo "Fix the issues above to resolve this warning."
            echo ""
            echo "Bypass: add label 'hotfix-bypass:deployment-schema' to suppress (audit-trailed)."
            exit 1
          elif [[ "${RESULT}" -eq 2 ]]; then
            echo "=== lint-internal-error (YAML parse failure) - fail-loud (ADR-089) ==="
            exit 2
          else
            echo "=== PASS (or opt-in skip) ==="
          fi

      - name: Bypass notice
        if: steps.bypass.outputs.bypassed == 'true'
        run: |
          echo "=== Skipped: hotfix-bypass:deployment-schema label active ==="
          echo "Bypass is audit-trailed via label presence (ADR-024 Amendment 3)."
