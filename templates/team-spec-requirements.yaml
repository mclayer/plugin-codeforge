# Team spec — 요구사항 lane
# CFP-137 / ADR-044 §결정 2 SSOT (dispatch_mode SSOT)
# CFP-411 / ADR-052 Amendment 1 — Codex worker entry 신설 + dispatch_mode [default, auto_on_divergence]
#                                  + divergence_detection 블록 + adversarial-debate dispatch_pattern entry
# CFP-609 / ADR-064 Amendment 1 — ADR-056 implementation gap absorb (teammates 6-way fanout —
#                                  ChangeImpactAgent / FeasibilityAgent / ContinuityAgent 추가).
#                                  parallel-dispatch-protocol-v1 §5 4-분기 결정 tree 정합.
# Trigger: story-init.yml Action (Issue Forms 제출) 후 Orchestrator 가 RequirementsPL spawn
# Activation: CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 (env=0 시 fallback to ADR-039 default subagent context)

lane: requirements
description: |
  요구사항 lane — RequirementsPL (lead) + 요구사항 lane 전체 sub-agent 동시 spawn (count: 6)
  + Codex worker (proactive check producer, ADR-052 touchpoint #4).
  모든 sub-agent non-skippable (codeforge-requirements plugin SSOT). PL 이 dedup + 상충 조정.
  Codex worker = §1~§6 완료 직후 1회 발화 (proactive check) + RequirementsPL semantic divergence 감지 시
  debate-protocol-v1 multi-round 자동 발동 (ADR-052 Amendment 1 — touchpoint #4 multi-round 격상).
  PL final synthesis = Story §2/§5/§6 self-write (review-verdict packet producer 아님 — synthesis lane).
  CFP-609 absorb — ADR-056 implementation gap fix (3 sub-agent → 6 sub-agent fanout).

teammates:
  - name: RequirementsPLAgent
    role: PL
    system_prompt_path: agents/RequirementsPLAgent.md  # codeforge-requirements plugin canonical
    model: claude-opus-4-7
    spawn_mode: default
    dispatch_mode: default

  - name: DomainAgent
    role: deputy
    system_prompt_path: agents/DomainAgent.md
    model: claude-opus-4-7
    spawn_mode: default
    dispatch_mode: default

  - name: RequirementsAnalyst
    role: deputy
    system_prompt_path: agents/RequirementsAnalystAgent.md
    model: claude-opus-4-7
    spawn_mode: default
    dispatch_mode: default

  - name: Researcher
    role: deputy
    system_prompt_path: agents/ResearcherAgent.md
    model: claude-opus-4-7
    spawn_mode: default
    dispatch_mode: default

  # CFP-609 / ADR-064 Amendment 1 — ADR-056 implementation gap absorb (3 신규 deputy 추가)
  - name: ChangeImpactAgent
    role: deputy
    system_prompt_path: agents/ChangeImpactAgent.md  # codeforge-requirements plugin canonical
    model: claude-opus-4-7
    spawn_mode: default
    dispatch_mode: default

  - name: FeasibilityAgent
    role: deputy
    system_prompt_path: agents/FeasibilityAgent.md  # codeforge-requirements plugin canonical
    model: claude-opus-4-7
    spawn_mode: default
    dispatch_mode: default

  - name: ContinuityAgent
    role: deputy
    system_prompt_path: agents/ContinuityAgent.md  # codeforge-requirements plugin canonical
    model: claude-opus-4-7
    spawn_mode: default
    dispatch_mode: default

  # ADR-077 §결정 2 — 조건부 PMO 합류 (답변 영향이 Epic/Story 구조 도달 시 재분해).
  # ADR-045 PMO retro mandatory trigger 와 origin disjoint (재분해 spawn ≠ retro spawn).
  - name: PMOAgent
    role: deputy
    system_prompt_path: agents/PMOAgent.md
    model: claude-opus-4-7
    spawn_mode: conditional
    activation_condition: epic_structure_change
    contrapositive_invariant: "PMO 합류 미발동 = Epic 구조 무변경"
    dispatch_mode: [default]

  - name: CodexProactiveCheckAgent
    role: worker
    system_prompt_path: agents/codex-proactive-check.md  # codeforge-requirements plugin sibling sync (Phase 2 follow-up PR scope)
    model: gpt-5-codex  # codex@openai-codex plugin 의 codex CLI runtime
    spawn_mode: default
    activation_condition: requirements_synthesis_complete  # §1~§6 self-write 완료 직후 발화 (ADR-052 touchpoint #4)
    # CFP-411 / ADR-052 Amendment 1 — dispatch_mode 배열 표기 (우선순위: default > auto_on_divergence > user_request_only)
    # default = §1~§6 완료 직후 1회 proactive check 발화 (touchpoint #4 자동 활성, opt-in 없음 — ADR-052 D2)
    # auto_on_divergence = RequirementsPL semantic divergence 감지 시 debate-protocol-v1 multi-round 자동 발동
    dispatch_mode: [default, auto_on_divergence]
    divergence_detection:
      surface: pl_semantic_judgment  # RequirementsPL LLM 의미 판정 (structured surface 없음 — synthesis lane 특성)
      criteria: [ac_semantic_diff, edge_case_semantic_diff, why_interpretation_diff]
      anchor_field: pl_assigned_anchor_id  # PL 이 §<section-ref> 형태로 할당 (review-verdict-v4 패턴 재사용)
      anchor_format: "§<section-ref>"  # 예: §5-AC-3, §5.2-EC-2, §2-bound-1, §6-source-2

dispatch_pattern:
  - name: parallel
    description: "요구사항 lane 전체 sub-agent 동시 spawn (count: 6)"  # CFP-609 ADR-056 absorb
  - name: post-synthesis-codex-check
    description: "§1~§6 완료 직후 Codex proactive check 1회 발화 (touchpoint #4 default 동작)"
    trigger: RequirementsPL §2/§5/§6 self-write 완료
  - name: adversarial-debate
    description: "Multi-round adversarial debate (debate-protocol-v1) — semantic divergence 감지 시 자동 발동"
    trigger: RequirementsPL LLM 이 Codex proactive check 결과 vs 자기 synthesis 간 semantic divergence 판정
    protocol: debate-protocol-v1
    rounds: { min: 3, max: 5, soft_default: 4 }
    termination: pl_llm_judgment OR user_arbitration
    transcript_persistence: story_section_9

worktree_layout:
  per_teammate: false  # 요구사항 lane = doc-only, 단일 worktree 충분
  base_worktree: cfp-NNN

hook_subscriptions:
  - TeammateIdle
  - TaskCreated
  - TaskCompleted

measurable_verification:
  parallelization: "§14 Lane Evidence 의 6 sub-agent row spawned_at diff < 60s (ADR-044 §결정 5 + ADR-056 gap fix — CFP-609)"
  post_synthesis_codex_check: "§14 Lane Evidence 의 CodexProactiveCheckAgent row spawned_at > 6 sub-agent end timestamp (sequence 검증)"
  adversarial_debate: "debate-protocol-v1 transcript Story §9 inline append + dialog_rounds_count >= 3 (min cap, ADR-059 §결정 1 정합). FIX 시 §10 FIX Ledger debate_artifact_ref 채움 (fix-event-v1 1.1 정합)"

env_divergent_fallback:
  env_0_behavior: "Orchestrator 가 PL 1개만 spawn → PL 이 1차 sub-agent (Domain) 호출 후 return, Orchestrator 재 spawn 으로 다음 sub-agent. 3-round Orchestrator round-trip 으로 fallback (continuous dialog 부재). §1~§6 완료 후 Orchestrator 가 CodexProactiveCheckAgent subagent one-shot spawn (post-synthesis check)."
  env_0_adversarial_debate: "PL semantic divergence 판정 시 PL 이 Round dispatch 를 Orchestrator round-trip 으로 수행 (매 라운드 worker subagent one-shot spawn + transcript 누적 입력). 토큰 비용 증가 (cache 미적용 — round 간 cold start). PL 자체가 round counter 관리 + Story §14 free-form event 컬럼에 debate_round_N 기록. max 5 라운드 cap = 비용 폭증 차단 forcing function (5 × 2 worker × ~5K = ~50K token, ADR-059 §결정 1 token budget 정합)."
