# Team spec — 요구사항 lane
# CFP-137 / ADR-041 §결정 2 SSOT
# Trigger: story-init.yml Action (Issue Forms 제출) 후 Orchestrator 가 RequirementsPL spawn
# Activation: CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 (env=0 시 fallback to ADR-039 default subagent context)

lane: requirements
description: |
  요구사항 lane — RequirementsPL (lead) + 3 sub-agent (Domain + Analyst + Researcher) 병렬.
  3 sub-agent 모두 non-skippable (codeforge-requirements plugin SSOT). PL 이 dedup + 상충 조정.

teammates:
  - name: RequirementsPLAgent
    role: PL
    system_prompt_path: agents/RequirementsPLAgent.md  # codeforge-requirements plugin canonical
    model: claude-opus-4-7
    spawn_mode: default
    dispatch_mode: default

  - name: DomainAgent
    role: deputy
    system_prompt_path: agents/DomainAgent.md
    model: claude-opus-4-7
    spawn_mode: default
    dispatch_mode: default

  - name: RequirementsAnalyst
    role: deputy
    system_prompt_path: agents/RequirementsAnalyst.md
    model: claude-opus-4-7
    spawn_mode: default
    dispatch_mode: default

  - name: Researcher
    role: deputy
    system_prompt_path: agents/Researcher.md
    model: claude-opus-4-7
    spawn_mode: default
    dispatch_mode: default

dispatch_pattern: parallel  # 3 sub-agent 동시 spawn
worktree_layout:
  per_teammate: false  # 요구사항 lane = doc-only, 단일 worktree 충분
  base_worktree: cfp-NNN

hook_subscriptions:
  - TeammateIdle
  - TaskCreated
  - TaskCompleted

measurable_verification:
  parallelization: "§14 Lane Evidence 의 3 sub-agent row spawned_at diff < 60s (ADR-041 §결정 5)"

env_divergent_fallback:
  env_0_behavior: "Orchestrator 가 PL 1개만 spawn → PL 이 1차 sub-agent (Domain) 호출 후 return, Orchestrator 재 spawn 으로 다음 sub-agent. 3-round Orchestrator round-trip 으로 fallback (continuous dialog 부재)."
