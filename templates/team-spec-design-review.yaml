# Team spec — 설계 리뷰 lane

  # ADR-109 §결정 4 + ADR-044 Amendment 2 신설 (429 incident throttle policy)
  parallel_spawn_cap: 7       # Default: low intensity (0 incident/30min) — Phase 0 brainstorm 7-agent baseline
  spawn_stagger_ms: 0         # Default: no stagger (low intensity)
  cascade_circuit_breaker: false  # Default: disabled, opt-in (429 cascade depth ≥ 2 detection)
# CFP-137 / ADR-044 §결정 2 SSOT (dispatch_mode SSOT)
# CFP-391 / ADR-044 Amendment 1 — dispatch_mode 배열 + auto_on_divergence enum 추가 + divergence_detection 블록 + adversarial-debate dispatch_pattern entry
# Trigger: ArchitectPL verdict = PASS 후 Orchestrator 가 DesignReviewPL spawn
# Activation: CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 (env=0 시 fallback to ADR-039 default subagent context)

lane: design-review
description: |
  설계 리뷰 lane — DesignReviewPL (lead) + 1~2 worker (Claude default + Codex on user_request).
  Default roster = 2 teammate (PL + Claude worker). Codex worker 는 사용자 explicit request 시 추가 → 3 teammate.
  Adversarial debate: Claude vs Codex SendMessage rounds (사용자 활성 시).
  Auto adversarial debate: Codex 활성 후 divergence_detection criteria 매치 시 자동 발동 (debate-protocol-v1).
  PL final pl_recommendation = review-verdict v4 packet (ADR-044 §결정 4 — Sonnet decider 영역 정식 제거).

teammates:
  - name: DesignReviewPLAgent
    role: PL
    system_prompt_path: agents/DesignReviewPLAgent.md  # codeforge-review plugin canonical
    model: claude-opus-4-7
    spawn_mode: default
    dispatch_mode: default

  - name: ClaudeReviewAgent
    role: worker
    system_prompt_path: agents/ClaudeReviewAgent.md
    model: claude-opus-4-7
    spawn_mode: default
    dispatch_mode: default

  - name: CodexReviewAgent
    role: worker
    system_prompt_path: agents/CodexReviewAgent.md
    model: gpt-5-codex  # codex@openai-codex plugin 의 codex CLI runtime
    spawn_mode: conditional
    activation_condition: user_explicit_request  # 사용자 ad-hoc 요청 시에만 활성 (Story §2.4)
    # CFP-391 / ADR-044 Amendment 1 — dispatch_mode 배열 표기 (우선순위: default > auto_on_divergence > user_request_only)
    # user_request_only = 활성 게이트 (사용자 explicit request 로 worker spawn 결정)
    # auto_on_divergence = 활성 후 divergence_detection criteria 자동 매치 시 debate-protocol-v1 발동
    dispatch_mode: [user_request_only, auto_on_divergence]
    divergence_detection:
      surface: review-verdict-v4-findings  # review-verdict-v4 `findings[]` 의 `anchor_id` 필드 surface
      criteria: [severity_mismatch, recommendation_mismatch]
      anchor_field: finding_anchor_id  # findings[].anchor_id (canonical 4.1 schema 추가됨, CFP-391 FIX-1)

dispatch_pattern:
  - name: adversarial
    description: "Claude vs Codex worker SendMessage rounds (Codex 활성 시, default)"
  - name: adversarial-debate
    description: "Multi-round adversarial debate (debate-protocol-v1) — divergence_detection criteria 자동 매치 시 발동"
    trigger: divergence_detection.criteria match 시 자동
    protocol: debate-protocol-v1
    rounds: { min: 3, max: 5, soft_default: 4 }
    termination: pl_llm_judgment OR user_arbitration
    transcript_persistence: story_section_9
worktree_layout:
  per_teammate: false  # review lane = read-only review, 단일 worktree 충분
  base_worktree: cfp-NNN/design-review

hook_subscriptions:
  - TeammateIdle
  - TaskCreated
  - TaskCompleted

measurable_verification:
  adversarial: "review-verdict v4 packet의 worker_dialog_rounds >= 2 (Codex worker 활성 시) — ADR-044 §결정 5"
  adversarial_debate: "debate-protocol-v1 transcript Story §9 inline append + worker_dialog_rounds >= 3 (min cap, ADR-059 §결정 1 정합)"

env_divergent_fallback:
  env_0_behavior: "DesignReviewPL 1개만 spawn → PL 이 Claude worker 1차 호출 → return → Orchestrator 재 spawn 으로 Codex worker (사용자 요청 시). 2-3 round Orchestrator round-trip fallback. SendMessage 부재 → worker_dialog_rounds = 0."
  env_0_adversarial_debate: "auto_on_divergence 매치 시 PL 이 Round dispatch 를 Orchestrator round-trip 으로 수행 (매 라운드 worker subagent one-shot spawn + transcript 누적 입력). 토큰 비용 증가 (cache 미적용). PL 자체가 round counter 관리 + review-verdict-v4 worker_dialog_rounds 정합."
