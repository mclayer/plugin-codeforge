# Fixture: valid design-review team-spec (CFP-137 Phase 2 test fixture)
lane: design-review
description: |
  Test fixture — valid design-review lane team spec (adversarial).

teammates:
  - name: DesignReviewPLAgent
    role: PL
    system_prompt_path: agents/DesignReviewPLAgent.md
    model: opus
    spawn_mode: default
    dispatch_mode: default

  - name: ClaudeReviewAgent
    role: worker
    system_prompt_path: agents/ClaudeReviewAgent.md
    model: opus
    spawn_mode: default
    dispatch_mode: default

  - name: CodexReviewAgent
    role: worker
    system_prompt_path: agents/CodexReviewAgent.md
    model: gpt-5-codex
    spawn_mode: conditional
    activation_condition: user_explicit_request
    dispatch_mode: user_request_only

dispatch_pattern: adversarial
worktree_layout:
  per_teammate: false
  base_worktree: cfp-NNN/design-review

hook_subscriptions:
  - TeammateIdle
  - TaskCreated
  - TaskCompleted

measurable_verification:
  adversarial: "review-verdict v4 packet worker_dialog_rounds >= 2 (Codex worker 활성 시)"

env_divergent_fallback:
  env_0_behavior: "DesignReviewPL 1개만 spawn → PL 이 review 수행. worker_dialog_rounds = 0."
