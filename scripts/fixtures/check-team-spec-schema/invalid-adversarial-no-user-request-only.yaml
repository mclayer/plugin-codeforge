# Fixture: INVALID — adversarial lane but no user_request_only teammate (CFP-137 Phase 2 test fixture — expect FAIL)
lane: code-review
description: |
  Test fixture — code-review lane 이지만 dispatch_mode: user_request_only teammate 없음 (FAIL expected).

teammates:
  - name: CodeReviewPLAgent
    role: PL
    system_prompt_path: agents/CodeReviewPLAgent.md
    model: opus
    spawn_mode: default
    dispatch_mode: default

  - name: ClaudeReviewAgent
    role: worker
    system_prompt_path: agents/ClaudeReviewAgent.md
    model: opus
    spawn_mode: default
    dispatch_mode: default

  - name: CodexReviewAgent
    role: worker
    system_prompt_path: agents/CodexReviewAgent.md
    model: gpt-5-codex
    spawn_mode: conditional
    activation_condition: user_explicit_request
    dispatch_mode: default  # BUG: should be user_request_only

dispatch_pattern: adversarial
worktree_layout:
  per_teammate: false
  base_worktree: cfp-NNN/code-review

hook_subscriptions:
  - TeammateIdle
  - TaskCreated
  - TaskCompleted

measurable_verification:
  adversarial: "worker_dialog_rounds >= 2"

env_divergent_fallback:
  env_0_behavior: "CodeReviewPL 1개만 spawn."
