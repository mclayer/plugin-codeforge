# 작성: PMOAgent (Cross-cutting)
# 날짜: 2026-05-20 KST
# 입력: Phase 0 brainstorm (Domain/Research/Analyst/PMO 4-tuple) + Phase 1 Codex 일괄 dispatch + 사용자 confirm (CFP 분해 / golden-path / downstream gate)
# 산출: Mega-CFP-1104 single Epic + 6 Story 내부 분해 + Phase 1 docs PR + Phase 2 PR1~PR5 sequential

# ====================================================================
# Section A: Epic 메타데이터
# ====================================================================
epic:
  cfp_id: "CFP-1104"
  title: "ArchitectLane DDD 재편 — vocabulary theater 차단 + bounded context / aggregate / ubiquitous language 도입"
  type: "Mega-CFP (single Epic, 6-Story internal decomposition)"
  parent: null  # top-level Epic
  governance_layer: "ArchitectLane (codeforge-design lane)"

  decomposition_model:
    # 사용자 confirm 2026-05-20 KST — option (1) Mega-CFP single + 6 Story 내부 분해
    rationale: |
      6 Story 가 동일 DDD governance scope 안에서 strongly cohesive (vocabulary SSOT
      → frontmatter → template → contract → skill → worked example 의 vertical slice).
      별 CFP 분해 시 cross-CFP coordination overhead + ADR proliferation. 단일 Epic +
      sequential PR ordering 으로 atomic governance change 보존.
    alternative_rejected: "6 independent CFP" (rationale: cohesive scope 분리 시 governance drift)

  phase_distribution:
    phase_1_docs_pr:
      # 사용자 confirm — Story 1 단독 Phase 1 PR (ADR + glossary + concept seed)
      scope: ["Story-1"]
      rationale: "ADR-NNN + 50+ term glossary + 4 concept entry = downstream Story 의 어휘 prerequisite. doc-only fast-path (ADR-054) 적용 가능."
    phase_2_pr_sequential:
      # 사용자 confirm — Story-2~6 sequential PR ordering (병렬 회피)
      ordering: ["PR1=Story-2", "PR2=Story-3", "PR3=Story-4", "PR4=Story-5", "PR5=Story-6"]
      rationale: |
        Story-2 (agent frontmatter) → Story-3 (template+lint) → Story-4 (contract v5) →
        Story-5 (deputy matrix) → Story-6 (golden-path) 의 dependency chain.
        Story-6 golden-path 는 모든 selior 산출물의 worked example 박제이므로 마지막.

  integration_invariants:
    # Epic-level cross-Story invariants (DesignReviewPL Epic-close 시 verify)
    - id: "INV-1"
      desc: "Story-1 glossary 50+ term 이 Story-2/3/4/5/6 산출물 안 vocabulary 와 100% match (drift 0)"
      verify: "scripts/check-ubiquitous-language.sh (Story-3 산출물) 전체 lane corpus run"
    - id: "INV-2"
      desc: "Story-2 agent frontmatter `bounded_context` 값 enum 이 Story-1 ADR §결정 N 의 bounded context enum 과 disjoint 0"
      verify: "PMOAgent retro 시 manual cross-ref + lint warning-tier"
    - id: "INV-3"
      desc: "Story-4 review-verdict-v5 의 3 finding enum (bc_violation / aggregate_violation / ubiquitous_language_drift) 이 Story-6 worked example 에서 5건 이상 실제 emit 됨"
      verify: "Story-6 golden-path examples/ddd-golden-path-mct031.md 안 finding 박제 grep count >= 5"
    - id: "INV-4"
      desc: "Story-5 deputy matrix 의 Subdomain Specialist 재배치가 Story-2 agent frontmatter `bounded_context` 와 1:1 mapping"
      verify: "manual cross-ref + ArchitectAgent §3 self-check (ADR-065 mechanical sync 7-item 확장)"
    - id: "INV-5 (vocabulary theater 차단 — Codex BIG CONCERN)"
      desc: "각 Story acceptance criteria 의 '어휘 emit 이 spawn / review / ADR acceptance 를 실제로 변경하는가' 검증항목이 PASS 한 case 가 Story-6 worked example 5 영역 박제로 입증됨"
      verify: "Epic-close 시 ArchitectPLAgent + DesignReviewPL dual verdict + PMOAgent retro cross-Story pattern check"

  max_parallelism:
    # 사용자 confirm — sequential ordering (병렬 회피)
    level: 1
    rationale: "Story 간 dependency chain (frontmatter → template → contract → skill → golden-path). 병렬 시 INV-1~4 cross-Story invariant 검증 cycle 폭증."

