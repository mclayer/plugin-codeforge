# ====================================================================
# Section D: Risk 우선순위 (Top 5)
# ====================================================================
risks_top_5:

  - priority: 1
    risk_id: "R-1 (HIGHEST — Codex BIG CONCERN)"
    name: "Vocabulary theater"
    desc: |
      DDD 어휘 (bounded context / aggregate / ubiquitous language) 가 frontmatter / template / contract /
      skill 본문에 emit 되지만 spawn decision / review findings / ADR acceptance criteria 를
      실제로 변경하지 않으면 "어휘만 도입 + behavior 변경 0" 인 vocabulary theater 함정.
    mitigation:
      - "각 Story acceptance criteria 의 '어휘 emit 이 spawn / review / ADR acceptance 를 실제로 변경하는가' 검증항목 1건 이상 의무 (AC-S1-4 / AC-S2-4 / AC-S3-4 / AC-S4-4 / AC-S5-4 / AC-S6-4)"
      - "INV-5 Epic-level invariant — vocabulary theater 차단 FINAL VERDICT (Story-6 worked example 5 영역 박제로 입증)"
      - "Story-1 ADR-NNN forcing function § 의무 명시 (AC-S1-4)"
      - "Story-6 worked example AC-S6-4 = 3 forcing function path verbatim cite — vocabulary theater 차단 FINAL gate"
    residual_risk: "LOW (Story-6 worked example 시연 PASS 시 vocabulary theater 차단 입증 완료)"

  - priority: 2
    risk_id: "R-2"
    name: "Subdomain 분류 정치적 합의"
    desc: |
      DDD subdomain 분류 (Core / Supporting / Generic) 가 codeforge 적용 시
      "어느 agent 가 Core / Supporting / Generic 인가" 의 정치적 합의 영역.
      upstream Story 1 = 분류 기준만 정의, downstream repo-by-repo = 실 분류 (사용자 confirm).
    mitigation:
      - "upstream Story-1 = subdomain 분류 기준 + 분류 example only (실 분류 strict 0)"
      - "downstream Epic (별 CFP, mctrader 등 consumer repo) = repo-by-repo 분류"
      - "Story-2 agent frontmatter `bounded_context` 는 codeforge plugin 한정 (consumer 분류 영역 아님)"
      - "Story-5 deputy matrix 6+2 = codeforge-design lane 한정 deputy spawn matrix (consumer subdomain 영역 disjoint)"
    residual_risk: "MEDIUM (downstream Epic 진입 시점 별 CFP 영역 — AC-S6-5 gate)"

  - priority: 3
    risk_id: "R-3"
    name: "Self-reference paradox"
    desc: |
      codeforge 자체가 DDD governance 를 도입하면서 codeforge 자체의 bounded context /
      ubiquitous language 를 정의하는 self-reference. 이미 사용자 confirm 영역 (non-blocker).
    mitigation:
      - "Story-1 ADR-NNN 안 self-reference paradox 1 sentence acknowledge + codeforge bounded context enum 명시 (codeforge plugin governance domain 한정)"
      - "Story-2 agent frontmatter `bounded_context` 값 = codeforge governance domain 한정 enum (consumer domain disjoint)"
    residual_risk: "LOW (사용자 confirm 영역 — non-blocker)"

  - priority: 4
    risk_id: "R-4"
    name: "Cross-repo coupling (downstream Epic 진입 시점 gate)"
    desc: |
      mctrader (5 repo Tier B-extended) 등 downstream consumer 가 codeforge DDD governance
      를 채택할 시점이 본 Epic 종료 후. Story-6 worked example 시연 PASS = downstream gate.
    mitigation:
      - "AC-S6-5 — downstream Epic 진입 시점 gate = Story-6 merged + worked example 시연 PASS 후"
      - "downstream Epic = 별 CFP (mctrader-specific) — 본 Epic scope 외"
      - "Story-6 worked example 안 mctrader ADR-031 = before/after diff only (mctrader repo 직접 수정 0 — example 박제만)"
    residual_risk: "LOW (downstream gate 분리 — 본 Epic scope 외)"

  - priority: 5
    risk_id: "R-5"
    name: "Existing ADR amendment ripple (6 ADR amendment 대상)"
    desc: |
      6 ADR amendment (ADR-004 / ADR-006 / ADR-007 / ADR-014 / ADR-064 / ADR-068 / ADR-080) +
      추가 3 ADR amendment (ADR-042 / ADR-008 / ADR-010) = 총 9 ADR amendment.
      atomic Phase 1 docs PR 안 동시 amendment 의무 → ripple 영역.
    mitigation:
      - "Story-1 Phase 1 docs PR 안 9 ADR amendment 동시 처리 (atomic merge)"
      - "각 ADR amendment scope = 1 sentence cross-ref (deep rewrite 0)"
      - "ADR-058 §결정 5 sunset_justification 의무 (ratchet 강화 방향만)"
      - "DesignReviewPL §3 verify — 9 ADR amendment 정합성 100% match (drift 0)"
    residual_risk: "MEDIUM (9 ADR atomic amendment cycle — Phase 1 PR 크기 크다, DesignReviewPL workload)"

