# BEGIN wrapper-managed
name: Story
description: 신규 Story 제출 (기능·설계·개선)
title: "[STORY] "
labels: ["type:story", "phase:요구사항"]
body:
  - type: markdown
    attributes:
      value: |
        ## Story 제출
        신규 Story를 제출합니다. 제출 후 요구사항 lane이 자동 시작됩니다.
        Story SSOT: `docs/stories/<KEY>.md` — 이 form이 Issue body의 §1 verbatim이 됩니다.
  - type: input
    id: story-key
    attributes:
      label: Story Key (예정)
      description: 프로젝트 KEY prefix + 번호 (예) CFP-821)
      placeholder: CFP-NNN
    validations:
      required: false
  - type: textarea
    id: why
    attributes:
      label: WHY — 해결하려는 문제 / 목표
      description: 사용자 directive 또는 도메인 필요성을 1-3 bullet로 기술
      placeholder: |
        - 문제: ...
        - 목표: ...
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: WHAT — 요구사항 요약
      description: 무엇을 만들거나 바꾸는가 (scope 요약)
      placeholder: |
        - D1: ...
        - D2: ...
    validations:
      required: true
  - type: textarea
    id: oos
    attributes:
      label: OOS (Out-of-Scope) — 명시적 제외 영역
      placeholder: |
        - Wave N 이후 영역
        - 별도 follow-up Issue
    validations:
      required: false
  - type: dropdown
    id: story-type
    attributes:
      label: Story 유형
      options:
        - 신규 기능 (Feature)
        - 설계·정책 변경 (Policy/ADR)
        - 버그 수정 (Bug Story)
        - 리팩토링 (Refactor)
        - 에픽 (Epic — 복수 Story)
    validations:
      required: true
# END wrapper-managed
