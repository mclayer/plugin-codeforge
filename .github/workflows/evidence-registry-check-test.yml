name: evidence-registry-check-test
# CFP-881 / ADR-060 Amendment 26 / ADR-151 §결정7 — evidence-registry-check 게이트의 discriminating
#   self-test 를 실 CI red/green 으로 산출한다 (born-dormant + born-swallowed 동시 차단).
# Security: third-party actions are SHA-pinned per CFP-300 policy.
#
# 왜 필요한가 (F-B: gate warning ≠ self-test enforce):
#   evidence-registry-check.yml (warning-tier, continue-on-error) 안에 self-test step 을 두면
#   self-test RED 가 swallowed(masking) 되어 identity-oracle 이 이빨 없는 fence 가 된다
#   (CFP-2635 shell-test-exit-masking-detect 의 self-test-in-warning-job 오모델). 본 workflow 가
#   그 self-test 를 전용 hard-fail job(continue-on-error 부재)으로 실행해 "mutation-verified RED
#   fixture + identity-oracle(live dup-key set == known 13-tuple) = self-test RED = job red" 을 성립시킨다.
#   precedent: ac-traceability-self-test.yml / doc-frontmatter-category-test.yml /
#   hard-gate-self-verification-test.yml (전용 hard-fail named-pytest workflow).
#
# 검사 대상: tests/scripts/test_check_evidence_registry.py — §8 RTM AC-1~14 normative 명명 테스트
#   (validate_registry / load_and_validate / _UniqueKeyLoader 직접 import) + mutation-verified RED
#   fixtures + identity-oracle(AC-12) + adversarial code-exec(AC-14). tests/conftest.py 가
#   scripts/lib 를 sys.path 주입.
#
# **day-1 hard-fail** (continue-on-error 금지) — self-test 실패 = job red = enforcing.
# **non-required** (branch-protection 7-tuple 무변경 — required context 신설 0, INV-1).
# **wrapper-self-only**: repo-guard if: github.repository == 'mclayer/plugin-codeforge'
#   (consumer 는 tests/scripts/** 부재 → job skip = inert). 순수 self-test workflow 관례상
#   templates/github-workflows/ copy 없음 (.github-only — ac-traceability-self-test.yml 선례,
#   byte-identical pair 대상 아님).

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'scripts/check-evidence-registry.sh'
      - 'scripts/lib/check_evidence_registry.py'
      - 'tests/scripts/test_check_evidence_registry.py'
      - 'docs/evidence-checks-registry.yaml'
      - '.github/workflows/evidence-registry-check-test.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  evidence-registry-check-test:
    name: evidence-registry-check-test
    if: github.repository == 'mclayer/plugin-codeforge'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install test deps (pytest + pyyaml)
        run: pip install --quiet pytest pyyaml

      - name: Run pytest discriminating self-test (§8 RTM AC-1~14, day-1 hard-fail)
        run: python3 -m pytest tests/scripts/test_check_evidence_registry.py -q
