# windows-bootstrap-smoke.yml — CFP-2250 결함5: windows-latest 부트스트랩 smoke 안전망.
#
# 목적: ubuntu 에서 통과하나 Windows 에서 깨지는 PowerShell bootstrap 경로(경로 구분자 \,
#       pwsh ConvertFrom-Json, UTF-8 인코딩, bash 부재 fallback)를 잡는 회귀 안전망.
#
# 본 job 은 TC1(label count) + TC3(USERPROFILE resolve) + TC7(Stage 6 PowerShell-native fallback)
# 을 windows runner self-validating 으로 composing 한다 (Change Plan §8 TC8 / 설계리뷰 P2-5).
#
# dry-run 전용 (gh 미호출) → token secret 불요, side-effect 0 (보안 경계 안전).
# windows-latest 기본 shell = pwsh (PowerShell Core 7) — bash 명시 불요.
#
# non-required tier: branch protection required contexts 미등재 (advisory).
#   ADR-060 evidence-gate (PR >= 20 + failure 0) 후 승격 후보.

name: windows bootstrap smoke

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  windows-bootstrap-smoke:
    runs-on: windows-latest      # 기본 shell = pwsh (PowerShell Core)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install pyyaml
        run: pip install pyyaml

      # TC1 — PowerShell-native label 시드 dry-run (gh 미호출, count + tab-separated 출력 self-check)
      - name: bootstrap-labels.ps1 dry-run (TC1)
        run: pwsh -File scripts/bootstrap-labels.ps1 -DryRun

      # TC7 — bootstrap-consumer.ps1 dry-run (Stage 6 PowerShell-native 경로 선택 검증, bash 유무 무관 dry-run)
      - name: bootstrap-consumer.ps1 dry-run (TC7)
        run: pwsh -File scripts/bootstrap-consumer.ps1 -DryRun

      # TC3 — check_bootstrap.py Windows path resolve 회귀 (os.name=='nt' → USERPROFILE 우선)
      - name: check_bootstrap.py Windows resolve (TC3)
        run: python overlay/hooks/check_bootstrap.py --quiet

      # check_bootstrap.py 단위 테스트 (cross-platform matrix Windows side)
      - name: pytest check_bootstrap (Windows)
        run: |
          pip install pytest
          python -m pytest overlay/hooks/tests/test_check_bootstrap.py -q

      # TC2 — .sh <-> .ps1 label parity (windows runner = Git Bash 동봉 → bash 경로 정상 resolve)
      - name: label parity .sh <-> .ps1 (TC2)
        run: pwsh -File scripts/test-bootstrap-labels-parity.ps1

      # AC-4 (CFP-2702) — CRLF 배포본 run-hook.cmd 를 cmd.exe 로 실행 → @REM 배너 유래 스퓨리어스
      #   stderr == 0 (도메인 불변식 I-HOOK-NOISE 회귀 봉인). ★cmd.exe 파싱 경로 검증 = windows-latest
      #   전용 (Linux 러너엔 cmd.exe 부재). windows runner = Git Bash 동봉 → run-hook.cmd 배치 본문이
      #   bash 를 정상 resolve. symbol: test_run_hook_cmd_crlf_banner_zero.
      #   discriminating(anti-theater): 같은 파일 LF 변환본은 배너 stderr > 0 (cmd 바이트 드리프트로
      #   @echo off/배너 줄이 명령 실행) — 테스트가 결함을 실검출함을 대조 증명(vacuity 차단).
      - name: run-hook.cmd cmd.exe banner-zero (AC-4)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tmp = Join-Path $env:RUNNER_TEMP ("ac4_" + [guid]::NewGuid().ToString("N"))
          New-Item -ItemType Directory -Path $tmp -Force | Out-Null
          # 체크아웃본을 LF 로 정규화한 뒤 CRLF(배포본) + LF(결함 fixture) 두 변종 파생 (checkout eol 무관 robust).
          $src  = [System.IO.File]::ReadAllText((Join-Path $env:GITHUB_WORKSPACE 'hooks/run-hook.cmd'))
          $lf   = ($src -replace "`r`n","`n") -replace "`r","`n"
          $crlf = $lf -replace "`n","`r`n"
          [System.IO.File]::WriteAllText("$tmp\run-hook.cmd", $crlf)
          [System.IO.File]::WriteAllText("$tmp\run-hook-lf.cmd", $lf)
          # probe = run-hook.cmd 자기 디렉터리 기준 dispatch 대상 (extensionless, bash 페이로드).
          $probe = "#!/usr/bin/env bash`necho AC4_PAYLOAD_SENTINEL`nprintf '[%s]' `"`$@`"`necho`n"
          [System.IO.File]::WriteAllText("$tmp\probe", $probe)

          $fail = 0
          function Assert($cond, $msg) {
            if ($cond) { Write-Host "OK PASS: $msg" }
            else { Write-Host "X FAIL: $msg"; $script:fail = 1 }
          }
          function RunCmd($cmdfile, $tag, $cmdargs) {
            $out = "$tmp\$tag.out"; $err = "$tmp\$tag.err"
            cmd /c "`"$cmdfile`" $cmdargs 1>`"$out`" 2>`"$err`""
            $ec = $LASTEXITCODE
            $o = if (Test-Path $out) { [string](Get-Content -Raw $out) } else { "" }
            $e = if (Test-Path $err) { [string](Get-Content -Raw $err) } else { "" }
            if ($null -eq $o) { $o = "" }; if ($null -eq $e) { $e = "" }
            return [pscustomobject]@{ ec = $ec; out = $o; err = $e;
              banner = ([regex]::Matches($e, "is not recognized")).Count }
          }

          # 주 케이스: CRLF 배포본 → 배너 0 + 페이로드 방출 + 인자 정확 + exit 0.
          $c = RunCmd "$tmp\run-hook.cmd" "crlf" "probe alpha beta"
          Assert ($c.banner -eq 0) "AC-4 CRLF: @REM/배너 유래 스퓨리어스 stderr == 0 (I-HOOK-NOISE)"
          Assert ($c.out -match 'AC4_PAYLOAD_SENTINEL') "AC-4 CRLF: 의도된 페이로드만 방출"
          Assert ($c.out -match '\[alpha\]\[beta\]') "AC-4 CRLF: 인자 정확 전달 (CR 누출 0)"
          Assert ($c.ec -eq 0) "AC-4 CRLF: exit 0"

          # discriminating: 동일 파일 LF 변환본 → 배너 > 0 (결함 재현, 테스트 비-vacuity 증명).
          $l = RunCmd "$tmp\run-hook-lf.cmd" "lf" "probe alpha beta"
          Assert ($l.banner -gt 0) "AC-4 discriminating: LF 변환본 배너 stderr > 0 (결함 실검출 = anti-theater)"

          # no-arg missing-name guard → exit 1 + 메시지.
          $n = RunCmd "$tmp\run-hook.cmd" "noarg" ""
          Assert ($n.ec -eq 1) "AC-4 no-arg: missing-name guard exit 1"
          Assert ($n.err -match 'missing script name') "AC-4 no-arg: missing-name stderr 메시지"

          if ($fail -ne 0) { Write-Host "AC-4 FAIL"; exit 1 }
          Write-Host "AC-4 PASS (CRLF banner 0 / LF banner>0 대조 / no-arg guard)"
          exit 0
