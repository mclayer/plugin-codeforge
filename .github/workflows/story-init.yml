name: Story Init
# Security: third-party actions are SHA-pinned per CFP-300 policy.

# CFP-596 / ADR-013 Amendment 5: codeforge family detection + cross-repo write branch.
# codeforge family (project.name ^codeforge): cross-repo write to mclayer/codeforge-internal-docs.
# Generic consumer (project.name != ^codeforge): local mkdir/commit/push (기존 동작 보존 — AC-5).
# story_key_prefix 는 project.yaml `github.story_key_prefix` 에서 fetch (yq 우선 + Python fallback).
#
# CFP-671 / ADR-036 Amendment 1: KEY title regex precedence + Issue # fallback.
# Title `[<PREFIX>-<N>]` or `<PREFIX>-<N>` pattern matched + prefix matched → title KEY 우선 (cfp-reserve.yml reservation 정합).
# Title pattern absent OR prefix MISMATCH → Issue # fallback (ADR-036 결정 1 race-free guarantee 보존).
#
# CFP-661 / ADR-027 Amendment 2 §결정 6: PR create step `continue-on-error: true` + post-fail Issue comment.
# Enterprise default_workflow_permissions: read 차단 환경에서 silent skip 회피 + CFP-658 Wave 1 fallback path 자동 활성.
#
# CFP-2252 / ADR-049 Amendment 2: native Issue Type cutover 완결.
#   - 트리거 native-type 전환 (OR-bridge: issue.type.name == 'Story' OR type:story 라벨) + `typed` 이벤트 추가.
#   - native type 부착 step: 종전 type-id 필드(REST 미존재 파라미터 — silent drop) → -f type=Story + verify-after-write.
#   - PAT scope 사전검증 step (existence_check 앞, codeforge family 한정, fail-closed).
#   - TARGET_REPO 하드코딩 4곳 → project.yaml github.story_ssot_repo 파라미터화 (ADR-013 Amendment 7).
#   - internal-docs PR --label type:story 제거 + 사후 graceful 부착 (라벨 cutover 정합).
#   - #2147 body-치환 guard (degraded scaffold 양산 차단) + #1046 에러 locality + write-readiness probe.

on:
  issues:
    types: [opened, labeled, typed]   # was: [opened] (CFP-280 race fix) → +typed (CFP-2252 native Issue Type 부착 이벤트)

permissions:
  contents: write
  issues: write
  pull-requests: write

# CFP-260 / ADR-036 Option B safety net — per-Issue concurrency group.
# 같은 Issue 의 reopen / re-trigger race 만 직렬화. 병렬 Issue (다른 #) 는 영향 없음.
concurrency:
  group: story-init-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  story-init:
    # CFP-2149 — gate 라벨 편집 재트리거 차단: labeled 이벤트는 phase:요구사항 부착일 때만 발화.
    # CFP-280 의도 보존: opened 시 race 회피용 labeled re-trigger 는 phase:요구사항 부착만 재발화.
    # opened 이벤트엔 github.event.label 부재 → 빈 문자열 평가 (false) — || 단락 순서가 opened 우선이라 안전.
    #
    # CFP-2252 / ADR-049 Amendment 2 §3.2 — native-type 트리거 OR-bridge (self-host 위험 1급):
    #   - event gate: opened || phase:요구사항 labeled || typed (native type 부착/UI type 부여 시 발화).
    #   - Story gate (OR-bridge): issue.type.name == 'Story' OR type:story 라벨 — 라벨삭제 후 native-type 으로
    #     발화 보존 + transient 기간 dual catch + org type 미활성 consumer 는 라벨 분기 fallback (ADR-049 §결정 5).
    #   - phase:요구사항 AND 보존: type 부착만으로 오발화 차단 (무관 Story type 이슈 차단 — phase gate 가 lane 진입 신호).
    #   - null 안전: type 미설정 이슈는 github.event.issue.type.name 가 null → == 'Story' false (Actions null 비교 안전).
    #   - 본 expression 의 truth-table 검증 = scripts/lib/eval_story_init_trigger_expr.py (TC-6~11, CI-gated, F5).
    if: |
      (github.event.action == 'opened'
       || github.event.label.name == 'phase:요구사항'
       || github.event.action == 'typed') &&
      (github.event.issue.type.name == 'Story'
       || contains(github.event.issue.labels.*.name, 'type:story')) &&
      contains(github.event.issue.labels.*.name, 'phase:요구사항')
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON_LINUX_JSON || '["ubuntu-latest"]') }}
    env:
      ISSUE_TITLE: ${{ github.event.issue.title }}
      ISSUE_BODY: ${{ github.event.issue.body }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Read project.yaml story_key_prefix + family detection
        id: project_config
        shell: bash
        run: |
          set -euo pipefail
          cfg=".claude/_overlay/project.yaml"

          if [[ ! -f "$cfg" ]]; then
            echo "::error::missing $cfg — consumer-guide §3a 참조"
            exit 1
          fi

          if command -v yq >/dev/null 2>&1; then
            story_key_prefix="$(yq -r '.github.story_key_prefix // ""' "$cfg")"
            project_name="$(yq -r '.project.name // ""' "$cfg")"
          else
            story_key_prefix="$(CFG_PATH="$cfg" python3 "${GITHUB_WORKSPACE}/scripts/lib/workflow_story_init_project_config_key_prefix.py")"
            project_name="$(CFG_PATH="$cfg" python3 "${GITHUB_WORKSPACE}/scripts/lib/workflow_story_init_project_config_name.py")"
          fi

          if [[ -z "$story_key_prefix" ]]; then
            echo "::error::github.story_key_prefix missing in $cfg — project-config-schema.md §1 참조"
            exit 1
          fi

          if [[ -z "$project_name" ]]; then
            echo "::error::project.name missing in $cfg — project-config-schema.md §1.f 참조 (CFP-596 family detection 필수)"
            exit 1
          fi

          echo "story_key_prefix=$story_key_prefix" >> "$GITHUB_OUTPUT"
          echo "project_name=$project_name" >> "$GITHUB_OUTPUT"

          # codeforge family detection sentinel — Change Plan §3.1
          if [[ "$project_name" =~ ^codeforge ]]; then
            echo "is_codeforge_family=true" >> "$GITHUB_OUTPUT"
            # plugin folder mapping — Change Plan §3.2
            folder=$(printf '%s' "$project_name" | sed 's/^codeforge-//;s/^codeforge$/wrapper/')
            echo "dogfood_folder=$folder" >> "$GITHUB_OUTPUT"
            # CFP-2252 / ADR-013 Amendment 7 — story SSOT repo 파라미터화 (TARGET_REPO 하드코딩 제거).
            # 부재 시 template default mclayer/codeforge-internal-docs (확장-only — 축소/제거 금지,
            # 선례 ADR-024 Amd2 §결정 A + ADR-026 Amd4 §결정 6, mechanism ADR-116 cross-ref).
            if command -v yq >/dev/null 2>&1; then
              story_ssot_repo="$(yq -r '.github.story_ssot_repo // "mclayer/codeforge-internal-docs"' "$cfg")"
            else
              story_ssot_repo="$(CFG_PATH="$cfg" python3 "${GITHUB_WORKSPACE}/scripts/lib/workflow_story_init_project_config_story_ssot_repo.py")"
            fi
            # null/empty 방어 (yq 'null' 문자열 또는 빈 값 → default 보존, 확장-only invariant)
            if [[ -z "$story_ssot_repo" || "$story_ssot_repo" == "null" ]]; then
              story_ssot_repo="mclayer/codeforge-internal-docs"
            fi
            echo "story_ssot_repo=$story_ssot_repo" >> "$GITHUB_OUTPUT"
            echo "::notice::codeforge family detected (project.name=$project_name) — cross-repo write branch active (folder=$folder, story_ssot_repo=$story_ssot_repo)"
          else
            echo "is_codeforge_family=false" >> "$GITHUB_OUTPUT"
            echo "dogfood_folder=" >> "$GITHUB_OUTPUT"
            echo "story_ssot_repo=" >> "$GITHUB_OUTPUT"
            echo "::notice::generic consumer detected (project.name=$project_name) — local write branch active (AC-5 정합)"
          fi

          # CFP-2423 / ADR-069 Amendment 1 (Phase 2) — multi-repo component routing (additive branch)
          # Extract codeforge.stories.repos[] and component→owner_repo mapping from project.yaml.
          # Additive only — backward-compat: single-repo flow unchanged if repos[] absent.
          #
          # Routing logic:
          #   1. Extract repos[] list + codeforge.stories.repo_topology (if present)
          #   2. Build component→[owner_repos] mapping (duplicate detection for ESCALATE)
          #   3. Output: routed_target_repo (or hub_fallback), routed_component_source
          #   4. ESCALATE if component multi-mapped (N≥2 repos claim same component)
          #
          # INV-PAT-ROUTE: Upfront precheck of all declared repos[].github write scope
          # (moved to dedicated pat_precheck_multiRepo step below).

          if command -v yq >/dev/null 2>&1; then
            # yq read: codeforge.stories.repos[] → for each component, output: component\tgithub
            # Format: one line per component mapping (not per repo), raw component names (no normalization here)
            repos_mapping=$(yq -r '.codeforge.stories.repos[]? | select(.github != null) | .github as $g | .components[]? | select(. != "") | . + "\t" + $g' "$cfg" 2>/dev/null || true)
          else
            # Python fallback: extract repos[].github + components[]
            # Format: identical to yq (one line per component, component\tgithub, raw names)
            repos_mapping=$(CFG_PATH="$cfg" python3 "${GITHUB_WORKSPACE}/scripts/lib/workflow_story_init_project_config_repos.py" 2>/dev/null || true)
          fi

          # Output raw mapping (parsed later in component routing step)
          {
            echo "repos_mapping<<REPOS_EOF"
            printf '%s\n' "$repos_mapping"
            echo "REPOS_EOF"
          } >> "$GITHUB_OUTPUT"

          # CFP-2423 §3.2 AC-5/AC-6 — repo_topology SSOT 대조 input 추출 (component_routing step 이 소비).
          # ADR-131 토폴로지 SSOT schema verbatim: repo_topology.applicable(bool) + responsibilities[].owner_repo.
          # awk-parseable 2 output 으로 emit:
          #   - repo_topology_applicable: 'true' 일 때만 대조 활성 (AC-5). 그 외(false/미주입/yq부재) = skip(PASS, AC-6).
          #   - repo_topology_owner_repos: responsibilities[].owner_repo newline-separated 집합 (대조 대상).
          # NOTE: yq 부재 시 대조 skip (AC-6 PASS 경로로 degrade) — design §3.1#5 (helper 는 repos[] read 만, topology 미포함).
          if command -v yq >/dev/null 2>&1; then
            # applicable 값 ('true' 만 활성, default false — schema L608)
            repo_topology_applicable=$(yq -r '.repo_topology.applicable // false' "$cfg" 2>/dev/null || echo "false")
            # responsibilities[].owner_repo 집합 (대조 대상). applicable!=true 면 빈값으로 무의미화.
            if [[ "$repo_topology_applicable" == "true" ]]; then
              repo_topology_owner_repos=$(yq -r '.repo_topology.responsibilities[]?.owner_repo // empty' "$cfg" 2>/dev/null | grep -v '^$' || true)
            else
              repo_topology_owner_repos=""
            fi
          else
            # yq 부재: 대조 skip (AC-6 PASS 경로로 degrade — component_routing step 이 applicable!=true 분기로 처리)
            repo_topology_applicable="false"
            repo_topology_owner_repos=""
          fi
          echo "repo_topology_applicable=$repo_topology_applicable" >> "$GITHUB_OUTPUT"
          {
            echo "repo_topology_owner_repos<<TOPO_OWNERS_EOF"
            printf '%s\n' "$repo_topology_owner_repos"
            echo "TOPO_OWNERS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Compute story key (CFP-260 / ADR-036 Option B + CFP-671 / ADR-036 Amendment 1 — title regex precedence + Issue# fallback)
        id: key
        env:
          PREFIX: ${{ steps.project_config.outputs.story_key_prefix }}
        run: |
          # CFP-260 / ADR-036 결정 1: GitHub atomic Issue numbering 위임 (race-free baseline).
          # CFP-671 / ADR-036 Amendment 1: title pattern `[<PREFIX>-<N>]` or `<PREFIX>-<N>` 우선 추출 (cfp-reserve.yml reservation 정합).
          #   - Title pattern matched + prefix matched → title KEY 우선
          #   - Title pattern absent OR prefix MISMATCH → Issue # fallback (race-free guarantee 보존 + cross-project KEY injection 차단)

          PYOUT=$(python3 "${GITHUB_WORKSPACE}/scripts/lib/workflow_story_init_compute_key.py")
          KEY=$(printf '%s' "$PYOUT" | sed -n '1p')
          SLUG=$(printf '%s' "$PYOUT" | sed -n '2p')
          TITLE_CLEAN=$(printf '%s' "$PYOUT" | sed -n '3p')
          echo "key=$KEY" >> "$GITHUB_OUTPUT"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          {
            echo "title_clean<<TITLE_EOF"
            printf '%s\n' "$TITLE_CLEAN"
            echo "TITLE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Pre-validate CODEFORGE_CROSS_REPO_PAT scope (codeforge family only — CFP-2252 / ADR-066 §결정 2)
        id: pat_precheck
        if: steps.project_config.outputs.is_codeforge_family == 'true'
        env:
          GH_TOKEN: ${{ secrets.CODEFORGE_CROSS_REPO_PAT }}
          STORY_SSOT_REPO: ${{ steps.project_config.outputs.story_ssot_repo }}
        run: |
          # CFP-2252 §3.4 (SecurityArch) — PAT scope 3-tier 사전검증 (fail-closed + 에러 locality).
          # 사후 발각(existence_check L157 HTTP 실패) 대신 명시적 step 에서 fail-fast + 명확 메시지.
          # #1046 (CFP-689 retro carrier) 흡수: 단독 흡수 아님 — existence_check 가 이미 read probe 수행 →
          #   본 step = (a) 에러 locality 개선 + (b) write-readiness probe(permissions.push) 보강.
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::CODEFORGE_CROSS_REPO_PAT secret 부재 — ADR-066 §결정 2 (fine-grained scope) 참조. story-init cross-repo write 불가."
            exit 1
          fi
          # 1) 토큰 유효성 + 신원
          if ! gh api user --jq '.login' >/dev/null 2>&1; then
            echo "::error::PAT 무효 또는 만료 (gh api user 실패) — ADR-066 §결정 1/4 rotation 확인."
            exit 1
          fi
          # 2) target repo metadata:read (접근 가능성)
          if ! gh api "repos/${STORY_SSOT_REPO}" --jq '.full_name' >/dev/null 2>&1; then
            echo "::error::PAT 가 ${STORY_SSOT_REPO} 접근 불가 — repo:read/metadata:read scope 또는 repository access list 확인 (ADR-066 §결정 2)."
            exit 1
          fi
          # 3) contents:write 가능성 사전 신호 — permissions.push (write scope proxy).
          #    fine-grained scope 정밀 introspection API 부재 → permissions.push 가 최선 신호 (abstention 명시).
          CAN_PUSH=$(gh api "repos/${STORY_SSOT_REPO}" --jq '.permissions.push // false' 2>/dev/null || echo "false")
          if [[ "$CAN_PUSH" != "true" ]]; then
            echo "::error::PAT 가 ${STORY_SSOT_REPO} write 권한 부재 (permissions.push=false) — repo:write scope 필요 (ADR-066 §결정 2: branch create + contents PUT + PR create)."
            exit 1
          fi
          echo "::notice::PAT scope 사전검증 PASS — ${STORY_SSOT_REPO} write 가용 (ADR-066 §결정 2 정합)"

      - name: Pre-validate repos[].github write scope (multi-repo component routing — CFP-2423 / ADR-069 Amendment 1, INV-PAT-ROUTE)
        id: pat_precheck_multirepo
        if: steps.project_config.outputs.is_codeforge_family == 'true' && steps.project_config.outputs.repos_mapping != ''
        env:
          GH_TOKEN: ${{ secrets.CODEFORGE_CROSS_REPO_PAT }}
          REPOS_MAPPING: ${{ steps.project_config.outputs.repos_mapping }}
        run: |
          # CFP-2423 §3.2 — INV-PAT-ROUTE enforcement (upfront precheck of all repos[].github)
          # Precheck all declared repos[].github for write scope before component routing (fail-fast).
          # Extract unique repos from mapping (normalized_component\tgithub format).
          set -euo pipefail

          # Extract unique github repos from REPOS_MAPPING (tab-separated, 2nd column)
          REPOS_TO_CHECK=$(printf '%s' "$REPOS_MAPPING" | awk -F'\t' '{print $2}' | sort -u)

          if [[ -z "$REPOS_TO_CHECK" ]]; then
            # No repos to check — skip
            echo "::notice::No repos[] declared for component routing — skipping multi-repo PAT precheck"
            exit 0
          fi

          # Check each unique repo for write scope (permissions.push)
          FAILED_REPOS=()
          while IFS= read -r repo; do
            [[ -z "$repo" ]] && continue
            if ! gh api "repos/${repo}" --jq '.permissions.push // false' >/dev/null 2>&1; then
              echo "::error::PAT 가 ${repo} 접근 불가 — repo access list 또는 scope 확인 (ADR-066 §결정 2)"
              FAILED_REPOS+=("$repo")
            else
              CAN_PUSH=$(gh api "repos/${repo}" --jq '.permissions.push // false' 2>/dev/null || echo "false")
              if [[ "$CAN_PUSH" != "true" ]]; then
                echo "::error::PAT 가 ${repo} write 권한 부재 (permissions.push=false) — ADR-066 §결정 2 확인"
                FAILED_REPOS+=("$repo")
              fi
            fi
          done <<< "$REPOS_TO_CHECK"

          if [[ ${#FAILED_REPOS[@]} -gt 0 ]]; then
            echo "::error::INV-PAT-ROUTE precheck FAILED — 다음 repos 에 write 권한 부재: ${FAILED_REPOS[*]}"
            exit 1
          fi

          echo "::notice::INV-PAT-ROUTE precheck PASS — 모든 repos[].github write 가용"
          exit 0

      - name: Skip if first firing already published (two-stage existence_check — CFP-596 / ADR-013 Amendment 5)
        id: existence_check
        env:
          GH_TOKEN: ${{ secrets.CODEFORGE_CROSS_REPO_PAT }}
          KEY: ${{ steps.key.outputs.key }}
          SLUG: ${{ steps.key.outputs.slug }}
          IS_CODEFORGE_FAMILY: ${{ steps.project_config.outputs.is_codeforge_family }}
          DOGFOOD_FOLDER: ${{ steps.project_config.outputs.dogfood_folder }}
          STORY_SSOT_REPO: ${{ steps.project_config.outputs.story_ssot_repo }}
        run: |
          # CFP-596 / ADR-013 Amendment 5 — two-stage existence_check (Change Plan §3.5)
          # codeforge family: internal-docs 측 branch + Story file 양 stage check.
          # consumer branch: single-stage (기존 동작 보존).
          # fail-closed: 4xx/5xx → exit 1 (PAT scope 또는 unreachable).

          if [[ "$IS_CODEFORGE_FAMILY" == "true" ]]; then
            # CFP-2252 / ADR-013 Amendment 7 — TARGET_REPO 파라미터화 (story_ssot_repo, default 보존)
            TARGET_REPO="${STORY_SSOT_REPO}"
          else
            TARGET_REPO="${GITHUB_REPOSITORY}"
          fi
          BRANCH="feat/${KEY}-${SLUG}"
          STORY_PATH="${DOGFOOD_FOLDER}/stories/${KEY}.md"

          # CFP-2142 D2 — BRANCH URL-encode (defense in depth).
          # D1 (ASCII-only slug) 수정 후에도 기존 한글 브랜치 재트리거 케이스에서
          # raw 삽입 시 Stage 2 query param 이 HTTP 400 → fail-closed 차단 방어.
          BRANCH_ENC=$(jq -rn --arg v "$BRANCH" '$v|@uri')

          # Stage 1 — branch existence
          http_code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${TARGET_REPO}/branches/${BRANCH_ENC}" 2>/dev/null || echo "000")

          if [[ "$http_code" == "200" ]]; then
            STAGE1_PRESENT=true
          elif [[ "$http_code" == "404" ]]; then
            STAGE1_PRESENT=false
          else
            echo "::error::existence_check Stage 1 실패 — HTTP ${http_code}. PAT scope 또는 ${TARGET_REPO} unreachable (ADR-066 §결정 2 참조)"
            exit 1
          fi

          if [[ "$IS_CODEFORGE_FAMILY" == "true" && "$STAGE1_PRESENT" == "true" ]]; then
            # Stage 2 — Story file existence on the branch (codeforge family only)
            file_http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${TARGET_REPO}/contents/${STORY_PATH}?ref=${BRANCH_ENC}" 2>/dev/null || echo "000")

            if [[ "$file_http_code" == "200" ]]; then
              echo "::notice::idempotent skip — branch + Story file 모두 존재 (CFP-596 two-stage check §3.5 정합)"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "auto_recovered=false" >> "$GITHUB_OUTPUT"
              echo "skip_branch_create=true" >> "$GITHUB_OUTPUT"
            elif [[ "$file_http_code" == "404" ]]; then
              echo "::warning::automated reconcile path — branch 존재 + Story file 부재 (Disconnect edge case 복구 — Change Plan §3.5)"
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "auto_recovered=true" >> "$GITHUB_OUTPUT"
              echo "skip_branch_create=true" >> "$GITHUB_OUTPUT"
            else
              echo "::error::existence_check Stage 2 실패 — HTTP ${file_http_code}. PAT scope 또는 ${TARGET_REPO} unreachable (ADR-066 §결정 2 참조)"
              exit 1
            fi
          elif [[ "$STAGE1_PRESENT" == "true" ]]; then
            # consumer branch — Stage 1 only (기존 동작 보존)
            echo "::notice::Remote branch ${BRANCH} already exists — skipping (idempotent re-entry, CFP-280 Iter 1 FIX)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "auto_recovered=false" >> "$GITHUB_OUTPUT"
            echo "skip_branch_create=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "auto_recovered=false" >> "$GITHUB_OUTPUT"
            echo "skip_branch_create=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Parse user requirement from Issue body
        id: parse
        if: steps.existence_check.outputs.skip != 'true'
        run: |
          REQ=$(printf '%s' "$ISSUE_BODY" \
                 | awk '/^### 사용자 요구사항/{flag=1; next} /^### /{flag=0} flag' \
                 | sed '/^$/d')

          # CFP-2252 #2147 흡수 — body 치환 후 재렌더 degraded scaffold 차단 (fail-safe).
          # 발현 = (1) body 이미 'Story SSOT: [...](...)' 마크다운 링크로 치환 + (2) existence_check skip=false
          #   (slug 변경 재트리거 또는 reconcile auto_recovered) → 요구사항 추출 0 → 빈 §1 scaffold 양산.
          # 실제 치환 prefix = "Story SSOT: [" (workflow Update Issue body step L513/517 마크다운 링크).
          #   대괄호까지 일치해야 발동 — 사용자가 우연히 "Story SSOT: ..." 평문으로 시작한 요구사항의 false-pos 축소 (F8).
          FIRST_LINE=$(printf '%s' "$ISSUE_BODY" | head -1)
          if [[ -z "${REQ// }" ]] && printf '%s' "$FIRST_LINE" | grep -qE '^Story SSOT: \['; then
            echo "::error::Issue body 가 이미 'Story SSOT: [' 마크다운 링크로 치환됨 + 요구사항 추출 0 — degraded scaffold 양산 차단 (#2147). 재렌더 중단."
            echo "body_replaced_guard=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          {
            echo "requirement<<REQ_EOF"
            printf '%s\n' "$REQ"
            echo "REQ_EOF"
          } >> "$GITHUB_OUTPUT"

          MILESTONE=$(printf '%s' "$ISSUE_BODY" \
                       | awk '/^### Epic Milestone/{flag=1; next} /^### /{flag=0} flag' \
                       | sed '/^$/d' | head -1)
          echo "milestone=$MILESTONE" >> "$GITHUB_OUTPUT"

          COMPONENT=$(printf '%s' "$ISSUE_BODY" \
                        | awk '/^### Component/{flag=1; next} /^### /{flag=0} flag' \
                        | sed '/^$/d' | head -1)
          echo "component=$COMPONENT" >> "$GITHUB_OUTPUT"

      - name: Route component to owner repo (multi-repo support — CFP-2423 / ADR-069 Amendment 1)
        id: component_routing
        if: steps.existence_check.outputs.skip != 'true'
        env:
          COMPONENT: ${{ steps.parse.outputs.component }}
          REPOS_MAPPING: ${{ steps.project_config.outputs.repos_mapping }}
          IS_CODEFORGE_FAMILY: ${{ steps.project_config.outputs.is_codeforge_family }}
          STORY_SSOT_REPO: ${{ steps.project_config.outputs.story_ssot_repo }}
          REPO_TOPOLOGY_APPLICABLE: ${{ steps.project_config.outputs.repo_topology_applicable }}
          REPO_TOPOLOGY_OWNER_REPOS: ${{ steps.project_config.outputs.repo_topology_owner_repos }}
        run: |
          set -euo pipefail

          # CFP-2423 §3.2 — component → owner_repo routing logic
          # AC-1: 1:1 mapping → TARGET_REPO=owner_repo
          # AC-3: 0 mapping (no repos[] or component absent) → fallback to story_ssot_repo/hub
          # AC-4: N≥2 mapping (component claimed by multiple repos) → ESCALATE + exit 1
          # AC-5: topology mismatch → surface(warning) + TARGET_REPO=owner_repo (hard-block 아님)
          # AC-6: repo topology applicable!=true / absent → skip validation, PASS, TARGET_REPO=owner_repo

          ROUTED_TARGET_REPO="$STORY_SSOT_REPO"
          ROUTED_COMPONENT_SOURCE="hub-fallback"
          ESCALATE_FLAG="false"

          # Non-codeforge family: fallback to local GITHUB_REPOSITORY (no multi-repo routing)
          if [[ "$IS_CODEFORGE_FAMILY" != "true" ]]; then
            echo "component_routed_target_repo=${GITHUB_REPOSITORY}" >> "$GITHUB_OUTPUT"
            echo "component_routed_source=consumer-local" >> "$GITHUB_OUTPUT"
            echo "component_escalate=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Empty component or no repos[] declared: fallback
          if [[ -z "$COMPONENT" || -z "$REPOS_MAPPING" ]]; then
            echo "component_routed_target_repo=$ROUTED_TARGET_REPO" >> "$GITHUB_OUTPUT"
            echo "component_routed_source=$ROUTED_COMPONENT_SOURCE" >> "$GITHUB_OUTPUT"
            echo "component_escalate=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Normalize component (lowercase + trim) for matching
          COMPONENT_NORMALIZED=$(printf '%s' "$COMPONENT" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//;' | tr '[:upper:]' '[:lower:]')

          if [[ -z "$COMPONENT_NORMALIZED" ]]; then
            # Empty after normalization
            echo "component_routed_target_repo=$ROUTED_TARGET_REPO" >> "$GITHUB_OUTPUT"
            echo "component_routed_source=$ROUTED_COMPONENT_SOURCE" >> "$GITHUB_OUTPUT"
            echo "component_escalate=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Build mapping: normalize each line in REPOS_MAPPING, then match
          # REPOS_MAPPING format (both yq and python): component\tgithub (raw component names, not normalized)
          # Normalize component names during matching (lowercase + trim for both sides)
          # awk script: split each line by tab, normalize $1, compare with COMPONENT_NORMALIZED, collect $2
          MATCHING_REPOS=$(printf '%s' "$REPOS_MAPPING" | awk -F'\t' \
            -v comp="$COMPONENT_NORMALIZED" \
            'NF==2 {
              comp_raw=$1;
              github=$2;
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", comp_raw);
              comp_normalized=tolower(comp_raw);
              if (comp_normalized == comp) print github
            }' | sort -u)
          # CFP-2423 F-CR-2423-P1-3 — count-0 멱등 정규화 (shell grep-c idiom 결함 수정):
          #   buggy: `grep -c . || echo 0` — MATCHING_REPOS 빈값(AC-3: repos[] 선언 + component 미매핑)일 때
          #   `grep -c .` 가 stdout '0' + exit 1 동시 → `|| echo 0` 추가 발화 → MATCHING_COUNT="0\n0"(2줄)
          #   → `[[ "0\n0" -eq 0 ]]` syntax error → if/elif false → else=AC-4 ESCALATE false fall-through.
          #   fix: 빈값 선분기로 count 를 항상 단일 정수 보장. 비빈값 path 는 grep -c . 가 항상 exit 0(≥1줄).
          if [[ -z "$MATCHING_REPOS" ]]; then
            MATCHING_COUNT=0
          else
            MATCHING_COUNT=$(printf '%s' "$MATCHING_REPOS" | grep -c .)
          fi

          if [[ $MATCHING_COUNT -eq 0 ]]; then
            # AC-3: no mapping — hub fallback
            echo "component_routed_target_repo=$ROUTED_TARGET_REPO" >> "$GITHUB_OUTPUT"
            echo "component_routed_source=hub-fallback (component=$COMPONENT unmapped)" >> "$GITHUB_OUTPUT"
            echo "component_escalate=false" >> "$GITHUB_OUTPUT"
            exit 0
          elif [[ $MATCHING_COUNT -eq 1 ]]; then
            # AC-1: 1:1 mapping — route to owner_repo
            OWNER_REPO=$(printf '%s' "$MATCHING_REPOS" | head -1)
            ROUTED_TARGET_REPO="$OWNER_REPO"
            ROUTED_COMPONENT_SOURCE="component-routed (component=$COMPONENT → $OWNER_REPO)"

            # CFP-2423 §3.2 AC-5/AC-6 — 토폴로지 SSOT 대조 (ADR-131 토폴로지 SSOT).
            #   applicable==true 시: 라우팅된 owner_repo 가 repo_topology.responsibilities[].owner_repo 집합에
            #   포함되는지 cross-check.
            #     - 일치 (집합 안) → TARGET_REPO=owner_repo (AC-1, surface 없음)
            #     - 불일치 (집합 밖) → ::warning:: surface + TARGET_REPO=owner_repo (AC-5, hard-block 아님)
            #   applicable!=true / 미주입 (owner_repos 빈값) → 대조 skip (AC-6 PASS).
            #   검사연극 금지: 불일치는 surface 만, exit 1 차단 없음 (ADR-131 §결정4 / ADR-119).
            if [[ "$REPO_TOPOLOGY_APPLICABLE" == "true" && -n "${REPO_TOPOLOGY_OWNER_REPOS//[$'\n']/}" ]]; then
              TOPO_MATCH="false"
              while IFS= read -r topo_owner; do
                [[ -z "$topo_owner" ]] && continue
                if [[ "$topo_owner" == "$OWNER_REPO" ]]; then
                  TOPO_MATCH="true"
                  break
                fi
              done <<< "$REPO_TOPOLOGY_OWNER_REPOS"
              if [[ "$TOPO_MATCH" == "true" ]]; then
                echo "::notice::토폴로지 SSOT 대조 일치 — owner_repo '$OWNER_REPO' ∈ repo_topology.responsibilities[].owner_repo (AC-5 정합)"
              else
                # AC-5 — 불일치 surface (hard-block 아님). 라우팅은 그대로 owner_repo 로 진행.
                echo "::warning::토폴로지 SSOT 대조 불일치 (AC-5) — 라우팅 owner_repo '$OWNER_REPO' 가 repo_topology.responsibilities[].owner_repo 집합에 부재. surface only (hard-block 아님, ADR-131 §결정4). 책임 배치 SSOT 점검 권장."
                ROUTED_COMPONENT_SOURCE="component-routed (component=$COMPONENT → $OWNER_REPO; topology-mismatch surfaced)"
              fi
            fi

            echo "component_routed_target_repo=$ROUTED_TARGET_REPO" >> "$GITHUB_OUTPUT"
            echo "component_routed_source=$ROUTED_COMPONENT_SOURCE" >> "$GITHUB_OUTPUT"
            echo "component_escalate=false" >> "$GITHUB_OUTPUT"
            exit 0
          else
            # AC-4: N≥2 mapping — ESCALATE
            REPOS_LIST=$(printf '%s' "$MATCHING_REPOS" | tr '\n' ',' | sed 's/,$//')
            echo "::warning::component multi-mapping detected — component '$COMPONENT' claimed by multiple repos: $REPOS_LIST (AC-4 ESCALATE)"
            echo "component_routed_target_repo=" >> "$GITHUB_OUTPUT"
            echo "component_routed_source=escalate (component=$COMPONENT multi-mapped)" >> "$GITHUB_OUTPUT"
            echo "component_escalate=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - name: Handle component multi-mapping ESCALATE (AC-4)
        if: steps.component_routing.outputs.component_escalate == 'true'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMPONENT: ${{ steps.parse.outputs.component }}
          COMPONENT_ROUTED_SOURCE: ${{ steps.component_routing.outputs.component_routed_source }}
          REPOS_MAPPING: ${{ steps.project_config.outputs.repos_mapping }}
        run: |
          set -euo pipefail
          # CFP-2423 §3.2 AC-4 — multi-mapping ESCALATE (fail-closed + Issue comment)
          # 자동 single-repo 선택 금지(ambiguous) — user/architect 가 Story scope 명시 후 재트리거 의존.

          # Extract matching repos from REPOS_MAPPING for Issue comment detail
          # CFP-2423 F-CR-2423-P1-1 — handler awk 정규화 통일 (routing step 과 동치):
          #   raw `$1 == comp` 는 mixed-case/whitespace component 시 빈 목록 → ESCALATE comment 누락.
          #   routing step (component_routing) 과 동일 gsub(trim)+tolower 정규화로 통일.
          COMPONENT_NORMALIZED=$(printf '%s' "$COMPONENT" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//;' | tr '[:upper:]' '[:lower:]')
          MATCHING_REPOS=$(printf '%s' "$REPOS_MAPPING" | awk -F'\t' \
            -v comp="$COMPONENT_NORMALIZED" \
            'NF==2 {
              comp_raw=$1;
              github=$2;
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", comp_raw);
              comp_normalized=tolower(comp_raw);
              if (comp_normalized == comp) print github
            }' | sort -u)

          ISSUE_BODY_DETAIL=$(printf 'Component multi-mapping ESCALATE (AC-4):\n\nComponent: `%s`\nMatching repos:\n' "$COMPONENT")
          while IFS= read -r repo; do
            [[ -z "$repo" ]] && continue
            ISSUE_BODY_DETAIL="$ISSUE_BODY_DETAIL- $repo"$'\n'
          done <<< "$MATCHING_REPOS"
          ISSUE_BODY_DETAIL="$ISSUE_BODY_DETAIL"$'\n'"Story scope 모호성 해소 필요. Story file frontmatter 에 \`story_scope: repo\` + \`repo: <name>\` 명시 후 재트리거하거나, component 값을 1개 repo 만 claim 하도록 project.yaml 조정 후 재시작."

          if ! gh issue comment "$ISSUE_NUMBER" --body "$(printf '%s' "$ISSUE_BODY_DETAIL")"; then
            echo "::warning::ESCALATE Issue comment 부착 실패 (workflow 는 실패로 진행) — manual review 필요"
          fi

          echo "::error::Component multi-mapping ESCALATE (AC-4) — component '$COMPONENT' claimed by multiple repos in repos[].components. Story scope 명시 또는 project.yaml 조정 필요."
          exit 1

      - name: Render Story file content
        id: render
        if: steps.existence_check.outputs.skip != 'true'
        env:
          KEY: ${{ steps.key.outputs.key }}
          TITLE_CLEAN: ${{ steps.key.outputs.title_clean }}
          REQUIREMENT: ${{ steps.parse.outputs.requirement }}
        run: |
          # Story file content rendering — shared between codeforge family and consumer branches.
          # base64 encode 는 codeforge family branch (REST API PUT contents 요구).
          STORY_CONTENT=$(python3 "${GITHUB_WORKSPACE}/scripts/lib/workflow_story_init_render_story.py")
          # base64 encode (REST API PUT contents 용 — codeforge family branch)
          CONTENT_B64=$(printf '%s' "$STORY_CONTENT" | base64 -w 0)
          echo "content_b64=$CONTENT_B64" >> "$GITHUB_OUTPUT"

      - name: Create branch + Story file (codeforge family — cross-repo write)
        if: >
          steps.existence_check.outputs.skip != 'true' &&
          steps.project_config.outputs.is_codeforge_family == 'true' &&
          steps.component_routing.outputs.component_escalate != 'true'
        env:
          GH_TOKEN: ${{ secrets.CODEFORGE_CROSS_REPO_PAT }}
          KEY: ${{ steps.key.outputs.key }}
          SLUG: ${{ steps.key.outputs.slug }}
          TITLE_CLEAN: ${{ steps.key.outputs.title_clean }}
          DOGFOOD_FOLDER: ${{ steps.project_config.outputs.dogfood_folder }}
          STORY_SSOT_REPO: ${{ steps.project_config.outputs.story_ssot_repo }}
          COMPONENT_ROUTED_TARGET_REPO: ${{ steps.component_routing.outputs.component_routed_target_repo }}
          CONTENT_B64: ${{ steps.render.outputs.content_b64 }}
          SKIP_BRANCH_CREATE: ${{ steps.existence_check.outputs.skip_branch_create }}
          AUTO_RECOVERED: ${{ steps.existence_check.outputs.auto_recovered }}
        run: |
          set -euo pipefail
          # CFP-2252 / ADR-013 Amendment 7 — TARGET_REPO 파라미터화 (story_ssot_repo, default 보존)
          # CFP-2423 / ADR-069 Amendment 1 — TARGET_REPO 라우팅 (component routing 결과 사용)
          # Routing priority: component-routed → story_ssot_repo (hub fallback)
          if [[ -n "${COMPONENT_ROUTED_TARGET_REPO}" ]]; then
            TARGET_REPO="${COMPONENT_ROUTED_TARGET_REPO}"
          else
            TARGET_REPO="${STORY_SSOT_REPO}"
          fi
          BRANCH="feat/${KEY}-${SLUG}"
          STORY_PATH="${DOGFOOD_FOLDER}/stories/${KEY}.md"
          COMMIT_MSG="[${KEY}] feat: Story init — §1 verbatim, §2-11 placeholder"

          if [[ "$SKIP_BRANCH_CREATE" != "true" ]]; then
            # Get main sha
            MAIN_SHA=$(gh api "repos/${TARGET_REPO}/git/refs/heads/main" --jq '.object.sha')
            if [[ -z "$MAIN_SHA" ]]; then
              echo "::error::internal-docs main sha fetch 실패 — PAT scope 또는 ${TARGET_REPO} unreachable"
              exit 1
            fi

            # Create branch ref in internal-docs
            if ! gh api -X POST "repos/${TARGET_REPO}/git/refs" \
              -f "ref=refs/heads/${BRANCH}" \
              -f "sha=${MAIN_SHA}"; then
              echo "::error::branch create 실패 (${BRANCH} in ${TARGET_REPO}) — PAT repo:write scope 확인 필요 (ADR-066 §결정 2)"
              exit 1
            fi
            echo "::notice::branch created: ${BRANCH} in ${TARGET_REPO}"
          else
            echo "::notice::branch create skip (skip_branch_create=true — auto_recovered=${AUTO_RECOVERED})"
          fi

          # PUT contents — create Story file on branch
          if ! gh api -X PUT "repos/${TARGET_REPO}/contents/${STORY_PATH}" \
            -f "branch=${BRANCH}" \
            -f "message=${COMMIT_MSG}" \
            -f "content=${CONTENT_B64}"; then
            echo "::error::Story file PUT 실패 (${STORY_PATH} on ${BRANCH}) — PAT scope 또는 conflict"
            exit 1
          fi
          echo "::notice::Story file created: ${TARGET_REPO}/${STORY_PATH} on ${BRANCH}"

      - name: Create Phase 1 PR (codeforge family — internal-docs PR)
        if: >
          steps.existence_check.outputs.skip != 'true' &&
          steps.project_config.outputs.is_codeforge_family == 'true' &&
          steps.component_routing.outputs.component_escalate != 'true'
        env:
          GH_TOKEN: ${{ secrets.CODEFORGE_CROSS_REPO_PAT }}
          KEY: ${{ steps.key.outputs.key }}
          SLUG: ${{ steps.key.outputs.slug }}
          TITLE_CLEAN: ${{ steps.key.outputs.title_clean }}
          DOGFOOD_FOLDER: ${{ steps.project_config.outputs.dogfood_folder }}
          STORY_SSOT_REPO: ${{ steps.project_config.outputs.story_ssot_repo }}
          COMPONENT_ROUTED_TARGET_REPO: ${{ steps.component_routing.outputs.component_routed_target_repo }}
          AUTO_RECOVERED: ${{ steps.existence_check.outputs.auto_recovered }}
        run: |
          set -euo pipefail
          # CFP-2252 / ADR-013 Amendment 7 — TARGET_REPO 파라미터화 (story_ssot_repo, default 보존)
          # CFP-2423 / ADR-069 Amendment 1 — TARGET_REPO 라우팅 (component routing 결과 사용)
          # Routing priority: component-routed → story_ssot_repo (hub fallback)
          if [[ -n "${COMPONENT_ROUTED_TARGET_REPO}" ]]; then
            TARGET_REPO="${COMPONENT_ROUTED_TARGET_REPO}"
          else
            TARGET_REPO="${STORY_SSOT_REPO}"
          fi
          REPO_OWNER="${TARGET_REPO%%/*}"
          BRANCH="feat/${KEY}-${SLUG}"

          # PR existence check (auto_recovered 분기 — PR list idempotency, Change Plan §3.5 + §4.1)
          EXISTING_PR_URL=$(gh pr list \
            --repo "${TARGET_REPO}" \
            --head "${REPO_OWNER}:${BRANCH}" \
            --base "main" \
            --state open \
            --json url \
            --jq '.[0].url' 2>/dev/null || true)

          if [[ -n "$EXISTING_PR_URL" ]]; then
            echo "::notice::PR already exists (idempotent skip) — ${EXISTING_PR_URL}"
            echo "pr_url=${EXISTING_PR_URL}" >> "$GITHUB_OUTPUT" 2>/dev/null || true
            exit 0
          fi

          BODY=$(printf 'Story SSOT: `%s/stories/%s.md`\n\nThis is the Phase 1 PR (요구사항+설계+설계리뷰 lane).\n\nRelated: %s#%s\n' \
            "$DOGFOOD_FOLDER" "$KEY" "$GITHUB_REPOSITORY" "$ISSUE_NUMBER")

          # CFP-2252 #1046 흡수 — PR create 실패 시 명확 에러 + locality (set -euo silent exit 회피).
          # CFP-2252 §3.6 (F4) — --label type:story 제거 (라벨 cutover 정합, DI-1 방향). --label 인자 자체 제거:
          #   gh pr create --label 은 라벨이 repo 에 부재하면 PR 생성 전체 실패 → 라벨 cutover 중 PR open 깨짐 risk.
          if ! PR_URL=$(gh pr create \
            --repo "${TARGET_REPO}" \
            --base "main" \
            --head "${BRANCH}" \
            --title "[${KEY}] ${TITLE_CLEAN}" \
            --body "$BODY" 2>&1); then
            echo "::error::Phase 1 PR create 실패 (${TARGET_REPO}, head=${BRANCH}) — PAT pull_requests:write scope 또는 self-repo resolve 확인 (#1046 carrier / ADR-066 §결정 2). branch 는 push 완료 — manual PR open 필요. gh stderr: ${PR_URL}"
            exit 1
          fi

          # 라벨은 사후 graceful 부착 — type:story 제외(삭제 대상), phase:요구사항 만 시도 (라벨 부재 시 무시).
          gh pr edit "$PR_URL" --repo "${TARGET_REPO}" --add-label "phase:요구사항" 2>/dev/null \
            || echo "::notice::internal-docs PR phase:요구사항 라벨 부착 skip (라벨 부재 — graceful, CFP-2252 F4)"

          echo "::notice::Phase 1 PR created in ${TARGET_REPO}: ${PR_URL}"
        id: create_pr_family

      - name: Create branch + docs/stories/<KEY>.md (generic consumer — local write)
        if: >
          steps.existence_check.outputs.skip != 'true' &&
          steps.project_config.outputs.is_codeforge_family != 'true'
        env:
          KEY: ${{ steps.key.outputs.key }}
          SLUG: ${{ steps.key.outputs.slug }}
          TITLE_CLEAN: ${{ steps.key.outputs.title_clean }}
          REQUIREMENT: ${{ steps.parse.outputs.requirement }}
        run: |
          BRANCH="feat/${KEY}-${SLUG}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          mkdir -p docs/stories
          {
            cat <<FRONTMATTER_EOF
          ---
          story_key: ${KEY}
          story_issues:
            - repo: ${GITHUB_REPOSITORY}
              number: ${ISSUE_NUMBER}
          status: phase:요구사항
          ---
          FRONTMATTER_EOF
            printf '\n# %s: %s\n\n' "$KEY" "$TITLE_CLEAN"
            printf -- '- **Issue**: #%s\n' "$ISSUE_NUMBER"
            printf -- '- **Status**: phase:요구사항\n\n'
            printf '## 1. 사용자 요구사항 (verbatim — Phase 2 후속 CFP 까지 CODEOWNERS manual review 로 변경 차단)\n\n'
            printf '%s\n\n' "$REQUIREMENT"
            cat <<'TPL_EOF'
          ## 2. 도메인 해석

          *(DomainAgent 작성 예정 — placeholder)*

          ## 3. 관련 ADR

          *(RequirementsPL 작성 예정 — placeholder)*

          ## 4. 관련 코드 경로

          *(RequirementsPL 작성 예정 — placeholder)*

          ## 5. 요구사항 확장 해석

          *(RequirementsAnalyst 작성 예정 — placeholder)*

          ## 6. 외부 지식 배경

          *(Researcher 작성 예정 — placeholder)*

          ## 7. 설계 서사

          *(Architect 작성 예정 — placeholder)*

          ## 8. 개발 서사

          *(DeveloperPL 작성 예정 — Phase 2 PR에서)*

          ## 9. 품질 게이트 이력

          *(Review/Test PL 작성 예정 — Phase 2 PR에서)*

          ## 10. FIX Ledger

          | Iter | 시각 | 레인 | 트리거 | 원인 판정 | 재실행 범위 | RESET? |
          |------|------|------|--------|-----------|-------------|--------|

          *(FIX 발생 시 append)*

          ## 11. 회고

          *(PMOAgent 작성 예정 — Story 완료 시)*
          TPL_EOF
          } > "docs/stories/${KEY}.md"

          git add "docs/stories/${KEY}.md"
          git commit -m "[${KEY}] feat: Story init — §1 verbatim, §2-11 placeholder"
          git push origin "$BRANCH"

      - name: Create Phase 1 PR (generic consumer — wrapper repo PR)
        id: pr_create_consumer
        if: >
          steps.existence_check.outputs.skip != 'true' &&
          steps.project_config.outputs.is_codeforge_family != 'true'
        # CFP-661 Wave 3 graceful degradation — enterprise `default_workflow_permissions: read` 차단 시 step 실패 흡수.
        # 후속 step `Post manual PR fallback comment` 가 Issue comment 로 CFP-658 Wave 1 fallback path 안내 자동 게시.
        # SSOT: docs/consumer-guide.md §1i Enterprise environment setup + ADR-027 Amendment 2 §결정 6.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEY: ${{ steps.key.outputs.key }}
          SLUG: ${{ steps.key.outputs.slug }}
          TITLE_CLEAN: ${{ steps.key.outputs.title_clean }}
        run: |
          BRANCH="feat/${KEY}-${SLUG}"
          BASE="main"

          BODY=$(printf 'Story SSOT: `docs/stories/%s.md`\n\nThis is the Phase 1 PR (요구사항+설계+설계리뷰 lane). architect team CODEOWNERS auto-review attached.\n\nRelated: #%s\n' "$KEY" "$ISSUE_NUMBER")

          gh pr create \
            --base "$BASE" \
            --head "$BRANCH" \
            --title "[${KEY}] ${TITLE_CLEAN}" \
            --body "$BODY" \
            --label "type:story,phase:요구사항"

      - name: Post manual PR fallback comment (CFP-661 Wave 3 graceful degradation)
        if: >
          steps.existence_check.outputs.skip != 'true' &&
          steps.project_config.outputs.is_codeforge_family != 'true' &&
          steps.pr_create_consumer.outcome == 'failure'
        # CFP-661 Wave 3 — pr_create step `continue-on-error: true` 실패 흡수 시 Issue comment 로 manual fallback path 안내.
        # Enterprise default_workflow_permissions: read 차단 환경에서 silent skip 회피 + CFP-658 Wave 1 fallback path 자동 활성 trigger.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEY: ${{ steps.key.outputs.key }}
          SLUG: ${{ steps.key.outputs.slug }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<EOF
          ## Enterprise GitHub Actions PR create permission 차단 — manual fallback 의무 (CFP-661 graceful degradation)

          본 workflow 의 \`Create Phase 1 PR\` step 이 enterprise \`default_workflow_permissions: read\` 차단으로 실패. **CFP-658 Wave 1 fallback path 활성화 의무**:

          1. \`.claude/_overlay/project.yaml\` 에 \`bootstrap.fallback_mode: action_blocked\` 설정 (영구 차단 환경 default, declarative trigger A)
          2. RequirementsPL / ArchitectPL 가 manual fallback path 호출: \`bash templates/scripts/manual-story-init-fallback.sh ${ISSUE_NUMBER}\`
          3. 또는 \`fallback:manual\` label 부착 (per-Issue ad-hoc override trigger C, ADR-027 Amendment 2 §결정 6.A)
          4. 4 required check 통과 의무 — admin override 차단 (\`enforce_admins: true\` ratchet 유지, CFP-70)

          **Enterprise admin 권한 보유 시 prerequisite 활성 권장** (fallback 회피 정상 경로):

          \`\`\`bash
          gh api --method PUT repos/${GITHUB_REPOSITORY}/actions/permissions/workflow \\
            -f default_workflow_permissions=write \\
            -F can_approve_pull_request_reviews=true
          \`\`\`

          참조 SSOT:
          - [docs/consumer-guide.md §1h Action 차단 환경 fallback](../blob/main/docs/consumer-guide.md)
          - [docs/consumer-guide.md §1i Enterprise environment setup](../blob/main/docs/consumer-guide.md)
          - [ADR-027 Amendment 2 §결정 6](../blob/main/archive/adr/ADR-027-consumer-adoption-protocol.md)
          - CFP-658 Phase 2 \`templates/scripts/manual-story-init-fallback.sh\`
          - Branch: \`feat/${KEY}-${SLUG}\` (이미 push 완료 — manual PR open 만 필요)

          Story init 진행 무중단 — fallback path 활성 시 정상 4 required check 통과 시 merge gate 통과.
          EOF
          )"

      - name: Post worktree-create reminder comment
        if: steps.existence_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          STORY_KEY: ${{ steps.key.outputs.key }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<'EOF'
          ## 작업 환경 준비 — worktree-first 의무 reminder

          이 Story 진입 직전 worktree 생성 의무. 본 Issue 가 Phase 1 PR 으로 진척하기 전 다음 명령 실행:

          \`\`\`bash
          bash templates/scripts/worktree-create.sh ${STORY_KEY} origin/main
          \`\`\`

          Story 작업 모두 worktree 안에서 수행 — main working tree 직접 편집 금지.

          참조:
          - ADR-040 §결정 5 (Stale GC) + Amendment 3 §결정 7 (Normative ↔ mechanical boundary mandate)
          - playbook §3.0.11 worktree-first normative + §3.5 worktree dispatch
          - CFP-425 Epic (worktree-first mechanical enforcement 영구화) — 본 Story = child / parent
          EOF
          )"

      - name: Update Issue body to docs link
        if: steps.existence_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEY: ${{ steps.key.outputs.key }}
          IS_CODEFORGE_FAMILY: ${{ steps.project_config.outputs.is_codeforge_family }}
          DOGFOOD_FOLDER: ${{ steps.project_config.outputs.dogfood_folder }}
          STORY_SSOT_REPO: ${{ steps.project_config.outputs.story_ssot_repo }}
        run: |
          if [[ "$IS_CODEFORGE_FAMILY" == "true" ]]; then
            # cross-repo internal-docs URL (Change Plan §4.3)
            # CFP-2252 / ADR-013 Amendment 7 — repo URL 파라미터화 (story_ssot_repo, default 보존)
            gh issue edit "$ISSUE_NUMBER" \
              --body "Story SSOT: [\`${DOGFOOD_FOLDER}/stories/${KEY}.md\`](https://github.com/${STORY_SSOT_REPO}/blob/main/${DOGFOOD_FOLDER}/stories/${KEY}.md)"
          else
            BASE="main"
            gh issue edit "$ISSUE_NUMBER" \
              --body "Story SSOT: [\`docs/stories/${KEY}.md\`](../blob/${BASE}/docs/stories/${KEY}.md)"
          fi

      - name: Assign Milestone (if specified)
        if: steps.existence_check.outputs.skip != 'true' && steps.parse.outputs.milestone != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MILESTONE: ${{ steps.parse.outputs.milestone }}
        run: |
          # CFP-2142 D4 — milestone graceful: Issue form 자유 텍스트 (예: "(없음 — 단일 Story)")가
          # repo milestone 에 부재하면 edit 실패 → run 전체 failure 였음. warning 으로 강등.
          gh issue edit "$ISSUE_NUMBER" --milestone "$MILESTONE" \
            || echo "::warning::milestone '${MILESTONE}' 부착 실패 — repo 에 해당 milestone 부재 (자유 텍스트 입력 가능). Story init 은 계속 진행 (CFP-2142 D4 graceful)"

      - name: Add component label
        if: steps.existence_check.outputs.skip != 'true' && steps.parse.outputs.component != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMPONENT: ${{ steps.parse.outputs.component }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --add-label "component:$COMPONENT"

      - name: Attach native Issue Type (CFP-140 / ADR-049 / CFP-2252 type 정정 + verify-after-write)
        if: steps.existence_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Attach native Issue Type "Story" to newly created Issue.
          # Idempotent: 이미 Story type 이면 PATCH 는 no-op.
          # Graceful fallback: org Issue Types 미활성 시 warning 후 계속 — label hack 사용 (ADR-049 §결정 5).
          #
          # CFP-2252 / ADR-049 Amendment 2 §3.1 — 라이브 결함 정정 (P0):
          #   - 종전 `--field type-id=<id>` 형태 = REST 미존재 파라미터 (2xx 반환하나 silent drop) → 6개월 잠복 결함.
          #     [SSOT: GitHub REST "Update an issue" — 파라미터 = `type`(string, 타입 이름) / migrate-script L171 검증 패턴]
          #   - 정정: `-f type=Story` (이름 기반). 종전 id 기반 필드는 사용 금지.
          #   - verify-after-write 추가: PATCH 2xx ≠ 실제 부착(push access 부족 시 silent drop) → 재read 로 실측 (silent-drop 구조적 차단).
          REPO_OWNER="${GITHUB_REPOSITORY%%/*}"
          # org type 존재 확인 — 부재 시 label fallback (graceful, ADR-049 §결정 5)
          TYPE_PRESENT=$(gh api "orgs/${REPO_OWNER}/issue-types" \
            --jq '.[] | select(.name == "Story") | .name' 2>/dev/null || true)
          if [[ -z "$TYPE_PRESENT" ]]; then
            echo "::warning::org ${REPO_OWNER} 에 Story Issue Type 부재 — label fallback 유지 (ADR-049 §결정 5)"
            exit 0
          fi
          # 이름 기반 부착 (idempotent — 이미 Story 면 no-op). 종전 id 기반 필드는 REST 미존재 파라미터(silent drop) — 사용 금지.
          if gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}" \
               -f "type=Story" >/dev/null 2>&1; then
            # verify-after-write (silent-drop 방어 — 종전 id 기반 결함 재발 차단)
            SET=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}" --jq '.type.name // ""' 2>/dev/null || echo "")
            if [[ "$SET" == "Story" ]]; then
              echo "Issue Type 'Story' 부착 확인 (#${ISSUE_NUMBER})"
            else
              echo "::warning::type PATCH 후 verify 미확인 (push access 부족 가능 — silent drop). label fallback 의존 (ADR-049 §결정 5)."
            fi
          else
            echo "::warning::Issue Type PATCH 실패 — label fallback 의존 (ADR-049 §결정 5)"
          fi

      - name: Post failure notice comment (CFP-2142 D3 — silent-fail 차단)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # CFP-2142 D3 — 임의 step 실패 시 Issue 에 안내 없이 silent 종료되던 결함 보완.
          # 자기 repo Issue comment 라 GITHUB_TOKEN (issues: write) 으로 충분 — PAT 불요.
          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<EOF
          ## Story Init workflow 실패 — manual fallback 안내 (CFP-2142 D3)

          본 Issue 의 story-init workflow 가 실패해 Story scaffold 가 완료되지 않았을 수 있습니다.

          - 실패 run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - manual fallback: \`bash templates/scripts/manual-story-init-fallback.sh ${ISSUE_NUMBER}\`

          실패 step 로그에서 원인 해소 후 \`phase:요구사항\` label 재부착으로 re-trigger 하거나, 위 manual fallback path 로 진행하세요.
          EOF
          )"
