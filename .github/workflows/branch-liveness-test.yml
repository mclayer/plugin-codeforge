name: Branch Liveness Test Suite (CFP-2772 §8)

on:
  push:
    branches:
      - main
      - cfp-2772*
    paths:
      - 'scripts/lib/emit_branch_heartbeat.py'
      - 'scripts/lib/check_branch_liveness.py'
      - 'scripts/jira-channel/heartbeat-format.sh'
      - 'tests/**/*heartbeat*.py'
      - 'tests/**/*watchdog*.py'
      - 'tests/**/*liveness*.py'
  pull_request:
    paths:
      - 'scripts/lib/emit_branch_heartbeat.py'
      - 'scripts/lib/check_branch_liveness.py'
      - 'scripts/jira-channel/heartbeat-format.sh'
      - 'tests/**/*heartbeat*.py'
      - 'tests/**/*watchdog*.py'
      - 'tests/**/*liveness*.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  branch-liveness-tests:
    name: CFP-2772 Branch Liveness Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run heartbeat emit tests (AC-1, AC-2, AC-3, AC-8)
        run: |
          python -m pytest tests/unit/test_heartbeat_emit.py -v

      - name: Run heartbeat Jira reach tests (AC-3)
        run: |
          python -m pytest tests/integration/test_heartbeat_jira_reach.py -v

      - name: Run watchdog observer death tests (AC-4)
        run: |
          python -m pytest tests/unit/test_watchdog_observer_death.py -v

      - name: Run watchdog three-state tests (AC-5)
        run: |
          python -m pytest tests/integration/test_watchdog_three_state.py -v

      - name: Run watchdog threshold tests (AC-6)
        run: |
          python -m pytest tests/integration/test_watchdog_threshold.py -v

      - name: Run watchdog partial-hang tests (AC-7)
        run: |
          python -m pytest tests/integration/test_watchdog_partial_hang.py -v

      - name: Run heartbeat nonblocking tests (AC-8)
        run: |
          python -m pytest tests/unit/test_heartbeat_nonblocking.py -v

      - name: Run watchdog fail-open tests (AC-9)
        run: |
          python -m pytest tests/unit/test_watchdog_fail_open.py -v

      - name: Run captured-golden pagination tests (§8.7)
        run: |
          python -m pytest tests/integration/test_watchdog_captured_golden.py -v

      - name: Run full branch-liveness test suite
        run: |
          python -m pytest tests/ -k "heartbeat or watchdog or branch_liveness or liveness" -v --tb=short

      - name: Generate coverage report
        run: |
          python -m pytest tests/ -k "heartbeat or watchdog or branch_liveness or liveness" \
            --cov=scripts/lib --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: branch-liveness
          fail_ci_if_error: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
