name: cross-repo-bypass-counter
# CFP-845 / ADR-024 Amendment 8 section 6.A.5
# cross-repo (3-repo) bypass counter extension lint.
# Detects hotfix-bypass:* label accumulation across wrapper + internal-docs + marketplace.
#
# PAT scope requirement (OQ-1, ADR-066 single PAT):
#   CODEFORGE_CROSS_REPO_PAT must have: issues:write + repo:read (contents:read)
#   PAT must have read access to: mclayer/plugin-codeforge + mclayer/codeforge-internal-docs + mclayer/marketplace
#
# Warning tier (ADR-060 4-tier framework):
#   Script exits 0 on threshold reach + Issue auto-create (warning, not blocking).
#   continue-on-error: true (first iteration, ADR-060 section 5)
#   Carrier Issue created in mclayer/plugin-codeforge (wrapper governance owner SSOT, ADR-013)
#
# Bypass: hotfix-bypass:cross-repo-bypass-counter label (39th family member, label-registry-v2 v2.27)
on:
  schedule:
    - cron: '0 3 * * *'  # daily 03:00 UTC = 12:00 KST
  workflow_dispatch:

permissions:
  issues: write    # carrier Issue auto-create (mclayer/plugin-codeforge)
  contents: read   # gh api search/issues (merged PR label scan)

jobs:
  cross-repo-count:
    runs-on: ubuntu-latest
    continue-on-error: true  # warning tier -- ADR-060 section 5
    steps:
      - uses: actions/checkout@v4

      - name: Run cross-repo bypass counter
        env:
          GH_TOKEN: ${{ secrets.CODEFORGE_CROSS_REPO_PAT }}  # ADR-066 single PAT (3-repo access)
        run: |
          bash scripts/check-cross-repo-bypass-counter.sh \
            --threshold 3 \
            --repos "mclayer/plugin-codeforge,mclayer/codeforge-internal-docs,mclayer/marketplace"
