name: evidence-registry-naming-check (CFP-508 / ADR-060 §결정 20 warning mode)

on:
  pull_request:
    paths:
      - docs/evidence-checks-registry.yaml
      - scripts/check-evidence-registry-naming.sh
      - templates/github-workflows/evidence-registry-naming-check.yml
      - .github/workflows/evidence-registry-naming-check.yml
      - 'templates/github-workflows/**.yml'
      - '.github/workflows/**.yml'

permissions:
  contents: read
  pull-requests: read

jobs:
  evidence-registry-naming-check:
    runs-on: ubuntu-latest
    continue-on-error: true  # warning tier (ADR-060 §결정 5)
    steps:
      - uses: actions/checkout@v4

      - name: Check hotfix-bypass label
        id: bypass
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const bypass = labels.includes('hotfix-bypass:evidence-naming');
            console.log(`Bypass label present: ${bypass}`);
            return bypass;

      - name: Evidence registry naming check
        if: steps.bypass.outputs.result != 'true'
        run: bash scripts/check-evidence-registry-naming.sh

      - name: Audit comment (bypass label)
        if: steps.bypass.outputs.result == 'true'
        run: bash scripts/check-bypass-audit-comment.sh "evidence-naming"
