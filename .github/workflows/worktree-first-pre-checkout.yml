name: worktree-first pre-checkout hook check (blocking-on-pr mode)
# CFP-426 / ADR-040 Amendment 3 В§кІ°м • 7 / ADR-060 В§кІ°м • 5
# Tier: blocking-on-pr (continue-on-error: false, required check вҖ” CFP-531 / ADR-040 Amendment 5)
# Bypass channel: hotfix-bypass:worktree-pre-checkout label
#
# CFP-531 Amendment 5 вҖ” actual warning вҶ’ blocking-on-pr мҠ№кІ© (2026-05-13).

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'templates/.git-hooks/pre-checkout*'
      - '.git-hooks/pre-checkout*'
      - 'scripts/check-worktree-first-pre-checkout.sh'
      - '.github/workflows/worktree-first-pre-checkout.yml'
      - 'templates/github-workflows/worktree-first-pre-checkout.yml'

permissions:
  pull-requests: write
  contents: read

jobs:
  worktree-first-pre-checkout:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "labels=$labels"
          case ",$labels," in
            *,hotfix-bypass:worktree-pre-checkout,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run worktree-first pre-checkout lint
        id: lint
        if: steps.bypass.outputs.bypass == 'false'
        run: |
          set +e
          bash scripts/check-worktree-first-pre-checkout.sh 2>&1 | tee /tmp/lint.out
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit $status  # blocking-on-pr mode вҖ” lint fail мӢң step fail propagation (CFP-531)

      - name: Post lint result comment (sticky)
        if: steps.bypass.outputs.bypass == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/lint.out 2>/dev/null || echo '(lint output л¶Җмһ¬)')"
          if [ "${LINT_STATUS:-1}" = "0" ]; then
            HEADER="## worktree-first pre-checkout lint вҖ” PASS (enforce mode, CFP-531)"
            FOOTER="blocking-on-pr mode вҖ” lint PASS. pre-checkout hook м •н•© нҷ•мқёлҗЁ."
          else
            HEADER="## worktree-first pre-checkout lint вҖ” violation к°җм§Җ (enforce mode)"
            FOOTER=$'**blocking-on-pr mode (CFP-531 / ADR-040 Amendment 5)**: lint fail мқҙ PR merge лҘј м°ЁлӢЁн•©лӢҲлӢӨ.\n\n**hotfix bypass channel**: `hotfix-bypass:worktree-pre-checkout` label л¶Җм°© мӢң lint skip + audit comment мһҗлҸҷ л°ңмқҳ.'
          fi
          BODY="${HEADER}

\`\`\`
${LINT_OUT}
\`\`\`

${FOOTER}

> ліё workflow = blocking-on-pr mode (continue-on-error: false, CFP-531 / ADR-040 Amendment 5). PR merge м°ЁлӢЁ нҷңм„ұ."
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Emit bypass audit comment (label applied)
        if: steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' м„№м…ҳ л¶Җмһ¬ вҖ” нӣ„мҶҚ ліҙмҷ„ мқҳл¬ҙ)"
          fi
          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:worktree-pre-checkout")] | last | .actor.login' \
            2>/dev/null || echo "unknown")
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label_applied_by=${LABEL_USER} reason=${REASON} ADR_files=(N/A вҖ” worktree-first lint) timestamp=${TS}"
          BODY="${AUDIT}

> ADR-024 Amendment 3 В§кІ°м • 6.C вҖ” audit comment мһҗлҸҷ л°ңмқҳ. assertion lint = \`scripts/check-bypass-audit-comment.sh\`."
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Audit assertion (bypass label л¶Җм°© мӢң)
        if: steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          bash scripts/check-bypass-audit-comment.sh
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "audit assertion FAIL (warning mode вҖ” PR merge лҜём°ЁлӢЁ)"
          fi
          exit 0
