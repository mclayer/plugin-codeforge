name: Schema 7 principles self-check
# CFP-1059-S6 / ADR-089 §결정 1 — Schema 변경 7 원칙 mandatory invariant
# Tier: warning (continue-on-error, ADR-060 §결정 5)
# Bypass channel: hotfix-bypass:bidirectional-smoke label (label-registry-v2.42)
#
# S6 actual job body (declarative seed -> actual wire):
#   scripts/check-schema-7-principles.sh invoke (ADR-089 7 원칙 + ADR-068 I-5 dimensional grounding)
#
# ADR-089 §결정 1 7 원칙:
#   원칙 1 — backward-compatible 우선 (additive 우선, drop 후속)
#   원칙 2 — 단방향 변경 (한 PR 안 add+drop 동시 금지)
#   원칙 3 — compatibility window 유지 (bidirectional-smoke.yml 분담)
#   원칙 4 — fail-loud (silent fallback / safe-default 차단)
#   원칙 5 — rollback path 명시 (downgrade 정책 사전 정의)
#   원칙 6 — empirical evidence (ADR-068 I-5 dimensional grounding)
#   원칙 7 — hard limit (column 100+ / row 1억+ / lock 5분+ / depth 7+)
#
# ADR-068 I-5 cross-ref:
#   원칙 6+7 = dimensional empirical grounding annotation 의무
#   [empirical-source: <ref>] (dimension: latency/scale/cardinality/throughput/count/volume...)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'migrations/**'
      - 'schema/**'
      - 'docs/change-plans/**'
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  schema-7-principles:
    runs-on: ubuntu-latest
    # warning tier (ADR-060 §결정 5)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run schema-7-principles check
        run: |
          set -euo pipefail
          echo "=== Schema 7 principles self-check ==="
          echo "ADR-089 §결정 1 — 7 원칙 mandatory invariant"

          # scripts/check-schema-7-principles.sh 존재 확인 + 실행
          CHECK_SH="scripts/check-schema-7-principles.sh"
          if [[ -f "${CHECK_SH}" ]]; then
            bash "${CHECK_SH}"
          else
            echo "::warning::${CHECK_SH} 미발견 — 7 원칙 self-check 스킵"
            echo "[INFO] S6 scripts/check-schema-7-principles.sh 가 본 workflow 의 실 로직"
            exit 0
          fi

      - name: Report
        if: always()
        run: |
          echo "=== schema-7-principles-check 완료 ==="
          echo "[INFO] warning tier (ADR-060 §결정 5) — blocking-on-pr 승격 = 별 CFP"
          echo "[INFO] ADR-068 I-5 dimensional empirical grounding annotation 의무"
