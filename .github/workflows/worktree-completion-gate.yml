name: worktree-completion-gate
# CFP-2377 Phase 2 — 완료 단계 정식화 anti-theater 변별 test (warning-tier).
#
# ADR-128 §결정 2 + ADR-040 Amendment 9 §결정 7.K + ADR-045 Amendment 13 검증:
# - 완료-게이트(check-worktree-completion-clean.sh) F2 구분 계약 변별 (TC-3/TC-4/TC-6)
# - backstop SessionEnd async 단일 wire 배선 + 트리거 단일화 invariant (TC-1/TC-2)
# - backstop 로직 무변경 회귀 + close lifecycle disjoint (TC-5/TC-7)
# - evidence-checks-registry worktree-clean-completion-gate entry (warning + workflow:null)
#
# Non-required workflow (branch protection required contexts 무변경, merge 미차단 — AC-12 / ADR-024 Amd19 §B).
# Warning-tier: continue-on-error: true 로 job 실패가 PR merge 를 차단하지 않음.
# (선례 = operational-outcome-signal-lint.yml header pattern — wrapper-self only,
#  templates/github-workflows/ 미배치 → invariant-check workflow-parity 비대상.)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  worktree-completion-gate:
    name: 완료 단계 정식화 변별 test (warning-tier)
    runs-on: ubuntu-latest
    continue-on-error: true   # warning-tier — 실패가 merge 미차단
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML (registry assert 용)
        run: python -m pip install --quiet pyyaml

      - name: Smoke — check-worktree-completion-clean.sh 자체 호출 (always exit 0 advisory)
        run: |
          set +e
          if [ -f scripts/check-worktree-completion-clean.sh ]; then
            STORY_KEY=cfp-0000 bash scripts/check-worktree-completion-clean.sh
            echo "[smoke] completion-clean exit=$?"
          else
            echo "::warning::check-worktree-completion-clean.sh 부재 — Phase 2 산출물 미 commit"
          fi
          exit 0

      - name: 변별 test — completion-clean (TC-3 / TC-4 / TC-6)
        run: bash scripts/test-check-worktree-completion-clean.sh

      - name: 변별 test — backstop wire + registry + 회귀 (TC-1 / TC-2 / TC-5 / TC-7)
        run: bash scripts/test-worktree-backstop-wire.sh
