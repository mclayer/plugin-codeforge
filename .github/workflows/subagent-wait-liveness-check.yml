name: Subagent wait liveness presence lint (warning mode)
# CFP-2549 / ADR-139 §결정 4 2안 — general adapter liveness gate presence lint.
# codeforge 소유 background 서브에이전트 호출(run_in_background / spawn 후 bg fetch)이 항상
# `timeout --kill-after=<K> <N>` (option-first runnable) 또는 별 max-wait ceiling 구동이나
# `docs/orchestrator-playbook.md` 에서 정의된 max-wait 어휘/구성을 따르는지, 그리고
# 호출 건수 ≥1 (hollow-gate 차단, invariant I-3) 검증.
# Tier: warning (continue-on-error, non-required check — ADR-060 §결정 5 / ADR-139 Phase 2 wire)
# Bypass channel: hotfix-bypass:subagent-wait-liveness-presence (ADR-024 §결정 6.A per-entry namespace)
#
# consumer degradation (SSOT = scripts/lib/check_subagent_wait_liveness_presence.py header §5):
#   byte-identical template mirror(ADR-005)를 consumer 가 상속해도, consumer repo 에
#   `docs/orchestrator-playbook.md` 경로 부재 시 lint 는 honest no-op(exit 0) 로 degrade —
#   spurious RED 미발생. 따라서 CONSUMER_ONLY_WORKFLOWS 등록 안 함 (byte-identical parity 유지).
#
# 승격 path:
#   warning → blocking-on-pr 승격 시 CFP-NNN carrier PR 가 다음 변경 동반 의무:
#     1. 본 workflow 의 continue-on-error: true 제거
#     2. branch protection required_status_checks.contexts 에 본 workflow job name 추가
#     3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d) + evidence-checks-registry promotion_criteria)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'docs/orchestrator-playbook.md'
      - 'scripts/**'
      - '.github/workflows/**'
      - '**/*.md'

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  subagent-wait-liveness-presence:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — lint fail 이 PR merge 차단하지 않음.
    # required_status_checks.contexts 부착 X.
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Run self-test (D3 — inline fixture, RED→GREEN discriminating)
        run: bash scripts/check-subagent-wait-liveness-presence.sh --self-test

      - name: Run discriminating test suite (QADev — mutation proof + consumer no-op)
        # tests/scripts/test_check-subagent-wait-liveness-presence.sh (D2 test case: GREEN + RED,
        # 가드 제거 → RED 전환 mutation proof + hollow-gate I-3 + consumer no-op). wrapper-self only
        # (CI channel = 본 step, ADR-136 Amd2 QADev tests/scripts 실행 채널 선례 동형).
        if: hashFiles('tests/scripts/test_check-subagent-wait-liveness-presence.sh') != ''
        run: bash tests/scripts/test_check-subagent-wait-liveness-presence.sh

      - name: Run subagent wait liveness presence lint
        id: lint
        run: |
          bash scripts/check-subagent-wait-liveness-presence.sh . 2>&1 | tee lint-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Post warning comment (max-wait liveness 누락)
        if: steps.lint.outcome == 'failure'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('lint-output.txt', 'utf8');
            const body = [
              '## Subagent wait liveness presence lint — warning',
              '',
              '> ADR-139 §결정 4 2안 warning-tier (CFP-2549). PR merge 차단 아님.',
              '> background 서브에이전트 호출은 `timeout --kill-after=<K> <N>` (option-first) 또는 max-wait 어휘 규약 필수 (무한 대기 근절).',
              '> bypass: `hotfix-bypass:subagent-wait-liveness-presence` label 부착.',
              '',
              '```',
              output.slice(0, 3000),
              '```',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
