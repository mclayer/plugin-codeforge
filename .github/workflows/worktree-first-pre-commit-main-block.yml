name: worktree-first pre-commit main-block hook check (warning mode)
# CFP-426 / ADR-040 Amendment 3 §결정 7 / ADR-060 §결정 5
# Tier: warning (continue-on-error, non-required check)
# Bypass channel: hotfix-bypass:worktree-pre-commit-main-block label
#
# Story 1 skeleton — actual git hook 도입 = Story 3 (CFP-428).

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'templates/.git-hooks/pre-commit*'
      - '.git-hooks/pre-commit*'
      - 'scripts/check-worktree-first-pre-commit-main-block.sh'

permissions:
  pull-requests: write
  contents: read

jobs:
  worktree-first-pre-commit-main-block:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "labels=$labels"
          case ",$labels," in
            *,hotfix-bypass:worktree-pre-commit-main-block,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run worktree-first pre-commit-main-block lint
        id: lint
        if: steps.bypass.outputs.bypass == 'false'
        run: |
          set +e
          bash scripts/check-worktree-first-pre-commit-main-block.sh 2>&1 | tee /tmp/lint.out
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Post lint result comment (sticky)
        if: steps.bypass.outputs.bypass == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/lint.out 2>/dev/null || echo '(lint output 부재)')"
          if [ "${LINT_STATUS:-1}" = "0" ]; then
            HEADER="## worktree-first pre-commit-main-block lint — PASS (warning mode, Story 1 skeleton)"
            FOOTER="skeleton mode — actual git hook 도입 = Story 3 (CFP-428)."
          else
            HEADER="## worktree-first pre-commit-main-block lint — violation 감지 (warning mode)"
            FOOTER=$'**warning mode**: lint fail 이 PR merge 를 차단하지 않습니다.\n\n**hotfix bypass channel**: `hotfix-bypass:worktree-pre-commit-main-block` label 부착 시 lint skip + audit comment 자동 발의.'
          fi
          BODY="${HEADER}

\`\`\`
${LINT_OUT}
\`\`\`

${FOOTER}

> warning mode (continue-on-error). 승격 gate 통과 후 blocking 전환 (Story 4 CFP-429 책임)."
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Emit bypass audit comment (label applied)
        if: steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' 섹션 부재 — 후속 보완 의무)"
          fi
          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:worktree-pre-commit-main-block")] | last | .actor.login' \
            2>/dev/null || echo "unknown")
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label_applied_by=${LABEL_USER} reason=${REASON} ADR_files=(N/A — worktree-first lint) timestamp=${TS}"
          BODY="${AUDIT}

> ADR-024 Amendment 3 §결정 6.C — audit comment 자동 발의. assertion lint = \`scripts/check-bypass-audit-comment.sh\`."
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Audit assertion (bypass label 부착 시)
        if: steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          bash scripts/check-bypass-audit-comment.sh
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "audit assertion FAIL (warning mode — PR merge 미차단)"
          fi
          exit 0
