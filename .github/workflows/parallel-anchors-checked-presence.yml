name: parallel_anchors_checked presence lint (warning mode)
# CFP-1306 / ADR-060 Amendment 15 §결정 29 / ADR-068 I-2 cross-module propagation completeness
# Tier: warning (continue-on-error: true, non-required check)
# Bypass channel: hotfix-bypass:parallel-anchors-checked-presence label (ADR-024 Amendment 14)
#
# Checks review-verdict-v4 packet body files for findings[].parallel_anchors_checked[] field.
# Wave 3 mechanical enforcement (Wave 1=CFP-1291 prose, Wave 2=CFP-1303 schema v4.9).
#
# 3-state semantic:
#   absent      → WARNING — field missing for candidate finding
#   present+clean → PASS  — all matched: false (clean enumeration evidence)
#   present+matched → PASS — matched: true (parallel anchor found, advisory)
#
# 5 pattern_type enum closed-set (review-verdict-v4 v4.9 SSOT):
#   local_remote / client_server / read_write / forward_reverse / enum_closure
#
# SecurityArch §7.2 TH-2 constraint: permissions: contents: read only (no PR write).
# No CODEFORGE_CROSS_REPO_PAT in lint output (PAT guard).
#
# Carrier: CFP-1306 / dual-binding: ADR-068 I-2 (declaration source) +
#                                   ADR-060 Amendment 15 (enforcement source)
#
# Promotion path (ADR-060 §결정 29.E):
#   warning → blocking-on-pr: remove continue-on-error + branch protection update
#   (requires pr_cumulative_min: 20 evidence gate, ADR-060 §결정 6(b))

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      target_file:
        description: "Optional file path to lint (leave empty to scan PR diff)"
        required: false
        default: ""

concurrency:
  group: parallel-anchors-checked-presence-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  parallel-anchors-checked-presence:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 29 / §결정 5) — lint fail does NOT block PR merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check bypass label
        id: bypass
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          set +x  # SecurityArch TH-2: no debug trace
          labels="${PR_LABELS:-}"
          case ",$labels," in
            *,hotfix-bypass:parallel-anchors-checked-presence,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              echo "::notice::hotfix-bypass:parallel-anchors-checked-presence detected — parallel-anchors-checked-presence lint bypassed (ADR-024 Amendment 14)"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run parallel-anchors-checked-presence lint
        id: lint
        if: steps.bypass.outputs.bypass == 'false'
        env:
          TARGET_FILE: ${{ github.event.inputs.target_file || '' }}
        run: |
          set +x  # SecurityArch TH-2: no debug trace (PAT guard)
          set +e

          # Determine candidate files to lint
          if [ -n "${TARGET_FILE:-}" ]; then
            # workflow_dispatch: explicit file
            CANDIDATE_FILES="$TARGET_FILE"
          else
            # PR trigger: scan diff for review-verdict packet candidates
            # Heuristic: files containing findings: or pl_recommendation: markers
            CHANGED_FILES="$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || true)"

            if [ -z "$CHANGED_FILES" ]; then
              echo "::notice::parallel-anchors-checked-presence: no changed files detected — PASS (advisory)"
              echo "exit_status=0" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            # Content pre-screen: filter to review-verdict packet candidate files only
            # Reduces blast surface — only files with review-verdict inline citation markers.
            CANDIDATE_FILES=$(echo "$CHANGED_FILES" | while IFS= read -r f; do
              [ -z "$f" ] && continue
              [ -f "$f" ] || continue
              grep -l -E "(findings:|pl_recommendation:|parallel_anchors_checked)" "$f" 2>/dev/null || true
            done)

            if [ -z "$CANDIDATE_FILES" ]; then
              echo "::notice::parallel-anchors-checked-presence: no review-verdict packet candidates in PR diff — lint scope empty, PASS (advisory)"
              echo "exit_status=0" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Run lint on candidate files (warning tier — non-blocking)
          MAX_EXIT=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            python3 scripts/lib/check_parallel_anchors_checked_presence.py "$f" 2>&1 || {
              status=$?
              if [ "$status" -gt "$MAX_EXIT" ]; then
                MAX_EXIT="$status"
              fi
            }
          done <<< "$CANDIDATE_FILES"

          echo "exit_status=$MAX_EXIT" >> "$GITHUB_OUTPUT"
          # warning tier: always exit 0 (continue-on-error + warning-tier semantic)
          exit 0

      - name: Emit lint summary
        if: steps.bypass.outputs.bypass == 'false' && always()
        env:
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set +x  # SecurityArch TH-2
          status="${LINT_STATUS:-0}"
          if [ "$status" = "0" ]; then
            echo "::notice::parallel-anchors-checked-presence: PASS — parallel_anchors_checked field present (review-verdict-v4 v4.9, ADR-068 I-2)"
          elif [ "$status" = "1" ]; then
            echo "::warning::parallel-anchors-checked-presence: WARNING — findings[].parallel_anchors_checked[] field absent or malformed for candidate finding. Add parallel_anchors_checked[] array per review-verdict-v4 v4.9 (CFP-1303). 5 pattern_type enum: local_remote/client_server/read_write/forward_reverse/enum_closure. hotfix bypass: hotfix-bypass:parallel-anchors-checked-presence label (ADR-024 Amendment 14)."
          else
            echo "::warning::parallel-anchors-checked-presence: META-ERROR (exit $status) — lint infrastructure issue. Non-blocking (warning tier)."
          fi
