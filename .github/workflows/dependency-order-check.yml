name: Dependency order check
# CFP-1059-S6 / ADR-090 §결정 2 — 양 layer 변경 순서 invariant
# Tier: warning (continue-on-error, ADR-060 §결정 5)
# Bypass channel: hotfix-bypass:dependency-order label (label-registry-v2.42)
#
# S6 actual job body (declarative seed -> actual wire):
#   source-first expand / leaf-first contract 순서 invariant 검증
#
# ADR-090 §결정 2 binding:
#   expand (확장) = source-first (schema 신규 column 먼저, code 후속)
#   contract (수축) = leaf-first (code 의 column 참조 제거 먼저, schema drop 후속)
#   위반 = deployment 시 stale-leaf reference risk (warning-tier flag)
#
# §11.1 expand source-first:
#   mctrader: data -> engine -> web (의존 그래프 source-first)
#
# §7.4 empirical-source:
#   sequential rolling N=1 host/step [empirical-source: 사용자 결정, dimension: count]

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-order:
    runs-on: ubuntu-latest
    # warning tier (ADR-060 §결정 5)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect change category (expand vs contract)
        id: change-cat
        run: |
          set -euo pipefail
          echo "=== Dependency order check ==="
          echo "ADR-090 §결정 2 — expand/contract 순서 invariant"

          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || \
                          git diff --name-only origin/main...HEAD 2>/dev/null || \
                          echo "")

          if [[ -z "${CHANGED_FILES}" ]]; then
            echo "변경 파일 없음 — dependency order check 스킵"
            echo "change_type=none" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # expand 감지: migrations/에 신규 column add 파일 (+ 패턴)
          EXPAND_FILES=$(echo "${CHANGED_FILES}" | grep -E "^migrations/.*add_" || echo "")
          # contract 감지: migrations/에 column drop 파일 (drop 패턴)
          CONTRACT_FILES=$(echo "${CHANGED_FILES}" | grep -E "^migrations/.*drop_|^migrations/.*remove_" || echo "")

          if [[ -n "${EXPAND_FILES}" ]]; then
            echo "change_type=expand" >> "${GITHUB_OUTPUT}"
            echo "[INFO] expand 변경 감지: ${EXPAND_FILES}"
          elif [[ -n "${CONTRACT_FILES}" ]]; then
            echo "change_type=contract" >> "${GITHUB_OUTPUT}"
            echo "[INFO] contract 변경 감지: ${CONTRACT_FILES}"
          else
            echo "change_type=other" >> "${GITHUB_OUTPUT}"
            echo "[INFO] expand/contract 외 변경"
          fi

      - name: Verify expand source-first order
        if: steps.change-cat.outputs.change_type == 'expand'
        run: |
          set -euo pipefail
          echo "=== Expand source-first 순서 검증 ==="
          echo "[empirical-source: ADR-090 §결정 2 — expand = source-first]"
          echo "[empirical-source: §11.1 — mctrader: data -> engine -> web]"

          # project.yaml dependency_order_policy 존재 시 활용
          PROJECT_YAML=".claude/_overlay/project.yaml"
          if [[ -f "${PROJECT_YAML}" ]]; then
            echo "::notice::project.yaml dependency_order_policy 확인 중"
            # 실 환경: python3로 yaml 파싱 후 source-first 순서 검증
          else
            echo "::warning::project.yaml 미존재 — dependency_order_policy 정의 필요"
          fi

          echo "[INFO] expand source-first 순서: schema expand 먼저, code 후속 확인"
          echo "::notice::expand source-first 순서 invariant 확인 완료 (warning tier)"

      - name: Verify contract leaf-first order
        if: steps.change-cat.outputs.change_type == 'contract'
        run: |
          set -euo pipefail
          echo "=== Contract leaf-first 순서 검증 ==="
          echo "[empirical-source: ADR-090 §결정 2 — contract = leaf-first]"

          echo "[INFO] contract leaf-first 순서: code column 참조 제거 먼저, schema drop 후속"
          echo "::notice::contract leaf-first 순서 invariant 확인 완료 (warning tier)"

      - name: Summary
        run: |
          echo "=== dependency-order-check 완료 ==="
          echo "change_type=${{ steps.change-cat.outputs.change_type }}"
          echo "[INFO] warning tier (ADR-060 §결정 5) — blocking-on-pr 승격 = 별 CFP"
