name: lane-count-ssot
# CFP-2426 / ADR-060 Amendment 19 §결정 33 — lane-count SSOT consistency 게이트 (warning-tier).
#
# canonical 작업레인 수(10, ADR-125 Amendment 1)가 governance 문서 전반에서 단조 유지되는지
# 현재-상태 lane-count 단언(N 레인 / N번째 lane / 레인 N개, N≠10)을 grep-기반 검출 + 5축
# allowlist(within-line 이중토큰 / negation / history / path / counterfactual) false-positive 차단.
#
# F4 결정 (§7.B7 / ADR-060 Amd18 §32.H 답습): .github single-root (deferred-followup-reconcile.yml
#   답습). ADR-005 byte-parity scope 외 — template mirror 미운용 (게이트 = wrapper-self governance
#   lane-count 자기일관성 검사라 .github-only 정합, consumer 배포 surface 무관). invariant-check.yml
#   parity loop 은 templates → .github 방향이라 .github-only 파일은 미검출 (CONSUMER_ONLY_WORKFLOWS
#   등록 불요 — deferred-followup-reconcile.yml 동형 firsthand 확인).
#
# Non-required workflow (branch protection required contexts 무변경, merge 미차단 — ADR-127 ratchet).
# Warning-tier: lint job 은 FLAG 검출 시 경고 표시하되 continue-on-error 로 job 성공(비차단).
# path-filter on.paths 미사용 (ADR-130 §결정 158 required-pending 회피 선례 일관성 — 비-required 라
#   직접 영향 적으나 선례 정합).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lane-count-ssot:
    name: lane-count SSOT 일관성 검출 (warning-tier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run check-lane-count-ssot.sh (warning, 비차단)
        continue-on-error: true
        run: bash scripts/check-lane-count-ssot.sh check

  lane-count-ssot-test:
    name: discriminating self-test (22 fixture + 4 mutation 생존 0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run test-check-lane-count-ssot.sh (회귀 시 exit 1 차단)
        run: bash scripts/test-check-lane-count-ssot.sh
