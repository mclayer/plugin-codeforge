name: spawn-prompt-fact-verify
# CFP-2383 / ADR-082 Amendment 37 §결정 1 layer 1 sub-scope 1-Z (sub-scope 1-L Amd 23, CFP-1590
# carrier) — spawn-prompt-fact-verify 게이트 (warning-tier).
#
# worker→worker handoff spawn prompt PR-body-proxy 안 5 fact category (C1 counter / C2 version /
# C3 SHA / C4 verify-result / C5 file-existence) inherit fact 단언 시 동일-line `[verified-via:`
# annotation presence 로 write-time pre-screen. sub-scope 1-L Wave 1 declaration-only mandate 의
# Wave 2 mechanical wire.
#
# single-root (.github only): templates/github-workflows/ 미사용 — 게이트 = wrapper-self governance
#   PR body 검사라 .github-only 정합. ADR-005 byte-parity scope 외 (template mirror 미운용).
#   invariant-check.yml parity loop 은 templates → .github 방향이라 .github-only 파일은 미검출
#   (CONSUMER_ONLY_WORKFLOWS 등록 불요). S2 issue-body-claim-pre-screen.yml 동형.
#
# injection-safe (비협상 — fork-PR shell injection 차단):
#   - on: pull_request (NOT pull_request_target) — fork PR 도 base repo secret 미노출 컨텍스트.
#   - permissions: contents:read, pull-requests:read (write/secret 0).
#   - env-injection only: PR body 를 env 로 주입 후 run 에서 env 경유만 — run inline ${{ }} 보간 금지.
#     ↑ [AC-3 discriminator — load-bearing, 절대 삭제 금지] 위 줄의 top-level(주석) 빈 표현식은
#       tests/scripts/test-actionlint-workflows.sh 의 F3 anti-vacuous negative fixture 다.
#       run: 블록 밖 빈 표현식이 born-invalid 가 아님을 실증하는 2-sided discrimination 의 negative 축.
#       삭제 시 self-test 의 F3-precondition-empty-expr-absent 가 명시 FAIL 한다(CFP-2644 / ADR-145 Amd3).
#   - paths filter 미사용 — PR body 검사라 변경 파일 경로 무관 (S2 동형).
#
# Non-required workflow (branch protection 6-tuple 무변경, merge 미차단 — ADR-127 ratchet).
# Warning-tier: lint job 은 FLAG 검출 시 경고 표시하되 continue-on-error 로 job 성공(비차단).

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: read

jobs:
  spawn-prompt-fact-verify:
    name: spawn-prompt fact-verify pre-screen (warning-tier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run check-spawn-prompt-fact-verify.sh (warning, 비차단)
        continue-on-error: true
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: bash scripts/check-spawn-prompt-fact-verify.sh

  spawn-prompt-fact-verify-test:
    name: discriminating test (다형 fixture — mutation 생존 0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run test-check-spawn-prompt-fact-verify.sh (회귀 시 exit 1 차단)
        run: bash scripts/test-check-spawn-prompt-fact-verify.sh
