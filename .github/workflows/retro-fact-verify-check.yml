name: PMOAgent retro fact verify mandate check (warning mode — Wave 1 stub)
# CFP-1684 / ADR-082 Amendment 30 §결정 1 layer 1 sub-scope (1-S) 신설 carrier
# CFP-1646 retro F3 forcing function (META recursive — retro write-time stale fact)
# ADR-060 §결정 5 default warning mode (first introduction = warning tier)
# Tier: warning (continue-on-error: true, non-required check)
# Bypass: hotfix-bypass:retro-fact-verify-mandate label (107번째 family member)
#
# Wave 1 declarative stub — Wave 2 mechanical wire = Phase 2 PR scope.
# Wave 2 carrier: scripts/check-retro-fact-verify.sh + scripts/lib/check_retro_fact_verify.py (ADR-061) +
#                 bats fixture pair RED→GREEN stash proof (CFP-1334) + boundary fixture pair (CFP-963 Codex TP#4)
#
# Detection scope (Wave 2 codify, declarative anchor):
#   PMOAgent retro file write 시 cited fact source direct verify:
#     - commit SHA (gh pr view --json mergeCommit / git log — Phase 1 commit vs merge commit disambiguation)
#     - label-registry version (git show origin/main:label-registry-v2.md grep version)
#     - bypass family count (grep -c hotfix-bypass:)
#     - cross-Story memory pattern_count (source memory entries cross-ref)
#   retro file 안 SHA pattern + version pattern presence-grep + verify trace presence.
#
# Axis disjoint:
#   - ADR-082 §결정 9 (CFP-1312 Amd 7) = ArchitectAgent + Orchestrator write-time verify scope
#   - 본 §결정 1 sub-scope 1-S (Amd 30 CFP-1684) = PMOAgent retro write scope
#
# META recursive: CFP-1646 retro write-time PMOAgent 자체 stale_fact (wrapper SHA e84f0460 vs 00641695 + internal-docs 0b37a71 vs 33fff4cf)

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**/retros/**'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: retro-fact-verify-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  retro-fact-verify-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    if: false  # Wave 1 stub disabled — Wave 2 carrier 가 if:false 제거 + body actual lint wire
    steps:
      - name: Wave 1 stub — declarative anchor only (Wave 2 carrier = mechanical wire)
        run: |
          echo "::notice::CFP-1684 Wave 1 stub — PMOAgent retro fact verify mandate declarative anchor."
          echo "ADR-082 Amendment 30 §결정 1 sub-scope (1-S) — retro write-time cited fact source direct verify 의무."
          echo "Bypass: hotfix-bypass:retro-fact-verify-mandate label (audit-trailed exception channel)."
