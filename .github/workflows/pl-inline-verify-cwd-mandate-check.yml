name: pl-inline-verify-cwd-mandate-check (warning mode)
# CFP-1341 / CFP-1316 retro F1 Mandatory carrier
# ADR-040 Amendment 6 §결정 7.J PL inline scope mechanical enforcement gap closure
# ADR-073 §결정 1 verify-before-assert primitive 강화
# ADR-070 §결정 D5 verify-before-trust direct file Read primary
# Tier: warning (continue-on-error: true, non-required check)
# Bypass channel: hotfix-bypass:pl-inline-verify-cwd-mandate label (ADR-024 Amendment N §결정 6.A — 91번째 family member)
#
# pl-inline-verify-cwd-mandate-lint — Lane PL spawn prompt 안 inline 명령 cwd directive
# enforcement mechanical lint (warning-tier).
#
# Detection scope:
#   변경된 Story file (docs/stories/**/*.md) §14 Lane Evidence section 안에서
#   Lane PL spawn marker 발견 시 ±20 line window 안 cwd directive (3 forms) presence 검사:
#     form 1: `git -C <worktree_abs_path>` (best)
#     form 2: `cd <worktree_abs_path>` (acceptable)
#     form 3: `[WORKTREE-CWD: <path>]` (declarative annotation)
#   3 form 모두 부재 + spawn marker 존재 → [WARN-CWD-DIRECTIVE-ABSENT]
#
# FP-완화 guard:
#   - templates/** path = canonical example 면제
#   - tests/** path = bats fixture 면제
#
# Trigger split (CFP-954 D2 consensus 답습 — production-cutover-evidence.yml byte-pattern):
#   - pull_request (PR-time enforcement)
#   - workflow_dispatch (manual runs)
#
# SecurityArch §7.2 TH-2 constraint: permissions: contents: read only.
# No CODEFORGE_CROSS_REPO_PAT in lint output (PAT guard).
#
# Carrier: CFP-1341 / CFP-1316 retro F1 Mandatory
#   - declaration source: ADR-040 Amendment 6 §결정 7.J (PL inline scope gap)
#   - enforcement source: ADR-060 §결정 5 warning tier framework
#
# Promotion path (ADR-060 §결정 28.E):
#   warning → blocking-on-pr: remove continue-on-error + branch protection update
#   (requires pr_cumulative_min: 20 + pattern_count >= 2 evidence gate, ADR-060 §결정 6(b))
#
# Precedent byte-pattern: templates/github-workflows/spawn-prompt-head-pin-check.yml (CFP-1489)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:

concurrency:
  group: pl-inline-verify-cwd-mandate-check-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pl-inline-verify-cwd-mandate-check:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5 / §결정 28) — lint fail does NOT block PR merge.
    continue-on-error: true
    steps:
      - name: Checkout PR HEAD
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bypass label check
        id: bypass
        run: |
          set +x  # SecurityArch TH-2
          BYPASS_LABEL="hotfix-bypass:pl-inline-verify-cwd-mandate"
          LABELS_JSON='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS_JSON" | grep -q "\"$BYPASS_LABEL\""; then
            echo "::notice::pl-inline-verify-cwd-mandate-check: bypass label $BYPASS_LABEL detected — skip lint"
            echo "bypass=true" >> "$GITHUB_OUTPUT"
          else
            echo "bypass=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run lint
        id: lint
        if: steps.bypass.outputs.bypass == 'false'
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set +x  # SecurityArch TH-2
          # Collect changed files (PR diff scope)
          CHANGED_FILES=$(git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD" -- 'docs/stories/**/*.md' 2>/dev/null || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "::notice::pl-inline-verify-cwd-mandate-check: no docs/stories/**/*.md files in PR diff — lint scope empty, PASS (advisory)"
            echo "exit_status=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Content pre-screen: filter to story files containing Lane PL spawn markers
          CANDIDATE_FILES=$(echo "$CHANGED_FILES" | while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -f "$f" ] || continue
            case "$f" in
              templates/*|tests/*|*/templates/*|*/tests/*) continue ;;
            esac
            grep -l -E "(DesignReviewPLAgent spawn|CodeReviewPLAgent spawn|SecurityTestPLAgent spawn|ArchitectPLAgent spawn|DeveloperPLAgent spawn|RequirementsPLAgent spawn|DeployPLAgent spawn|DeployReviewPLAgent spawn)" "$f" 2>/dev/null || true
          done)

          if [ -z "$CANDIDATE_FILES" ]; then
            echo "::notice::pl-inline-verify-cwd-mandate-check: no Lane PL spawn candidate files in PR diff — lint scope empty, PASS (advisory)"
            echo "exit_status=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Run lint only on candidate files (warning tier — non-blocking)
          MAX_EXIT=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            python3 scripts/lib/check_pl_inline_verify_cwd.py "$f" 2>&1 || {
              status=$?
              if [ "$status" -gt "$MAX_EXIT" ]; then
                MAX_EXIT="$status"
              fi
            }
          done <<< "$CANDIDATE_FILES"

          echo "exit_status=$MAX_EXIT" >> "$GITHUB_OUTPUT"
          # warning tier: always exit 0
          exit 0

      - name: Emit lint summary
        if: steps.bypass.outputs.bypass == 'false' && always()
        env:
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set +x  # SecurityArch TH-2
          status="${LINT_STATUS:-0}"
          if [ "$status" = "0" ]; then
            echo "::notice::pl-inline-verify-cwd-mandate-check: PASS — Lane PL spawn entries all have cwd directive (3 forms: git -C / cd <path> / [WORKTREE-CWD:]) in ±20 line window (ADR-040 Amendment 6 §결정 7.J)"
          elif [ "$status" = "1" ]; then
            echo "::warning::pl-inline-verify-cwd-mandate-check: WARNING — Lane PL spawn marker detected without cwd directive in ±20 line window. Add: \`git -C <worktree_abs_path>\` (best) OR \`cd <worktree_abs_path>\` (acceptable) OR \`[WORKTREE-CWD: <path>]\` annotation (declarative). Hotfix bypass: hotfix-bypass:pl-inline-verify-cwd-mandate label (ADR-024 Amendment N §결정 6.A — 91번째 family member)."
          else
            echo "::warning::pl-inline-verify-cwd-mandate-check: META-ERROR (exit $status) — lint infrastructure issue. Non-blocking (warning tier)."
          fi
