name: architect-chief-author-base-sha-freeze
# CFP-1581 / ADR-073 Amendment 16 — ArchitectAgent chief author base SHA freeze verify
# Tier: warning (ADR-060 evidence-enforceable, continue-on-error: true)
# evidence-checks-registry.yaml entry: architect-chief-author-base-sha-freeze-verify
#
# 검증:
#   PR open 시점 + workflow_dispatch — ArchitectAgent (chief author) spawn 시점 base SHA freeze
#   ADR-073 §결정 1-Q 4-step verify-before-assert primitive:
#     Step 1: git fetch origin (cross-repo state freshness)
#     Step 2: git diff origin/main..HEAD --stat (base drift detection)
#     Step 3: drift 감지 시 mechanical rebase 권장 message
#     Step 4: expected diff narrowed verify (PR scope 정합)
#
# Lint 2-mode (artifact verification):
#   Mode A (spawn-prompt-grep): §14 ArchitectAgent chief author spawn marker ±20 line window
#                                [PRE-SPAWN-ORIGIN-MAIN-SHA: <40-char-hex>] presence-grep
#   Mode B (lane-evidence-marker-grep): §14 base_sha_pinned field presence
#
# FP guard 4종:
#   1. templates/** canonical example 면제
#   2. tests/** bats fixture 면제
#   3. docs/stories/ path-only scope (Story file 아닌 모든 file = silent skip)
#   4. marker 부재 silent skip
#
# 트리거 (D2 dual trigger split — production-cutover-evidence.yml precedent):
#   pull_request: opened/synchronize/reopened
#   workflow_dispatch: 수동 ad-hoc 실행
#
# Hotfix bypass:
#   hotfix-bypass:architect-chief-author-base-sha-freeze-verify label 부착 시 skip + audit comment
#   (ADR-024 Amendment N §결정 6.A per-entry namespace, 99번째 family member)
#
# Graceful degradation 3 fail-mode:
#   401_fail_closed:  git CLI 환경 오류 → exit 2 (SETUP error, warning 발화)
#   429_fail_open:    rate-limit 등 transient → exit 0 (continue-on-error + warning)
#   5xx_noop:         네트워크 오류 → exit 0 (advisory stderr marker)
#
# Permissions: deny-all top-level + per-job least-privilege (ADR-060 Amendment 8)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions: {}  # top-level deny-all

jobs:
  architect-chief-author-base-sha-freeze:
    runs-on: ubuntu-latest
    continue-on-error: true  # warning tier — does not block CI (ADR-060 §결정 5)
    permissions:
      contents: read   # git fetch + diff
      pull-requests: write  # bypass audit comment

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git diff origin/main..HEAD

      - name: Check hotfix-bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            LABELS=$(gh pr view ${{ github.event.pull_request.number }} \
              --json labels --jq '[.labels[].name] | @json' 2>/dev/null || echo '[]')
            if echo "$LABELS" | grep -q "hotfix-bypass:architect-chief-author-base-sha-freeze-verify"; then
              echo "bypass=true" >> "$GITHUB_OUTPUT"
            else
              echo "bypass=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "bypass=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bypass audit comment
        if: steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "[architect-chief-author-base-sha-freeze] hotfix-bypass:architect-chief-author-base-sha-freeze-verify active — lint check skipped"
          echo "[bypass-justification] hotfix-bypass:architect-chief-author-base-sha-freeze-verify applied on PR #${{ github.event.pull_request.number }}"
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "[architect-chief-author-base-sha-freeze] bypass active — hotfix-bypass:architect-chief-author-base-sha-freeze-verify label detected. Audit trail: $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              2>/dev/null || true
          fi

      - name: Setup Python
        if: steps.bypass.outputs.bypass != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run 4-step base SHA freeze verify (ADR-073 §결정 1-Q)
        if: steps.bypass.outputs.bypass != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/check-architect-chief-author-base-sha-freeze.sh
          # Step 1-4: git fetch + diff + drift detect + expected diff verify
          # continue-on-error: warning tier — exit 1 (WARNING) is non-blocking
          bash scripts/check-architect-chief-author-base-sha-freeze.sh \
            --mode=4step-verify \
            --worktree-path="." \
            2>&1 || {
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 2 ]; then
              echo "::warning::architect-chief-author-base-sha-freeze ENVIRONMENT_ERROR (exit 2) — git CLI or dependency setup issue"
            elif [ $EXIT_CODE -eq 1 ]; then
              echo "::warning::architect-chief-author-base-sha-freeze WARNING (exit 1) — base drift detected, rebase recommended"
            fi
            exit 0  # warning tier: non-blocking
          }

      - name: Run Story file §14 lint (Mode A + Mode B)
        if: steps.bypass.outputs.bypass != 'true' && github.event.pull_request.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find Story files changed in this PR (docs/stories/**/*.md scope)
          CHANGED_STORIES=$(git diff --name-only origin/${{ github.base_ref || 'main' }}...HEAD \
            -- 'docs/stories/**/*.md' 2>/dev/null || echo "")

          if [ -z "$CHANGED_STORIES" ]; then
            echo "[architect-chief-author-base-sha-freeze] No Story files changed — §14 lint skipped"
            exit 0
          fi

          WARN_COUNT=0
          while IFS= read -r story_path; do
            [ -z "$story_path" ] && continue
            echo "[architect-chief-author-base-sha-freeze] Linting Story file: $story_path"
            bash scripts/check-architect-chief-author-base-sha-freeze.sh \
              --mode=story-lint \
              --story-file="$story_path" \
              2>&1 || {
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 1 ]; then
                echo "::warning::architect-chief-author-base-sha-freeze §14 lint WARNING: $story_path — base SHA pin absent"
                WARN_COUNT=$((WARN_COUNT + 1))
              elif [ $EXIT_CODE -eq 2 ]; then
                echo "::warning::architect-chief-author-base-sha-freeze §14 lint ENVIRONMENT_ERROR: $story_path"
              fi
            }
          done <<< "$CHANGED_STORIES"

          if [ "$WARN_COUNT" -gt 0 ]; then
            echo "::warning::architect-chief-author-base-sha-freeze §14 lint: $WARN_COUNT Story file(s) missing base SHA pin"
          fi
          exit 0  # warning tier: non-blocking
