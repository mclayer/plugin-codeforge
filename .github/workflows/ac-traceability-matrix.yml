name: ac-traceability-matrix
# CFP-2603 (Epic CFP-2602 G1) / ADR-145 — 요건 traceability zero-drop **fail-closed** 게이트.
# Security: third-party actions are SHA-pinned per CFP-300 policy.
#
# 사용자 요건("5분/1시간 compactor" 반복 주장)이 요구사항→설계→§8→구현 사슬에서 조용히 증발하는
#   Gap A(요건-현실 갭)를, AC 에 lane 경계 넘는 안정 식별자(AC-ID)를 부여하고
#   `AC-N ↔ §8 명명 테스트 ↔ 실 테스트파일(symbol)` zero-drop 을 강제해 구조적으로 불가능하게 만든다.
#   presence/mapping 만 fail-closed 강제 — semantic 완전성 미강제(AC-8 CEILING, 검사연극 금지).
#
# day-1 hard-fail (continue-on-error 금지, warning-tier 금지). job-id = context name
#   `ac-traceability-matrix` (double-context 회피 — checks.create 별도 name 미사용).
#   branch-protection required_status_checks contexts 에 `ac-traceability-matrix` 등록(6→7-tuple, ADR-145 §결정3).
#
# wrapper-self-only (F1 — consumer born-broken 방지): repo-guard `if: github.repository == 'mclayer/plugin-codeforge'`.
#   templates/github-workflows/ byte-identical copy(execution-liveness L2)도 guard 상속 →
#   consumer 배포 시 inert(job skip). consumer 전파(ALLOWED_HUB_REPOS venue 파라미터화 +
#   project.yaml applicability)는 별도 follow-up Story(§12.1) — 지금 consumer 활성 배포 금지.
#
# cross-repo fetch = phase-gate-mergeable.yml 패턴 재사용 (같은 PAT secret 이름 CODEFORGE_CROSS_REPO_PAT,
#   helper fail-closed `if(!token) return`, whitelist strict match, resp.ok 403/404 가드).
#   **main-path degrade(PR-label fallback) 재사용 금지** — degraded(fetch 실패/token 부재/403/404/
#   non-resp.ok) 전부 FAIL (AC-7 no-optout, §7.6 5-state). PAT 취급: Authorization header-only,
#   응답 본문/토큰 로그 출력 금지(secret masking) — fail() 메시지엔 사유만.
#
# phase 신호 = EXPLICIT (Story frontmatter `phase:` / `status: phase:X`) — diff 추론 금지.
#   문서 lane(요구사항·설계·리뷰) → Phase 1(Hop1+Hop2) / 구현 lane → Phase 2(+Hop3 born-missing).
#
# per-PR applicability (ADR-145 Amendment 1 §결정8, CFP-2609): 비적용 PR(추적할 normative AC 부재 —
#   marketplace sync / Epic close / sibling / §5 AC 미선언 governance) = **항상 실행 in-job exit 0**
#   (job-skip/on.paths 필터 금지 — required+workflow-skip=영구 Pending, F-1/F-2/F-3). 적용성 verdict =
#   core 단일 소유(classify_ac_source). 비적용 skip 은 resolve-success ∧ 0 normative AC positive 확정에서만
#   도달 — 판정불가(fetch/403/404/frontmatter/malformed-table)·적용-미추적 은 FAIL(anti-degradation).

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read

env:
  # cross-repo Story/Change Plan fetch venue 화이트리스트 (zero-trust anchor, strict match — 미일치=FAIL).
  ALLOWED_HUB_REPOS: "mclayer/codeforge-internal-docs"

jobs:
  ac-traceability-matrix:
    name: ac-traceability-matrix
    # wrapper-self-only (F1) — consumer repo 에선 job skip(inert). required context 는 wrapper 만 등록.
    if: github.repository == 'mclayer/plugin-codeforge'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Resolve cross-repo AC source + RTM + phase (fail-closed)
        id: resolve
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          # cross-repo PAT (read-only). 부재/degraded = FAIL (main-path degrade 재사용 금지).
          CROSS_REPO_TOKEN: ${{ secrets.CODEFORGE_CROSS_REPO_PAT }}
          ALLOWED_HUB_REPOS: ${{ env.ALLOWED_HUB_REPOS }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { execFileSync } = require('child_process');
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            // fail-closed 하드 실패 — 로그엔 사유만(토큰/응답 본문 미출력, secret masking).
            const fail = (reason) => { core.setFailed(`ac-traceability-matrix fail-closed: ${reason}`); };

            // 1) marker 파싱 = pure leaf 모듈 단일 위임 (CFP-2659 / ADR-145 §결정11 Amendment 5).
            //    구 inline-JS 정규식 3개 제거 — markdown 장식 마커(`**story_uri**:` 키bold /
            //      `- **story_uri**:` list+bold)를 놓쳐 정상 PR 을 both-absent 로 오분류하던
            //      marker-format false-red(F1, 실측 2/7 PR) 정정. 파싱이 pure 모듈로 추출돼
            //      self-test 가 실 구동한다(born-hollow 봉인 — 장식/clean-capture mutation-kill 가능).
            //    injection 가드(§7.6 S7-3): PR body = attacker-controlled → **파일로 전달**(argv 금지) +
            //      execFileSync **arg-array**(셸 미경유, shell:true 금지).
            //    ReDoS(§7.6 S7-5): fork PR body 는 토큰 확인 이전 도달(pre-auth) → 모듈 측 bounded
            //      수량자(`\*{0,2}`) + per-line `^` anchor 로 차단. 산문 언급은 line-start anchor 로 미매치
            //      (false-green 금지).
            //    story_uri = 영구 ref(internal-docs main / immutable commit SHA). transient feature 브랜치 ref
            //      금지 — gate 시점에 미존재/사후삭제 = Class A 404(ADR-145 §결정8 F). 영구-ref convention 이 예방.
            //    rtm_uri 부재 ∧ phase 1 = RTM not-yet(Hop1 only) — placeholder(§8 "작성 예정") fallback 금지,
            //      EXPLICIT --rtm-not-yet 신호로 core 전달(§결정8 D). story-as-rtm fallback 재사용 금지.
            //    ac_applicability: none — <사유> = INPUT(저자선언, ADR-145 §결정9). thin router — verdict 는
            //      core 단일소유(Option B). story_uri present 시 병존-forward(precedence 는 core arbitrate —
            //      surface overrides none). 값이 'none' 외(skip/n/a/false)면 미인식 → both-absent 경로(AC-10).
            fs.writeFileSync('pr-body.md', body);
            let markers;
            try {
              const rawMarkers = execFileSync('python3',
                ['scripts/lib/ac_pr_markers.py', '--parse-pr-body', 'pr-body.md'],
                { encoding: 'utf-8' });
              markers = JSON.parse(rawMarkers);
            } catch (e) {
              fail('PR body 마커 파싱 실패 (scripts/lib/ac_pr_markers.py — 판정불가=FAIL, no-optout)');
              return;
            }
            const storyUri = markers.story_uri;                 // 장식 strip 후 clean URI | null
            const rtmUri = markers.rtm_uri;                     // 장식 strip 후 clean URI | null
            const noneDeclared = !!markers.none_declared;
            const noneReason = markers.none_reason || '';
            // 기계적 추출 사실(마커 0개) — verdict 아님. 적용성 판정은 core(classify_ac_source) 단일소유.
            const bothAbsent = !!markers.both_absent;

            if (!storyUri) {
              // story_uri 부재 = applicability-scoping 정의역(신호 C 정의상 부재). thin router forward(verdict=core).
              if (noneDeclared) {
                core.setOutput('applicability_none', 'true');
                core.setOutput('none_reason', noneReason);   // 빈 사유도 그대로 forward — 검증은 core(AC-2).
                core.setOutput('both_absent', bothAbsent ? 'true' : 'false');
                core.setOutput('phase', '1');
                core.setOutput('rtm_not_yet', 'false');
                return;
              }
              // 둘 다 부재 = fail-closed no-optout — core distinct default guard(두 flag 모두 미전달).
              core.setOutput('applicability_none', 'false');
              core.setOutput('none_reason', '');
              core.setOutput('both_absent', bothAbsent ? 'true' : 'false');
              core.setOutput('phase', '1');
              core.setOutput('rtm_not_yet', 'false');
              return;
            }
            // story_uri present — 기존 fetch 경로(신호 C, non-suppressible). none 마커 병존 시 forward(core arbitrate).
            core.setOutput('applicability_none', noneDeclared ? 'true' : 'false');
            core.setOutput('none_reason', noneReason);
            core.setOutput('both_absent', bothAbsent ? 'true' : 'false');

            const allowedHubs = (process.env.ALLOWED_HUB_REPOS || '')
              .split(',').map(h => h.trim()).filter(Boolean);
            const token = process.env.CROSS_REPO_TOKEN;
            // helper fail-closed (phase-gate L232 형) — token 부재 = degraded = FAIL (main-path degrade 금지).
            if (!token) { fail('CODEFORGE_CROSS_REPO_PAT secret 부재 (degraded=FAIL, §7.6 5-state)'); return; }

            async function fetchDoc(uri, label) {
              const m = uri.match(/github\.com\/([^\/]+)\/([^\/]+)\/blob\/([^\/]+)\/(.+)/);
              if (!m) { fail(`${label} URI 파싱 실패`); return null; }
              const [, owner, repo, ref, path] = m;
              const hubKey = `${owner}/${repo}`;
              // whitelist strict match (phase-gate L229 형) — 미일치 = FAIL (fetch spoof 차단).
              if (!allowedHubs.some(h => h === hubKey)) { fail(`${label} venue '${hubKey}' 화이트리스트 미일치`); return null; }
              const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${ref}`;
              let resp;
              try {
                resp = await fetch(url, {
                  headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'User-Agent': 'ac-traceability-matrix-action'
                  }
                });
              } catch (e) { fail(`${label} fetch 네트워크 실패`); return null; }
              // resp.ok 가드 (404 3-class 단일원인 처리 금지, ADR-145 §결정8 F) — auth-masking(403→404, F-5)
              //   vs genuine ref-missing vs 5xx 모두 "판정불가=FAIL"(비적용 skip 흡수 금지). 영구-ref 로 false-fail 예방.
              if (!resp.ok) { fail(`${label} fetch HTTP ${resp.status} (403/404/5xx 판정불가=FAIL — 영구 ref 확인, auth vs ref-missing 무관 전부 차단)`); return null; }
              const file = await resp.json();
              return Buffer.from(file.content, 'base64').toString('utf-8');
            }

            // 2) story(§5 AC source) 영구 ref 실 fetch·내용 검증 (마커 존재 ≠ 형식통과).
            const storyText = await fetchDoc(storyUri, 'story_uri');
            if (storyText === null) return;

            // 3) phase = EXPLICIT (Story frontmatter). diff 추론 금지. (rtm not-yet 판정에 선행 필요.)
            const fmMatch = storyText.match(/^---\n([\s\S]*?)\n---/);
            if (!fmMatch) { fail('Story frontmatter 부재 — phase 판정불가 (post-fetch, Class B 판정불가 FAIL)'); return; }
            const fm = fmMatch[1];
            // `phase: X` 또는 `status: phase:X` 양식 수용.
            const phaseM = fm.match(/^phase:\s*(\S+)/m) || fm.match(/^status:\s*phase:\s*(\S+)/m);
            if (!phaseM) { fail('Story frontmatter phase 신호 부재 (phase: / status: phase:)'); return; }
            const phaseRaw = phaseM[1].replace(/["']/g, '').replace(/^phase:/, '');
            // lane label → Phase 1|2 매핑 (ADR-127 Phase 1 문서 / Phase 2 구현 PR 분리).
            const p2 = ['구현', 'phase:구현', '구현-리뷰', 'phase:구현-리뷰', '구현-테스트', '보안-테스트', '2'];
            const p1 = ['요구사항', 'phase:요구사항', '요구사항-리뷰', 'phase:요구사항-리뷰',
                        '설계', 'phase:설계', '설계-리뷰', 'phase:설계-리뷰', '1'];
            let phaseNum = null;
            if (p2.includes(phaseRaw)) phaseNum = 2;
            else if (p1.includes(phaseRaw)) phaseNum = 1;
            if (phaseNum === null) { fail(`phase '${phaseRaw}' → Phase 1/2 매핑 불가 (EXPLICIT 신호 오류)`); return; }

            // 4) 로컬 파일 write (문서 본문만 — secret 미포함) + rtm 결정.
            fs.writeFileSync('ac-gate-source.md', storyText);
            core.setOutput('phase', String(phaseNum));
            if (!rtmUri) {
              // rtm_uri 마커 부재 = RTM not-yet EXPLICIT 신호. core: phase1=Hop1 only / phase2=FAIL(RTM 필수).
              //   placeholder(story §8 "작성 예정") fallback 흡수 아님 — 표면 자체를 전달하지 않음.
              core.setOutput('rtm_not_yet', 'true');
              return;
            }
            const rtmText = (rtmUri === storyUri) ? storyText : await fetchDoc(rtmUri, 'rtm_uri');
            if (rtmText === null) return;
            fs.writeFileSync('ac-gate-rtm.md', rtmText);
            core.setOutput('rtm_not_yet', 'false');

      - name: Run AC-traceability matrix gate (day-1 hard-fail, exit passthrough)
        env:
          PHASE: ${{ steps.resolve.outputs.phase }}
          RTM_NOT_YET: ${{ steps.resolve.outputs.rtm_not_yet }}
          APPLICABILITY_NONE: ${{ steps.resolve.outputs.applicability_none }}
          NONE_REASON: ${{ steps.resolve.outputs.none_reason }}
          BOTH_ABSENT: ${{ steps.resolve.outputs.both_absent }}
        run: |
          # per-PR applicability (ADR-145 §결정8/§결정9): 적용성 verdict = core 단일소유(어댑터 thin router).
          #   비적용(§5 AC 표면 부재 / ac_applicability:none 선언) → core in-job exit 0. 둘다부재 → core FAIL.
          #   injection 가드(§결정9 G): 사유는 env-var "$NONE_REASON" 로만 참조 — GHA 이중중괄호 표현식→run: 보간 금지.
          if [ "$BOTH_ABSENT" = "true" ]; then
            # 둘 다 부재(story_uri·ac_applicability:none 마커 0개) — 두 flag 모두 미전달(core distinct default guard).
            bash scripts/check-ac-traceability-matrix.sh --phase "$PHASE" --tests-root tests
          elif [ -f ac-gate-source.md ]; then
            # story_uri present(source fetched, 신호 C). none 마커 병존 시 함께 forward(precedence=core arbitrate).
            if [ "$APPLICABILITY_NONE" = "true" ] && [ "$RTM_NOT_YET" = "true" ]; then
              bash scripts/check-ac-traceability-matrix.sh --phase "$PHASE" --ac-source ac-gate-source.md --rtm-not-yet --ac-applicability-none --none-reason "$NONE_REASON" --tests-root tests
            elif [ "$APPLICABILITY_NONE" = "true" ]; then
              bash scripts/check-ac-traceability-matrix.sh --phase "$PHASE" --ac-source ac-gate-source.md --rtm ac-gate-rtm.md --ac-applicability-none --none-reason "$NONE_REASON" --tests-root tests
            elif [ "$RTM_NOT_YET" = "true" ]; then
              bash scripts/check-ac-traceability-matrix.sh --phase "$PHASE" --ac-source ac-gate-source.md --rtm-not-yet --tests-root tests
            else
              bash scripts/check-ac-traceability-matrix.sh --phase "$PHASE" --ac-source ac-gate-source.md --rtm ac-gate-rtm.md --tests-root tests
            fi
          elif [ "$APPLICABILITY_NONE" = "true" ]; then
            # story_uri 부재 + 비적용 선언 — source 없이 none forward(reason=env-var, injection 가드).
            bash scripts/check-ac-traceability-matrix.sh --phase "$PHASE" --ac-applicability-none --none-reason "$NONE_REASON" --tests-root tests
          else
            echo "::error::check-ac-traceability-matrix: 예상외 라우팅(source 부재 ∧ none 미선언 ∧ 둘다부재 아님) — fail-closed"; exit 1
          fi
