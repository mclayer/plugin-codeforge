name: worktree-first SessionStart hook wire check (warning mode)
# CFP-426 / ADR-040 Amendment 3 §결정 7 / ADR-060 §결정 5
# Tier: warning (continue-on-error, non-required check)
# Bypass channel: hotfix-bypass:worktree-session-start-wire label (ADR-024 Amendment 3 + ADR-060 §결정 7)
#
# Story 1 skeleton — 본 workflow 는 lint script (skeleton mode, exit 0 always) 호출만 수행.
# Story 2 (CFP-427) 가 actual wire 첫 사례 — `.claude/settings.json` 의 `hooks.SessionStart[]` append.
#
# 승격 path:
#   warning → blocking-on-pr 승격 시 CFP-429 Story 4 가 다음 변경 동반 의무:
#     1. 본 workflow 의 `continue-on-error: true` 제거
#     2. branch protection `required_status_checks.contexts` 에 본 workflow job name 추가
#        (ADR-024 Amendment 2 / branch-protection-manifest.yaml SSOT 정합)
#     3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d) + evidence-checks-registry.yaml promotion_criteria)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - '.claude/settings.json'
      - 'templates/.claude/hooks/SessionStart-*.json.sample'
      - 'scripts/check-worktree-first-session-start-wire.sh'

permissions:
  pull-requests: write
  contents: read

jobs:
  worktree-first-session-start-wire:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — lint fail 이 PR merge 차단하지 않음.
    # required_status_checks.contexts 부착 X.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "labels=$labels"
          case ",$labels," in
            *,hotfix-bypass:worktree-session-start-wire,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run worktree-first session-start-wire lint
        id: lint
        if: steps.bypass.outputs.bypass == 'false'
        run: |
          set +e
          bash scripts/check-worktree-first-session-start-wire.sh 2>&1 | tee /tmp/lint.out
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit 0  # continue-on-error 정합 — fail 이어도 다음 step 진행

      - name: Post lint result comment (sticky)
        if: steps.bypass.outputs.bypass == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/lint.out 2>/dev/null || echo '(lint output 부재)')"
          if [ "${LINT_STATUS:-1}" = "0" ]; then
            HEADER="## worktree-first session-start-wire lint — PASS (warning mode, Story 1 skeleton)"
            FOOTER="skeleton mode — actual logic 는 Story 2 (CFP-427) 가 wire."
          else
            HEADER="## worktree-first session-start-wire lint — violation 감지 (warning mode)"
            FOOTER=$'**warning mode (ADR-060 §결정 5)**: lint fail 이 PR merge 를 차단하지 않습니다.\n\n**hotfix bypass channel** (ADR-024 Amendment 3): `hotfix-bypass:worktree-session-start-wire` label 부착 시 lint skip + audit comment 자동 발의.'
          fi
          BODY="${HEADER}

\`\`\`
${LINT_OUT}
\`\`\`

${FOOTER}

> 본 workflow = warning mode (continue-on-error). PR merge 미차단. 승격 gate (ADR-060 §결정 6) 통과 후 blocking 전환 (Story 4 CFP-429 책임)."
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Emit bypass audit comment (label applied)
        if: steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # Schema: ADR-060 §결정 8 verbatim
          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' 섹션 부재 — 후속 보완 의무)"
          fi
          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:worktree-session-start-wire")] | last | .actor.login' \
            2>/dev/null || echo "unknown")
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label_applied_by=${LABEL_USER} reason=${REASON} ADR_files=(N/A — worktree-first lint) timestamp=${TS}"
          BODY="${AUDIT}

> ADR-024 Amendment 3 §결정 6.C — audit trail 3중 안전망 1차 (audit comment 자동 발의). assertion lint = \`scripts/check-bypass-audit-comment.sh\` (BYPASS_LABEL_PREFIX=hotfix-bypass: 으로 family-wide detect)."
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Audit assertion (bypass label 부착 시)
        if: steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # warning mode 시점 — audit assertion fail 도 continue-on-error 정합.
          set +e
          bash scripts/check-bypass-audit-comment.sh
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "audit assertion FAIL (warning mode — PR merge 미차단)"
          fi
          exit 0
