name: issue-body-claim-pre-screen
# CFP-2382 / ADR-082 Amendment 20 §결정 15 (CFP-1559 carrier) — issue-body-claim-pre-screen 게이트 (warning-tier).
#
# orchestrator-authored followup Issue body 안 4 sub-pattern (PR state / CFP state / count /
# sister carrier) stale-claim 을 동일-line `[verified-via:` annotation presence 로 write-time
# pre-screen. Wave 1 declarative anchor(CFP-1559)의 Wave 2 mechanical wire.
#
# F4 결정 (S1 deferred-followup-reconcile.yml 답습): .github/ single-root.
#   ADR-005 byte-parity scope 외 — template mirror 미운용 (게이트 = wrapper-self governance
#   Issue body 검사라 .github-only 정합). invariant-check.yml parity loop 은 templates → .github
#   방향이라 .github-only 파일은 미검출 (CONSUMER_ONLY_WORKFLOWS 등록 불요).
#
# Non-required workflow (branch protection required contexts 무변경, merge 미차단 — ADR-127 ratchet).
# Warning-tier: lint job 은 FLAG 검출 시 경고 표시하되 continue-on-error 로 job 성공(비차단).

on:
  issues:
    types: [opened, edited]
  workflow_dispatch: {}

permissions:
  contents: read
  issues: read

jobs:
  issue-body-claim-pre-screen:
    name: issue-body stale-claim pre-screen (warning-tier)
    runs-on: ubuntu-latest
    # R1 scope predicate (story-init.yml:52-58 답습) — orchestrator-authored followup 한정.
    #   precedence: label > title. codeforge-improvement 부재 시 즉시 out-of-scope
    #   (작성자 무관 — governance followup 아님). 사용자 raw 요구사항 Issue 는 story-init 전
    #   codeforge-improvement 미부착 → 자연 out-of-scope (ADR-082 Amd2 1-A immutable scope 정합).
    #   workflow_dispatch (event.issue 부재) 는 predicate false → lint job skip (test job 만 실행).
    if: |
      contains(github.event.issue.labels.*.name, 'codeforge-improvement') &&
      (contains(github.event.issue.labels.*.name, 'type:improvement')
       || startsWith(github.event.issue.title, '[CFP-FU')
       || startsWith(github.event.issue.title, '[CFP][FU'))
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run check-issue-body-claim-pre-screen.sh (warning, 비차단)
        continue-on-error: true
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: bash scripts/check-issue-body-claim-pre-screen.sh

  issue-body-claim-pre-screen-test:
    name: discriminating test (다형 fixture — mutation 생존 0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run test-check-issue-body-claim-pre-screen.sh (회귀 시 exit 1 차단)
        run: bash scripts/test-check-issue-body-claim-pre-screen.sh
