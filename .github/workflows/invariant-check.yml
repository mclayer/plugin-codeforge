name: Invariant Check

# CFP-5 Phase A + CFP-7~10 Phase C/D + CFP-13/16 вҖ” SSOT drift мһҗлҸҷ м°ЁлӢЁ.
#
# кІҖмҰқ 8мў…:
#   1. Workflow parity вҖ” templates/github-workflows/*.yml вҶ” .github/workflows/<basename>.yml byte-identical
#   2. Version match вҖ” .claude-plugin/plugin.json `version` вҶ” CHANGELOG.md мөңмғҒлӢЁ [version] header
#   3. Agent count вҖ” agents/*.md мӢӨм ң к°ңмҲҳ вҶ” CLAUDE.md "N core м—җмқҙм „нҠё" мІ« л§Өм№ӯ
#   4. Write queue permission parity (CFP-7) вҖ” CLAUDE.md "Write queue мқҳлў° к¶Ңн•ң" н‘ң вҶ” agents/*.md frontmatter permissions.allow
#   5. ADR-002 footer pattern (CFP-8) вҖ” agents/*.md (DocsAgent м ңмҷё) + presets/*/agents/*.md мқҳ "## л¬ём„ңнҷ” н‘ңмӨҖ" м„№м…ҳ 1мӨ„ + м •нҷ•н•ң link target + SSOT ліёл¬ё inline ліөм ң кёҲм§Җ
#   6. Review category enum parity (CFP-9 lane=code + CFP-13 lane=design/security) вҖ” 3 lane к°Ғк°Ғмқҳ SSOT (templates/review-checklists/<lane>.md) вҶ” <Lane>PLAgent.md YAML list вҶ” CodexReviewAgent.md lane-anchored н”„лЎ¬н”„нҠё set м •н•© (лҸҷмқј мҲңм„ң)
#   7. Migration-guide BREAKING parity (CFP-10) вҖ” CHANGELOG.md `## [X.Y.Z] ... (BREAKING ...)` вҶ” docs/migration-guide.md `## vA.B вҶ’ vC.D` м„№м…ҳ м •н•© (лӘЁл“  BREAKINGмқҖ migration-guideм—җ лҢҖмқ‘ м„№м…ҳ ліҙмң )
#   8. Severity overrides count + breakdown parity (CFP-16) вҖ” 3 lane к°Ғк°Ғмқҳ SSOT "## Severity мһҗлҸҷ лЈ°" bullet к°ңмҲҳ + P0/P1 л¶„нҸ¬ вҶ” <Lane>PLAgent.md severity_overrides YAML list м •н•© (Codex н”„лЎ¬н”„нҠёлҠ” мқҳлҸ„м Ғ мҳҒл¬ё мҡ”м•Ҫмқҙлқј scope мҷё)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  invariant-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Workflow parity (templates вҶ” .github)
        run: |
          set -u
          EXIT=0
          # CFP-65 / CFP-67 / CFP-68 вҖ” consumer-only workflow лҠ” self-app parity кІҖмҰқ м ңмҷё.
          # plugin-codeforge лҠ” internal-docs Story binding мӮ¬мҡ©мңјлЎң docs/stories/*.md path
          # мқҳмЎҙн•ҳлҠ” workflow self-app л¶Ҳн•„мҡ”.
          # CFP-79 вҖ” 4 Live touching reusable workflow (workflow_call) лҸ„ consumer м „мҡ©. wrapper мһҗмІҙ .github/workflows/ copy л¶Ҳн•„мҡ”.
          CONSUMER_ONLY_WORKFLOWS=("story-init.yml" "story-section-1-immutable.yml" "fix-ledger-sync.yml" "subissue-from-impl-manifest.yml" "live-test-guard.yml" "live-deploy-approval.yml" "live-secret-policy.yml" "kill-switch-integration-test.yml")
          for f in templates/github-workflows/*.yml; do
            base=$(basename "$f")
            skip_file=0
            for skip in "${CONSUMER_ONLY_WORKFLOWS[@]}"; do
              if [ "$base" = "$skip" ]; then
                skip_file=1
                break
              fi
            done
            if [ $skip_file -eq 1 ]; then
              echo "вҶ· Skip $base (consumer-only вҖ” CFP-65 exclusion)"
              continue
            fi
            target=".github/workflows/${base}"
            if [ ! -f "$target" ]; then
              echo "::error file=${target}::Missing вҖ” templates/github-workflows/${base}лҠ” self-app copy н•„мҡ”"
              EXIT=1
              continue
            fi
            if ! diff -q "$f" "$target" > /dev/null 2>&1; then
              echo "::error file=${target}::Drift from templates/github-workflows/${base}"
              echo "--- diff (template вҶ’ self-app) ---"
              diff "$f" "$target" || true
              EXIT=1
            fi
          done
          if [ $EXIT -eq 0 ]; then
            echo "вң“ Workflow parity: templates/github-workflows/*.yml вҶ” .github/workflows/ (consumer-only exclusion: ${CONSUMER_ONLY_WORKFLOWS[*]})"
          fi
          exit $EXIT

      - name: Version match (plugin.json вҶ” CHANGELOG.md latest)
        run: |
          set -u
          PJ_VER=$(jq -r '.version' .claude-plugin/plugin.json)
          CL_VER=$(grep -oE '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | head -1 | sed -E 's/^## \[(.*)\]$/\1/')
          if [ -z "$PJ_VER" ] || [ "$PJ_VER" = "null" ]; then
            echo "::error file=.claude-plugin/plugin.json::version н•„л“ң л¶Җмһ¬ лҳҗлҠ” null"
            exit 1
          fi
          if [ -z "$CL_VER" ]; then
            echo "::error file=CHANGELOG.md::мөңмғҒлӢЁ ## [N.N.N] header л¶Җмһ¬"
            exit 1
          fi
          if [ "$PJ_VER" != "$CL_VER" ]; then
            echo "::error::plugin.json version ($PJ_VER) вү  CHANGELOG.md latest ($CL_VER)"
            echo "  plugin.json: $PJ_VER"
            echo "  CHANGELOG.md: $CL_VER"
            exit 1
          fi
          echo "вң“ Version match: $PJ_VER"

      - name: Agent count (agents/*.md вҶ” CLAUDE.md \"N core м—җмқҙм „нҠё\")
        run: |
          set -u
          AGENT_COUNT=$(ls agents/*.md 2>/dev/null | wc -l | tr -d ' ')
          DOC_COUNT=$(grep -oE '[0-9]+ core м—җмқҙм „нҠё' CLAUDE.md | head -1 | grep -oE '[0-9]+')
          if [ -z "$DOC_COUNT" ]; then
            echo "::error file=CLAUDE.md::\"N core м—җмқҙм „нҠё\" нҢЁн„ҙ л¶Җмһ¬"
            exit 1
          fi
          if [ "$AGENT_COUNT" != "$DOC_COUNT" ]; then
            echo "::error::agents/*.md count ($AGENT_COUNT) вү  CLAUDE.md 'N core м—җмқҙм „нҠё' ($DOC_COUNT)"
            echo "  Actual files in agents/: $AGENT_COUNT"
            echo "  CLAUDE.md narrative: $DOC_COUNT"
            echo "  мғҲ agent м¶”к°Җ/мӮӯм ң мӢң CLAUDE.md мІ« NлҸ„ лҸҷкё° к°ұмӢ  н•„мҡ”"
            exit 1
          fi
          echo "вң“ Agent count match: $AGENT_COUNT"

      - name: Write queue permission parity (CFP-7 вҖ” CLAUDE.md н‘ң вҶ” agents/*.md frontmatter)
        run: |
          python3 <<'EOF'
          """
          CLAUDE.md "Write queue мқҳлў° к¶Ңн•ң" н•ң мӨ„мқ„ нҢҢмӢұн•ҙ listed agent м§‘н•©мқ„ м¶”м¶ңн•ҳкі ,
          agents/*.md frontmatter permissions.allowм—җ Edit/Write(.claude-work/doc-queue/**)
          мЎҙмһ¬ м—¬л¶ҖмҷҖ м •н•© л№„көҗ.

          Invariant:
            - Listed agents (CLAUDE.md н‘ң) MUST have BOTH Edit + Write doc-queue permissions
            - Unlisted agents MUST NOT have doc-queue permissions, EXCEPT DocsAgent (single writer)
            - Shorthand вҶ’ full name mapping handles 4 known shortcuts
          """
          import re
          import sys
          from pathlib import Path

          # CLAUDE.md н‘ңм—җм„ң мӮ¬мҡ©лҗҳлҠ” shorthand вҶ’ agents/*.md нҢҢмқјлӘ… л§Өн•‘
          SHORTHAND = {
              "CodebaseMapper": "CodebaseMapperAgent",
              "Refactor": "RefactorAgent",
              "RequirementsAnalyst": "RequirementsAnalystAgent",
              "Researcher": "ResearcherAgent",
              "DesignReviewPL": "DesignReviewPLAgent",
              "CodeReviewPL": "CodeReviewPLAgent",
              "SecurityTestPL": "SecurityTestPLAgent",
          }

          # DocsAgentлҠ” single writerлЎң doc-queueлҸ„ к°Җм§ҖлӮҳ н‘ңм—җлҠ” м—ҶмқҢ (мқҳлў°мһҗк°Җ м•„лӢҢ drain мЈјмІҙ)
          EXEMPT_FROM_TABLE = {"DocsAgent"}

          # CFP-40 О¶ arc нӣ„ wrapper agent 0к°ң вҖ” agents/ л№„м–ҙмһҲмңјл©ҙ ліё invariant м Ғмҡ© лҢҖмғҒ м—ҶмқҢ
          if not list(Path("agents").glob("*.md")):
              print("вң“ Write queue permission parity: wrapper agent 0к°ң (О¶ arc wrapper-only) вҖ” skip")
              sys.exit(0)

          claude_md = Path("CLAUDE.md").read_text(encoding="utf-8")
          # н‘ң лқјмқё нҢЁн„ҙ: "**Write queue мқҳлў° к¶Ңн•ң** (`.claude-work/doc-queue/**`л§Ң): A, B, C ... вҖ” кё°нғҖ ..."
          m = re.search(
              r"\*\*Write queue мқҳлў° к¶Ңн•ң\*\*[^:]*:\s*(.+?)\s*[вҖ”-]\s*кё°нғҖ",
              claude_md,
          )
          if not m:
              print("::error file=CLAUDE.md::'Write queue мқҳлў° к¶Ңн•ң' н‘ң лқјмқё л¶Җмһ¬")
              sys.exit(1)
          raw_list = m.group(1)
          listed_short = [name.strip() for name in raw_list.split(",") if name.strip()]
          listed_full = {SHORTHAND.get(n, n) for n in listed_short}

          # frontmatter permissions.allowм—җм„ң doc-queue Edit/Write л‘ҳ лӢӨ мһҲлҠ” agent мҲҳм§‘
          actual_queue_agents = set()
          actual_partial = {}  # name вҶ’ {"edit": bool, "write": bool}
          for agent_path in sorted(Path("agents").glob("*.md")):
              text = agent_path.read_text(encoding="utf-8")
              # frontmatterлҠ” мІ« --- мҷҖ л‘җ лІҲм§ё --- мӮ¬мқҙ
              fm_match = re.match(r"^---\n(.*?)\n---", text, re.DOTALL)
              if not fm_match:
                  continue
              fm = fm_match.group(1)
              has_edit = bool(re.search(r"Edit\(\.claude-work/doc-queue/\*\*\)", fm))
              has_write = bool(re.search(r"Write\(\.claude-work/doc-queue/\*\*\)", fm))
              name = agent_path.stem
              if has_edit and has_write:
                  actual_queue_agents.add(name)
              elif has_edit or has_write:
                  actual_partial[name] = {"edit": has_edit, "write": has_write}

          errors = []

          # PartialмқҖ н•ӯмғҒ мҳӨлҘҳ (Edit/Write н•ңмӘҪл§Ң к°Җм§Җл©ҙ мқҳлҸ„ л¶ҲлӘ…)
          for name, perms in sorted(actual_partial.items()):
              errors.append(
                  f"{name}: doc-queue Edit/Write л№„лҢҖм№ӯ вҖ” Edit={perms['edit']} Write={perms['write']} "
                  f"(л‘ҳ лӢӨ мһҲм–ҙм•ј н•Ё)"
              )

          # ListedмқёлҚ° frontmatterм—җ мҷ„м „ л¶Җмһ¬ (partialмқҖ мң„м—җм„ң лі„лҸ„ ліҙкі )
          partial_names = set(actual_partial.keys())
          for name in sorted(listed_full - actual_queue_agents - partial_names):
              errors.append(
                  f"{name}: CLAUDE.md н‘ңм—җ listed but frontmatter permissions.allowм—җ "
                  f"Edit/Write(.claude-work/doc-queue/**) л¶Җмһ¬"
              )

          # Frontmatterм—җ мһҲлҠ”лҚ° unlisted (DocsAgent м ңмҷё)
          unlisted = actual_queue_agents - listed_full - EXEMPT_FROM_TABLE
          for name in sorted(unlisted):
              errors.append(
                  f"{name}: frontmatterм—җ doc-queue к¶Ңн•ң мһҲмңјлӮҳ CLAUDE.md "
                  f"'Write queue мқҳлў° к¶Ңн•ң' н‘ңм—җ л¶Җмһ¬"
              )

          if errors:
              print(f"::error file=CLAUDE.md::Write queue к¶Ңн•ң м •н•© мӢӨнҢЁ ({len(errors)} drift)")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)

          print(f"вң“ Write queue permission parity: {len(listed_full)} listed agents + DocsAgent (single writer)")
          EOF

      - name: ADR-002 footer pattern (CFP-8 вҖ” agents/*.md + presets/*/agents/*.md)
        run: |
          python3 <<'EOF'
          """
          ADR-002 В§3 вҖ” лӘЁл“  м—җмқҙм „нҠё md(DocsAgent м ңмҷё) "## л¬ём„ңнҷ” н‘ңмӨҖ" м„№м…ҳмқҙ
          1мӨ„ body + DocsAgent.md м°ёмЎ° link + SSOT ліёл¬ё inline ліөм ң кёҲм§ҖлҘј л§ҢмЎұн•ҳлҠ”м§Җ кІҖмҰқ.

          Invariant:
            - DocsAgent.mdлҘј м ңмҷён•ң лӘЁл“  agents/*.md + presets/*/agents/*.md
            - "## л¬ём„ңнҷ” н‘ңмӨҖ" м„№м…ҳ л§Ҳм§Җл§ү мң„м№ҳм—җ мЎҙмһ¬
            - bodyлҠ” 1мӨ„
            - bodyм—җ DocsAgent.md м°ёмЎ° link нҸ¬н•Ё (мң„м№ҳлі„ мғҒлҢҖ кІҪлЎң кІҖмҰқ):
                В· agents/<X>.md вҶ’ "DocsAgent.md"
                В· presets/<flavor>/agents/<X>.md вҶ’ "../../../agents/DocsAgent.md"
            - bodyм—җ SSOT ліёл¬ё inline ліөм ң кёҲм§Җ нӮӨмӣҢл“ң л¶Җмһ¬ (anti-drift):
                "phase prefix", "Story file м„№м…ҳ", "FIX Ledger мҠӨнӮӨл§Ҳ", "Impl Manifest мҠӨнӮӨл§Ҳ"
          """
          import re
          import sys
          from pathlib import Path

          # SSOT ліёл¬ё inline ліөм ң м°ЁлӢЁ keyword (drift мң„н—ҳ)
          FORBIDDEN_KEYWORDS = [
              "phase prefix",
              "Story file м„№м…ҳ",
              "FIX Ledger мҠӨнӮӨл§Ҳ",
              "Impl Manifest мҠӨнӮӨл§Ҳ",
          ]

          # мң„м№ҳлі„ expected DocsAgent.md мғҒлҢҖ link target
          def expected_link_target(path: Path) -> str:
              parts = path.parts
              if parts[0] == "agents":
                  return "DocsAgent.md"
              if parts[0] == "presets" and "agents" in parts:
                  # presets/<flavor>/agents/<X>.md вҶ’ 3 levels up to root, then agents/
                  return "../../../agents/DocsAgent.md"
              return ""  # ліё invariant scope мҷё

          targets = []
          for p in sorted(Path("agents").glob("*.md")):
              if p.stem == "DocsAgent":
                  continue
              targets.append(p)
          for p in sorted(Path("presets").glob("*/agents/*.md")):
              targets.append(p)

          errors = []

          for path in targets:
              text = path.read_text(encoding="utf-8")
              # "## л¬ём„ңнҷ” н‘ңмӨҖ" м„№м…ҳ + лӢӨмқҢ "## " heading мӮ¬мқҙ body м¶”м¶ң
              m = re.search(
                  r"^## л¬ём„ңнҷ” н‘ңмӨҖ\s*\n(.+?)(?=\n## |\Z)",
                  text,
                  re.MULTILINE | re.DOTALL,
              )
              if not m:
                  errors.append(f"{path}: '## л¬ём„ңнҷ” н‘ңмӨҖ' м„№м…ҳ л¶Җмһ¬ (ADR-002 В§3 мң„л°ҳ)")
                  continue

              body_raw = m.group(1).strip()
              body_lines = [ln for ln in body_raw.split("\n") if ln.strip()]

              # 1мӨ„ кІҖмӮ¬
              if len(body_lines) != 1:
                  errors.append(
                      f"{path}: footer body 1мӨ„мқҙ м•„лӢҳ ({len(body_lines)} мӨ„, ADR-002 В§3 'footer ліёл¬ё нҷ•мһҘ кёҲм§Җ' мң„л°ҳ)"
                  )
                  continue

              body = body_lines[0]

              # link target кІҖмҰқ
              expected = expected_link_target(path)
              if expected:
                  link_pattern = re.compile(r"\[(?:[^\]]+)\]\(([^)]+)\)")
                  links = link_pattern.findall(body)
                  if not any(href.endswith("DocsAgent.md") for href in links):
                      errors.append(f"{path}: footer bodyм—җ DocsAgent.md м°ёмЎ° link л¶Җмһ¬")
                      continue
                  # м •нҷ•н•ң expected target 1к°ң мқҙмғҒ мЎҙмһ¬н•ҳлҠ”м§Җ
                  if expected not in links:
                      errors.append(
                          f"{path}: footer link target л¶Ҳмқјм№ҳ вҖ” expected '{expected}', got {links}"
                      )
                      continue

              # SSOT ліёл¬ё inline ліөм ң кёҲм§Җ keyword кІҖмӮ¬
              for kw in FORBIDDEN_KEYWORDS:
                  if kw in body:
                      errors.append(
                          f"{path}: footer bodyм—җ SSOT ліёл¬ё нӮӨмӣҢл“ң '{kw}' нҸ¬н•Ё вҖ” "
                          f"ADR-002 В§3 'footer ліёл¬ё нҷ•мһҘ кёҲм§Җ' мң„л°ҳ (drift мң„н—ҳ)"
                      )
                      break

          if errors:
              print(f"::error::ADR-002 footer pattern м •н•© мӢӨнҢЁ ({len(errors)} drift)")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)

          print(f"вң“ ADR-002 footer pattern: {len(targets)} agent md (DocsAgent м ңмҷё)")
          EOF

      # Review category enum parity (CFP-9 + CFP-13) вҖ” REMOVED in CFP-29 Phase 1
      # 5 review agent + base + 3 checklistмқҙ codeforge-review pluginмңјлЎң мқҙлҸҷ.
      # ліё invariantлҠ” codeforge-review repoмқҳ мһҗмІҙ CIм—җм„ң enforceн•ҙм•ј н•Ё (лі„лҸ„ нӣ„мҶҚ вҖ” CFP-29.5 лҳҗлҠ” л“ұ).

      - name: Migration-guide BREAKING parity (CFP-10 вҖ” CHANGELOG вҶ” migration-guide)
        run: |
          python3 <<'EOF'
          """
          CHANGELOG.mdмқҳ лӘЁл“  BREAKING лІ„м „мқҙ docs/migration-guide.mdм—җ лҢҖмқ‘ м„№м…ҳмқ„ к°Җм§ҖлҠ”м§Җ кІҖмҰқ.

          Invariant:
            - CHANGELOG.md `## [X.Y.Z] вҖ” DATE (BREAKING вҖ” title)` нҢЁн„ҙ
            - к°Ғ BREAKING лІ„м „мқҳ major.minor (X.Y)м—җ лҢҖн•ҙ
              docs/migration-guide.mdм—җ `## vA.B вҶ’ vX.Y` heading мЎҙмһ¬
            - м—ӯл°©н–Ҙ(migration-guideмқҳ лӘЁл“  м„№м…ҳ вҶ’ CHANGELOG BREAKING)мқҖ к°•м ң м•Ҳ н•Ё:
              non-breaking migration м„№м…ҳлҸ„ л¬ём„ңнҷ” к°Җм№ҳ мһҲмқҢ (superset н—Ҳмҡ©)
          """
          import re
          import sys
          from pathlib import Path

          # 1. CHANGELOG.mdмқҳ BREAKING лІ„м „ м¶”м¶ң
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          breaking_re = re.compile(
              r"^## \[(\d+)\.(\d+)\.(\d+)\][^\n]*\(BREAKING",
              re.MULTILINE,
          )
          breaking_versions = []  # [(major, minor, patch, full_str)]
          for m in breaking_re.finditer(changelog):
              major, minor, patch = m.group(1), m.group(2), m.group(3)
              breaking_versions.append((major, minor, patch, f"{major}.{minor}.{patch}"))

          if not breaking_versions:
              print("вң“ Migration-guide BREAKING parity: BREAKING лІ„м „ м—ҶмқҢ (skip)")
              sys.exit(0)

          # 2. migration-guide.mdмқҳ `## vA.B вҶ’ vC.D` м„№м…ҳ м¶”м¶ң
          mg_text = Path("docs/migration-guide.md").read_text(encoding="utf-8")
          # н•ңкөӯм–ҙ emdash(вҶ’) лҳҗлҠ” мқјл°ҳ dash(->)лҸ„ н—Ҳмҡ© (кҙҖн–үмғҒ emdash мӮ¬мҡ©)
          mg_sections = set()  # set of "C.D" (to-version)
          for m in re.finditer(
              r"^##\s*v(\d+)\.(\d+)\s*[вҶ’\-]+>?\s*v(\d+)\.(\d+)\b",
              mg_text,
              re.MULTILINE,
          ):
              from_major, from_minor = m.group(1), m.group(2)
              to_major, to_minor = m.group(3), m.group(4)
              mg_sections.add(f"{to_major}.{to_minor}")

          # 3. м •н•© кІҖмҰқ вҖ” к°Ғ BREAKINGмқҳ major.minorк°Җ migration-guideм—җ лҢҖмқ‘ м„№м…ҳ мЎҙмһ¬
          errors = []
          for major, minor, patch, full in breaking_versions:
              key = f"{major}.{minor}"
              if key not in mg_sections:
                  errors.append(
                      f"CHANGELOG v{full} BREAKING but migration-guide.mdм—җ "
                      f"'## v? вҶ’ v{major}.{minor}' м„№м…ҳ л¶Җмһ¬"
                  )

          if errors:
              print(f"::error file=docs/migration-guide.md::Migration-guide BREAKING parity мӢӨнҢЁ ({len(errors)} drift)")
              for e in errors:
                  print(f"  - {e}")
              print(f"  CHANGELOG BREAKING versions: {[v[3] for v in breaking_versions]}")
              print(f"  migration-guide section to-versions: {sorted(mg_sections)}")
              sys.exit(1)

          print(
              f"вң“ Migration-guide BREAKING parity: "
              f"{len(breaking_versions)} BREAKING Г— all matched in migration-guide"
          )
          EOF

