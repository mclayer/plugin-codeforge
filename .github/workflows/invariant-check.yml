name: Invariant Check

# CFP-5 Phase A + CFP-7~10 Phase C/D + CFP-13/16 — SSOT drift 자동 차단.
#
# 검증 (CHANGELOG 동결로 #2 version-match / #7 migration-parity 제거 — prune):
#   1. Workflow parity — templates/github-workflows/*.yml ↔ .github/workflows/<basename>.yml byte-identical
#   3. Agent count — agents/*.md 실제 개수 ↔ CLAUDE.md "N core 에이전트" 첫 매칭
#   4. Write queue permission parity (CFP-7) — CLAUDE.md "Write queue 의뢰 권한" 표 ↔ agents/*.md frontmatter permissions.allow
#   5. ADR-002 footer pattern (CFP-8) — agents/*.md (DocsAgent 제외) + presets/*/agents/*.md 의 "## 문서화 표준" 섹션 1줄 + 정확한 link target + SSOT 본문 inline 복제 금지

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  invariant-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Workflow parity (templates ↔ .github)
        run: |
          set -u
          EXIT=0
          # CFP-65 / CFP-67 / CFP-68 — consumer-only workflow 는 self-app parity 검증 제외.
          # plugin-codeforge 는 internal-docs Story binding 사용으로 docs/stories/*.md path
          # 의존하는 workflow self-app 불필요.
          # CFP-79 — 4 Live touching reusable workflow (workflow_call) 도 consumer 전용. wrapper 자체 .github/workflows/ copy 불필요.
          # CFP-128 / ADR-033 — container-image-scan.yml (workflow_call reusable, consumer build pipeline 호출용) 도 consumer 전용. wrapper 자체엔 컨테이너 이미지 빌드 부재.
          # CFP-260 / ADR-036 — reservation-cleanup.yml = daily cron, consumer-only (wrapper repo 에 phase:reservation Issue 없음).
          # CFP-261 / ADR-037 — check-plugin-version-bump.yml Phase 2 v1 = consumer-only initial. wrapper self-app = 후속 follow-up CFP.
          # CFP-138 / ADR-043 — retro-mandatory.yml = consumer-only (Phase 2 PR merge close-blocking forcing function).
          #   wrapper repo dogfood = PMOAgent manual spawn 의무 (templates-only flow, F-6 fix option (b) 채택).
          #   self-app workflow 도입 = 별도 follow-up CFP (consumer-side adoption, ADR-027).
          # CFP-367 / ADR-055 — test.yml = consumer 배포용 테스트 workflow 템플릿.
          # wrapper 자체 테스트 스위트 부재 (PR #2103 dead suite 제거) — self-app copy 미운용 (theater 제거).
          # CFP-2227 / ADR-121 — consumer-deploy-seed.yml + post-deploy-smoke.yml = 배포 완전 위임 consumer seed.
          # CFP-2360 / ADR-014 Amд7 + ADR-121 §결정3 — post-deploy-benchmark.yml = consumer post-deploy throughput/outcome-signal benchmark seed (terminal sink monotone assert). wrapper repo 에 배포 대상 0 → self-app copy 미운용.
          # wrapper repo 에 dev/stg/prd Environments 부재 — self-app copy 시 환경 오염 (배포 대상 0).
          # CFP-2369 / ADR-042 Amd14 — duplication-check.yml = consumer 재사용성 duplication-ratio warning-tier seed. wrapper 자체 src 부재 (declarative governance) → self-app copy 미운용 (consumer-only).
          # CFP-2521 Phase 2 / ADR-044 §결정11 — pl-delegation-ratio-check.yml = DeveloperPL delegation-ratio advisory lint seed. wrapper 자체 실행 대상 부재 → self-app copy 미운용 (consumer-only).
          CONSUMER_ONLY_WORKFLOWS=("story-init.yml" "story-section-1-immutable.yml" "fix-ledger-sync.yml" "subissue-from-impl-manifest.yml" "live-test-guard.yml" "live-deploy-approval.yml" "live-secret-policy.yml" "kill-switch-integration-test.yml" "container-image-scan.yml" "reservation-cleanup.yml" "check-plugin-version-bump.yml" "retro-mandatory.yml" "test.yml" "consumer-deploy-seed.yml" "post-deploy-smoke.yml" "post-deploy-benchmark.yml" "duplication-check.yml" "pl-delegation-ratio-check.yml")
          for f in templates/github-workflows/*.yml; do
            base=$(basename "$f")
            skip_file=0
            for skip in "${CONSUMER_ONLY_WORKFLOWS[@]}"; do
              if [ "$base" = "$skip" ]; then
                skip_file=1
                break
              fi
            done
            if [ $skip_file -eq 1 ]; then
              echo "↷ Skip $base (consumer-only — CFP-65 exclusion)"
              continue
            fi
            target=".github/workflows/${base}"
            if [ ! -f "$target" ]; then
              echo "::error file=${target}::Missing — templates/github-workflows/${base}는 self-app copy 필요"
              EXIT=1
              continue
            fi
            if ! diff -q "$f" "$target" > /dev/null 2>&1; then
              echo "::error file=${target}::Drift from templates/github-workflows/${base}"
              echo "--- diff (template → self-app) ---"
              diff "$f" "$target" || true
              EXIT=1
            fi
          done
          if [ $EXIT -eq 0 ]; then
            echo "✓ Workflow parity: templates/github-workflows/*.yml ↔ .github/workflows/ (consumer-only exclusion: ${CONSUMER_ONLY_WORKFLOWS[*]})"
          fi
          exit $EXIT

      # Version match (plugin.json ↔ CHANGELOG.md) — REMOVED (prune: CHANGELOG → archive/CHANGELOG-legacy.md 동결, 버전 SSOT = plugin.json)

      - name: Agent count (agents/*.md ↔ CLAUDE.md \"N core 에이전트\")
        run: |
          set -u
          AGENT_COUNT=$(ls agents/*.md 2>/dev/null | wc -l | tr -d ' ')
          DOC_COUNT=$(grep -oE '[0-9]+ core 에이전트' CLAUDE.md | head -1 | grep -oE '[0-9]+')
          if [ -z "$DOC_COUNT" ]; then
            echo "::error file=CLAUDE.md::\"N core 에이전트\" 패턴 부재"
            exit 1
          fi
          if [ "$AGENT_COUNT" != "$DOC_COUNT" ]; then
            echo "::error::agents/*.md count ($AGENT_COUNT) ≠ CLAUDE.md 'N core 에이전트' ($DOC_COUNT)"
            echo "  Actual files in agents/: $AGENT_COUNT"
            echo "  CLAUDE.md narrative: $DOC_COUNT"
            echo "  새 agent 추가/삭제 시 CLAUDE.md 첫 N도 동기 갱신 필요"
            exit 1
          fi
          echo "✓ Agent count match: $AGENT_COUNT"

      - name: Write queue permission parity (CFP-7 — CLAUDE.md 표 ↔ agents/*.md frontmatter)
        run: |
          python3 <<'EOF'
          """
          CLAUDE.md "Write queue 의뢰 권한" 한 줄을 파싱해 listed agent 집합을 추출하고,
          agents/*.md frontmatter permissions.allow에 Edit/Write(.claude-work/doc-queue/**)
          존재 여부와 정합 비교.

          Invariant:
            - Listed agents (CLAUDE.md 표) MUST have BOTH Edit + Write doc-queue permissions
            - Unlisted agents MUST NOT have doc-queue permissions, EXCEPT DocsAgent (single writer)
            - Shorthand → full name mapping handles 4 known shortcuts
          """
          import re
          import sys
          from pathlib import Path

          # CLAUDE.md 표에서 사용되는 shorthand → agents/*.md 파일명 매핑
          SHORTHAND = {
              "CodebaseMapper": "CodebaseMapperAgent",
              "Refactor": "RefactorAgent",
              "RequirementsAnalyst": "RequirementsAnalystAgent",
              "Researcher": "ResearcherAgent",
              "DesignReviewPL": "DesignReviewPLAgent",
              "CodeReviewPL": "CodeReviewPLAgent",
              "SecurityTestPL": "SecurityTestPLAgent",
          }

          # DocsAgent는 single writer로 doc-queue도 가지나 표에는 없음 (의뢰자가 아닌 drain 주체)
          EXEMPT_FROM_TABLE = {"DocsAgent"}

          # CFP-40 ζ arc 후 wrapper agent 0개 — agents/ 비어있으면 본 invariant 적용 대상 없음
          if not list(Path("agents").glob("*.md")):
              print("✓ Write queue permission parity: wrapper agent 0개 (ζ arc wrapper-only) — skip")
              sys.exit(0)

          claude_md = Path("CLAUDE.md").read_text(encoding="utf-8")
          # 표 라인 패턴: "**Write queue 의뢰 권한** (`.claude-work/doc-queue/**`만): A, B, C ... — 기타 ..."
          m = re.search(
              r"\*\*Write queue 의뢰 권한\*\*[^:]*:\s*(.+?)\s*[—-]\s*기타",
              claude_md,
          )
          if not m:
              print("::error file=CLAUDE.md::'Write queue 의뢰 권한' 표 라인 부재")
              sys.exit(1)
          raw_list = m.group(1)
          listed_short = [name.strip() for name in raw_list.split(",") if name.strip()]
          listed_full = {SHORTHAND.get(n, n) for n in listed_short}

          # frontmatter permissions.allow에서 doc-queue Edit/Write 둘 다 있는 agent 수집
          actual_queue_agents = set()
          actual_partial = {}  # name → {"edit": bool, "write": bool}
          for agent_path in sorted(Path("agents").glob("*.md")):
              text = agent_path.read_text(encoding="utf-8")
              # frontmatter는 첫 --- 와 두 번째 --- 사이
              fm_match = re.match(r"^---\n(.*?)\n---", text, re.DOTALL)
              if not fm_match:
                  continue
              fm = fm_match.group(1)
              has_edit = bool(re.search(r"Edit\(\.claude-work/doc-queue/\*\*\)", fm))
              has_write = bool(re.search(r"Write\(\.claude-work/doc-queue/\*\*\)", fm))
              name = agent_path.stem
              if has_edit and has_write:
                  actual_queue_agents.add(name)
              elif has_edit or has_write:
                  actual_partial[name] = {"edit": has_edit, "write": has_write}

          errors = []

          # Partial은 항상 오류 (Edit/Write 한쪽만 가지면 의도 불명)
          for name, perms in sorted(actual_partial.items()):
              errors.append(
                  f"{name}: doc-queue Edit/Write 비대칭 — Edit={perms['edit']} Write={perms['write']} "
                  f"(둘 다 있어야 함)"
              )

          # Listed인데 frontmatter에 완전 부재 (partial은 위에서 별도 보고)
          partial_names = set(actual_partial.keys())
          for name in sorted(listed_full - actual_queue_agents - partial_names):
              errors.append(
                  f"{name}: CLAUDE.md 표에 listed but frontmatter permissions.allow에 "
                  f"Edit/Write(.claude-work/doc-queue/**) 부재"
              )

          # Frontmatter에 있는데 unlisted (DocsAgent 제외)
          unlisted = actual_queue_agents - listed_full - EXEMPT_FROM_TABLE
          for name in sorted(unlisted):
              errors.append(
                  f"{name}: frontmatter에 doc-queue 권한 있으나 CLAUDE.md "
                  f"'Write queue 의뢰 권한' 표에 부재"
              )

          if errors:
              print(f"::error file=CLAUDE.md::Write queue 권한 정합 실패 ({len(errors)} drift)")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)

          print(f"✓ Write queue permission parity: {len(listed_full)} listed agents + DocsAgent (single writer)")
          EOF

      - name: ADR-002 footer pattern (CFP-8 — agents/*.md + presets/*/agents/*.md)
        run: |
          python3 <<'EOF'
          """
          ADR-002 §3 — 모든 에이전트 md(DocsAgent 제외) "## 문서화 표준" 섹션이
          1줄 body + DocsAgent.md 참조 link + SSOT 본문 inline 복제 금지를 만족하는지 검증.

          Invariant:
            - DocsAgent.md를 제외한 모든 agents/*.md + presets/*/agents/*.md
            - "## 문서화 표준" 섹션 마지막 위치에 존재
            - body는 1줄
            - body에 DocsAgent.md 참조 link 포함 (위치별 상대 경로 검증):
                · agents/<X>.md → "DocsAgent.md"
                · presets/<flavor>/agents/<X>.md → "../../../agents/DocsAgent.md"
            - body에 SSOT 본문 inline 복제 금지 키워드 부재 (anti-drift):
                "phase prefix", "Story file 섹션", "FIX Ledger 스키마", "Impl Manifest 스키마"
          """
          import re
          import sys
          from pathlib import Path

          # SSOT 본문 inline 복제 차단 keyword (drift 위험)
          FORBIDDEN_KEYWORDS = [
              "phase prefix",
              "Story file 섹션",
              "FIX Ledger 스키마",
              "Impl Manifest 스키마",
          ]

          # 위치별 expected DocsAgent.md 상대 link target
          def expected_link_target(path: Path) -> str:
              parts = path.parts
              if parts[0] == "agents":
                  return "DocsAgent.md"
              if parts[0] == "presets" and "agents" in parts:
                  # presets/<flavor>/agents/<X>.md → 3 levels up to root, then agents/
                  return "../../../agents/DocsAgent.md"
              return ""  # 본 invariant scope 외

          targets = []
          for p in sorted(Path("agents").glob("*.md")):
              if p.stem == "DocsAgent":
                  continue
              targets.append(p)
          for p in sorted(Path("presets").glob("*/agents/*.md")):
              targets.append(p)

          errors = []

          for path in targets:
              text = path.read_text(encoding="utf-8")
              # "## 문서화 표준" 섹션 + 다음 "## " heading 사이 body 추출
              m = re.search(
                  r"^## 문서화 표준\s*\n(.+?)(?=\n## |\Z)",
                  text,
                  re.MULTILINE | re.DOTALL,
              )
              if not m:
                  errors.append(f"{path}: '## 문서화 표준' 섹션 부재 (ADR-002 §3 위반)")
                  continue

              body_raw = m.group(1).strip()
              body_lines = [ln for ln in body_raw.split("\n") if ln.strip()]

              # 1줄 검사
              if len(body_lines) != 1:
                  errors.append(
                      f"{path}: footer body 1줄이 아님 ({len(body_lines)} 줄, ADR-002 §3 'footer 본문 확장 금지' 위반)"
                  )
                  continue

              body = body_lines[0]

              # link target 검증
              expected = expected_link_target(path)
              if expected:
                  link_pattern = re.compile(r"\[(?:[^\]]+)\]\(([^)]+)\)")
                  links = link_pattern.findall(body)
                  if not any(href.endswith("DocsAgent.md") for href in links):
                      errors.append(f"{path}: footer body에 DocsAgent.md 참조 link 부재")
                      continue
                  # 정확한 expected target 1개 이상 존재하는지
                  if expected not in links:
                      errors.append(
                          f"{path}: footer link target 불일치 — expected '{expected}', got {links}"
                      )
                      continue

              # SSOT 본문 inline 복제 금지 keyword 검사
              for kw in FORBIDDEN_KEYWORDS:
                  if kw in body:
                      errors.append(
                          f"{path}: footer body에 SSOT 본문 키워드 '{kw}' 포함 — "
                          f"ADR-002 §3 'footer 본문 확장 금지' 위반 (drift 위험)"
                      )
                      break

          if errors:
              print(f"::error::ADR-002 footer pattern 정합 실패 ({len(errors)} drift)")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)

          print(f"✓ ADR-002 footer pattern: {len(targets)} agent md (DocsAgent 제외)")
          EOF

      # CFP-2159 (ADR-118 S3) — CFP-29 에서 codeforge-review repo 로 이동했던 review invariant 3 검사를
      # 모노레포 통합으로 wrapper 에 재이식 (역사적 대칭 복원). 이식 원본 = plugins/codeforge-review/.github/workflows/invariant-check.yml
      # (base e420cdc5, 같은 PR 에서 dead workflow 삭제와 동일 commit — 검사 공백 0).
      # path remap: templates/review-checklists/ + agents/ → plugins/codeforge-review/ prefix. 로직·regex·메시지 무변경.

      - name: Review invariant 이식 path preflight (CFP-2159 — ADR-118 S3)
        run: |
          set -u
          MISSING=0
          for f in \
            plugins/codeforge-review/templates/review-checklists/design.md \
            plugins/codeforge-review/templates/review-checklists/code.md \
            plugins/codeforge-review/templates/review-checklists/security.md \
            plugins/codeforge-review/agents/DesignReviewPLAgent.md \
            plugins/codeforge-review/agents/CodeReviewPLAgent.md \
            plugins/codeforge-review/agents/SecurityTestPLAgent.md \
            plugins/codeforge-review/agents/CodexReviewAgent.md; do
            if [ ! -f "$f" ]; then echo "::error file=$f::이식 입력 파일 부재 — path remap 재확인 (CFP-2159 R1)"; MISSING=1; fi
          done
          exit $MISSING

      - name: Review category enum parity (3 lane × SSOT/PL/Codex) (CFP-2159 이식 — plugins/codeforge-review)
        run: |
          python3 <<'EOF'
          """
          3 lane 각각의 review category enum 3 location 정합:
            - SSOT: templates/review-checklists/<lane>.md (pipe-separated inline code)
            - Mirror 1: agents/<Lane>PLAgent.md packet category_enum: YAML list
            - Mirror 2: agents/CodexReviewAgent.md `#### lane=<lane>` 이후 inline {set}

          Invariant: 각 lane 3 location 동일 categories + 동일 순서.
          """
          import re
          import sys
          from pathlib import Path

          LANES = [
              ("design",   "DesignReviewPLAgent"),
              ("code",     "CodeReviewPLAgent"),
              ("security", "SecurityTestPLAgent"),
          ]

          codex_text = Path("plugins/codeforge-review/agents/CodexReviewAgent.md").read_text(encoding="utf-8")
          all_errors = []

          for lane, pl_name in LANES:
              ssot_path = f"plugins/codeforge-review/templates/review-checklists/{lane}.md"
              pl_path = f"plugins/codeforge-review/agents/{pl_name}.md"

              # 1. SSOT (pipe-separated inline code)
              ssot_text = Path(ssot_path).read_text(encoding="utf-8")
              ssot_match = re.search(r"`([a-z-]+(?:\s*\|\s*[a-z-]+)+)`", ssot_text)
              if not ssot_match:
                  all_errors.append(f"{ssot_path}: pipe-separated category enum 부재")
                  continue
              ssot_enum = [s.strip() for s in ssot_match.group(1).split("|")]

              # 2. PL YAML list
              pl_text = Path(pl_path).read_text(encoding="utf-8")
              pl_match = re.search(
                  r"category_enum:\s*\n((?:\s*-\s*[a-z-]+\s*\n)+)",
                  pl_text,
              )
              if not pl_match:
                  all_errors.append(f"{pl_path}: category_enum YAML list 부재")
                  continue
              pl_enum = re.findall(r"-\s*([a-z-]+)", pl_match.group(1))

              # 3. Codex lane-anchored set
              codex_match = re.search(
                  rf"####\s*lane={lane}.*?category from \{{([^}}]+)\}}",
                  codex_text,
                  re.DOTALL,
              )
              if not codex_match:
                  all_errors.append(
                      f"plugins/codeforge-review/agents/CodexReviewAgent.md: lane={lane} 섹션의 category from {{...}} 패턴 부재"
                  )
                  continue
              codex_enum = [s.strip() for s in codex_match.group(1).split(",")]

              # 비교 — 3 location list equality (순서 포함)
              if pl_enum != ssot_enum:
                  all_errors.append(
                      f"[lane={lane}] {pl_path} category_enum ({len(pl_enum)}) ≠ SSOT ({len(ssot_enum)})\n"
                      f"  SSOT  : {ssot_enum}\n"
                      f"  PL    : {pl_enum}\n"
                      f"  diff(only in SSOT): {sorted(set(ssot_enum) - set(pl_enum))}\n"
                      f"  diff(only in PL)  : {sorted(set(pl_enum) - set(ssot_enum))}"
                  )
              if codex_enum != ssot_enum:
                  all_errors.append(
                      f"[lane={lane}] CodexReviewAgent.md category set ({len(codex_enum)}) ≠ SSOT ({len(ssot_enum)})\n"
                      f"  SSOT  : {ssot_enum}\n"
                      f"  Codex : {codex_enum}\n"
                      f"  diff(only in SSOT) : {sorted(set(ssot_enum) - set(codex_enum))}\n"
                      f"  diff(only in Codex): {sorted(set(codex_enum) - set(ssot_enum))}"
                  )

              if pl_enum == ssot_enum and codex_enum == ssot_enum:
                  print(f"  ✓ lane={lane}: {len(ssot_enum)} categories x 3 locations")

          if all_errors:
              print(f"::error::Review category enum parity 실패 ({len(all_errors)} drift)")
              for e in all_errors:
                  for line in e.split("\n"):
                      print(f"  {line}")
              sys.exit(1)

          print("✓ Review category enum parity: 3 lanes × 3 locations all match")
          EOF

      - name: Severity overrides count + breakdown parity (3 lane × SSOT/PL) (CFP-2159 이식 — plugins/codeforge-review)
        run: |
          python3 <<'EOF'
          """
          3 lane 각각의 severity_overrides 정합:
            - SSOT: templates/review-checklists/<lane>.md "## Severity 자동 룰" 섹션 bullet
            - PL: agents/<Lane>PLAgent.md `severity_overrides:` YAML list

          Invariant: 각 lane (총 bullet 개수 + P0 개수 + P1 개수) 동일.

          Codex 프롬프트는 의도적 영문 요약 (예: "Auto-P0: ADR violation, §8 missing, ...")이라
          본 invariant scope 외 — 향후 별도 design 필요 시 재검토.

          string equality 미적용 사유: SSOT는 verbose Korean (e.g. "**X** → P0 강제 (`category`)"),
          PL은 condensed Korean (e.g. "X → P0"), 작성 시점 의도된 차이. count + breakdown만 invariant.
          """
          import re
          import sys
          from pathlib import Path
          from collections import Counter

          LANES = [
              ("design",   "DesignReviewPLAgent"),
              ("code",     "CodeReviewPLAgent"),
              ("security", "SecurityTestPLAgent"),
          ]

          SEVERITY_RE = re.compile(r"→\s*P(\d)")

          def extract_ssot_severity(path):
              """SSOT의 ## Severity 자동 룰 섹션 bullet 추출 + P0/P1 카운트."""
              text = path.read_text(encoding="utf-8")
              m = re.search(
                  r"^## Severity 자동 룰\s*\n(.+?)(?=\n## |\Z)",
                  text,
                  re.MULTILINE | re.DOTALL,
              )
              if not m:
                  return None
              bullets = [
                  line for line in m.group(1).split("\n")
                  if line.lstrip().startswith("- ")
              ]
              counts = Counter()
              for b in bullets:
                  for sev in SEVERITY_RE.findall(b):
                      counts[f"P{sev}"] += 1
              return len(bullets), counts

          def extract_pl_severity(path):
              """PL의 severity_overrides: YAML list 추출 + P0/P1 카운트."""
              text = path.read_text(encoding="utf-8")
              m = re.search(
                  r"severity_overrides:\s*\n((?:\s*-\s*\".+?\"\s*\n)+)",
                  text,
              )
              if not m:
                  return None
              lines = [
                  line for line in m.group(1).split("\n")
                  if line.lstrip().startswith("- ")
              ]
              counts = Counter()
              for line in lines:
                  for sev in SEVERITY_RE.findall(line):
                      counts[f"P{sev}"] += 1
              return len(lines), counts

          all_errors = []

          for lane, pl_name in LANES:
              ssot_path = Path(f"plugins/codeforge-review/templates/review-checklists/{lane}.md")
              pl_path = Path(f"plugins/codeforge-review/agents/{pl_name}.md")

              ssot_result = extract_ssot_severity(ssot_path)
              if ssot_result is None:
                  all_errors.append(f"{ssot_path}: '## Severity 자동 룰' 섹션 또는 bullet 부재")
                  continue
              ssot_total, ssot_counts = ssot_result

              pl_result = extract_pl_severity(pl_path)
              if pl_result is None:
                  all_errors.append(f"{pl_path}: severity_overrides YAML list 부재")
                  continue
              pl_total, pl_counts = pl_result

              if ssot_total != pl_total:
                  all_errors.append(
                      f"[lane={lane}] bullet count 불일치 — SSOT={ssot_total}, PL={pl_total}"
                  )
              for sev in sorted(set(ssot_counts) | set(pl_counts)):
                  if ssot_counts[sev] != pl_counts[sev]:
                      all_errors.append(
                          f"[lane={lane}] {sev} count 불일치 — "
                          f"SSOT={ssot_counts[sev]}, PL={pl_counts[sev]}"
                      )

              if ssot_total == pl_total and all(
                  ssot_counts[s] == pl_counts[s]
                  for s in set(ssot_counts) | set(pl_counts)
              ):
                  breakdown = ", ".join(f"{s}={ssot_counts[s]}" for s in sorted(ssot_counts))
                  print(f"  ✓ lane={lane}: {ssot_total} bullets ({breakdown})")

          if all_errors:
              print(f"::error::Severity overrides parity 실패 ({len(all_errors)} drift)")
              for e in all_errors:
                  print(f"  - {e}")
              sys.exit(1)

          print("✓ Severity overrides count + breakdown parity: 3 lanes × SSOT/PL match")
          EOF

