name: Codex fallback subclass tally lint (warning mode)
# CFP-1368 / ADR-052 Amendment 14 / ADR-060 Amendment 14 §결정 28
# Tier: warning (continue-on-error: true, non-required check)
# Bypass channel: hotfix-bypass:codex-fallback-tally label (ADR-024 Amendment 9)
#
# Purpose:
#   Tallies [codex-sandbox-fallback: <fail-mode>] and
#   [codex-substitution-scope-declared: <scope-enum>] markers from Story §10.
#   9 fail-mode enum closed-set (ADR-052 §A3 + ADR-070 §결정 D1 SSOT):
#     api_missing / version_skew / enterprise_blocked / gh_api_network_blocked /
#     manual_substitution_declared / inline_orchestrator_verify_only /
#     subagent_recursion_blocked / dispatch_stall_or_stream_timeout /
#     codex_truncated_no_verdict
#   Per-enum count >= 3 → escalation_action: escalate_user (ADR-045 §D-9).
#
# Triggers: PR open + scheduled daily cron (15 0 * * * UTC = 09:15 KST) + workflow_dispatch
# ADR-079 KST display: cron UTC 15 0 = 09:15 KST (offset +09:00)
#
# SecurityArch §7.2 TH-2: permissions: contents: read + issues: write (Issue auto-create only)
# No CODEFORGE_CROSS_REPO_PAT in lint output (PAT guard).
#
# Dual-binding pattern (CFP-963 codex-network-scope-presence precedent verbatim):
#   declaration source: ADR-052 Amendment 14 + ADR-070 Amendment 8 + ADR-081 Amendment 7
#   enforcement source: ADR-060
#
# Carrier: CFP-1368 / ADR-052 Amendment 14
# Promotion path (ADR-060 §결정 5):
#   warning → blocking-on-pr: remove continue-on-error + branch protection update
#   (requires pr_cumulative_min: 20 evidence gate, ADR-060 §결정 6(a))

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  schedule:
    # Daily cron: 00:15 UTC = 09:15 KST (ADR-079 normative display)
    # Random offset 15min (DevOps best practice — avoid :00 congestion)
    - cron: "15 0 * * *"
  workflow_dispatch:
    inputs:
      story_file:
        description: "Path to story file to scan (default: docs/stories/*.md scan)"
        required: false
        default: ""
      dry_run:
        description: "Dry-run mode (parse + tally but do not append to jsonl)"
        required: false
        default: "false"

concurrency:
  group: codex-fallback-tally-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write  # Issue auto-create for escalation_action: escalate_user (ADR-045 §D-9)

jobs:
  codex-fallback-tally:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — lint fail does NOT block PR merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check bypass label
        id: bypass
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set +x  # SecurityArch TH-2: no debug trace (PAT guard)
          labels="${PR_LABELS:-}"
          event_name="${EVENT_NAME:-}"

          # schedule + workflow_dispatch = no PR context → bypass label check N/A
          if [ "$event_name" = "schedule" ] || [ "$event_name" = "workflow_dispatch" ]; then
            echo "bypass=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case ",$labels," in
            *,hotfix-bypass:codex-fallback-tally,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              echo "::notice::hotfix-bypass:codex-fallback-tally detected — tally check bypassed (ADR-024)"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Determine story files to scan
        id: story-files
        if: steps.bypass.outputs.bypass == 'false'
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_STORY_FILE: ${{ inputs.story_file }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set +x  # SecurityArch TH-2
          event_name="${EVENT_NAME:-}"
          input_story="${INPUT_STORY_FILE:-}"

          if [ -n "$input_story" ] && [ -f "$input_story" ]; then
            # workflow_dispatch with explicit story file
            echo "story_files=$input_story" >> "$GITHUB_OUTPUT"
          elif [ "$event_name" = "pull_request" ]; then
            # PR mode: changed Story files in diff
            CHANGED=$(git diff --name-only "origin/${BASE_REF:-main}...HEAD" 2>/dev/null | grep -E "^docs/stories/CFP-[0-9]+\.md$" || true)
            echo "story_files=$CHANGED" >> "$GITHUB_OUTPUT"
          else
            # schedule / workflow_dispatch without explicit file: scan all stories
            ALL=$(find docs/stories -name "CFP-*.md" 2>/dev/null | tr '\n' ' ' || true)
            echo "story_files=$ALL" >> "$GITHUB_OUTPUT"
          fi

      - name: Run codex-fallback-tally lint
        id: tally
        if: steps.bypass.outputs.bypass == 'false'
        env:
          STORY_FILES: ${{ steps.story-files.outputs.story_files }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          CARRIER_STORY: CFP-1368
        run: |
          set +x  # SecurityArch TH-2: no debug trace (PAT guard)
          set +e

          story_files="${STORY_FILES:-}"
          dry_run_flag=""
          if [ "${DRY_RUN:-false}" = "true" ]; then
            dry_run_flag="--dry-run"
          fi

          if [ -z "$story_files" ]; then
            echo "::notice::codex-fallback-tally: no Story files to scan — PASS (advisory)"
            echo "exit_status=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MAX_EXIT=0
          JSONL_FILE="docs/kpi/codex-fallback-tally.jsonl"

          for story_file in $story_files; do
            [ -z "$story_file" ] && continue
            [ -f "$story_file" ] || continue
            python3 scripts/lib/check_codex_fallback_tally.py \
              --jsonl-file "$JSONL_FILE" \
              --story-file "$story_file" \
              --carrier-story "$CARRIER_STORY" \
              $dry_run_flag 2>&1 || {
              status=$?
              if [ "$status" -gt "$MAX_EXIT" ]; then
                MAX_EXIT="$status"
              fi
            }
          done

          echo "exit_status=$MAX_EXIT" >> "$GITHUB_OUTPUT"
          # warning tier: always exit 0 (continue-on-error + warning-tier semantic)
          exit 0

      - name: Emit tally summary
        if: steps.bypass.outputs.bypass == 'false' && always()
        env:
          TALLY_STATUS: ${{ steps.tally.outputs.exit_status }}
        run: |
          set +x  # SecurityArch TH-2
          status="${TALLY_STATUS:-0}"
          if [ "$status" = "0" ]; then
            echo "::notice::codex-fallback-tally: PASS — per-enum tally below threshold (ADR-052 §A3 + ADR-045 §D-9)"
          elif [ "$status" = "1" ]; then
            echo "::warning::codex-fallback-tally: WARNING — per-enum count >= 3 threshold OR invalid enum detected."
            echo "::warning::Action: escalation_action: escalate_user (ADR-045 §D-9). Create GitHub Issue for systemic class determination."
            echo "::warning::Bypass: hotfix-bypass:codex-fallback-tally label (ADR-024 Amendment 9). Bypass-justification PR comment required (CFP-845 §결정 6.A.4)."
          else
            echo "::warning::codex-fallback-tally: META-ERROR (exit $status) — lint infrastructure issue. Non-blocking (warning tier)."
          fi
