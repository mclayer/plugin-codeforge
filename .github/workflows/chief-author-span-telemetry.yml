name: chief-author-span-telemetry (warning mode)
# CFP-1502 / Wave 2-D of CFP-1389 (Sub-CFP D CFP-1438 mechanical wire) — FINAL Wave 2
# ADR-039 Amendment 5 §결정 17 chief author spawn span guideline (recommendation tier)
# + ADR-044 Amendment 3 §결정 9 multi-step chief author pattern paired sibling carrier
# Tier: warning (continue-on-error: true, non-required check)
# Bypass channel: hotfix-bypass:chief-author-span-telemetry label
#   (ADR-024 Amendment N §결정 6.A — 88번째 family member)
#
# Chief author span telemetry mechanical lint.
# Detection scope (Wave 2-D — codify):
#   Check (a) — chief author spawn entry in Story §14 Lane Evidence without
#     `[chief-author-span: <minutes>, <class>]` inline marker OR
#     `chief_author_span_minutes:` YAML-like field presence → [WARN-TELEMETRY-MARKER-ABSENT]
#   Check (b) — long-span chief author spawn (≥ 10 min, env CFP_CHIEF_AUTHOR_SPAN_MAX_MIN)
#     with class `monolithic` → [WARN-LONG-SPAN-MONOLITHIC] (recommendation tier)
#   - docs/stories/**/*.md path filter only (Story file scope)
#   - templates/** + tests/** path = FP-완화 guard
#   - markdown table row (line starts with `|`) = silent skip (FP guard 4)
#
# Trigger split (CFP-954 D2 consensus 답습 — production-cutover-evidence.yml byte-pattern):
#   - pull_request (PR-time enforcement)
#   - workflow_dispatch (manual runs)
#
# SecurityArch §7.2 TH-2 constraint: permissions: contents: read only (no PR write).
# No CODEFORGE_CROSS_REPO_PAT in lint output (PAT guard).
#
# Carrier: CFP-1502 / Wave 2-D mechanical wire
#   - declaration source: ADR-039 Amendment 5 + ADR-044 Amendment 3 (CFP-1438 Wave 1 anchor)
#   - enforcement source: ADR-060 §결정 5 warning tier framework
#
# Promotion path (ADR-060 §결정 28.E):
#   warning → blocking-on-pr: remove continue-on-error + branch protection update
#   (requires pr_cumulative_min: 20 evidence gate, ADR-060 §결정 6(b))
#
# Precedent byte-pattern: templates/github-workflows/mid-spawn-drift-detection-check.yml (CFP-1500)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'docs/stories/**/*.md'
  workflow_dispatch:

concurrency:
  group: chief-author-span-telemetry-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  chief-author-span-telemetry:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5 / §결정 28) — lint fail does NOT block PR merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check bypass label
        id: bypass
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          set +x  # SecurityArch TH-2: no debug trace
          labels="${PR_LABELS:-}"
          case ",$labels," in
            *,hotfix-bypass:chief-author-span-telemetry,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              echo "::notice::hotfix-bypass:chief-author-span-telemetry detected — chief-author-span-telemetry lint bypassed (ADR-024 Amendment N §결정 6.A — 88번째 hotfix-bypass:* family member)"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run chief-author-span-telemetry lint
        id: lint
        if: steps.bypass.outputs.bypass == 'false'
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          set +x  # SecurityArch TH-2: no debug trace (PAT guard)
          set +e

          # Determine changed Story files scope
          if [ -z "${GITHUB_BASE_REF:-}" ]; then
            # workflow_dispatch path — no PR diff, scan latest commit only
            CHANGED_FILES="$(git diff --name-only HEAD~1...HEAD 2>/dev/null | grep -E '^docs/stories/.*\.md$' || true)"
          else
            CHANGED_FILES="$(git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD" 2>/dev/null | grep -E '^docs/stories/.*\.md$' || true)"
          fi

          if [ -z "$CHANGED_FILES" ]; then
            echo "::notice::chief-author-span-telemetry: no changed Story files detected — PASS (advisory)"
            echo "exit_status=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Run lint via bash thin wrapper (delegates to Python SSOT)
          MAX_EXIT=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            bash scripts/check-chief-author-span-telemetry.sh "$f" 2>&1 || {
              status=$?
              if [ "$status" -gt "$MAX_EXIT" ]; then
                MAX_EXIT="$status"
              fi
            }
          done <<< "$CHANGED_FILES"

          echo "exit_status=$MAX_EXIT" >> "$GITHUB_OUTPUT"
          # warning tier: always exit 0 (continue-on-error + warning-tier semantic)
          exit 0

      - name: Emit lint summary
        if: steps.bypass.outputs.bypass == 'false' && always()
        env:
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set +x  # SecurityArch TH-2
          status="${LINT_STATUS:-0}"
          if [ "$status" = "0" ]; then
            echo "::notice::chief-author-span-telemetry: PASS — all chief author spawn entries have telemetry marker presence (ADR-039 Amendment 5 §결정 17 + ADR-044 Amendment 3 §결정 9 cross-ref)"
          elif [ "$status" = "1" ]; then
            echo "::warning::chief-author-span-telemetry: WARNING — Story §14 Lane Evidence chief author spawn entry detected without \`[chief-author-span: <minutes>, <class>]\` inline marker OR \`chief_author_span_minutes:\` YAML field, OR long-span spawn (≥ 10 min) with class \`monolithic\` (recommendation tier — consider multi_step_N decomposition). Add telemetry marker to Story §14 Lane Evidence chief author spawn entry before merging. hotfix bypass: hotfix-bypass:chief-author-span-telemetry label (ADR-024 Amendment N §결정 6.A — 88번째 family member)."
          else
            echo "::warning::chief-author-span-telemetry: META-ERROR (exit $status) — lint infrastructure issue. Non-blocking (warning tier)."
          fi
