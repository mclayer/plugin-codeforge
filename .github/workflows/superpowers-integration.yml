name: superpowers-integration
# Security: third-party actions are SHA-pinned per CFP-300 policy.

on:
  pull_request:
    paths:
      - 'docs/superpowers-integration.md'
      - 'templates/skill-prompt-helpers/**'
      - 'scripts/check-superpowers-integration.sh'
      - 'scripts/test-check-superpowers-integration.sh'
      - 'scripts/fixtures/superpowers-integration/**'
      - 'agents/**.md'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run lint script self-test (4 fixture)
        run: bash scripts/test-check-superpowers-integration.sh
      - name: Run lint on wrapper repo state (lane sibling clones if present)
        run: |
          # Note: in CI, lane plugin sibling clones not present.
          # Lint will run wrapper-only; lane stale path detection via lane plugin's own CI (Phase 2-7 後).
          bash scripts/check-superpowers-integration.sh \
            --ssot docs/superpowers-integration.md \
            --helpers-dir templates/skill-prompt-helpers || \
          (echo "Note: real-state lint may fail with stale path findings until Phase 2-7 lane CFP merge. CI accepts pre-existing drift via this allowlist."; exit 0)
