name: Path relocation consistency lint (warning mode)
# CFP-2661 / ADR-136 Amendment 4 §결정 15 (22번째 warning-tier entry) — relocation-ledger 구동 construct-scoped
# dead-path 재유입 차단 lint. 게이트 execution-surface construct(shell array / python literal / yaml sequence)가
# 원장 등록 (old→new) pair 의 OLD 경로를 NEW 동반 없이 단독 지목하면 flag. census 3-count(candidates_scanned/
# inert_skipped/violations) + verdict fail-open/census fail-closed 비대칭 + active_when field-predicate selector.
# Tier: warning (continue-on-error, non-required check — ADR-060 §결정 5 default). PR merge 미차단.
# required 미등록 (설계 I-4 비협상 — 6→7 required 등록 4연속 실패 이력 + paths skip Pending 영구고착 회피).
# Bypass channel: hotfix-bypass:path-relocation-consistency (ADR-024 §결정 6.A per-entry namespace)
# honesty ceiling(ADR-151 §결정7): construct-scoped 정적 리터럴 천장 — 동적 조립/간접 참조/ledger-외 relocation/
#   body-prose 산문 지시문 미검출(declared FN). "재유입 완전 차단" hard-claim 없음.
#
# consumer degradation: byte-identical template mirror(ADR-005)를 consumer 가 상속해도 census fail-closed 는
#   ledger 등록 pair 기준 — corpus construct 부재 시 candidate 0 → exit 3(born-hollow guard)로 정직 노출.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'scripts/**'
      - '.github/workflows/**'
      - 'templates/github-workflows/**'
      - 'docs/parallel-work/**'
      - 'docs/doc-locations.yaml'
      - 'docs/path-relocation-ledger.yaml'
      - 'docs/path-relocation-baseline.yaml'
      - 'plugins/**/agents/**'

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  path-relocation-consistency:
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON_LINUX_JSON || '["ubuntu-latest"]') }}
    # warning mode (ADR-060 §결정 5) — lint fail 이 PR merge 차단하지 않음.
    # required_status_checks.contexts 부착 X (설계 I-4 required 미등록).
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Run discriminating self-test (QADev — positive anchor/mutation-kill / negative 0-FP / born-hollow guard / construct-vs-file FN / field-predicate)
        # tests/scripts/test_check-path-relocation-consistency.sh: 검출 TC ∧ 정당용법 미검출 ∧ MK mutation-kill
        # ∧ PERF DoS 가드 ∧ born-hollow guard(candidate 0→FAIL) ∧ active_when locked↔append-only discriminating.
        # wrapper-self only (ADR-136 Amd2 QADev tests/scripts 실행 채널 선례 동형).
        if: hashFiles('tests/scripts/test_check-path-relocation-consistency.sh') != ''
        run: bash tests/scripts/test_check-path-relocation-consistency.sh

      - name: Run legacy adr-path dead-path-sweep regression (CFP-2661 D7 — CI tier 승격, 신규 lint 흡수/확장)
        # test_adr-path-dead-path-sweep.sh = ALIVE(13 passed / 5 mutant-kill) 인데 인벤토리 manual-tier +
        # FALSE manual_reason("subject 부재") 였다. 신규 relocation lint 이 dead-path 검출을 흡수·확장하므로
        # 본 회귀 test 를 이 workflow 실행 채널로 CI 승격(AC-17). 신규 dead-path 주입 fixture 에서 뒤집힘.
        if: hashFiles('tests/scripts/test_adr-path-dead-path-sweep.sh') != ''
        run: bash tests/scripts/test_adr-path-dead-path-sweep.sh

      - name: Run path-relocation-consistency lint
        id: lint
        run: |
          bash scripts/check-path-relocation-consistency.sh --repo-root . 2>&1 | tee lint-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Post warning comment (dead-path 재유입 검출)
        if: steps.lint.outcome == 'failure'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('lint-output.txt', 'utf8');
            const body = [
              '## Path relocation consistency lint — warning',
              '',
              '> ADR-136 Amendment 4 §결정 15 warning-tier (CFP-2661). PR merge 차단 아님.',
              '> relocation-ledger 등록 (old → new) pair 에 대해, execution-surface construct 가 OLD 경로를 NEW 동반 없이 단독 지목 = dead-path 재유입 위험.',
              '> remediation: 동일 construct 에 NEW 경로 union-ADD (삭제형 치환 금지 — consumer 정답 경로 소실) / 정당 sunset 이면 OLD 리터럴 제거.',
              '> bypass: `hotfix-bypass:path-relocation-consistency` label 부착.',
              '',
              '```',
              output.slice(0, 3000),
              '```',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
