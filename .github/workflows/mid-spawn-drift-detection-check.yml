name: mid-spawn-drift-detection-check (warning mode)
# CFP-1500 / Wave 2-B of CFP-1389 (Sub-CFP B CFP-1436 mechanical wire)
# ADR-082 Amendment 16 §결정 1 layer 1 sub-scope (1-F) spawn-internal periodic
# origin re-pin protocol mandate + ADR-073 Amendment 12 `mid_spawn_origin_drift_detected`
# transition trigger 11번째 entry paired sibling
# Tier: warning (continue-on-error: true, non-required check)
# Bypass channel: hotfix-bypass:mid-spawn-drift-detection label
#   (ADR-024 Amendment N §결정 6.A — 87번째 family member)
#
# Mid-spawn drift detection mechanical lint.
# Detection scope (Wave 2-B — codify):
#   Check (a) — agent spawn entry in Story §14 Lane Evidence without
#     `mid_spawn_drift_check_executed: <bool>` field OR `drift_check_directive_present: true`
#     marker presence → [WARN-DIRECTIVE-ABSENT]
#   Check (b) — long-duration spawn (≥ 5 min) without `drift_detected: <bool>`
#     return packet flag → [WARN-RETURN-PAYLOAD-INCOMPLETE]
#   - docs/stories/**/*.md path filter only (Story file scope)
#   - templates/** + tests/** path = FP-완화 guard
#
# Trigger split (CFP-954 D2 consensus 답습 — production-cutover-evidence.yml byte-pattern):
#   - pull_request (PR-time enforcement)
#   - workflow_dispatch (manual runs)
#
# SecurityArch §7.2 TH-2 constraint: permissions: contents: read only (no PR write).
# No CODEFORGE_CROSS_REPO_PAT in lint output (PAT guard).
#
# Carrier: CFP-1500 / Wave 2-B mechanical wire
#   - declaration source: ADR-082 Amendment 16 + ADR-073 Amendment 12 (CFP-1436 Wave 1 anchor)
#   - enforcement source: ADR-060 §결정 5 warning tier framework
#
# Promotion path (ADR-060 §결정 28.E):
#   warning → blocking-on-pr: remove continue-on-error + branch protection update
#   (requires pr_cumulative_min: 20 evidence gate, ADR-060 §결정 6(b))
#
# Precedent byte-pattern: templates/github-workflows/amendment-slot-reservation-check.yml (CFP-1497)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'docs/stories/**/*.md'
  workflow_dispatch:

concurrency:
  group: mid-spawn-drift-detection-check-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mid-spawn-drift-detection-check:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5 / §결정 28) — lint fail does NOT block PR merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check bypass label
        id: bypass
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          set +x  # SecurityArch TH-2: no debug trace
          labels="${PR_LABELS:-}"
          case ",$labels," in
            *,hotfix-bypass:mid-spawn-drift-detection,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              echo "::notice::hotfix-bypass:mid-spawn-drift-detection detected — mid-spawn-drift-detection-check lint bypassed (ADR-024 Amendment N §결정 6.A — 87번째 hotfix-bypass:* family member)"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run mid-spawn-drift-detection lint
        id: lint
        if: steps.bypass.outputs.bypass == 'false'
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          set +x  # SecurityArch TH-2: no debug trace (PAT guard)
          set +e

          # Determine changed Story files scope
          if [ -z "${GITHUB_BASE_REF:-}" ]; then
            # workflow_dispatch path — no PR diff, scan latest commit only
            CHANGED_FILES="$(git diff --name-only HEAD~1...HEAD 2>/dev/null | grep -E '^docs/stories/.*\.md$' || true)"
          else
            CHANGED_FILES="$(git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD" 2>/dev/null | grep -E '^docs/stories/.*\.md$' || true)"
          fi

          if [ -z "$CHANGED_FILES" ]; then
            echo "::notice::mid-spawn-drift-detection-check: no changed Story files detected — PASS (advisory)"
            echo "exit_status=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Run lint via bash thin wrapper (delegates to Python SSOT)
          MAX_EXIT=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            bash scripts/check-mid-spawn-drift-detection.sh "$f" 2>&1 || {
              status=$?
              if [ "$status" -gt "$MAX_EXIT" ]; then
                MAX_EXIT="$status"
              fi
            }
          done <<< "$CHANGED_FILES"

          echo "exit_status=$MAX_EXIT" >> "$GITHUB_OUTPUT"
          # warning tier: always exit 0 (continue-on-error + warning-tier semantic)
          exit 0

      - name: Emit lint summary
        if: steps.bypass.outputs.bypass == 'false' && always()
        env:
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set +x  # SecurityArch TH-2
          status="${LINT_STATUS:-0}"
          if [ "$status" = "0" ]; then
            echo "::notice::mid-spawn-drift-detection-check: PASS — all agent spawn entries have mid-spawn drift directive presence marker (ADR-082 Amendment 16 §결정 1 layer 1 sub-scope (1-F) + ADR-073 Amendment 12 cross-ref)"
          elif [ "$status" = "1" ]; then
            echo "::warning::mid-spawn-drift-detection-check: WARNING — Story §14 Lane Evidence agent spawn entry detected without `mid_spawn_drift_check_executed: <bool>` field OR `drift_check_directive_present: true` marker, OR long-duration spawn (≥ 5 min) without `drift_detected: <bool>` return packet flag. Add directive presence marker to Story §14 Lane Evidence agent spawn entry before merging. hotfix bypass: hotfix-bypass:mid-spawn-drift-detection label (ADR-024 Amendment N §결정 6.A — 87번째 family member)."
          else
            echo "::warning::mid-spawn-drift-detection-check: META-ERROR (exit $status) — lint infrastructure issue. Non-blocking (warning tier)."
          fi
