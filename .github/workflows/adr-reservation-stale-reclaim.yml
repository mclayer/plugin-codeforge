name: ADR reservation stale-slot reclaim (slot-level, 30-day)

# CFP-2491 / Epic CFP-2481 E3b / ADR-133 §결정4·§결정6 + Amendment 1 A1-4 —
# slot-level stale claim 자동 회수 (Issue-level reservation-cleanup.yml 과 별개 신설).
#
# 정책 (ADR-133 Amd1 A1-4 / Change Plan §3.5):
#   abandoned 영구 마킹 + 번호 재사용 금지 + gap(구멍) audit 보존.
#   회수 = "재사용 가능 표시"가 아님 — abandoned slot free 복원은 단조성 위반 → A→abandoned→A ABA 재현.
#   `source:` Herlihy & Wing, "Linearizability", ACM TOCS 1990 §5 (CAS counter ABA 단조성).
#
# 대상: adr-reservation-state branch 위 claim state JSON 의 claims[] 중
#       status==claimed ∧ claimed_at < now-30d ∧ 대응 ADR 파일 미존재 → status: abandoned 마킹.
#       max_adr_number 는 절대 감소시키지 않는다 (번호 free 복원 0 — gap 잔류).
#
# Trigger: daily cron (02:00 UTC, reservation-cleanup.yml 선례) + manual dispatch.
# Tier: non-required (slot-level governance automation, merge 무차단).

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  stale-reclaim:
    name: adr-reservation-stale-reclaim
    if: github.repository == 'mclayer/plugin-codeforge'
    runs-on: ubuntu-latest
    env:
      STATE_BRANCH: adr-reservation-state
      STATE_PATH: adr-reservation-claim-state.json
      ADR_DIR: archive/adr
      TTL_DAYS: '30'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reclaim stale claimed slots (abandoned mark, number never freed)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # ── claim state fetch (state branch 위 JSON) — 부재 시 no-op exit 0 ──
          STATE_JSON=$(gh api "repos/${REPO}/contents/${STATE_PATH}?ref=${STATE_BRANCH}" \
            --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo "")
          if [ -z "$STATE_JSON" ]; then
            echo "::notice::claim state 부재 (adr-reservation-state branch 미생성 또는 빈 state) — no-op"
            exit 0
          fi
          STATE_SHA=$(gh api "repos/${REPO}/contents/${STATE_PATH}?ref=${STATE_BRANCH}" \
            --jq '.sha' 2>/dev/null || echo "")

          # ── 30-day cutoff (ISO 8601) ──
          CUTOFF=$(date -u -d "${TTL_DAYS} days ago" '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null \
                  || date -u -v-${TTL_DAYS}d '+%Y-%m-%dT%H:%M:%SZ')
          echo "::notice::cutoff = $CUTOFF — claimed slot 이 이 시각 이전이고 대응 ADR 미존재면 abandoned 마킹"

          # ── abandoned 마킹 (max_adr_number 불변 — 번호 free 복원 0, gap 보존) ──
          # 대응 ADR 파일 존재 여부: archive/adr/ADR-<n>-*.md glob.
          echo "$STATE_JSON" > /tmp/claim-state.json
          NEW_STATE=$(python3 - "$CUTOFF" "$ADR_DIR" <<'PY'
          import json, sys, glob, os
          cutoff = sys.argv[1]
          adr_dir = sys.argv[2]
          with open("/tmp/claim-state.json") as f:
              data = json.load(f)
          changed = 0
          for c in data.get("claims", []):
              if c.get("status") != "claimed":
                  continue
              if c.get("claimed_at", "") >= cutoff:
                  continue  # 아직 TTL 미경과
              n = c.get("adr_number")
              # 대응 ADR 파일 존재 시 = committed/active → 회수 대상 아님.
              hits = glob.glob(os.path.join(adr_dir, f"ADR-{n}-*.md"))
              if hits:
                  continue
              # stale claimed + ADR 미존재 → abandoned 영구 마킹 (번호 재사용 금지).
              c["status"] = "abandoned"
              c["abandoned_at"] = cutoff
              changed += 1
          # max_adr_number 는 절대 감소 안 함 (단조성 보존 — gap 잔류).
          print(json.dumps({"_changed": changed, "state": data}, ensure_ascii=False))
          PY
          )
          CHANGED=$(echo "$NEW_STATE" | python3 -c "import json,sys; print(json.load(sys.stdin)['_changed'])")
          if [ "$CHANGED" -eq 0 ]; then
            echo "::notice::stale claimed slot 0건 — no-op"
            exit 0
          fi

          echo "$NEW_STATE" | python3 -c "import json,sys; print(json.dumps(json.load(sys.stdin)['state'], ensure_ascii=False, indent=2))" > /tmp/new-claim-state.json
          NEW_B64=$(base64 -w0 < /tmp/new-claim-state.json)

          # ── conditional PUT (OCC — 동시 claim 과 race 시 409 → 다음 cron 재시도) ──
          ARGS=(-X PUT "repos/${REPO}/contents/${STATE_PATH}"
            -f message="reclaim(adr-reservation): ${CHANGED} stale slot abandoned 마킹 (number free 0, ADR-133)"
            -f content="$NEW_B64"
            -f branch="${STATE_BRANCH}")
          [ -n "$STATE_SHA" ] && ARGS+=(-f sha="$STATE_SHA")
          if gh api "${ARGS[@]}" >/dev/null 2>&1; then
            echo "::notice::${CHANGED} stale slot abandoned 마킹 완료 (번호 free 복원 0 — gap 보존)"
          else
            echo "::warning::claim state PUT 실패 (동시 claim 409 가능) — 다음 cron 재시도"
            exit 0
          fi
