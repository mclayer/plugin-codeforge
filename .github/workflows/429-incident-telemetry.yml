name: 429 incident telemetry (ADR-109 weekly measurement)
# CFP-1354 / ADR-109 §결정 8.2 + §결정 10 secret redaction matrix SSOT
# Tier: warning (runtime telemetry collection, §14 Lane Evidence aggregation → KPI artifact)
# evidence-checks-registry.yaml entry: `429-retry-evidence-presence` (warning tier)
#
# 책임:
#   - Weekly cron 으로 §14 Lane Evidence 의 [429-auto-retry: count=N, final_status=success|failed] 태그를 aggregate
#   - docs/kpi/429-incident.json 갱신 (weekly snapshot)
#   - docs/kpi/429-incident-history.jsonl append-only event log (ADR-109 §결정 8.2 + §결정 10 redaction matrix 정합)
#   - threshold violation 시 codeforge-ops label Issue auto-open (dedup: 동일 week 1회만)
#
# permissions: minimum (top-level deny-all + job override).
# concurrency: race 차단 (cron + workflow_dispatch 동시 발화 시 single instance).

on:
  schedule:
    # 매주 일요일 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      as_of:
        description: "Override 시계 (YYYY-MM-DD, 빈 값이면 now). 디버깅 / backfill 용."
        required: false
        default: ""

permissions: {}

concurrency:
  group: 429-incident-telemetry
  cancel-in-progress: false

jobs:
  aggregate-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout wrapper repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure jq + bash
        run: |
          set -euo pipefail
          which jq
          jq --version
          which bash
          bash --version | head -1

      - name: Run aggregator
        id: aggregate
        env:
          AS_OF_INPUT: ${{ github.event.inputs.as_of }}
        run: |
          set -uo pipefail
          mkdir -p docs/kpi

          args=()
          if [ -n "${AS_OF_INPUT:-}" ]; then
            args+=(--as-of "$AS_OF_INPUT")
          fi
          args+=(--out docs/kpi/429-incident.json)
          args+=(--history-out docs/kpi/429-incident-history.jsonl)

          bash scripts/measure-429-incident.sh "${args[@]}"
          exit_code=$?

          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

          if [ "$exit_code" -ne 0 ]; then
            echo "[aggregate] aggregator exit ${exit_code} — step failure 격상. detect_infra 가 sub-reason 분기 처리."
            exit "$exit_code"
          fi

          set -e

          gate=$(jq -r '.gate_status' docs/kpi/429-incident.json)
          incident_count=$(jq -r '.weekly_incident_count // 0' docs/kpi/429-incident.json)
          cascade_incidents=$(jq -r '.cascade_incidents // 0' docs/kpi/429-incident.json)
          echo "gate=$gate" >> "$GITHUB_OUTPUT"
          echo "incident_count=$incident_count" >> "$GITHUB_OUTPUT"
          echo "cascade_incidents=$cascade_incidents" >> "$GITHUB_OUTPUT"

          echo "=== 429 Incident KPI JSON ==="
          cat docs/kpi/429-incident.json

      - name: Check JSON changed (no-op short-circuit)
        id: diff
        run: |
          set -euo pipefail
          if git diff --quiet docs/kpi/429-incident.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "JSON unchanged — no-op."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "JSON changed:"
            git diff --stat docs/kpi/429-incident.json
          fi

      - name: Compute KPI window key (YYYY-Www bucket — Issue dedup 용)
        id: window
        if: steps.aggregate.outputs.gate == 'violated'
        run: |
          last_week=$(jq -r '.weekly_data[-1].week // empty' docs/kpi/429-incident.json 2>/dev/null || echo "")
          if [ -z "$last_week" ]; then
            # Fallback — week bucket 미설정 시 current ISO week
            last_week=$(date -u +%Y-W%V)
          fi
          echo "key=$last_week" >> "$GITHUB_OUTPUT"

      - name: Find existing alert issue (dedup)
        id: existing_alert
        if: steps.aggregate.outputs.gate == 'violated'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINDOW_KEY: ${{ steps.window.outputs.key }}
        run: |
          set -euo pipefail
          existing=$(gh issue list --state open --label codeforge-ops \
            --search "ADR-109 429 incident cascade gate violated week ${WINDOW_KEY} in:title" \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "existing=$existing" >> "$GITHUB_OUTPUT"
            echo "기존 alert Issue #${existing} 발견 — dedup skip."
          else
            echo "existing=" >> "$GITHUB_OUTPUT"
            echo "기존 alert Issue 없음 — 새로 발의."
          fi

      - name: Open cascade alert issue (threshold violated)
        if: steps.aggregate.outputs.gate == 'violated' && steps.existing_alert.outputs.existing == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINDOW_KEY: ${{ steps.window.outputs.key }}
          CASCADE_COUNT: ${{ steps.aggregate.outputs.cascade_incidents }}
        run: |
          set -euo pipefail
          KPI_JSON=$(jq -c . docs/kpi/429-incident.json)
          TITLE="[codeforge-ops] ADR-109 429 incident cascade gate violated (week ${WINDOW_KEY})"
          BODY=$(cat <<EOF
          ## ADR-109 429 incident cascade detection — gate violated

          Week: ${WINDOW_KEY}
          Cascade incidents (depth ≥ 2): ${CASCADE_COUNT}
          Threshold: depth ≥ 2 circuit breaker trigger (§결정 4)

          ### Context

          CFP-1354 (ADR-109) 429 surgical mitigation framework 의 in-process cascade detection 이 threshold 를 위반했습니다.
          \`cascade_depth ≥ 2\` incident 가 발생했으며, 이는 사용자 manual resume 영역 (§결정 5) 을 의미합니다.

          ### 관련 ADR

          - ADR-109 §결정 4 — Circuit breaker 3-window AND
          - ADR-109 §결정 5 — Cascade depth ≥ 2 → user manual resume only
          - ADR-057 §결정 2 — Sonnet → Opus fallback (cross-model substitution axis disjoint cross-ref)

          ### KPI snapshot (full JSON)

          \`\`\`json
          ${KPI_JSON}
          \`\`\`

          ### Suggested actions

          1. 429 incident cascade 원인 분석 (phase 0 brainstorm 7-agent burst? debate round escalation? deputy fan-out?)
          2. docs/kpi/429-incident-history.jsonl 의 cascade_depth 이벤트 분포 재검토
          3. 필요 시 ADR-109 Amendment N carrier CFP 발의 (circuit breaker threshold 조정)

          ---

          본 Issue 는 429-incident-telemetry.yml workflow 자동 발의 (weekly cron). 동일 week (${WINDOW_KEY}) 기존 open Issue 가 있으면 발의 dedup.
          EOF
          )
          gh issue create --title "$TITLE" --body "$BODY" --label codeforge-ops

      - name: Create or update auto-PR (JSON changed)
        id: auto_pr
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="kpi/429-incident/$(date -u +%Y%m%d-%H%M%S)"
          git config user.name "codeforge-bot[bot]"
          git config user.email "codeforge-bot@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add docs/kpi/429-incident.json
          git add docs/kpi/429-incident-history.jsonl
          git commit -m "chore(kpi): 429 incident telemetry weekly refresh ($(date -u +%Y-W%V))" \
                     -m "Automated by templates/github-workflows/429-incident-telemetry.yml" \
                     -m "ADR-109 §결정 8.2 KPI dual-tier (weekly aggregate + event log)"
          git push origin "$BRANCH"

          PR_BODY=$(cat <<EOF
          ## CFP-1354 — ADR-109 429 incident telemetry weekly refresh

          docs/kpi/429-incident.json + 429-incident-history.jsonl 갱신 (weekly cron / workflow_dispatch).

          ### KPI summary

          \`\`\`json
          $(jq '{schema_version, measured_at, weekly_incident_count, cascade_incidents, gate_status}' docs/kpi/429-incident.json)
          \`\`\`

          ### 정책 cross-ref

          - ADR-024 §결정 6 — main 직접 push 금지, auto-PR 패턴 정합.
          - ADR-109 §결정 8 — Telemetry SSOT (§14 Lane Evidence marker + KPI dual-tier).
          - ADR-109 §결정 10 — Secret redaction matrix (unconditional invariant).

          ### Auto-merge 가능 여부

          본 PR = telemetry data-only refresh. lint (frontmatter / section / locations / lane-evidence) 영향 0건.
          사용자가 검토 후 merge 가능. 즉시 merge 강제 X (admin discretion).
          EOF
          )

          gh pr create --title "chore(kpi): 429 incident telemetry weekly refresh ($(date -u +%Y-W%V))" \
                       --body "$PR_BODY" \
                       --base main \
                       --head "$BRANCH" \
                       --label codeforge-kpi-update

      - name: Detect infra error
        id: detect_infra
        if: always()
        run: |
          set -euo pipefail
          agg_outcome="${{ steps.aggregate.outcome }}"
          pr_outcome="${{ steps.auto_pr.outcome }}"
          agg_exit="${{ steps.aggregate.outputs.exit_code }}"

          infra_error="false"
          reasons=""

          if [ "${agg_outcome}" = "failure" ]; then
            infra_error="true"
            case "${agg_exit}" in
              1) reasons="${reasons}aggregator input validation failure (exit 1); " ;;
              2) reasons="${reasons}aggregator write failure (exit 2); " ;;
              3) reasons="${reasons}aggregator story scan failure (exit 3); " ;;
              *) reasons="${reasons}aggregator step failure (exit ${agg_exit:-unknown}); " ;;
            esac
          fi

          if [ "${pr_outcome}" = "failure" ]; then
            infra_error="true"
            reasons="${reasons}auto-PR creation failure; "
          fi

          echo "infra_error=${infra_error}" >> "$GITHUB_OUTPUT"
          echo "reasons=${reasons}" >> "$GITHUB_OUTPUT"
          echo "=== detect_infra 결과 ==="
          echo "infra_error=${infra_error}"
          echo "reasons=${reasons}"

      - name: Open infra error issue
        if: steps.detect_infra.outputs.infra_error == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REASONS: ${{ steps.detect_infra.outputs.reasons }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          WINDOW_KEY=$(date -u +%Y-W%V)
          existing=$(gh issue list --state open --label codeforge-kpi-infra-error \
            --search "429-incident-telemetry workflow infra error week ${WINDOW_KEY} in:title" \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "기존 infra-error Issue #${existing} 발견 — dedup skip."
            exit 0
          fi

          TITLE="[codeforge-kpi-infra-error] 429-incident-telemetry workflow infra error (week ${WINDOW_KEY})"
          BODY=$(cat <<EOF
          ## 429-incident-telemetry workflow infra error

          **Window**: ${WINDOW_KEY}
          **Run URL**: ${RUN_URL}
          **Detected reasons**: ${REASONS}

          ### Context

          429-incident-telemetry.yml workflow 가 **infrastructure domain** (운영 환경 결함) failure 를 detect.

          ### Triage 가이드

          1. Run URL 의 step log 확인 (aggregate / auto_pr 중 어느 step failure 인지).
          2. aggregator script error = measure-429-incident.sh exit code 확인 (1/2/3).
          3. auto-PR fail = branch protection / token 권한 점검.

          ### 관련 ADR

          - ADR-109 §결정 8 — Telemetry SSOT
          - ADR-104 / ADR-106 — 운영 phase definition

          ---

          본 Issue 는 429-incident-telemetry.yml workflow 자동 발의. 동일 week (${WINDOW_KEY}) 기존 open Issue 있으면 dedup.
          EOF
          )
          gh issue create --title "$TITLE" --body "$BODY" --label codeforge-kpi-infra-error

      - name: Summary (always)
        if: always()
        run: |
          echo "=== 429 incident telemetry workflow summary ==="
          echo "gate_status           = ${{ steps.aggregate.outputs.gate }}"
          echo "weekly_incident_count = ${{ steps.aggregate.outputs.incident_count }}"
          echo "cascade_incidents     = ${{ steps.aggregate.outputs.cascade_incidents }}"
          echo "json_changed          = ${{ steps.diff.outputs.changed }}"
          echo "infra_error           = ${{ steps.detect_infra.outputs.infra_error }}"
          echo "infra_error_reasons   = ${{ steps.detect_infra.outputs.reasons }}"
