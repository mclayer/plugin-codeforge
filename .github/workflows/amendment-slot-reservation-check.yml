name: amendment-slot-reservation-check (warning mode)
# CFP-1497 / Wave 2-C of CFP-1389 (Sub-CFP C CFP-1435 mechanical wire)
# ADR-082 Amendment 17 §결정 1 layer 1 sub-scope (1-G) amendment-slot pre-reservation
# strict claim mandate + ADR-050 §결정 1 ADR-RESERVATION carrier cross-ref
# Tier: warning (continue-on-error: true, non-required check)
# Bypass channel: hotfix-bypass:amendment-slot-reservation label
#   (ADR-024 Amendment N §결정 6.A — 86번째 family member)
#
# Amendment-slot reservation mechanical lint.
# Detection scope (Wave 2-C — codify):
#   Check (a) — Amendment append (frontmatter `amendment_id: N` entry) without matching
#     `amendments_reserved[]` row in ADR-RESERVATION.md → [WARN-MISSING-RESERVATION]
#   Check (b) — Concurrent reservation conflict (same (adr_number, amendment_id) slot
#     reserved 2+ times in same PR) → [WARN-CONCURRENT-CONFLICT]
#   - docs/adr/ADR-NNN-*.md path filter (ADR-RESERVATION.md = Check (b) source)
#   - templates/** + tests/** path = FP-완화 guard
#
# Trigger split (CFP-954 D2 consensus 답습 — production-cutover-evidence.yml byte-pattern):
#   - pull_request (PR-time enforcement)
#   - workflow_dispatch (manual runs)
#
# SecurityArch §7.2 TH-2 constraint: permissions: contents: read only (no PR write).
# No CODEFORGE_CROSS_REPO_PAT in lint output (PAT guard).
#
# Carrier: CFP-1497 / Wave 2-C mechanical wire
#   - declaration source: ADR-082 Amendment 17 (CFP-1435 Wave 1 anchor)
#   - enforcement source: ADR-060 §결정 5 warning tier framework
#
# Promotion path (ADR-060 §결정 28.E):
#   warning → blocking-on-pr: remove continue-on-error + branch protection update
#   (requires pr_cumulative_min: 20 evidence gate, ADR-060 §결정 6(b))
#
# Precedent byte-pattern: templates/github-workflows/spawn-prompt-head-pin-check.yml (CFP-1489)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'docs/adr/ADR-*.md'
      - 'docs/adr/ADR-RESERVATION.md'
  workflow_dispatch:

concurrency:
  group: amendment-slot-reservation-check-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  amendment-slot-reservation-check:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5 / §결정 28) — lint fail does NOT block PR merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check bypass label
        id: bypass
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          set +x  # SecurityArch TH-2: no debug trace
          labels="${PR_LABELS:-}"
          case ",$labels," in
            *,hotfix-bypass:amendment-slot-reservation,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              echo "::notice::hotfix-bypass:amendment-slot-reservation detected — amendment-slot-reservation-check lint bypassed (ADR-024 Amendment N §결정 6.A — 86번째 hotfix-bypass:* family member)"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run amendment-slot-reservation lint
        id: lint
        if: steps.bypass.outputs.bypass == 'false'
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          set +x  # SecurityArch TH-2: no debug trace (PAT guard)
          set +e

          # Determine changed ADR files scope
          if [ -z "${GITHUB_BASE_REF:-}" ]; then
            # workflow_dispatch path — no PR diff, scan latest commit only
            CHANGED_FILES="$(git diff --name-only HEAD~1...HEAD 2>/dev/null | grep -E '^docs/adr/ADR-[0-9].*\.md$' || true)"
          else
            CHANGED_FILES="$(git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD" 2>/dev/null | grep -E '^docs/adr/ADR-[0-9].*\.md$' || true)"
          fi

          if [ -z "$CHANGED_FILES" ]; then
            echo "::notice::amendment-slot-reservation-check: no changed ADR files detected — PASS (advisory)"
            echo "exit_status=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Run lint via bash thin wrapper (delegates to Python SSOT)
          MAX_EXIT=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            bash scripts/check-amendment-slot-reservation.sh "$f" 2>&1 || {
              status=$?
              if [ "$status" -gt "$MAX_EXIT" ]; then
                MAX_EXIT="$status"
              fi
            }
          done <<< "$CHANGED_FILES"

          echo "exit_status=$MAX_EXIT" >> "$GITHUB_OUTPUT"
          # warning tier: always exit 0 (continue-on-error + warning-tier semantic)
          exit 0

      - name: Emit lint summary
        if: steps.bypass.outputs.bypass == 'false' && always()
        env:
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set +x  # SecurityArch TH-2
          status="${LINT_STATUS:-0}"
          if [ "$status" = "0" ]; then
            echo "::notice::amendment-slot-reservation-check: PASS — all ADR Amendment append entries have matching ADR-RESERVATION amendments_reserved[] row (ADR-082 Amendment 17 §결정 1 layer 1 sub-scope (1-G) + ADR-050 §결정 1 cross-ref)"
          elif [ "$status" = "1" ]; then
            echo "::warning::amendment-slot-reservation-check: WARNING — ADR Amendment append detected without matching amendments_reserved[] row, OR concurrent slot conflict (same adr_number + amendment_id reserved 2+ times). Add reservation row to docs/adr/ADR-RESERVATION.md amendments_reserved: before merging Amendment PR. hotfix bypass: hotfix-bypass:amendment-slot-reservation label (ADR-024 Amendment N §결정 6.A — 86번째 family member)."
          else
            echo "::warning::amendment-slot-reservation-check: META-ERROR (exit $status) — lint infrastructure issue. Non-blocking (warning tier)."
          fi
