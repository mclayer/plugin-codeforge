name: Deploy Review lane spawn evidence
# CFP-1059-S6 / ADR-088 mechanical_enforcement_actions — Deploy Review lane spawn evidence lint
# Tier: warning (continue-on-error, ADR-060 §결정 5)
# Bypass channel: hotfix-bypass:deploy-trigger label (label-registry-v2.42)
#
# S6 actual job body (declarative seed -> actual wire):
#   Story §14 Lane Evidence row append 검증
#   + ProductionEvidenceDeputy ownership 이관 cross-validation
#   + ADR-072 Amendment N production-cutover-evidence cross-ref
#   (deploy-lane-spawn-evidence.yml 패턴 답습)
#
# ADR-088 spawn evidence binding:
#   Deploy Review lane spawn 시 Story §14 Lane Evidence row append 의무
#   ProductionEvidenceDeputy ownership 이관 (codeforge-design -> codeforge-deploy-review)
#   cascade trigger chain: Epic close -> auto-deploy -> DeployAgent -> 배포 lane -> 배포 리뷰 lane (본 anchor)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'docs/stories/**'
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-review-lane-spawn-evidence:
    runs-on: ubuntu-latest
    # warning tier (ADR-060 §결정 5)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check deploy-review lane spawn evidence
        run: |
          set -euo pipefail
          echo "=== Deploy Review lane spawn evidence check ==="
          echo "ADR-088 mechanical_enforcement_actions: [deploy-review-lane-spawn-evidence]"
          echo "(deploy-lane-spawn-evidence.yml 패턴 답습)"

          CHANGED_STORIES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | \
                            grep "^docs/stories/" || \
                            git diff --name-only origin/main...HEAD 2>/dev/null | \
                            grep "^docs/stories/" || echo "")

          if [[ -z "${CHANGED_STORIES}" ]]; then
            echo "::notice::Story 파일 변경 없음 — deploy-review lane spawn evidence check 스킵"
            exit 0
          fi

          echo "[INFO] 변경된 Story 파일:"
          echo "${CHANGED_STORIES}"

          VIOLATIONS=0

          for story_file in ${CHANGED_STORIES}; do
            if [[ ! -f "${story_file}" ]]; then
              continue
            fi

            echo "--- 검사 중: ${story_file} ---"

            # §14 Lane Evidence 섹션 존재 확인
            if ! grep -q "Lane Evidence\|lane-evidence\|## §14" "${story_file}"; then
              echo "::warning file=${story_file}::§14 Lane Evidence 섹션 미발견"
              VIOLATIONS=$((VIOLATIONS + 1))
              continue
            fi

            # deploy-review lane row + ProductionEvidenceDeputy 확인
            if grep -q "배포.리뷰\|deploy.review\|DeployReview" "${story_file}"; then
              echo "::notice file=${story_file}::deploy-review lane 관련 내용 발견"

              # ProductionEvidenceDeputy ownership 이관 확인
              if ! grep -q "ProductionEvidence\|production.*evidence\|production-evidence" "${story_file}"; then
                echo "::warning file=${story_file}::ProductionEvidenceDeputy ownership 이관 확인 필요"
              fi
            fi

            echo "[INFO] ${story_file}: deploy-review spawn evidence 확인 완료"
          done

          if [[ "${VIOLATIONS}" -gt 0 ]]; then
            echo "::warning::deploy-review lane spawn evidence ${VIOLATIONS}건 미흡 (warning tier, PR 차단 0)"
          else
            echo "[INFO] deploy-review lane spawn evidence check: 이상 없음"
          fi

          echo "[INFO] cascade trigger chain: Epic close -> auto-deploy -> DeployAgent -> 배포 lane -> 배포 리뷰 lane"
          echo "[INFO] ADR-072 production-cutover-evidence cross-ref (ADR-072 Amendment N)"
          echo "[INFO] warning tier (ADR-060 §결정 5)"
