name: bypass-label-counter
# CFP-825 / ADR-024 Amendment 6 section 6.A.2
# per-(plugin, label) signature cumulative use counter lint.
# Detects hotfix-bypass:<entry> label accumulation (exception -> norm mutation risk).
#
# PAT scope requirement (OQ-1, Change Plan section 3.3 EC-3):
#   CODEFORGE_CROSS_REPO_PAT must have: issues:write + repo:read (contents:read)
#   ADR-066 single PAT consolidation (shared with rate-limit-fallback-kpi.yml).
#
# Warning tier (ADR-060 4-tier framework):
#   Script exits 0 on threshold reach + Issue auto-create (warning, not blocking).
#   Cron failure is visible via workflow conclusion (alerting) -- continue-on-error: false.
#
# Bypass: hotfix-bypass:bypass-label-counter label (31st family member, label-registry-v2 v2.23)
on:
  schedule:
    - cron: '0 0 * * *'  # daily 00:00 UTC = 09:00 KST
  workflow_dispatch:

permissions:
  issues: write    # Issue auto-create (carrier Issue per signature)
  contents: read   # gh api search/issues (merged PR label scan)

# ── concurrency 가드 (ADR-063 §결정 13 E-6) ──
# cron + workflow_dispatch 동시 트리거 시 비원자 search-then-create dedup 가 중복 Issue 를
# 만들 수 있으므로 단일 run 만 진행되도록 직렬화. cancel-in-progress: false —
# 진행 중인 counter run 을 중단하면 부분 count 상태가 남을 수 있어 보존(완료 우선).
concurrency:
  group: bypass-label-counter
  cancel-in-progress: false

jobs:
  count-and-issue:
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON_LINUX_JSON || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Run bypass-label counter
        env:
          GH_TOKEN: ${{ secrets.CODEFORGE_CROSS_REPO_PAT }}  # ADR-066 single PAT
        run: bash scripts/check-bypass-label-counter.sh --repo mclayer/plugin-codeforge
