name: Admin merge pre-flight gate (warning mode)
# CFP-1564 / ADR-113 Wave 2 mechanical wire — admin-merge pre-flight gate.
# ADR-113 §결정 1 (5-step procedure) / §결정 5 (failure mode enum 4-fail).
# ADR-060 §결정 5 — warning-tier (continue-on-error, non-required check, PR merge 미차단).
# Bypass channel: hotfix-bypass:admin-merge-preflight-gate label (ADR-024 Amendment 6/8 §결정 6.A 5 lint chain 자동 covered).
#
# 목적: Orchestrator `gh pr merge --admin <PR>` attempt 직전 pre-flight gate 의 advisory
#   surfacing. PR 의 required check 가 ACTION_REQUIRED / non-success 상태이면 advisory
#   comment 로 5-step recovery procedure surface (admin merge silent override 차단).
#
# 승격 path (warning → blocking-on-pr):
#   1. 본 workflow continue-on-error: true 제거
#   2. branch protection required_status_checks.contexts 에 본 job 추가 (HIGH risk — 별 CFP)
#   3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d) + evidence-checks-registry.yaml)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  pull-requests: write
  contents: read
  checks: read

jobs:
  admin-merge-preflight:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — gate-block advisory only, PR merge 미차단.
    # required_status_checks.contexts 부착 X (HIGH risk — 별 CFP).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "labels=$labels"
          case ",$labels," in
            *,hotfix-bypass:admin-merge-preflight-gate,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run admin-merge pre-flight gate
        id: gate
        if: steps.bypass.outputs.bypass == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set +e
          STORY=$(echo "${{ github.event.pull_request.title }}" | grep -oE 'CFP-[0-9]+' | head -n1 || true)
          bash scripts/check-admin-merge-preflight.sh \
            --pr "$PR_NUMBER" \
            ${STORY:+--story "$STORY"} \
            --head-sha "$PR_HEAD" \
            --no-count 2>&1 | tee /tmp/preflight.out
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit 0  # continue-on-error 정합 — fail 이어도 다음 step 진행

      - name: Post pre-flight result comment (sticky)
        if: steps.bypass.outputs.bypass == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GATE_STATUS: ${{ steps.gate.outputs.exit_status }}
        run: |
          set -euo pipefail
          GATE_OUT="$(cat /tmp/preflight.out 2>/dev/null || echo '(pre-flight output 부재)')"
          if echo "$GATE_OUT" | grep -q 'ALLOW'; then
            HEADER="## ✓ Admin merge pre-flight gate — ALLOW (warning mode)"
            FOOTER="모든 required check success. ADR-113 §결정 1 정합 — admin merge 진행 가능."
          elif echo "$GATE_OUT" | grep -q 'meta-error'; then
            HEADER="## ⚠ Admin merge pre-flight gate — meta-error (warning mode)"
            FOOTER=$'**fail-1 API call failure** (ADR-113 §결정 5): gh CLI 미설치 / network / token / 429. retry exp-backoff 3회 + codeforge:rate-limit-429-mitigation skill.'
          else
            HEADER="## ⚠ Admin merge pre-flight gate — ABORT/STOP (warning mode)"
            FOOTER=$'**warning mode (CFP-1564 / ADR-060 §결정 5)**: 본 advisory 는 PR merge 를 차단하지 않습니다. `gh pr merge --admin` attempt 전 ACTION_REQUIRED 잔존 시 Step 3 fresh commit re-trigger 의무 (ADR-113 §결정 1).\n\n**hotfix bypass channel** (ADR-024 Amendment 6/8): `hotfix-bypass:admin-merge-preflight-gate` label 부착 → gate skip + audit comment 자동 발의.'
          fi
          BODY=$(printf '%s\n\n```\n%s\n```\n\n%s\n\n%s' \
            "$HEADER" "$GATE_OUT" "$FOOTER" \
            "> ⓘ 본 workflow = **warning mode** (continue-on-error). PR merge 미차단. 승격 gate (ADR-060 §결정 6) 통과 후 blocking 전환.")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Emit bypass audit comment (label applied)
        if: steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' 섹션 부재 — 후속 보완 의무)"
          fi
          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:admin-merge-preflight-gate")] | last | .actor.login' \
            2>/dev/null || echo "unknown")
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label_applied_by=${LABEL_USER} reason=${REASON} timestamp=${TS}"
          BODY=$(printf '%s\n\n%s' \
            "$AUDIT" \
            "> ⓘ ADR-024 Amendment 6/8 §결정 6.A — audit trail 자동 발의. bypass label: hotfix-bypass:admin-merge-preflight-gate. 5 lint chain 자동 covered.")
          gh pr comment "$PR_NUMBER" --body "$BODY"
