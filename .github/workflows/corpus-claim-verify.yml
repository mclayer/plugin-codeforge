name: Corpus claim verify (warning mode)
# CFP-841 / ADR-082 Amendment 1 §결정 6 scope(a) — corpus annotation lint
# Tier: warning (continue-on-error, non-required check)
# Bypass channel: hotfix-bypass:corpus-claim-verify label (ADR-024 Amendment 7)
#
# corpus enumeration token ('예시 N건' / '전무' / '부재' / '다수') + file-path co-occurrence
# (동일 줄 또는 ±2 줄 window) → [verified: git show <ref>:<path>] annotation 부재 시 flag.
# 4-guard FP 완화: (1) file-path co-occurrence guard (2) citation≠assertion 면제
# (3) forward-only effective-date (4) self-referential exemption (ADR-082 §결정 6 EC-3)
#
# 승격 path:
#   warning → blocking-on-pr 승격 시 CFP-NNN carrier PR 가 다음 변경 동반 의무:
#     1. 본 workflow 의 `continue-on-error: true` 제거
#     2. branch protection required_status_checks 에 본 workflow job name 추가
#     3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d) + evidence-checks-registry.yaml)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'docs/adr/ADR-*.md'
      - 'docs/change-plans/*.md'
      - 'docs/stories/*.md'

permissions:
  pull-requests: write
  contents: read

jobs:
  corpus-claim-verify:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — lint fail 이 PR merge 차단하지 않음.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed doc files
        id: changed
        run: |
          set -euo pipefail
          git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^docs/(adr/ADR-|change-plans/|stories/).*\.md$' \
            > /tmp/changed_docs.txt || true
          if [ -s /tmp/changed_docs.txt ]; then
            echo "has_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "=== Changed doc files ==="
          cat /tmp/changed_docs.txt || echo "(none)"

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "labels=$labels"
          case ",$labels," in
            *,hotfix-bypass:corpus-claim-verify,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Install dependencies
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'false'
        run: python3 -m pip install --user pyyaml 2>/dev/null || true

      - name: Run corpus claim verify lint
        id: lint
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'false'
        run: |
          set +e
          mapfile -t docs < /tmp/changed_docs.txt
          bash scripts/check-corpus-claim-verify.sh "${docs[@]}" 2>&1 | tee /tmp/lint.out
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit 0  # continue-on-error 정합

      - name: Post lint result comment (sticky)
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/lint.out 2>/dev/null || echo '(lint output absent)')"
          if [ "${LINT_STATUS:-1}" = "0" ]; then
            HEADER="## corpus-claim-verify -- PASS (warning mode)"
            FOOTER="violation 0 -- ADR-082 Amendment 1 corpus annotation policy satisfied."
          else
            HEADER="## corpus-claim-verify -- violation detected (warning mode)"
            FOOTER="**warning mode (CFP-841 / ADR-060 §결정 5)**: lint fail 이 PR merge 를 차단하지 않습니다. corpus enumeration token + file-path 인용 후 [verified: git show <ref>:<path>] annotation 부착 필요."$'\n\n'"**hotfix bypass**: hotfix-bypass:corpus-claim-verify label 부착 (ADR-024 Amendment 7)."
          fi
          BODY=$(printf '%s\n\n```\n%s\n```\n\n%s\n\n%s' \
            "$HEADER" "$LINT_OUT" "$FOOTER" \
            "> This workflow runs in **warning mode** (continue-on-error). PR merge not blocked. Promote via ADR-060 §결정 6 gate.")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Emit bypass audit comment
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' section absent)"
          fi
          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:corpus-claim-verify")] | last | .actor.login' \
            2>/dev/null || echo "unknown")
          DOC_LIST=$(paste -sd',' /tmp/changed_docs.txt 2>/dev/null || echo "")
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label_applied_by=${LABEL_USER} reason=${REASON} doc_files=${DOC_LIST} timestamp=${TS}"
          gh pr comment "$PR_NUMBER" --body "$AUDIT"

      - name: Audit assertion
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          bash scripts/check-bypass-audit-comment.sh
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "WARN: audit assertion FAIL (warning mode -- PR merge not blocked)"
          fi
          exit 0
