name: wording-ssot-check (ADR-068 warning-tier)
# ADR-068 §결정 5 wording SSOT lint — I-4 invariant (wording SSOT) mechanical enforcement
# Evidence-enforceable: warning tier (ADR-060 §결정 5). Hotfix bypass: hotfix-bypass:boundary-wording.
# Registry entry: docs/evidence-checks-registry.yaml `wording-ssot-grep-lint`
on:
  pull_request:
    paths:
      - 'docs/stories/**'
      - 'src/**'
      - 'scripts/**'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    continue-on-error: true  # warning-tier — ADR-060 evidence-enforceable advisory
    steps:
      - uses: actions/checkout@v4
      - name: Resolve Story file from PR title
        id: story
        run: |
          STORY_KEY=$(echo "${{ github.event.pull_request.title }}" | grep -oE '(CFP|STY)-[0-9]+' | head -1 || true)
          if [[ -z "$STORY_KEY" ]]; then
            echo "no Story key in PR title — skip"
            echo "story_file=" >> $GITHUB_OUTPUT
          else
            FILE="docs/stories/${STORY_KEY}.md"
            echo "story_file=${FILE}" >> $GITHUB_OUTPUT
          fi
      - name: Run wording-ssot-lint
        if: steps.story.outputs.story_file != ''
        run: bash scripts/check-wording-ssot.sh "${{ steps.story.outputs.story_file }}"
