name: rollback-signal-monitor
# CFP-1193 / ADR-105 §결정 3 — ongoing rollback signal monitor (24h cron)
# ADR-106 Amendment 1 §결정 1 단계 2-a: 자동 rollback 직후 사후 알림 Issue (ops-signal label)
# Tier: warning (ADR-060 evidence-enforceable, continue-on-error: true)
# evidence-checks-registry.yaml entry: rollback-signal-monitor
#
# 안전장치 4 AND (ADR-105 §결정 3):
#   1. 숫자 임계 초과 (에러율 / latency burn rate — 정량, 모달 어휘 금지 ADR-064)
#   2. 3시간 보존 window 내 (기존 hook check_within_retention 위임)
#   3. 사후 알림 mechanism 존재 (monitor 활성 = 항상 true)
#   4. kill-switch off (.codeforge/auto-rollback.disabled 부재 AND config enabled)
#
# 신호 source (ADR-104 §결정 3 — 0 API call):
#   신호 1: 에러율 (error_rate) — 에러 / 전체 요청 비율 (측정: Actions log / metric file)
#   신호 2: latency burn rate (burn_rate) — error budget 소진율/window 산술
#   신호 3·4: S5 (regression / smoke·health monitor, file disjoint)
#
# Wrapper-self-app: N/A (ADR-104 §결정 4 / ADR-072 Tier-1 declare-time exemption)
#   wrapper repo = declarative SSOT only. 실 monitoring = consumer 환경.
#   wrapper 에서 cron 실행 시 fast-pass exit 0 (check-rollback-signal.sh §3.6).
#
# Hotfix bypass:
#   hotfix-bypass:rollback-signal-monitor label 부착 시 skip + audit comment
#   (ADR-024 Amendment 3 hotfix-bypass family, label-registry-v2 v2.45 신규 member)
#
# 답습 source: channel-drift-detection.yml (CFP-932) — byte-pattern verbatim
#   schedule cron + workflow_dispatch + permissions deny-all + concurrency + continue-on-error
#
# §7.4 empirical-source:
#   24h cron rate: channel-drift-detection.yml cron '0 0 * * *' 답습 (dimension: rate)
#   3시간 보존 window: ADR-087 §결정 5 (dimension: lifecycle)
#
# Permissions: minimum (top-level deny-all + job override, ADR-060 Amendment 8)

on:
  schedule:
    - cron: '0 0 * * *'   # 24h UTC daily (ADR-106 §결정 1 단계 1 — 운영 신호 회수 주기)
  workflow_dispatch:       # 수동 ad-hoc 검증

permissions: {}  # top-level deny-all

jobs:
  rollback-signal-monitor:
    runs-on: ubuntu-latest
    continue-on-error: true   # warning tier — ADR-060 (신호 감지 실패 시 CI 차단 0)
    permissions:
      contents: read           # 스크립트 / config 파일 읽기
      issues: write            # ops-signal Issue 발의 (ADR-106 §결정 1 단계 2-a)

    concurrency:
      group: rollback-signal-monitor
      cancel-in-progress: false   # 진행 중 run 완료 보장 (race 차단)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check hotfix-bypass label
        id: bypass
        # hotfix-bypass:rollback-signal-monitor label 부착 시 skip
        # ADR-024 Amendment 3 hotfix-bypass family member (label-registry-v2 v2.45)
        run: |
          echo "bypass=false" >> "$GITHUB_OUTPUT"
          # TODO: bypass label 실 체크 (sub-PR carrier — evidence-checks-registry 승격 시)

      - name: Run rollback signal monitor
        if: steps.bypass.outputs.bypass != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # consumer 측 신호 값 주입 (project.yaml 또는 Actions vars)
          _CFP1193_MOCK_ERROR_RATE: ${{ vars.ROLLBACK_MONITOR_ERROR_RATE || '0.0' }}
          _CFP1193_MOCK_ERROR_RATE_THRESHOLD: ${{ vars.ROLLBACK_MONITOR_ERROR_RATE_THRESHOLD || '' }}
          _CFP1193_MOCK_BURN_RATE: ${{ vars.ROLLBACK_MONITOR_BURN_RATE || '0.0' }}
          _CFP1193_MOCK_BURN_RATE_THRESHOLD: ${{ vars.ROLLBACK_MONITOR_BURN_RATE_THRESHOLD || '' }}
          _CFP1193_MOCK_WINDOW: ${{ vars.ROLLBACK_MONITOR_WINDOW || '3600' }}
          # test override (DC-3)
          _CFP1193_SKIP_ISSUE_CREATE: ${{ vars.CFP1193_SKIP_ISSUE_CREATE || '' }}
        run: |
          chmod +x scripts/check-rollback-signal.sh
          # wrapper repo fast-pass: GITHUB_REPOSITORY = mclayer/plugin-codeforge → exit 0
          bash scripts/check-rollback-signal.sh \
            --repo "${GITHUB_REPOSITORY:-}" \
            --host "${DEPLOY_HOST:-localhost}"

      - name: Bypass audit comment
        if: steps.bypass.outputs.bypass == 'true'
        run: |
          echo "rollback-signal-monitor bypass active"
          echo "hotfix-bypass:rollback-signal-monitor label 감지 — audit comment 발의 (sub-PR carrier)"
