name: Amendment number frontmatter verify (warning mode)
# CFP-1216 / ADR-082 Amendment 6 §결정 9 — amendment-number-frontmatter-verify mechanical lint
# ADR-060 §결정 5 — warning-tier (continue-on-error, non-required check, PR merge 미차단)
# Bypass channel: hotfix-bypass:amendment-number-stale label (ADR-024 Amendment 3 §결정 6.A)
#
# Check (a) — ADR frontmatter self-consistency (PRIMARY):
#   amendment_log/amendments id 목록: 중복 / gap / frontmatter max ≠ body max → [WARN]
# Check (b) — cross-doc citation forward-staleness (SECONDARY):
#   docs/** 비-ADR 파일에서 "ADR-NNN Amendment M" 인용 시 M > max+1 → [WARN]
#
# 승격 path (warning → blocking-on-pr):
#   1. 본 workflow continue-on-error: true 제거
#   2. branch protection required_status_checks.contexts 에 본 job 추가
#   3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d) + evidence-checks-registry.yaml)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'docs/adr/ADR-*.md'
      - 'docs/change-plans/**'
      - 'docs/inter-plugin-contracts/**'

permissions:
  pull-requests: write
  contents: read

jobs:
  amendment-number-stale:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — lint fail 이 PR merge 차단하지 않음.
    # required_status_checks.contexts 부착 X.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pyyaml
        run: python3 -m pip install --user pyyaml

      - name: Detect changed files
        id: changed
        run: |
          set -euo pipefail
          git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '\.(md)$' \
            | grep -v 'ADR-RESERVATION.md' \
            > /tmp/changed_files.txt || true
          if [ -s /tmp/changed_files.txt ]; then
            echo "has_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "=== Changed files ==="
          cat /tmp/changed_files.txt || echo "(none)"

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "labels=$labels"
          case ",$labels," in
            *,hotfix-bypass:amendment-number-stale,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run amendment number stale lint
        id: lint
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'false'
        run: |
          set +e
          mapfile -t files < /tmp/changed_files.txt
          python3 scripts/lib/check_amendment_number_stale.py "${files[@]}" 2>&1 | tee /tmp/lint.out
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit 0  # continue-on-error 정합 — fail 이어도 다음 step 진행

      - name: Post lint result comment (sticky)
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/lint.out 2>/dev/null || echo '(lint output 부재)')"
          if [ "${LINT_STATUS:-1}" = "0" ]; then
            HEADER="## ✓ Amendment number frontmatter verify lint — PASS (warning mode)"
            FOOTER="경고 0건. ADR-082 Amendment 6 §결정 9 정합."
          else
            HEADER="## ⚠ Amendment number frontmatter verify lint — 경고 감지 (warning mode)"
            FOOTER=$'**warning mode (CFP-1216 / ADR-060 §결정 5)**: lint fail 이 PR merge 를 차단하지 않습니다. 의도된 결과인지 확인 + 다음 commit 으로 해소 또는 bypass label 부착.\n\n**hotfix bypass channel** (ADR-024 Amendment 3): 운영 장애 hotfix 시 `hotfix-bypass:amendment-number-stale` label 부착 → lint skip + audit comment 자동 발의.'
          fi
          BODY=$(printf '%s\n\n```\n%s\n```\n\n%s\n\n%s' \
            "$HEADER" "$LINT_OUT" "$FOOTER" \
            "> ⓘ 본 workflow = **warning mode** (continue-on-error). PR merge 미차단. 승격 gate (ADR-060 §결정 6) 통과 후 blocking 전환.")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Emit bypass audit comment (label applied)
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' 섹션 부재 — 후속 보완 의무)"
          fi
          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:amendment-number-stale")] | last | .actor.login' \
            2>/dev/null || echo "unknown")
          FILE_LIST=$(paste -sd',' /tmp/changed_files.txt 2>/dev/null || echo "")
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label_applied_by=${LABEL_USER} reason=${REASON} files=${FILE_LIST} timestamp=${TS}"
          BODY=$(printf '%s\n\n%s' \
            "$AUDIT" \
            "> ⓘ ADR-024 Amendment 3 §결정 6.C — audit trail 자동 발의. bypass label: hotfix-bypass:amendment-number-stale.")
          gh pr comment "$PR_NUMBER" --body "$BODY"
