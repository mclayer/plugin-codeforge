name: contract-lint
# CFP-2159 (ADR-118 S3): inter-plugin-contracts / inter-plugin-drift job 은퇴 — 모노레포 통합으로 cross-repo contract mirror 검사 대상 소멸. 잔존 4 job = 비분리 거버넌스 lint.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  comment-prefix-registry:
    name: comment-prefix-registry self-validation (CFP-33)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Run check-comment-prefix.sh
        run: bash scripts/check-comment-prefix.sh

  label-registry-sync:
    name: label-registry ↔ bootstrap-labels.sh sync (CFP-33)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Run check-label-registry.sh
        run: bash scripts/check-label-registry.sh

  workflow-yaml:
    name: workflow yaml regex fixture tests (CFP-34)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Run check-workflow-yaml.sh
        run: bash scripts/check-workflow-yaml.sh

  story-key-compute:
    name: story-key compute_key self-test (CFP-2116)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run compute_key --self-test (F1-F8, ADR-036 Amd 2)
        run: python3 scripts/lib/workflow_story_init_compute_key.py --self-test

  # marketplace-sync job removed (CFP-457) — redundant with marketplace-parity.yml (CFP-50 / ADR-016 / ADR-023).
  # See CFP-441 retro Action item 1 (3 marketplace lint scripts redundancy cleanup).
