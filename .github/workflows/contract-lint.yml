name: contract-lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  inter-plugin-contracts:
    name: inter-plugin-contracts (CFP-33)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Run check-inter-plugin-contracts.sh
        run: bash scripts/check-inter-plugin-contracts.sh

  inter-plugin-drift:
    name: inter-plugin-drift (CFP-E)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Run check-inter-plugin-drift.sh
        env:
          # CFP-71 / ADR-011 amendment: lane plugin private repo cross-repo read 전용 PAT.
          # secrets.GITHUB_TOKEN 은 wrapper repo scope 만 — 6 lane plugin contents fetch 불가.
          GH_TOKEN: ${{ secrets.CODEFORGE_CROSS_REPO_PAT }}
        run: bash scripts/check-inter-plugin-drift.sh

  comment-prefix-registry:
    name: comment-prefix-registry self-validation (CFP-33)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Run check-comment-prefix.sh
        run: bash scripts/check-comment-prefix.sh

  label-registry-sync:
    name: label-registry ↔ bootstrap-labels.sh sync (CFP-33)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Run check-label-registry.sh
        run: bash scripts/check-label-registry.sh

  workflow-yaml:
    name: workflow yaml regex fixture tests (CFP-34)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Run check-workflow-yaml.sh
        run: bash scripts/check-workflow-yaml.sh

  story-key-compute:
    name: story-key compute_key self-test (CFP-2116)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run compute_key --self-test (F1-F8, ADR-036 Amd 2)
        run: python3 scripts/lib/workflow_story_init_compute_key.py --self-test

  # marketplace-sync job removed (CFP-457) — redundant with marketplace-parity.yml (CFP-50 / ADR-016 / ADR-023).
  # See CFP-441 retro Action item 1 (3 marketplace lint scripts redundancy cleanup).
