name: spawn-event-schema-lint
# CFP-2393 Phase 2 / Epic CFP-2391 S3 — spawn-event-v1 schema lint gate (warning-tier).
#
# spawn-event-v1 registry schema validation — 19-field Allow-list + attribution_confidence
# unattributed default invariant + agent_type semi-open (unknown-agent fallback existence
# verification, NOT enum reject) + event_type closed enum + idempotency deterministic event_id
# + opt-in default false.
#
# ADR-163 §결정 13 / ADR-043 Amendment 2 / Epic CFP-2391 S3. OMC MIT 차용.
#
# F4 결정: .github/ single-root (deferred-followup-reconcile.yml 답습).
#   ADR-005 byte-parity scope 외 — template mirror 미운용 (게이트 = wrapper-self governance
#   registry 검사라 .github-only 정합). invariant-check.yml parity loop 은 templates → .github
#   방향이라 .github-only 파일은 미검출 (CONSUMER_ONLY_WORKFLOWS 등록 불요).
#
# Non-required workflow (branch protection required contexts 무변경, merge 미차단 — ADR-127 ratchet).
# Warning-tier: lint job 은 schema 검출 시 경고 표시하되 continue-on-error 로 job 성공(비차단).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  spawn-event-schema-lint:
    name: spawn-event-v1 schema lint (warning-tier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps (pyyaml — frontmatter 검증 의존, F-CR-004)
        run: pip install -r requirements.txt
      - name: Run check-spawn-event-schema.sh (warning, 비차단)
        continue-on-error: true
        run: bash scripts/check-spawn-event-schema.sh check

  spawn-event-schema-test:
    name: discriminating test (다형 fixture — mutation 생존 0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps (pyyaml — lint frontmatter 검증 의존, F-CR-004)
        run: pip install -r requirements.txt
      - name: Run test-check-spawn-event-schema.sh (회귀 시 exit 1 차단)
        run: bash scripts/test-check-spawn-event-schema.sh
