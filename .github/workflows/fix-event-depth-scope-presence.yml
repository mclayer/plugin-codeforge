name: fix-event-depth-scope-presence (warning mode)
# CFP-842 / ADR-067 Amendment 1 §결정 4 / ADR-060 §결정 5
#
# fix-event-v1 v1.3 depth-aware scope 의 mechanical enforcement advisory layer.
# broken-link / path 정정 FIX §10 row 에 affected_paths_with_depth 존재 여부 advisory lint.
#
# Tier: warning (continue-on-error, non-required check)
# Bypass channel: hotfix-bypass:fix-event-depth-scope label (ADR-024 Amendment 3, 40th family)
# Lint scope: docs/stories/CFP-*.md (§10 FIX Ledger 표 파싱)
#
# False-positive risk 명시:
#   어휘 grep heuristic 만 사용 (semantic precision 불가).
#   false-positive 는 bypass label + reviewer responsibility.
#
# 승격 path:
#   warning → blocking-on-pr 승격 시 CFP-NNN carrier PR 가 다음 변경 동반 의무:
#     1. 본 workflow 의 `continue-on-error: true` 제거
#     2. branch protection `required_status_checks.contexts` 에 본 workflow job name 추가
#        (ADR-024 Amendment 2 / branch-protection-manifest.yaml SSOT 정합)
#     3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d) + evidence-checks-registry.yaml promotion_criteria)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'docs/stories/CFP-*.md'
      - 'wrapper/stories/CFP-*.md'

permissions:
  pull-requests: write
  contents: read

jobs:
  fix-event-depth-scope-presence:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — lint fail 이 PR merge 차단하지 않음.
    # required_status_checks.contexts 부착 X.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed Story files
        id: changed
        run: |
          set -euo pipefail
          git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^(docs/stories/CFP-[0-9]+\.md|wrapper/stories/CFP-[0-9]+\.md)$' \
            > /tmp/changed_stories.txt || true
          if [ -s /tmp/changed_stories.txt ]; then
            echo "has_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "=== Changed Story files ==="
          cat /tmp/changed_stories.txt || echo "(none)"

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "labels=$labels"
          case ",$labels," in
            *,hotfix-bypass:fix-event-depth-scope,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run fix-event depth-scope presence lint
        id: lint
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'false'
        run: |
          set +e
          overall_exit=0
          : > /tmp/lint_combined.out
          while IFS= read -r story_file; do
            echo "--- checking: $story_file ---" >> /tmp/lint_combined.out
            bash scripts/check-fix-event-depth-scope-presence.sh "$story_file" 2>&1 \
              | tee -a /tmp/lint_combined.out
            file_exit=${PIPESTATUS[0]}
            if [ "$file_exit" -gt "$overall_exit" ]; then
              overall_exit=$file_exit
            fi
          done < /tmp/changed_stories.txt
          echo "exit_status=$overall_exit" >> "$GITHUB_OUTPUT"
          cat /tmp/lint_combined.out
          exit 0  # continue-on-error 정합 — fail 이어도 다음 step 진행

      - name: Post lint result comment (advisory)
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/lint_combined.out 2>/dev/null || echo '(lint output 부재)')"
          if [ "${LINT_STATUS:-1}" = "0" ]; then
            HEADER="## OK fix-event-depth-scope-presence lint — PASS (warning mode)"
            FOOTER="affected_paths_with_depth 누락 0건. broken-link/path 정정 FIX §10 row depth annotation 정합."
          else
            HEADER="## WARN fix-event-depth-scope-presence lint — advisory 감지 (warning mode)"
            FOOTER=$'**warning mode (CFP-842 / ADR-060 §결정 5)**: lint fail 이 PR merge 를 차단하지 않습니다.\n\nbroken-link / path 정정 FIX §10 row 에 `affected_paths_with_depth` column 기입을 권장합니다 (CFP-770 §8 CR-005→CR-006→CR-007 over-correction regression chain 직접 차단).\n\n예시: `[{path: "docs/adr/ADR-067.md", depth: 2}, {path: "CLAUDE.md", depth: 0}]`\n\n**false-positive 주의**: 어휘 grep heuristic 만 사용 (semantic precision 불가). 불필요한 경우 bypass label 부착.\n\n**hotfix bypass channel** (ADR-024 Amendment 3): `hotfix-bypass:fix-event-depth-scope` label 부착 → lint skip + audit comment 발의.'
          fi
          BODY=$(printf '%s\n\n```\n%s\n```\n\n%s\n\n%s' \
            "$HEADER" "$LINT_OUT" "$FOOTER" \
            "> i 본 workflow = **warning mode** (continue-on-error). PR merge 미차단. 승격 gate (ADR-060 §결정 6) 통과 후 blocking 전환.")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Emit bypass audit comment (label applied)
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # ADR-060 §결정 8 audit trail format
          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' 섹션 부재 — 후속 보완 의무)"
          fi

          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:fix-event-depth-scope")] | last | .actor.login' \
            2>/dev/null || echo "unknown")

          SCOPE_LIST=$(paste -sd',' /tmp/changed_stories.txt 2>/dev/null || echo "")
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label_applied_by=${LABEL_USER} reason=${REASON} scope_files=${SCOPE_LIST} timestamp=${TS}"

          BODY=$(printf '%s\n\n%s' \
            "$AUDIT" \
            "> i ADR-024 Amendment 3 §결정 6.C — audit trail 자동 발의. fix-event-depth-scope-presence lint skip (hotfix-bypass:fix-event-depth-scope label 활성).")
          gh pr comment "$PR_NUMBER" --body "$BODY"
