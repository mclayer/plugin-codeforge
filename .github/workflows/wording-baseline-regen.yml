name: wording-baseline-regen
# CFP-1561 (설계 E) — wording-dictionary-baseline.yaml single-writer 재생성 job.
#
# 목적: docs/wording-dictionary-baseline.yaml 은 "DO NOT EDIT BY HAND" (single-writer =
#   scripts/check-wording-dictionary.sh --write-baseline). Windows 로컬 재생성은 grep -P /
#   declare -A / locale false-oracle 라 authoritative 재생성 = ubuntu CI 전용. 본 job 이
#   그 single-writer 채널이다 — full-scope 재스캔 후 baseline 을 artifact 로 산출한다.
#
# 실행 채널: workflow_dispatch (merge 후 수동 재생성) + pull_request (본 PR 에서 1회 실측 실행 —
#   신규 workflow 는 default branch 부재로 workflow_dispatch 불가하므로 pull_request 로 born-execute).
#
# born-broken 가드 (CFP-2635/2761/881/2762 4회 재발 교훈):
#   ① 최소 self-test — 재생성 baseline 이 valid yaml 구조 + active-scope(6 non-archive 파일) record 0
#      을 inline validate (아래 "Self-validate" step). active>0 이면 job FAIL (hollow/born-red 봉인).
#   ② 실제 1회 실행 — pull_request 트리거로 본 PR 에서 ubuntu 실측 실행 (artifact 로 결과 확보).
#   · self-test 는 inline (별도 tests/scripts/*.sh corpus 파일 아님) → selftest-execution-liveness
#     bijection(tests/scripts/*.sh 대상) 무영향. inline 이라 매 트리거 실행 = silent-un-run 구조적 부재.
#
# single-writer 규율: 본 job 은 baseline 을 artifact 로만 산출 (auto-commit-back 안 함 — GITHUB_TOKEN
#   push 는 required check 재트리거 불가 → merge 차단 gotcha). authoritative baseline commit 은 산출
#   artifact 를 normal push 로 반영 (script-generated bytes = 수기편집 아님, single-writer 존중).

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'docs/**'
      - 'archive/adr/**'
      - 'CLAUDE.md'
      - 'templates/**'
      - 'scripts/check-wording-dictionary.sh'
      - 'docs/wording-dictionary-baseline.yaml'
      - '.github/workflows/wording-baseline-regen.yml'

permissions:
  contents: read

jobs:
  wording-baseline-regen:
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON_LINUX_JSON || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Generator self-test (reuse proven --self-test — CFP-2154 counter-case fixture)
        run: bash scripts/check-wording-dictionary.sh --self-test

      - name: Regenerate baseline (single-writer — --write-baseline)
        run: bash scripts/check-wording-dictionary.sh --write-baseline

      - name: Self-validate regenerated baseline (born-broken guard — valid yaml + active-scope==0)
        run: |
          python3 - <<'PY'
          import sys
          path = "docs/wording-dictionary-baseline.yaml"
          text = open(path, encoding="utf-8").read()
          # (1) schema header / structure presence
          assert "schema_version:" in text, "missing schema_version"
          assert "grandfathered_violations:" in text, "missing grandfathered_violations key"
          # (2) parse block records (content values are unquoted '- ...' so std yaml won't load; parse manually)
          recs = []
          cur = None
          for ln in text.split("\n"):
              if ln.startswith("- file: "):
                  if cur:
                      recs.append(cur)
                  cur = {"file": ln[len("- file: "):]}
              elif ln.startswith("  word: ") and cur is not None:
                  cur["word"] = ln[len("  word: "):]
              elif ln.startswith("  content: ") and cur is not None:
                  cur["content"] = ln[len("  content: "):]
          if cur:
              recs.append(cur)
          frozen = [r for r in recs if r["file"].startswith("archive/adr/")]
          active = [r for r in recs if not r["file"].startswith("archive/adr/")]
          # CFP-1561 G1 active-scope target files (U-2: baseline record 0)
          g1_targets = {
              "CLAUDE.md",
              "docs/orchestrator-playbook.md",
              "docs/domain-knowledge/concept/context-offloading-to-ephemeral-workers.md",
              "docs/domain-knowledge/domain/upgrade-flow/applicability-closure-integrity.md",
              "docs/domain-knowledge/domain/frontend-quality-gate/render-truth-headless-browser.md",
              "docs/inter-plugin-contracts/spawn-event-v1.md",
          }
          print("total records:", len(recs))
          print("frozen (archive/adr):", len(frozen))
          print("active (non-archive/adr):", len(active))
          for r in active:
              print("  ACTIVE-REMAINING:", r["file"], "|", r["word"])
          g1_remaining = [r for r in active if r["file"] in g1_targets]
          if g1_remaining:
              print("FAIL: CFP-1561 G1 active-scope target files still carry baseline records:", len(g1_remaining))
              sys.exit(1)
          # active records outside the G1 target set are reported (other slices), not failed here.
          print("PASS: valid baseline + CFP-1561 G1 active-scope==0 (U-2 met)")
          PY

      - name: Report frozen-scope census (G2~G5 signal)
        run: |
          echo "regenerated baseline record census:"
          grep -c '^- file: ' docs/wording-dictionary-baseline.yaml || true
          echo "frozen (archive/adr) records:"
          grep -c '^- file: archive/adr/' docs/wording-dictionary-baseline.yaml || true

      - name: Upload regenerated baseline artifact (authoritative single-writer output)
        uses: actions/upload-artifact@v4
        with:
          name: wording-dictionary-baseline
          path: docs/wording-dictionary-baseline.yaml
          if-no-files-found: error
