name: infra-resource-manifest-drift
# CFP-2700 (Epic) G2 / ADR-157 §결정3(D3) + §결정6(D4) — infra-resource manifest drift scan 의
#   TDD self-test + dogfood drift lint 의 CI 실행 채널. manifest(.claude/_overlay/project.yaml
#   infra_resources:)가 선언한 인프라 자원과 실 참조면(workflow secrets. / project.yaml _env: /
#   scripts 정적 리터럴)을 대조해 미선언 표면(drift 원천)·orphan(dead 선언)을 census-floor oracle 로
#   검출한다. wrapper 실 secret 전체를 자기 자신에게 먼저 스캔(none 위장 anti-hollow dogfood — 목록·수
#   SSOT = manifest resources[] 실내용, 주석 수치 열거 금지: CFP-2697 citation-drift 선례).
#
# scanner SSOT = scripts/lib/check_infra_resource_drift.py (python3 stdlib only, born-safe 라인 파서).
#   thin wrapper = scripts/check-infra-resource-drift.sh (ADR-061 python3 exec forward).
#
# wrapper-self-only (consumer red 회피 — decision-record-disposition-test.yml /
#   selftest-execution-liveness-test.yml 선례): job-level
#   `if: github.repository == 'mclayer/plugin-codeforge'` — wrapper self-CI 에서만 실행.
#   consumer 상속 시 byte-identical template(job-level if:)로 inert(job skip). ADR-130 graceful no-op 정합.
#
# byte-identical parity: templates/github-workflows/infra-resource-manifest-drift.yml ↔
#   .github/workflows/infra-resource-manifest-drift.yml 는 byte-identical (ADR-005,
#   invariant-check.yml Workflow parity step).
#
# ★ NO on.paths filter (vacuous-pass 방지 규범⑤): scanner/manifest 파일 미변경 PR 이라도, 워크플로에
#   미선언 secret 을 추가하는 PR 은 반드시 스캔돼야 하므로 path-filter 를 두지 않는다(전 PR 스캔).
#
# day-1 hard-fail (continue-on-error 금지): self-test 실패 = job red(visible). 판별력 채널은 hollow 로
#   새지 않도록 실패를 삼키지 않는다. self-test 파일 부재 시(QADev 착지 전)만 hashFiles 가드로 skip.
# dogfood drift lint = warning-tier(continue-on-error:true) — advisory, PR 미차단.
# G5 (ADR-157 §결정4): cross-repo drift 대조 self-test(.sh+.py, 실 네트워크 0 — fetch·Issue seam 은
#   mock-repo fixture 로 stub) + dogfood `--cross-repo` step(CODEFORGE_CROSS_REPO_PAT 주입, read-WRITE
#   PAT 를 read-only 로 사용 — ac-traceability-matrix.yml 선례). wrapper-self 는 namespace 자원 0 =
#   vacuous PASS. cross-repo failure-mode(content-mismatch/403·404/token 부재)는 fail-closed. base/G3 step 무손상.
# non-required (branch-protection 7-tuple[ADR-145 §결정3] 무변경 — 신규 required context 0).
#   required 승격 = ADR-060 evidence-gate promotion 별도 carrier(defer).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  infra-resource-manifest-drift:
    name: infra-resource-manifest-drift
    if: github.repository == 'mclayer/plugin-codeforge'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run infra-resource-drift self-test (.sh — day-1 hard-fail, QADev 착지 전 hashFiles 가드)
        if: hashFiles('tests/scripts/test_check-infra-resource-drift.sh') != ''
        run: bash tests/scripts/test_check-infra-resource-drift.sh

      - name: Run infra-resource-drift self-test (.py — day-1 hard-fail, QADev 착지 전 hashFiles 가드)
        if: hashFiles('tests/scripts/test_check-infra-resource-drift.py') != ''
        run: python3 tests/scripts/test_check-infra-resource-drift.py

      # ── G3 (CFP-2700 / ADR-157 §결정1+§결정2): manifest schema validator(AC-2) +
      #    D2 startup fail-closed reference-impl(AC-3/9/15) + refimpl fixture pair(AC-19) self-test.
      #    별도 step 으로 G2 스캐너 self-test 와 분리 (실패 지점 즉시 판독). day-1 hard-fail.
      - name: Run infra-startup-failclosed self-test (.sh — G3, day-1 hard-fail, hashFiles 가드)
        if: hashFiles('tests/scripts/test_infra-startup-failclosed.sh') != ''
        run: bash tests/scripts/test_infra-startup-failclosed.sh

      - name: Run infra-startup-failclosed self-test (.py — G3, day-1 hard-fail, hashFiles 가드)
        if: hashFiles('tests/scripts/test_infra-startup-failclosed.py') != ''
        run: python3 tests/scripts/test_infra-startup-failclosed.py

      # ── G5 (CFP-2700 / ADR-157 §결정4): cross-repo drift 대조 self-test (.sh + .py). 실 네트워크 0 —
      #    fetch·Issue-발행 seam(INFRA_CROSS_REPO_FETCH_ROOT / INFRA_CROSS_REPO_ISSUE_SINK)을 mock-repo
      #    fixture 로 stub. 별도 step 으로 G2/G3 self-test 와 분리(실패 지점 즉시 판독). day-1 hard-fail.
      #    .sh = ADR-151 인벤토리 enroll 채널 / .py = 보완 채널(disjoint).
      - name: Run infra-cross-repo-drift self-test (.sh — G5, day-1 hard-fail, hashFiles 가드)
        if: hashFiles('tests/scripts/test_infra-cross-repo-drift.sh') != ''
        run: bash tests/scripts/test_infra-cross-repo-drift.sh

      - name: Run infra-cross-repo-drift self-test (.py — G5, day-1 hard-fail, hashFiles 가드)
        if: hashFiles('tests/scripts/test_infra-cross-repo-drift.py') != ''
        run: python3 tests/scripts/test_infra-cross-repo-drift.py

      # G3 dogfood: wrapper-self manifest 의 4 필수 필드 schema (AC-2) + D2 채택 선언 (AC-15 —
      #   wrapper = declarative-only 라 adopted:false + reason 비적용 PASS 경로). day-1 hard-fail
      #   (결정적 검증 — 자기 manifest 가 자기 게이트를 못 넘으면 born-red 자기부정).
      - name: Validate wrapper-self manifest schema + adoption declaration (G3 dogfood — hard-fail)
        run: |
          python3 scripts/lib/check_infra_manifest_schema.py --manifest .claude/_overlay/project.yaml
          python3 scripts/lib/infra_startup_validator.py --adoption-check --manifest .claude/_overlay/project.yaml

      - name: Run dogfood infra-resource drift lint (warning-tier — advisory, PR 미차단)
        id: lint
        continue-on-error: true
        run: |
          bash scripts/check-infra-resource-drift.sh --repo-root . 2>&1 | tee lint-output.txt
          exit ${PIPESTATUS[0]}

      # ── G5 dogfood cross-repo drift 대조 (CFP-2700 / ADR-157 §결정4) — 실 gh api 경로.
      #    CODEFORGE_CROSS_REPO_PAT 주입(ac-traceability-matrix.yml 선례 — read-WRITE PAT 를 read-only 로
      #    contents fetch 에만 사용). wrapper-self 는 namespace 선언 자원 0 = vacuous PASS(exit 0).
      #    failure-mode(content-mismatch / 403·404 / token 부재)는 fail-closed 라 continue-on-error 없음
      #    (non-required 7-tuple 무변경 = PR 미차단, red 로 surfacing). foreign transient 만 fail-open+Issue.
      #    static-parse-only(fetch 콘텐츠 실행/eval 0) + secret-masking(PAT 값 로그 미출력). 3rd-party
      #    action 무추가(pure bash + gh preinstalled) — 신규 action pin 불요(base scan step 무손상).
      - name: Run dogfood cross-repo drift check (G5 — fail-closed, non-required)
        env:
          CODEFORGE_CROSS_REPO_PAT: ${{ secrets.CODEFORGE_CROSS_REPO_PAT }}
        run: bash scripts/check-infra-resource-drift.sh --repo-root . --cross-repo
