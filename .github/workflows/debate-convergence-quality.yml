name: Debate convergence quality (warning mode)
# CFP-582 Phase 2 / ADR-059 Amendment 2 §결정 8 — Evidence-enforceable framework warning-tier entry
# convergence_quality_invariant 3 marker pattern mechanical enforcement:
#   [COUNTERARGUMENT] / [ALTERNATIVE_PROPOSED] / [DEBATE_PURPOSE_STATEMENT]
# Tier: warning (continue-on-error, non-required check)
# Bypass channel: hotfix-bypass:debate-convergence-quality label (ADR-024 Amendment 3 + ADR-060 §결정 7)
# Script SSOT: scripts/check_debate_convergence_quality.py
#
# 승격 path:
#   warning → blocking-on-pr 승격 시 CFP-NNN carrier PR 이 다음 변경 동반 의무:
#     1. 본 workflow 의 `continue-on-error: true` 제거
#     2. branch protection `required_status_checks.contexts` 에 본 workflow job name 추가
#        (ADR-024 Amendment 2 / branch-protection-manifest.yaml SSOT 정합)
#     3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d) + evidence-checks-registry.yaml promotion_criteria)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'docs/stories/*.md'
      - 'wrapper/stories/*.md'
      - 'scripts/check_debate_convergence_quality.py'

permissions:
  pull-requests: write
  contents: read

jobs:
  debate-convergence-quality:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — lint fail 이 PR merge 차단하지 않음.
    # required_status_checks.contexts 부착 X.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Detect changed Story files
        id: changed
        run: |
          set -euo pipefail
          # Story 파일 변경 탐지 — docs/stories/*.md 또는 wrapper/stories/*.md
          git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^(docs/stories/[^/]+\.md|wrapper/stories/[^/]+\.md)$' \
            > /tmp/changed_stories.txt || true
          if [ -s /tmp/changed_stories.txt ]; then
            echo "has_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "=== Changed Story files ==="
          cat /tmp/changed_stories.txt || echo "(none)"

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "labels=$labels"
          case ",$labels," in
            *,hotfix-bypass:debate-convergence-quality,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run debate convergence quality lint
        id: lint
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'false'
        run: |
          set +e
          overall_status=0
          while IFS= read -r story_file; do
            python scripts/check_debate_convergence_quality.py "$story_file" 2>&1 | tee -a /tmp/lint.out
            file_status=${PIPESTATUS[0]}
            if [ "$file_status" -eq 1 ]; then
              overall_status=1
            elif [ "$file_status" -eq 2 ]; then
              overall_status=2
            fi
          done < /tmp/changed_stories.txt
          echo "exit_status=$overall_status" >> "$GITHUB_OUTPUT"
          exit 0  # continue-on-error 정합 — fail 이어도 다음 step 진행

      - name: Post lint result comment (sticky)
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/lint.out 2>/dev/null || echo '(lint output 부재)')"
          if [ "${LINT_STATUS:-1}" = "0" ]; then
            HEADER="## OK Debate convergence quality lint — PASS (warning mode)"
            FOOTER="violation 0건. ADR-059 Amendment 2 §결정 8 convergence_quality_invariant 3 marker pattern 정합."
          else
            HEADER="## WARN Debate convergence quality lint — violation 감지 (warning mode)"
            FOOTER="warning mode (CFP-582 / ADR-059 Amendment 2 §결정 8 / ADR-060 §결정 5): lint fail 이 PR merge 를 차단하지 않습니다. Story §9 debate transcript 내 [COUNTERARGUMENT] / [ALTERNATIVE_PROPOSED] / [DEBATE_PURPOSE_STATEMENT] marker 를 추가하거나 bypass label 부착하세요. hotfix bypass channel (ADR-024 Amendment 3): hotfix-bypass:debate-convergence-quality label + PR description Bypass reason 본문 → lint skip."
          fi
          BODY=$(printf '%s\n\n```\n%s\n```\n\n%s\n\n%s' \
            "$HEADER" "$LINT_OUT" "$FOOTER" \
            "> i 본 workflow = **warning mode** (continue-on-error). PR merge 미차단. 승격 gate (ADR-060 §결정 6) 통과 후 blocking 전환.")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Emit bypass audit comment (label applied)
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # Schema: ADR-060 §결정 8 verbatim
          # [hotfix-bypass-audit] PR=<n> label_applied_by=<user> reason=<reason>
          # scope_files=<paths> timestamp=<ISO8601>

          # bypass reason 추출 — PR description 의 `### Bypass reason` 섹션 본문
          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' 섹션 부재 — 후속 보완 의무)"
          fi

          # label applied_by — 가장 최근 labeled event 의 actor
          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:debate-convergence-quality")] | last | .actor.login' \
            2>/dev/null || echo "unknown")

          # scope file list
          SCOPE_LIST=$(paste -sd',' /tmp/changed_stories.txt 2>/dev/null || echo "")

          # ISO8601 UTC Z suffix
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label_applied_by=${LABEL_USER} reason=${REASON} scope_files=${SCOPE_LIST} timestamp=${TS}"

          BODY=$(printf '%s\n\n%s' \
            "$AUDIT" \
            "> i ADR-024 Amendment 3 §결정 6.C — audit trail. \`hotfix-bypass:debate-convergence-quality\` label 부착 감지 → lint skip. bypass reason 기록 의무.")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Audit assertion (bypass label 부착 시)
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BYPASS_LABEL_PREFIX: 'hotfix-bypass:'
        run: |
          # warning mode 시점 — audit assertion fail 도 continue-on-error 정합.
          set +e
          bash scripts/check-bypass-audit-comment.sh
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "WARN audit assertion FAIL (warning mode — PR merge 미차단)"
          fi
          exit 0
