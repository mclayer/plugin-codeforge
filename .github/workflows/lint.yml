name: lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck (regen-agents.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: shellcheck overlay/hooks/regen-agents.sh

  script-exec-bit:
    name: script exec bit (CFP-74 invariant)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify directly-invoked scripts have 100755 mode
        run: bash scripts/check-script-exec-bit.sh

  markdown-links:
    name: markdown internal links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check internal links in markdown
        run: python3 scripts/check-markdown-links.py

  agent-frontmatter:
    name: agent frontmatter contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Validate role:dev tag on dev agents + presence of required fields
        run: |
          python3 <<'EOF'
          import sys, yaml
          from pathlib import Path

          REQUIRED = {"name", "description"}
          # CFP-39 ζ arc 후 dev agents + presets 가 codeforge-develop plugin 으로 이전.
          # 본 lint 는 wrapper 에 남은 agents 만 검증.
          DEV_EXPECTED_IN_CORE = set()  # CFP-39: 이전 {Developer/DataEngineer/InfraEngineer} 제거
          DEV_EXPECTED_IN_PRESETS = set()  # CFP-39: presets 도 plugin 으로 이전

          failed: list[str] = []

          # Core agents
          for md in Path("agents").glob("*.md"):
              raw = md.read_text(encoding="utf-8")
              if not raw.startswith("---\n"):
                  failed.append(f"{md}: no frontmatter")
                  continue
              fm_text = raw.split("\n---\n", 1)[0][4:]
              fm = yaml.safe_load(fm_text)
              if not isinstance(fm, dict):
                  failed.append(f"{md}: frontmatter not a mapping")
                  continue
              missing = REQUIRED - fm.keys()
              if missing:
                  failed.append(f"{md}: missing required fields: {missing}")
              if fm.get("name") in DEV_EXPECTED_IN_CORE and fm.get("role") != "dev":
                  failed.append(f"{md}: expected role:dev, got {fm.get('role')}")

          # Preset agents (skip — CFP-39 후 presets 가 codeforge-develop plugin 으로 이전)
          for path_str in DEV_EXPECTED_IN_PRESETS:
              md = Path(path_str)
              if not md.exists():
                  failed.append(f"{md}: missing preset agent file")
                  continue
              raw = md.read_text(encoding="utf-8")
              fm_text = raw.split("\n---\n", 1)[0][4:]
              fm = yaml.safe_load(fm_text)
              if fm.get("role") != "dev":
                  failed.append(f"{md}: preset agent must have role:dev, got {fm.get('role')}")

          if failed:
              print("\n".join(failed))
              sys.exit(1)
          print("all agent frontmatter checks passed")
          EOF

  write-permission-redistribution:
    name: write permission redistribution invariant (CFP-26)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run check-write-permission-redistribution.sh
        run: bash scripts/check-write-permission-redistribution.sh

  doc-frontmatter:
    name: doc frontmatter schema (CFP-28 — strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Run check-doc-frontmatter.sh
        run: bash scripts/check-doc-frontmatter.sh

  doc-section-schema:
    name: doc section schema (CFP-28 — strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run check-doc-section-schema.sh
        run: bash scripts/check-doc-section-schema.sh

  hook-unit-tests:
    name: hook unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install pytest
      - name: Run hook unit tests
        run: pytest hooks/tests overlay/hooks/tests -q
