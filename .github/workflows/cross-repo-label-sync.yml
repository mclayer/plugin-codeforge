# templates/github-workflows/cross-repo-label-sync.yml
# Status: Wave 1 declarative skeleton (CFP-1336 / ADR-073 Amendment 9 + ADR-082 Amendment 14 + ADR-066 Amendment 4 carrier)
# Phase: Declaration only — Wave 2 별 sub-CFP carrier 가 trigger event binding + step hydration + bats fixture pair + lint script + impl repo listener seed
#
# Paired sibling 3 ADR Amendment 동시 발의 (CFP-1336 carrier, axis disjoint complement 3-set):
#   - ADR-073 Amendment 9 §결정 1-A 9번째 entry `label_change` + §결정 1-M cross-repo label state verify-before-assert 4-step primitive (verify subject layer)
#   - ADR-082 Amendment 14 §결정 1 layer 1 sub-scope (1-D) cross-repo label-write authority 4-tuple verify primitive (write authority layer)
#   - ADR-066 Amendment 4 §결정 2 scope minimum 6번째 entry `cross-repo-target-repos issues:write (label endpoint)` PAT scope grant (PAT scope grant layer)
#
# Wave 2 mechanical wire 후 hydrate 필수 elements:
#   - peter-evans/repository-dispatch@<SHA-pin> Tier B sender step (CFP-300 action SHA pin policy 정합)
#   - 4-pattern T-2 self-trigger guard AND invariant step (sender.type early-exit / actor-allowlist / [skip-cross-repo-sync] marker / idempotent diff)
#   - verify-before-assert 4-step (git fetch + gh api direct + Story §14 + active_sessions[] dual-source AND + verified-via annotation)
#   - audit comment [CROSS-REPO-SYNC] prefix (comment-prefix-registry-v1 v1.4 15번째 entry)
#   - cross-org sync 차단 (workflow level `if: github.repository_owner == 'mclayer'` strict)
#   - PAT scope grant verify-before-trust (CODEFORGE_CROSS_REPO_PAT scope = cross-repo-target-repos issues:write)
#   - bats fixture pair (cross-org reject / 4-pattern T-2 guard individual step fail / idempotent diff)
#   - lint script `scripts/check-cross-repo-label-sync.sh` (Wave 2 carrier)
#   - evidence-checks-registry `cross-repo-label-sync` entry status: deferred-followup → warning 자동 승격
#
# CFP-1302 D-4 chief tie-break dissent carry-over F2 carrier — within-repo GITHUB_TOKEN 결정 (phase-gate-auto-cleanup.yml) 시 cross-repo path 별 carrier 분리 (axis disjoint follow-up F2 carrier scope split — within-repo synchronous ↔ cross-repo asynchronous + PAT-mediated).

name: cross-repo-label-sync  # Wave 1 declare — Wave 2 wire 시 actual trigger event binding (issues.labeled / issues.unlabeled / pull_request.labeled / pull_request.unlabeled / repository_dispatch listener)

on:
  workflow_dispatch:  # Wave 1 = manual-only (Wave 2 actual = issues.labeled / pull_request.labeled / repository_dispatch type:cross-repo-label-sync)

permissions:
  contents: read       # default least-privilege
  issues: read         # Wave 2 wire 시 cross-repo PAT 가 issues:write scope override (CODEFORGE_CROSS_REPO_PAT scope = cross-repo-target-repos issues:write, ADR-066 Amendment 4 §결정 2 6번째 entry)
  pull-requests: read  # bidirectional sync 대상 PR label 인용 (read-only via GITHUB_TOKEN)

concurrency:
  group: cross-repo-label-sync-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false   # ordering invariant (AC-5 Story §5.2) — race window 안 last-write-wins, in-flight write 진행 보존

jobs:
  cross-repo-label-sync:
    # Wave 1 = declarative skeleton (no actual steps wire). Wave 2 carrier 가 hydrate.
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'mclayer' }}   # cross-org sync 차단 (ADR-082 sub-scope 1-D (c) strict)
    timeout-minutes: 5   # per-step 30s timeout per gh api call (§7.4.2 rate-limit budget 보존)
    steps:
      - name: Wave 1 declarative skeleton placeholder
        run: |
          echo "::notice::cross-repo-label-sync.yml Wave 1 declarative skeleton — Wave 2 별 sub-CFP carrier 가 trigger event binding + step hydration + bats fixture pair + lint script + impl repo listener seed + PAT scope grant actual."
          echo "::notice::verify-before-assert 4-step (ADR-073 Amendment 9 §결정 1-A 9th row label_change + §결정 1-M primitive) = Wave 2 wire."
          echo "::notice::4-pattern T-2 self-trigger guard AND invariant (ADR-073 Amendment 9 §결정 1-N) = Wave 2 wire (sender.type early-exit / actor-allowlist / [skip-cross-repo-sync] marker / idempotent diff)."
          echo "::notice::Cross-repo label-write authority 4-tuple verify (ADR-082 Amendment 14 sub-scope 1-D) = Wave 2 wire (wrapper→impl PAT scope verify / impl→wrapper sender.type+actor / cross-org reject / verified-via annotation)."
          echo "::notice::CODEFORGE_CROSS_REPO_PAT scope = cross-repo-target-repos issues:write (label endpoint) — ADR-066 Amendment 4 §결정 2 6th entry. Wave 2 actual grant = docs/security/pat-rotation-log.md 4번째 row pre-clear."
          echo "::notice::Carrier: CFP-1302 D-4 chief tie-break dissent carry-over F2 carrier — within-repo GITHUB_TOKEN 결정 (phase-gate-auto-cleanup.yml) 시 cross-repo path 별 carrier 분리 axis disjoint scope split."
          echo "::notice::See: docs/change-plans/cfp-1336-cross-repo-label-sync.md §3 / §7 / §8 for full SSOT (Wave 1 declarative scope)."
          echo "::notice::Wave 2 별 sub-CFP carrier = workflow yml hydrate + scripts/check-cross-repo-label-sync.sh + tests/scripts/cfp-1336/cfp-1336-*.bats + impl repo listener seed (consumer .github/workflows/cross-repo-label-sync-listener.yml) + PAT scope grant actual."
