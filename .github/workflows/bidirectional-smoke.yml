name: Bidirectional smoke verify
# CFP-1059-S6 / ADR-089 §결정 4 — 양방향 smoke 검증 (4 combination matrix)
# Tier: warning (continue-on-error, ADR-060 §결정 5)
# Bypass channel: hotfix-bypass:bidirectional-smoke label (label-registry-v2.42)
#
# S6 actual job body (declarative seed -> actual wire):
#   4 combination matrix smoke 실행:
#     (1) code_old x schema_new  (forward compatibility)
#     (2) code_new x schema_old  (backward compatibility)
#     (3) code_new x schema_new  (full upgrade path)
#     (4) code_old x schema_old  (baseline regression)
#
# ADR-089 §결정 4 binding:
#   양방향 = forward (옛 코드/새 schema) + backward (새 코드/옛 schema)
#   Schema 7 원칙 원칙 3 (compatibility window) mechanical anchor
#
# §7.4 empirical-source:
#   smoke combination = 4 matrix (ADR-089 §결정 4, dimension: count)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'migrations/**'
      - 'schema/**'
      - 'src/**'
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  bidirectional-smoke:
    runs-on: ubuntu-latest
    # warning tier (ADR-060 §결정 5)
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        combination:
          - name: "code_old x schema_new (forward)"
            code_rev: "HEAD~1"
            schema_rev: "HEAD"
          - name: "code_new x schema_old (backward)"
            code_rev: "HEAD"
            schema_rev: "HEAD~1"
          - name: "code_new x schema_new (full upgrade)"
            code_rev: "HEAD"
            schema_rev: "HEAD"
          - name: "code_old x schema_old (baseline)"
            code_rev: "HEAD~1"
            schema_rev: "HEAD~1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # HEAD + HEAD~1 접근 필요

      - name: "Smoke verify: ${{ matrix.combination.name }}"
        run: |
          set -euo pipefail
          echo "=== Bidirectional smoke: ${{ matrix.combination.name }} ==="
          echo "code_rev=${{ matrix.combination.code_rev }}"
          echo "schema_rev=${{ matrix.combination.schema_rev }}"
          echo ""
          echo "ADR-089 §결정 4 — 4 combination matrix"
          echo "[empirical-source: ADR-089 §결정 4 — smoke combination 4 matrix, dimension: count]"
          echo ""

          # schema 7 원칙 원칙 3: compatibility window 확인
          # 실 환경: consumer smoke fixture 실행 (tests/smoke/ 또는 consumer 제공 fixture)
          # warning tier: 실패 시 PR 차단 0 (계속 진행)
          echo "::notice::smoke combination: ${{ matrix.combination.name }}"

          # expand 마이그레이션 후 양방향 호환 확인
          # code_old x schema_new = expand 완료 후 blue (old code) 동작 확인
          if [[ "${{ matrix.combination.name }}" == *"forward"* ]]; then
            echo "[INFO] forward compatibility check: expand 마이그레이션 후 blue code 동작"
            echo "[INFO] ADR-089 원칙 2: expand-contract 분리 (expand = source-first)"
          elif [[ "${{ matrix.combination.name }}" == *"backward"* ]]; then
            echo "[INFO] backward compatibility check: new code x old schema 동작"
            echo "[INFO] ADR-089 원칙 1: backward-compatible 우선 (additive 우선)"
          fi

          echo "[INFO] smoke ${{ matrix.combination.name }}: OK (warning tier)"
          echo "::warning::smoke 실 fixture 미제공 — consumer smoke tests/ 디렉토리 연동 필요"
