name: ADR sunset criteria (warning mode)
# CFP-389 / ADR-060 / ADR-058 — Evidence-enforceable framework 첫 적용
# Tier: warning (continue-on-error, non-required check)
# Bypass channel: hotfix-bypass:adr-sunset label (ADR-024 Amendment 3 + ADR-060 §결정 7)
#
# 승격 path:
#   warning → blocking-on-pr 승격 시 CFP-NNN carrier PR 가 다음 변경 동반 의무:
#     1. 본 workflow 의 `continue-on-error: true` 제거
#     2. branch protection `required_status_checks.contexts` 에 본 workflow job name 추가
#        (ADR-024 Amendment 2 / branch-protection-manifest.yaml SSOT 정합)
#     3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d) + evidence-checks-registry.yaml promotion_criteria)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'docs/adr/ADR-*.md'
      - 'archive/adr/ADR-*.md'

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  adr-sunset-criteria:
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON_LINUX_JSON || '["ubuntu-latest"]') }}
    # warning mode (ADR-060 §결정 5) — lint fail 이 PR merge 차단하지 않음.
    # required_status_checks.contexts 부착 X.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pyyaml
        run: python3 -m pip install --user pyyaml

      - name: Detect changed ADR files
        id: changed
        run: |
          set -euo pipefail
          git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^(docs|archive)/adr/ADR-.*\.md$' \
            | grep -v 'ADR-RESERVATION.md' \
            > /tmp/changed_adrs.txt || true
          if [ -s /tmp/changed_adrs.txt ]; then
            echo "has_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "=== Changed ADR files ==="
          cat /tmp/changed_adrs.txt || echo "(none)"

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "labels=$labels"
          case ",$labels," in
            *,hotfix-bypass:adr-sunset,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run sunset criteria lint
        id: lint
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'false'
        run: |
          set +e
          mapfile -t adrs < /tmp/changed_adrs.txt
          bash scripts/check-adr-sunset-criteria.sh "${adrs[@]}" 2>&1 | tee /tmp/lint.out
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit 0  # continue-on-error 정합 — fail 이어도 다음 step 진행

      - name: Post lint result comment (sticky)
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/lint.out 2>/dev/null || echo '(lint output 부재)')"
          if [ "${LINT_STATUS:-1}" = "0" ]; then
            HEADER="## ✓ ADR sunset criteria lint — PASS (warning mode)"
            FOOTER="violation 0건. ADR-058 §결정 1-3 정합."
          else
            HEADER="## ⚠ ADR sunset criteria lint — violation 감지 (warning mode)"
            FOOTER=$'**warning mode (CFP-389 / ADR-060 §결정 5)**: lint fail 이 PR merge 를 차단하지 않습니다. 의도된 결과인지 확인 + 다음 commit 으로 해소 또는 bypass label 부착.\n\n**hotfix bypass channel** (ADR-024 Amendment 3): 운영 장애 hotfix 시 `hotfix-bypass:adr-sunset` label 부착 → lint skip + audit comment 자동 발의 (권한자 = repo admin).'
          fi
          BODY=$(printf '%s\n\n```\n%s\n```\n\n%s\n\n%s' \
            "$HEADER" "$LINT_OUT" "$FOOTER" \
            "> ⓘ 본 workflow = **warning mode** (continue-on-error). PR merge 미차단. 승격 gate (ADR-060 §결정 6) 통과 후 blocking 전환.")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Emit bypass audit comment (label applied)
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # Schema: ADR-060 §결정 8 verbatim
          # [hotfix-bypass-audit] PR=<n> label_applied_by=<user> reason=<reason>
          # ADR_files=<paths> timestamp=<ISO8601>

          # bypass reason 추출 — PR description 의 `### Bypass reason` 섹션 본문
          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' 섹션 부재 — 후속 보완 의무)"
          fi

          # label applied_by — 가장 최근 labeled event 의 actor
          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:adr-sunset")] | last | .actor.login' \
            2>/dev/null || echo "unknown")

          # ADR file list
          ADR_LIST=$(paste -sd',' /tmp/changed_adrs.txt 2>/dev/null || echo "")

          # ISO8601 UTC Z suffix (fix-event-v1 schema clarification 정합)
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label_applied_by=${LABEL_USER} reason=${REASON} ADR_files=${ADR_LIST} timestamp=${TS}"

          # Re-entry 안전망 (EC-D / ADR-060 §결정 8) — bypass PR 자체가 sunset criteria 누락 상태 검사
          set +e
          mapfile -t adrs < /tmp/changed_adrs.txt
          bash scripts/check-adr-sunset-criteria.sh "${adrs[@]}" > /tmp/recurse.out 2>&1
          RECURSE=$?
          set -e
          if [ "$RECURSE" -ne 0 ]; then
            AUDIT=$(printf '%s\n%s' "$AUDIT" \
              "[sunset-criteria-deferred] 변경 ADR 가 sunset criteria 누락 상태 — 후속 보완 의무 Issue 발의 권장 (별도 carrier scope: CFP-390 인벤토리 backfill 또는 신규 carrier)")
          fi

          BODY=$(printf '%s\n\n%s' \
            "$AUDIT" \
            "> ⓘ ADR-024 Amendment 3 §결정 6.C — audit trail 3중 안전망 1차 (audit comment 자동 발의). assertion lint = \`scripts/check-bypass-audit-comment.sh\`. quarterly merge 시 \`docs/audit/hotfix-bypass-log.md\` 자동 append (별도 carrier scope).")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Audit assertion (bypass label 부착 시)
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # warning mode 시점 — audit assertion fail 도 continue-on-error 정합.
          # enforce mode 진입 시 본 step 의 exit code 가 required check 결정.
          set +e
          bash scripts/check-bypass-audit-comment.sh
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "⚠ audit assertion FAIL (warning mode — PR merge 미차단)"
          fi
          exit 0
