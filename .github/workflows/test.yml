name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  overlay-hooks:
    name: overlay/hooks (merge.py + YAML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest

      - name: Run merge.py unit + E2E tests
        run: pytest overlay/hooks/tests/ -v

      - name: Validate example project.yaml files parse
        run: |
          for yml in examples/*/.claude/_overlay/project.yaml overlay/_overlay/project.yaml.example; do
            echo "checking $yml"
            python3 -c "import yaml; yaml.safe_load(open('$yml'))"
          done

      - name: Smoke test regen-agents.sh against examples
        run: |
          for ex in examples/*/; do
            echo "=== smoke: $ex ==="
            (cd "$ex" && PLUGIN_ROOT="$GITHUB_WORKSPACE" bash "$GITHUB_WORKSPACE/overlay/hooks/regen-agents.sh")
            ls "$ex/.claude/agents/" | wc -l
          done

      - name: Verify all core agent md have valid frontmatter
        run: |
          python3 -c "
          import sys, yaml
          from pathlib import Path

          failed = []
          for md in Path('agents').glob('*.md'):
              raw = md.read_text(encoding='utf-8')
              if not raw.startswith('---\n'):
                  failed.append(f'{md}: no frontmatter')
                  continue
              try:
                  fm_text = raw.split('\n---\n', 1)[0][4:]
                  fm = yaml.safe_load(fm_text)
                  assert isinstance(fm, dict), 'not a mapping'
                  assert 'name' in fm, 'missing name'
                  assert 'description' in fm, 'missing description'
              except Exception as e:
                  failed.append(f'{md}: {e}')

          if failed:
              print('\n'.join(failed))
              sys.exit(1)
          print(f'all {len(list(Path(\"agents\").glob(\"*.md\")))} core agents valid')
          "
