name: KST timestamp display (warning mode)
# CFP-771 / ADR-079 Amendment 1 — KST timestamp display mechanical lint
# Tier: warning (continue-on-error, non-required check)
# Bypass channel: hotfix-bypass:kst-timestamp-display label (ADR-024 Amendment 3 + ADR-060 §결정 7)
# Lint scope: ADR-079 §결정 1 display layer 5 영역 (CLAUDE.md / orchestrator-playbook / ADR / retros)
# Regex SSOT: scripts/lib/check_kst_timestamp.py KST_TS_RE (RFC 3339 §5.6 colon-offset)
#
# 승격 path:
#   warning → blocking-on-pr 승격 시 CFP-NNN carrier PR 가 다음 변경 동반 의무:
#     1. 본 workflow 의 `continue-on-error: true` 제거
#     2. branch protection `required_status_checks.contexts` 에 본 workflow job name 추가
#        (ADR-024 Amendment 2 / branch-protection-manifest.yaml SSOT 정합)
#     3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d) + evidence-checks-registry.yaml promotion_criteria)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'CLAUDE.md'
      - 'docs/orchestrator-playbook.md'
      - 'docs/adr/ADR-*.md'
      - 'archive/adr/ADR-*.md'
      - 'docs/retros/**/*.md'
      - 'wrapper/retros/**/*.md'

permissions:
  pull-requests: write
  contents: read

jobs:
  kst-timestamp-display:
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON_LINUX_JSON || '["ubuntu-latest"]') }}
    # warning mode (ADR-060 §결정 5) — lint fail 이 PR merge 차단하지 않음.
    # required_status_checks.contexts 부착 X.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed scope files
        id: changed
        run: |
          set -euo pipefail
          # 5 scope 영역 grep — EXEMPT_PATHS filter (docs/inter-plugin-contracts/ / spawned_at / returned_at / script self)
          git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^(CLAUDE\.md|docs/orchestrator-playbook\.md|(docs|archive)/adr/ADR-.*\.md|docs/retros/.*\.md|wrapper/retros/.*\.md)$' \
            | grep -v 'docs/inter-plugin-contracts/' \
            | grep -v 'scripts/check-kst-timestamp.sh' \
            | grep -v 'scripts/lib/check_kst_timestamp.py' \
            | grep -v 'tests/scripts/test-check-kst-timestamp.bats' \
            > /tmp/changed_scope.txt || true
          if [ -s /tmp/changed_scope.txt ]; then
            echo "has_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "=== Changed scope files ==="
          cat /tmp/changed_scope.txt || echo "(none)"

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "labels=$labels"
          case ",$labels," in
            *,hotfix-bypass:kst-timestamp-display,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run KST timestamp display lint
        id: lint
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'false'
        run: |
          set +e
          mapfile -t files < /tmp/changed_scope.txt
          bash scripts/check-kst-timestamp.sh "${files[@]}" 2>&1 | tee /tmp/lint.out
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit 0  # continue-on-error 정합 — fail 이어도 다음 step 진행

      - name: Post lint result comment (sticky)
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/lint.out 2>/dev/null || echo '(lint output 부재)')"
          if [ "${LINT_STATUS:-1}" = "0" ]; then
            HEADER="## OK KST timestamp display lint — PASS (warning mode)"
            FOOTER="violation 0건. ADR-079 Amendment 1 KST display layer 5 scope 정합."
          else
            HEADER="## WARN KST timestamp display lint — violation 감지 (warning mode)"
            FOOTER=$'**warning mode (CFP-771 / ADR-060 §결정 5)**: lint fail 이 PR merge 를 차단하지 않습니다. display layer timestamp 는 `+09:00` colon-offset 사용 필수 (ADR-079 §결정 1).\n\n위반 수정 예: `2026-05-16T18:50:50Z` → `2026-05-16T18:50:50+09:00`\n\n**hotfix bypass channel** (ADR-024 Amendment 3): 운영 장애 hotfix 시 `hotfix-bypass:kst-timestamp-display` label 부착 + PR description `### Bypass reason` 본문 작성 → lint skip + audit comment 자동 발의 (권한자 = repo admin).'
          fi
          BODY=$(printf '%s\n\n```\n%s\n```\n\n%s\n\n%s' \
            "$HEADER" "$LINT_OUT" "$FOOTER" \
            "> i 본 workflow = **warning mode** (continue-on-error). PR merge 미차단. 승격 gate (ADR-060 §결정 6) 통과 후 blocking 전환.")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Emit bypass audit comment (label applied)
        if: steps.changed.outputs.has_changed == 'true' && steps.bypass.outputs.bypass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # Schema: ADR-060 §결정 8 verbatim
          # [hotfix-bypass-audit] PR=<n> label_applied_by=<user> reason=<reason>
          # scope_files=<paths> timestamp=<ISO8601>

          # bypass reason 추출 — PR description 의 `### Bypass reason` 섹션 본문
          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' 섹션 부재 — 후속 보완 의무)"
          fi

          # label applied_by — 가장 최근 labeled event 의 actor
          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:kst-timestamp-display")] | last | .actor.login' \
            2>/dev/null || echo "unknown")

          # scope file list
          SCOPE_LIST=$(paste -sd',' /tmp/changed_scope.txt 2>/dev/null || echo "")

          # ISO8601 UTC Z suffix (fix-event-v1 schema clarification 정합 — audit metadata 는 non-authoritative runtime/audit)
          # §7.4 note: 본 audit timestamp 는 workflow 내 inherited `date -u` 사용 = non-authoritative runtime/audit metadata.
          # Display layer (ADR-079 §결정 1) 강제 영역 외 (machine-layer 해당). P2 note: design-7.4-clock-skew-refinement.
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label_applied_by=${LABEL_USER} reason=${REASON} scope_files=${SCOPE_LIST} timestamp=${TS}"

          BODY=$(printf '%s\n\n%s' \
            "$AUDIT" \
            "> i ADR-024 Amendment 3 §결정 6.C — audit trail 3중 안전망 1차 (audit comment 자동 발의). scope_files 경로의 timestamp offset 위반은 hotfix-bypass label 기간 중 lint skip 됨.")
          gh pr comment "$PR_NUMBER" --body "$BODY"
