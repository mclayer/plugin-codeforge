# BEGIN wrapper-managed
# CFP-1057 / ADR-085 §결정 3 — lane-entry sentinel ownership verify workflow
# evidence-checks-registry entry: lane-entry-ownership-verify (warning tier)
# ADR-073 Amendment 2 polling enum 4번째 source `active_sessions_check` cross-ref.
name: lane-entry-ownership-verify
on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: read
jobs:
  check:
    runs-on: ubuntu-latest
    continue-on-error: true  # warning tier (ADR-060 §결정 5)
    steps:
      - uses: actions/checkout@v4
      - name: Verify lane-entry ownership on PR head branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          if [[ -z "$branch" ]]; then
            echo "::warning::branch name not resolved — skip"
            exit 0
          fi
          # Find expected author from PR
          expected="${PR_AUTHOR:-}"
          if [[ -z "$expected" && -n "${GITHUB_EVENT_PATH:-}" && -f "$GITHUB_EVENT_PATH" ]]; then
            expected=$(python3 -c "import json,sys; d=json.load(open('$GITHUB_EVENT_PATH')); print((d.get('pull_request') or {}).get('user', {}).get('login', ''))")
          fi
          if [[ -n "$expected" ]]; then
            bash scripts/check-lane-entry-ownership.sh --branch "$branch" --repo "${GITHUB_REPOSITORY}" --expected-author "$expected"
          else
            bash scripts/check-lane-entry-ownership.sh --branch "$branch" --repo "${GITHUB_REPOSITORY}"
          fi
# END wrapper-managed
