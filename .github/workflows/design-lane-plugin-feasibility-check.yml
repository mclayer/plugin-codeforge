name: Design lane plugin feasibility check (warning mode)
# CFP-1367 / ADR-107 Amendment 1 §결정 2 — F2 design-lane-plugin-feasibility-check
# ADR-060 §결정 5 — warning-tier (continue-on-error, non-required check, PR merge 미차단)
# Bypass channel: hotfix-bypass:design-lane-plugin-feasibility label (ADR-024 Amendment 8 per-entry namespace)
#
# 검사: Design lane PR (phase:설계 또는 phase:설계-리뷰 label 부착 PR) 안에서
#       ArchitectAgent §3 cross-repo plugin path 인용에 [verified-via: ...] annotation presence 검사.
#       annotation 누락 → [WARN] advisory (warning-tier, PR merge 미차단)
#
# 승격 path (warning → blocking-on-pr):
#   1. 본 workflow continue-on-error: true 제거
#   2. branch protection required_status_checks.contexts 에 본 job 추가
#   3. evidence 3 산출물 제출 (ADR-060 §결정 6 + evidence-checks-registry.yaml)

on:
  pull_request:
    types: [labeled, opened, synchronize, reopened, unlabeled]
  workflow_dispatch:
    inputs:
      doc_file:
        description: 'Story or Change Plan file to check'
        required: false
        default: ''

permissions:
  pull-requests: write
  contents: read

jobs:
  design-lane-plugin-feasibility:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — lint fail 이 PR merge 차단하지 않음.
    continue-on-error: true
    # F2 detection trigger: phase:설계 or phase:설계-리뷰 label 부착 PR 한정
    # workflow_dispatch 시 무조건 실행 (수동 override)
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'phase:설계') ||
      contains(github.event.pull_request.labels.*.name, 'phase:설계-리뷰')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check bypass label
        id: bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [ -z "${PR_NUMBER:-}" ]; then
            echo "bypass=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          labels=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "labels=$labels"
          case ",$labels," in
            *,hotfix-bypass:design-lane-plugin-feasibility,*)
              echo "bypass=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "bypass=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Detect changed story/change-plan files
        id: changed
        if: steps.bypass.outputs.bypass == 'false'
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD" \
              | grep -E '^(wrapper/stories/|docs/stories/|docs/change-plans/|wrapper/change-plans/).+\.md$' \
              > /tmp/changed_story_files.txt || true
          else
            # workflow_dispatch: use provided doc_file if set
            DOC_FILE="${{ inputs.doc_file || '' }}"
            if [ -n "$DOC_FILE" ] && [ -f "$DOC_FILE" ]; then
              echo "$DOC_FILE" > /tmp/changed_story_files.txt
            else
              > /tmp/changed_story_files.txt
            fi
          fi
          if [ -s /tmp/changed_story_files.txt ]; then
            echo "has_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "=== Changed story/change-plan files ==="
          cat /tmp/changed_story_files.txt || echo "(none)"

      - name: Run design lane plugin feasibility lint
        id: lint
        if: steps.bypass.outputs.bypass == 'false' && steps.changed.outputs.has_changed == 'true'
        run: |
          set +e
          LINT_COMBINED=""
          EXIT_MAX=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            OUT=$(python3 scripts/lib/check_design_lane_plugin_feasibility.py \
              --doc-file "$f" 2>&1)
            STATUS=$?
            LINT_COMBINED="${LINT_COMBINED}=== ${f} ===\n${OUT}\n"
            if [ "$STATUS" -gt "$EXIT_MAX" ]; then EXIT_MAX="$STATUS"; fi
          done < /tmp/changed_story_files.txt
          printf "%b" "$LINT_COMBINED" | tee /tmp/lint.out
          echo "exit_status=$EXIT_MAX" >> "$GITHUB_OUTPUT"
          exit 0  # continue-on-error 정합

      - name: Post lint result comment (sticky)
        if: |
          steps.bypass.outputs.bypass == 'false' &&
          steps.changed.outputs.has_changed == 'true' &&
          github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_STATUS: ${{ steps.lint.outputs.exit_status }}
        run: |
          set -euo pipefail
          LINT_OUT="$(cat /tmp/lint.out 2>/dev/null || echo '(lint output 부재)')"
          if [ "${LINT_STATUS:-1}" = "0" ]; then
            HEADER="## ✓ Design lane plugin feasibility check — PASS (warning mode)"
            FOOTER="모든 cross-repo plugin path 인용에 [verified-via: ...] annotation 확인. ADR-107 Amendment 1 §결정 2 정합."
          else
            HEADER="## ⚠ Design lane plugin feasibility check — annotation 누락 감지 (warning mode)"
            FOOTER=$'**warning mode (CFP-1367 / ADR-060 §결정 5)**: lint fail 이 PR merge 를 차단하지 않습니다.\n\ncross-repo plugin path 인용에 `[verified-via: ...]` annotation 누락 감지 — ADR-107 §결정 2 + ADR-082 §결정 2 verify-before-trust annotation 의무 (5-enum scope: file existence / directory structure / mechanism wire status / schema structure / cross-repo state freshness).\n\n예시: `mclayer/plugin-codeforge-deploy/templates/deploy-mechanism.md [verified-via: gh api repos/mclayer/plugin-codeforge-deploy/contents/templates/deploy-mechanism.md]`\n\n**hotfix bypass channel** (ADR-024 Amendment 8): `hotfix-bypass:design-lane-plugin-feasibility` label 부착 → lint skip + audit comment 자동 발의.'
          fi
          BODY=$(printf '%s\n\n```\n%s\n```\n\n%s\n\n%s' \
            "$HEADER" "$LINT_OUT" "$FOOTER" \
            "> ⓘ 본 workflow = **warning mode** (continue-on-error). PR merge 미차단. 승격 gate (ADR-060 §결정 6) 통과 후 blocking 전환.")
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Emit bypass audit comment (label applied)
        if: steps.bypass.outputs.bypass == 'true' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          REASON=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
            | awk '/^### Bypass reason/{flag=1;next} /^##/{flag=0} flag' \
            | sed '/^$/d' | head -n 5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
          if [ -z "$REASON" ]; then
            REASON="(PR description '### Bypass reason' 섹션 부재 — 후속 보완 의무)"
          fi
          LABEL_USER=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/events" \
            --jq '[.[] | select(.event == "labeled" and .label.name == "hotfix-bypass:design-lane-plugin-feasibility")] | last | .actor.login' \
            2>/dev/null || echo "unknown")
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          AUDIT="[hotfix-bypass-audit] PR=${PR_NUMBER} label_applied_by=${LABEL_USER} reason=${REASON} timestamp=${TS}"
          BODY=$(printf '%s\n\n%s' \
            "$AUDIT" \
            "> ⓘ ADR-024 Amendment 8 §결정 6.A — audit trail 자동 발의. bypass label: hotfix-bypass:design-lane-plugin-feasibility.")
          gh pr comment "$PR_NUMBER" --body "$BODY"
