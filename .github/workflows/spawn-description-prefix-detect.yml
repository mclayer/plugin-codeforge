name: Spawn description prefix detect (warning mode)
# CFP-2574 도입 / CFP-2587 repurpose — Agent 수행 액션 렌더 줄 프리픽스 (`[에이전트명] MM/DD HH:MM - 내용`) 형식 injection regression guard.
# CFP-2587 (Gate-A/B GO): 범위① (Agent spawn 최상위 헤더 description) 을 PreToolUse(Agent) updatedInput 주입으로 프리픽스 자동 conformant 화
# — detect helper 를 주입 idempotency guard 로 재사용 (이미 conformant → 재주입 skip, KST render-stamp helper TZ-invariance 보존).
# 본 workflow = 그 guard 의 self-test 회귀를 warning-tier 로 방어 (QADev discriminating suite). exit-0-always fail-open, in-coverage best-effort.
# Tier: warning (continue-on-error, non-required check — ADR-060 §결정 5 / ADR-143 §결정 4 declaration-only Wave 1)
# Bypass channel: hotfix-bypass:spawn-description-prefix-detect (ADR-024 §결정 6.A per-entry namespace)
#
# enforcement 상한 (ADR-143 §결정 4 — advisory CEILING, theater 금지):
#   범위① (spawn 최상위 헤더) = 본 warning-tier CI guard + PreToolUse(Agent) updatedInput 주입 hook (CFP-2587).
#   범위② (leaf 도구호출) = prompt-mandate + 세션시작 리마인더 advisory (mechanical 불가 — ephemeral scan target 부재).
#   "100% 기계 강제" / "hard-gate" 참칭 금지 — advisory 조합이 곧 강제 상한.
#
# 승격 path:
#   warning → blocking-on-pr 승격 시 CFP-NNN carrier PR 가 다음 변경 동반 의무:
#     1. 본 workflow 의 continue-on-error: true 제거
#     2. branch protection required_status_checks.contexts 에 본 workflow job name 추가
#     3. evidence 3 산출물 제출 (ADR-060 §결정 6 (d) + evidence-checks-registry promotion_criteria)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'scripts/**'
      - 'hooks/**'
      - '.github/workflows/**'
      - 'tests/scripts/**'
      - 'docs/evidence-checks-registry.yaml'

permissions:
  pull-requests: write
  contents: read

jobs:
  spawn-description-prefix-detect:
    runs-on: ubuntu-latest
    # warning mode (ADR-060 §결정 5) — detect fail 이 PR merge 차단하지 않음.
    # required_status_checks.contexts 부착 X.
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Run detector self-test
        run: bash scripts/check-spawn-description-prefix.sh --self-test

      - name: Run discriminating test suite (QADev — T-1/T-2/T-4)
        id: suite
        # tests/scripts/test_spawn_description_prefix.sh (T-1 exit-0-always INV-1 + T-2 tz-invariance INV-2
        # + T-4 lint-inert INV-3). wrapper-self only (CI channel = 본 step, ADR-136 Amd2 QADev tests/scripts
        # 실행 채널 선례 동형). detect-output.txt 에 tee → warning comment 소스.
        if: hashFiles('tests/scripts/test_spawn_description_prefix.sh') != ''
        run: |
          bash tests/scripts/test_spawn_description_prefix.sh 2>&1 | tee detect-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Post warning comment (description prefix detect regression)
        if: steps.suite.outcome == 'failure'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('detect-output.txt', 'utf8');
            const body = [
              '## Spawn description prefix detect — warning',
              '',
              '> ADR-143 §결정 4 warning-tier (CFP-2574). PR merge 차단 아님.',
              '> Agent spawn 헤더 description 은 `[에이전트명] MM/DD HH:MM - 내용` 프리픽스 권고 (glanceability).',
              '> KST render-stamp helper 는 UTC+9 고정 산술 (TZ-invariant), 컴팩트 예시는 lint-inert.',
              '> bypass: `hotfix-bypass:spawn-description-prefix-detect` label 부착.',
              '',
              '```',
              output.slice(0, 3000),
              '```',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
