{% extends "base.html" %}
{% block title %}Admin — mctrader{% endblock %}
{% block content %}
<h4 class="mb-4">Admin — Config Editor</h4>

{% if saved %}
<div class="alert alert-success alert-dismissible fade show" role="alert">
  Settings saved successfully.
  <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
{% endif %}

<form method="post" action="/admin">

  <!-- Logging -->
  <div class="card mb-4">
    <div class="card-header">Logging</div>
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Level</label>
          <select class="form-select" name="log_level">
            {% for lvl in ["DEBUG", "INFO", "WARNING", "ERROR"] %}
            <option value="{{ lvl }}" {% if cfg.get("logging", {}).get("level") == lvl %}selected{% endif %}>{{ lvl }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Format</label>
          <select class="form-select" name="log_format">
            {% for fmt in ["json", "text"] %}
            <option value="{{ fmt }}" {% if cfg.get("logging", {}).get("format") == fmt %}selected{% endif %}>{{ fmt }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Output</label>
          <select class="form-select" name="log_output">
            {% for out in ["stdout", "file", "both"] %}
            <option value="{{ out }}" {% if cfg.get("logging", {}).get("output") == out %}selected{% endif %}>{{ out }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">File Path</label>
          <input type="text" class="form-control" name="log_file_path"
                 value="{{ cfg.get('logging', {}).get('file_path', '/var/log/mctrader/app.log') }}">
        </div>
      </div>
    </div>
  </div>

  <!-- Data -->
  <div class="card mb-4">
    <div class="card-header">Data</div>
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Root Path</label>
          <input type="text" class="form-control" name="data_root_path"
                 value="{{ cfg.get('data', {}).get('root_path', '/var/data/mctrader') }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">OrderBook Diff Path</label>
          <input type="text" class="form-control" name="data_orderbook_diff_path"
                 value="{{ cfg.get('data', {}).get('orderbook_diff_path', 'orderbook_diff') }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Trade Path</label>
          <input type="text" class="form-control" name="data_trade_path"
                 value="{{ cfg.get('data', {}).get('trade_path', 'trade') }}">
        </div>
      </div>
    </div>
  </div>

  <!-- Backtest -->
  <div class="card mb-4">
    <div class="card-header">Backtest</div>
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Initial Cash</label>
          <input type="text" class="form-control" name="backtest_initial_cash"
                 value="{{ cfg.get('backtest', {}).get('initial_cash', '1000000') }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Result Path</label>
          <input type="text" class="form-control" name="backtest_result_path"
                 value="{{ cfg.get('backtest', {}).get('result_path', '/var/data/mctrader/results') }}">
        </div>
        <div class="col-md-2">
          <label class="form-label">Queue Model</label>
          <select class="form-select" name="backtest_queue_model">
            {% for qm in ["naive", "proportional"] %}
            <option value="{{ qm }}" {% if cfg.get('backtest', {}).get('queue_model') == qm %}selected{% endif %}>{{ qm }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Symbols</label>
          <input type="text" class="form-control" name="backtest_symbols"
                 value="{{ cfg.get('backtest', {}).get('symbols', 'all') }}">
        </div>
      </div>
    </div>
  </div>

  <button type="submit" class="btn btn-primary">Save Settings</button>
</form>
{% endblock %}
