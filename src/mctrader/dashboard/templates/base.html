<!DOCTYPE html>
<html lang="ko" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}mctrader Dashboard{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { background-color: #0d1117; }
    .navbar { border-bottom: 1px solid #30363d; }
    .card { border-color: #30363d; background-color: #161b22; }
    .metric-value { font-size: 1.6rem; font-weight: 600; }
    .table { --bs-table-bg: #161b22; }
    tr[onclick] { cursor: pointer; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark px-4 py-2">
  <a class="navbar-brand fw-bold" href="/">⚡ mctrader</a>
  <div class="d-flex gap-3 align-items-center">
    <a class="nav-link text-secondary" href="/">Runs</a>
    <a class="nav-link text-secondary" href="/compare">Compare</a>
    <a class="nav-link text-secondary" href="/backtest">Backtest</a>
    <a class="nav-link text-secondary" href="/collector">Collector</a>
    <a class="nav-link text-secondary" href="/data">Data</a>
    <a class="nav-link text-secondary" href="/admin">Admin</a>
    <div class="dropdown">
      <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
        {{ tz if tz is defined else 'UTC' }}
      </button>
      <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
        <li>
          <a class="dropdown-item {% if tz is defined and tz == 'UTC' %}active{% endif %}"
             href="#" onclick="setTz('UTC'); return false;">UTC</a>
        </li>
        <li>
          <a class="dropdown-item {% if tz is defined and tz == 'Asia/Seoul' %}active{% endif %}"
             href="#" onclick="setTz('Asia/Seoul'); return false;">KST (+09:00)</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
<script>
function setTz(tz) {
  document.cookie = 'tz=' + tz + '; path=/; max-age=31536000';
  location.reload();
}
</script>
<div class="container-fluid px-4 py-4">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
