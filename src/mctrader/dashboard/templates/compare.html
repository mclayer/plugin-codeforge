{% extends "base.html" %}
{% block title %}Compare — mctrader{% endblock %}
{% block content %}
<div class="d-flex align-items-center gap-3 mb-4">
  <h5 class="text-light mb-0">Compare Runs</h5>
</div>

<!-- Run 선택 폼 -->
<div class="card p-3 mb-4">
  <form method="get" action="/compare" class="d-flex gap-2 flex-wrap align-items-end">
    <div class="flex-grow-1">
      <label class="text-secondary small d-block mb-1">Run IDs (쉼표 구분)</label>
      <input type="text" name="runs" class="form-control form-control-sm font-monospace bg-dark text-light border-secondary"
             value="{{ selected_runs | join(', ') }}" placeholder="run_001, run_002, ...">
    </div>
    <button type="submit" class="btn btn-sm btn-outline-primary">적용</button>
    <a href="/compare" class="btn btn-sm btn-outline-secondary">전체</a>
  </form>
</div>

<!-- 비교 차트 -->
<div class="card p-3">
  <div class="text-secondary small mb-2">Equity Curve Comparison</div>
  <canvas id="compareChart" height="70"></canvas>
</div>

<script>
const series = {{ series_json | safe }};
const colors = ['#58a6ff','#3fb950','#f78166','#d2a8ff','#ffa657','#79c0ff'];

if (series.length > 0) {
  const allTs = [...new Set(series.flatMap(s => s.data.map(p => p.ts)))].sort((a,b)=>a-b);
  const labels = allTs.map(ts => new Date(ts).toLocaleString('ko-KR'));

  const datasets = series.map((s, i) => {
    const map = Object.fromEntries(s.data.map(p => [p.ts, p.equity]));
    return {
      label: s.run_id,
      data: allTs.map(ts => map[ts] ?? null),
      borderColor: colors[i % colors.length],
      borderWidth: 1.5,
      pointRadius: 0,
      spanGaps: true,
      tension: 0.1,
    };
  });

  new Chart(document.getElementById('compareChart'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#8b949e', boxWidth: 12 } } },
      scales: {
        x: { ticks: { maxTicksLimit: 8, color: '#8b949e' }, grid: { color: '#21262d' } },
        y: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } },
      }
    }
  });
}
</script>
{% endblock %}
