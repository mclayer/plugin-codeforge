{% extends "base.html" %}
{% block title %}Backtest — mctrader{% endblock %}
{% block content %}
<h4 class="mb-4">Run Backtest</h4>

<div class="row">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-body">
        <form id="backtestForm">
          <div class="mb-3">
            <label class="form-label">Symbols</label>
            <input type="text" class="form-control" name="symbols" value="all"
                   placeholder="all  or  BTC_KRW,ETH_KRW">
            <div class="form-text text-secondary">Use "all" or comma-separated symbol names.</div>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label">Start Datetime ({{ tz_abbrev }})</label>
              <input type="datetime-local" class="form-control" name="start_date" id="startDt" step="60" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">End Datetime ({{ tz_abbrev }})</label>
              <input type="datetime-local" class="form-control" name="end_date" id="endDt" step="60" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Strategy</label>
            <input type="text" class="form-control" name="strategy"
                   value="mctrader.strategy.examples.order_imbalance:OrderImbalanceStrategy">
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label">Queue Model</label>
              <select class="form-select" name="queue_model">
                {% for qm in queue_models %}
                <option value="{{ qm }}">{{ qm }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Initial Cash</label>
              <input type="text" class="form-control" name="initial_cash" placeholder="(use config default)">
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="submitBtn">Run Backtest</button>
        </form>
      </div>
    </div>
  </div>

  <div class="col-lg-6 mt-4 mt-lg-0">
    <div id="statusArea" class="d-none">
      <div class="card">
        <div class="card-header">Job Status</div>
        <div class="card-body">
          <div id="spinnerArea" class="d-flex align-items-center gap-3 mb-3">
            <div class="spinner-border spinner-border-sm text-primary" role="status">
              <span class="visually-hidden">Running...</span>
            </div>
            <span id="statusText" class="text-secondary">pending</span>
          </div>
          <div id="progressArea" class="d-none mb-3">
            <div class="mb-1 d-flex justify-content-between">
              <span id="phaseText" class="text-secondary small fw-semibold">queued</span>
              <span id="pctText" class="text-secondary small fw-bold">0%</span>
            </div>
            <div class="progress" style="height: 8px;">
              <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated"
                   role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
              </div>
            </div>
            <div id="symbolsArea" class="mt-2 d-flex flex-wrap gap-1"></div>
            <div id="simTimeArea" class="mt-2 d-none">
              <span class="text-secondary small">Sim Time:</span>
              <span id="simTimeText" class="small fw-semibold ms-1">—</span>
            </div>
          </div>
          <div id="errorArea" class="d-none">
            <div class="alert alert-danger" id="errorMsg"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
window.BACKTEST_TZ = "{{ tz }}";

function formatSimTime(epochMs, tzName) {
  if (epochMs == null) return '—';
  const offsetMs = tzName === 'Asia/Seoul' ? 9 * 60 * 60 * 1000 : 0;
  const local = new Date(epochMs + offsetMs);
  const pad = n => String(n).padStart(2, '0');
  return `${local.getUTCFullYear()}-${pad(local.getUTCMonth()+1)}-${pad(local.getUTCDate())} ` +
         `${pad(local.getUTCHours())}:${pad(local.getUTCMinutes())}:${pad(local.getUTCSeconds())}`;
}

// Set default datetimes: end = now (truncated to minute), start = end - 24h
// If TZ cookie is Asia/Seoul (UTC+9), offset local time accordingly
(function () {
  function toDatetimeLocal(d) {
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }
  const tzCookie = (document.cookie.split(';').find(c => c.trim().startsWith('tz=')) || '').split('=')[1] || 'UTC';
  const offsetMs = tzCookie === 'Asia/Seoul' ? 9 * 60 * 60 * 1000 : 0;
  const nowUtc = Date.now();
  const end = new Date(nowUtc + offsetMs);
  end.setUTCSeconds(0, 0);
  const start = new Date(end.getTime() - 24 * 60 * 60 * 1000);
  document.getElementById('endDt').value = toDatetimeLocal(end);
  document.getElementById('startDt').value = toDatetimeLocal(start);
})();

const form = document.getElementById('backtestForm');
const statusArea = document.getElementById('statusArea');
const spinnerArea = document.getElementById('spinnerArea');
const statusText = document.getElementById('statusText');
const errorArea = document.getElementById('errorArea');
const errorMsg = document.getElementById('errorMsg');
const submitBtn = document.getElementById('submitBtn');
const progressArea = document.getElementById('progressArea');
const progressBar = document.getElementById('progressBar');
const phaseText = document.getElementById('phaseText');
const pctText = document.getElementById('pctText');
const symbolsArea = document.getElementById('symbolsArea');
const simTimeArea = document.getElementById('simTimeArea');
const simTimeText = document.getElementById('simTimeText');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  submitBtn.disabled = true;
  statusArea.classList.remove('d-none');
  errorArea.classList.add('d-none');
  spinnerArea.classList.remove('d-none');
  statusText.textContent = 'pending';

  let job_id;
  try {
    const resp = await fetch('/api/backtest/run', {
      method: 'POST',
      body: new FormData(form),
    });
    const data = await resp.json();
    job_id = data.job_id;
  } catch (err) {
    spinnerArea.classList.add('d-none');
    errorArea.classList.remove('d-none');
    errorMsg.textContent = 'Failed to submit job: ' + err;
    submitBtn.disabled = false;
    return;
  }

  const poll = setInterval(async () => {
    try {
      const s = await fetch(`/api/backtest/status/${job_id}`).then(r => r.json());
      statusText.textContent = s.status;

      if (s.progress) {
        progressArea.classList.remove('d-none');
        const p = s.progress;
        const pct = Math.round(p.progress_pct);
        progressBar.style.width = pct + '%';
        progressBar.setAttribute('aria-valuenow', pct);
        phaseText.textContent = p.phase;
        pctText.textContent = pct + '%';
        if (p.phase === 'done' || p.phase === 'error') {
          progressBar.classList.remove('progress-bar-striped', 'progress-bar-animated');
          if (p.phase === 'done') progressBar.classList.add('bg-success');
          if (p.phase === 'error') progressBar.classList.add('bg-danger');
        }
        if (p.planned_symbols && p.planned_symbols.length > 0) {
          symbolsArea.innerHTML = p.planned_symbols.map(sym =>
            `<span class="badge bg-secondary">${sym}</span>`
          ).join('');
        }
        simTimeText.textContent = p.current_ts != null
          ? formatSimTime(p.current_ts, window.BACKTEST_TZ)
          : '—';
        if (p.current_ts != null) simTimeArea.classList.remove('d-none');
      }

      if (s.status === 'done') {
        clearInterval(poll);
        window.location = `/run/${s.result_run_id}`;
      }

      if (s.status === 'error') {
        clearInterval(poll);
        spinnerArea.classList.add('d-none');
        errorArea.classList.remove('d-none');
        errorMsg.textContent = s.error || 'Unknown error';
        submitBtn.disabled = false;
      }
    } catch (err) {
      clearInterval(poll);
      spinnerArea.classList.add('d-none');
      errorArea.classList.remove('d-none');
      errorMsg.textContent = 'Polling error: ' + err;
      submitBtn.disabled = false;
    }
  }, 1000);
});
</script>
{% endblock %}
