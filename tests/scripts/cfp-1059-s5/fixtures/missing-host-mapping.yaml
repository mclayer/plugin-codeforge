---
# TC-2 fixture — deploy block present but host_mapping missing
# Expected: FAIL (exit 1) — host_mapping is required when deploy block is present
project:
  name: mctrader
  key_prefix: MCT

deploy:
  # host_mapping intentionally omitted

  docker_hub:
    org: mclayer
    image_prefix: mctrader
    auth_secret_env: DOCKERHUB_TOKEN

  traefik:
    enabled: true
    network: traefik-public
    domain_pattern: "*.mclayer.io"

  1password:
    enabled: true
    connect_host_env: OP_CONNECT_HOST
    connect_token_env: OP_CONNECT_TOKEN
    vault: mctrader-prod

  ssh_targets:
    - host: prod-server-01
      user: deploy
      key_secret_env: SSH_DEPLOY_KEY
      port: 22
