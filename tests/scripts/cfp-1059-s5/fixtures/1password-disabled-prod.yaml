---
# TC-5 fixture — 1password disabled with production marker
# Expected: PASS (exit 0) with warning emitted — less-secure fallback acknowledged
# Security warning (not FAIL): 1password.enabled=false + production marker present
project:
  name: mctrader
  key_prefix: MCT
  environment: production

deploy:
  host_mapping:
    - host: prod-server-01
      containers:
        - market

  docker_hub:
    org: mclayer
    image_prefix: mctrader
    auth_secret_env: DOCKERHUB_TOKEN

  traefik:
    enabled: true
    network: traefik-public
    domain_pattern: "*.mclayer.io"

  1password:
    enabled: false           # disabled — less secure .env fallback
    connect_host_env: OP_CONNECT_HOST
    connect_token_env: OP_CONNECT_TOKEN
    vault: mctrader-prod

  ssh_targets:
    - host: prod-server-01
      user: deploy
      key_secret_env: SSH_DEPLOY_KEY
      port: 22
