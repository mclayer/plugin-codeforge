---
# TC-3 fixture — traefik.enabled is a string "true" instead of bool true
# Expected: FAIL (exit 1) — strict bool type enforcement (yaml.safe_load: "true" != true)
project:
  name: mctrader
  key_prefix: MCT

deploy:
  host_mapping:
    - host: prod-server-01
      containers:
        - market
        - engine

  docker_hub:
    org: mclayer
    image_prefix: mctrader
    auth_secret_env: DOCKERHUB_TOKEN

  traefik:
    enabled: "true"        # STRING — must be bool true/false (type mismatch)
    network: traefik-public
    domain_pattern: "*.mclayer.io"

  1password:
    enabled: true
    connect_host_env: OP_CONNECT_HOST
    connect_token_env: OP_CONNECT_TOKEN
    vault: mctrader-prod

  ssh_targets:
    - host: prod-server-01
      user: deploy
      key_secret_env: SSH_DEPLOY_KEY
      port: 22
