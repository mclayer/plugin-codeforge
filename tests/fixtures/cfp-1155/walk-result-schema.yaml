# walk_result schema fixture — CFP-1155 Phase 2 TDD
# SSOT: docs/inter-plugin-contracts/imperative-walker-protocol-v1.md §2.A
# change-plan §8 TC-1~8 codify
#
# verified-via: Read imperative-walker-protocol-v1.md §2.A.1 / §2.A.2 / §2.A.3
# Author: QADeveloperAgent (CFP-1155 Phase 2 RED phase)

schema_version: "1.0"
carrier: CFP-1155
contract_ref: "docs/inter-plugin-contracts/imperative-walker-protocol-v1.md"
contract_section: "§2.A"

# ────────────────────────────────────────────────────────────────────────
# §2.A.1 walk_result enum (4-value closed_enum)
# SSOT: imperative-walker-protocol-v1 §2.A.1
# ────────────────────────────────────────────────────────────────────────
walk_result:
  enum:
    - SUCCESS
    - SUCCESS_WITH_DEGRADATION
    - PARTIAL_FAILURE
    - FAILED
  open_extension: false       # closed-set — 5번째 enum 값 신설 = ADR-093 amendment 로만
  exit_code_mapping: deterministic   # exit code → walk_result enum deterministic mapping 의무

# ────────────────────────────────────────────────────────────────────────
# §2.A.2 4-field 2-layer 분리 schema
# layer disjoint: 외부 보고 (human-facing) ↔ 내부 schema (machine/audit-facing)
# SSOT: imperative-walker-protocol-v1 §2.A.2
# ────────────────────────────────────────────────────────────────────────
layers:
  external_report:
    name: "walk completion report"
    facing: human-facing
    fields:
      - from_version
      - to_version
      - target_version_release_date
      - key_changes_summary
    open_extension: false

  internal_schema:
    name: "walk_result detail"
    facing: machine/audit-facing
    fields:
      - touched_files
      - atomic_invariants
      - verify_via
      - lane_outcomes
    open_extension: false

# ────────────────────────────────────────────────────────────────────────
# §2.A.3 closed_enum invariant (unconditional)
# SSOT: imperative-walker-protocol-v1 §2.A.3 + ADR-068 I-3
# ────────────────────────────────────────────────────────────────────────
invariants:
  enum_closed: true           # open_extension: false unconditional
  layer_disjoint: true        # 외부 ↔ 내부 field 혼입 0
  exit_code_deterministic: true   # exit 0 → {SUCCESS, SUCCESS_WITH_DEGRADATION} / exit 비-0 → {PARTIAL_FAILURE, FAILED}
  silent_success_forbidden: true  # SUCCESS hardcode (exit 비-0 인데 SUCCESS) = FAIL

# ────────────────────────────────────────────────────────────────────────
# TC-1~8 discriminating test data (change-plan §8 TC map)
# ────────────────────────────────────────────────────────────────────────
test_cases:
  # TC-1: walk_result enum closed_set 검증
  TC-1:
    name: "walk_result enum closed_set"
    description: "walker 산출 walk_result 값이 4-value closed_enum 안에 있어야 함. 5번째 값 = FAIL (open_extension:false)"
    valid_values:
      - SUCCESS
      - SUCCESS_WITH_DEGRADATION
      - PARTIAL_FAILURE
      - FAILED
    invalid_values:
      - UNKNOWN
      - PARTIAL_SUCCESS
      - ERROR
      - ""

  # TC-2: 2-layer 4-field presence 검증
  TC-2:
    name: "2-layer 4-field presence"
    description: "외부 보고 4-field + 내부 schema 4-field 모두 presence. layer disjoint (외부 ↔ 내부 field 혼입 0)"
    required_external_fields:
      - from_version
      - to_version
      - target_version_release_date
      - key_changes_summary
    required_internal_fields:
      - touched_files
      - atomic_invariants
      - verify_via
      - lane_outcomes
    cross_contamination_forbidden: true

  # TC-3: exit code → walk_result deterministic mapping
  TC-3:
    name: "exit code → walk_result deterministic mapping"
    description: "exit code 비-0 시 walk_result ∈ {PARTIAL_FAILURE, FAILED}, exit 0 시 ∈ {SUCCESS, SUCCESS_WITH_DEGRADATION}"
    exit_0_allowed_values:
      - SUCCESS
      - SUCCESS_WITH_DEGRADATION
    exit_nonzero_allowed_values:
      - PARTIAL_FAILURE
      - FAILED
    forbidden_combination:
      - { exit_code: 1, walk_result: SUCCESS }
      - { exit_code: 2, walk_result: SUCCESS }
      - { exit_code: 1, walk_result: SUCCESS_WITH_DEGRADATION }

  # TC-4: dry-run filesystem touch 0
  TC-4:
    name: "dry-run filesystem touch 0"
    description: "dry-run mode (Stage 1 walk + Stage 2 plan) = filesystem touch 0 / network 0. plan 출력만, apply 0"
    stage: "walk + plan only"
    filesystem_touch: 0
    network_calls: 0
    apply_stage_active: false

  # TC-5: min_prereq mismatch → fallback trigger
  TC-5:
    name: "min_prereq mismatch → fallback trigger"
    description: "plan stage 에서 consumer_pin < plugin_min fixture → fallback trigger 발화 + walk_result SUCCESS_WITH_DEGRADATION (grace window 안)"
    fixture:
      consumer_pin: "5.0.0"
      plugin_min: "6.0.0"
      grace_window_active: true
    expected_walk_result: SUCCESS_WITH_DEGRADATION
    fallback_trigger_fired: true

  # TC-6: per-family atomic rollback
  TC-6:
    name: "per-family atomic rollback"
    description: "apply fixture 에서 1 plugin apply 실패 inject → family 전체 snapshot rollback + walk_result PARTIAL_FAILURE"
    fixture:
      inject_failure_plugin: "codeforge-design"
      family_scope: all_7_plugins
    expected_walk_result: PARTIAL_FAILURE
    family_rollback: true
    partial_artifact_forbidden: true

  # TC-7: customization marker 보존
  TC-7:
    name: "customization marker 보존"
    description: "marker block 안 wrapper SSOT wins / 밖 consumer 값 보존 fixture verify. family rollback 시 marker block snapshot 시점 restore"
    fixture:
      marker_block_inside: "wrapper_ssot_content"
      marker_block_outside: "consumer_preserved_content"
    expected:
      inside_result: "wrapper_ssot_content"
      outside_result: "consumer_preserved_content"
    rollback_restores_marker: true

  # TC-8: idempotency
  TC-8:
    name: "idempotency"
    description: "동일 (target version + applied changelog entry hash) 재 apply = no-op (empty diff)"
    fixture:
      target_version: "6.0.0"
      applied_changelog_entry_hash: "abc123"
    second_apply_result: "no-op"
    diff_empty: true
