    - field: category  # ADR frontmatter category (lowercase canonical per lane_mapping_rule.case_normalization)
    - field: previous_parent_id  # Legacy flat parent (예: "2097153" for adr bucket)
    - field: new_parent_id  # Lane bucket page_id per lane_mapping_rule §4.1 primary
    - field: cross_ref_lane_bucket_ids  # Array of cross-ref lane bucket page_ids
  rows: []  # Phase 1 PR = empty skeleton, Phase 2 PR = 148 row append (F-DR-001 — ADR 117 + IPC 30 + Consumer Guide 1)

