# docs/selftest-execution-liveness-inventory.yaml
# self-test execution-liveness 인벤토리 — single SSOT (per `tests/scripts/*.sh` 1 레코드)
# Carrier: CFP-2622 (Epic CFP-2602 G6) / ADR-151
# Meta-gate: scripts/check-selftest-execution-liveness.sh (→ scripts/lib/check_selftest_execution_liveness.py)
# Wiring:    .github/workflows/selftest-execution-liveness-test.yml (wrapper-self-only, non-required, day-1 hard-fail)
#
# 목적: wrapper-self 의 self-test corpus 를 "선언(declared L3 fixture)"에서 "실제 CI 실행(channel alive)"으로
#   승격한다. 전 `tests/scripts/*.sh` 를 enroll 해 신규 self-test 가 무레코드로 침묵 un-run 되는 root(silent-un-run)
#   을 fail-closed 로 차단한다.
#
# 스키마 (ADR-151 §결정2 — 8-field/레코드):
#   self_test              : 스크립트 경로(tests/scripts/*.sh, repo-root 상대).            [AC-1a]
#   execution_channel      : workflow:<file>.yml:<job-id> | inline_self_test_flag:<file>.yml:<job-id>
#                            | agent_runtime | manual_registered.                          [AC-2]
#   channel_status         : alive | dead | permanently_skipped.                           [AC-3]
#   blocking_tier          : required | non_required | warning_tier | manual (정직 기록만).
#   discriminating_fixture : present | smoke_only | N/A (형식 presence 까지만 — 검출력=G3). [AC-4 미강제]
#   l2_full_scope          : both_copies | single | N/A.                                    [AC-5]
#   manual_reason          : ≥30자 substantive (agent_runtime/manual_registered 시 필수, else "").  [AC-2]
#   g_boundary_check       : runtime 축(soak=G2 / DAST=G5 / real-render=§8.7) 무침범 확인 note.       [AC-8]
#
# 정직 천장 (ADR-151 §결정7): 메타-게이트는 presence/alive/형식/L2-presence/manual_reason substantive 까지만
#   fail-closed. discriminating 검출력(G3)·열거 완결성(review)·L1 blocking 승격(ADR-060)은 미강제.
#   "wrapper 동적검증 완전 봉인" hard-claim 금지 — 실행-채널 fail-closed + 선언→실행 갭 저감 + 잔여 정직 공개.
#
# 자연 N/A 3축 (ADR-151 §결정6): wrapper-self runtime 축 soak(G2)/real-render(§8.7)/DAST(G5) = plugin-meta-na
#   (런타임 데몬/frontend/공격표면 산출물 부재). 억지 이식 = over-forcing → g_boundary_check 로 형제 축 참조.
# l2_full_scope: 각 self-test 는 tests/scripts/ 단일 아티팩트(template copy 없음)로 1회 실행 → 실행 scope
#   자연 N/A. workflow byte-identical parity 는 invariant-check.yml(Workflow parity step) 소관 = disjoint 축.
#
# census (execution-backed, 트리 실측 2026-07-13): 38 기존 + 신규 1
#   (CFP-2646 test_check-resource-safety-claim-proof.sh, ADR-082 Amendment 38 §결정 16 resource-safety
#   claim↔proof presence lint self-test, workflow:resource-safety-claim-proof-presence.yml dedicated step alive;
#   직전 CFP-2635 test_check-shell-test-masking.sh shell-test masking self-test) = 39 레코드. dead 레코드 0
#   (silent-un-run 봉인 — bucket A backfill / bucket B agent_runtime / bucket C·D manual_registered 로 전수 enroll).
#   ★ 메타-게이트는 count 상수를 강제하지 않음 — tests/scripts/*.sh ↔ 레코드 bijection(AC-1a)으로 전수 enroll 검증.

