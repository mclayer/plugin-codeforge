# ── 선언적 바인딩 핵심 의미 요약 (참조 전용 — reconcile-protocol-v1 §4.10 원문 변조 0) ──
# consumer .claude/_overlay/project.yaml codeforge.channel 필드로
# family 7 plugin 동시 channel resolve 트리거.
# 3-tier enum (stable/beta/canary) closed-enum +
# family_7_plugin_atomic × channel 버전 고정 invariant (per-plugin override 금지) +
# publisher ↔ registry ↔ consumer 3-way channel version byte-identical 3 불변 조건.

walk_result_mapping:
  SUCCESS: >
    7 plugin 전체 동일 channel resolve 완료 + publisher↔registry↔consumer
    3-way version byte-identical 검증 PASS + channel drift 0건.
  SUCCESS_WITH_DEGRADATION: >
    channel 필드 미선언 consumer — stable fallback 자동 적용 (경고 발화 의무).
    backward_compat invariant 정합: 기존 consumer overlay 영향 0.
  PARTIAL_FAILURE: >
    7 plugin 중 일부만 channel resolve (mixed channel 감지 → atomic skip).
    per_plugin_override_forbidden invariant 위반 시 발생.
  FAILED: >
    3-way version mismatch (blocking-on-pr) 또는
    channel enum 유효하지 않은 값 (stable/beta/canary 외) 감지.

walk_steps:
  - step_id: "WS-906-1"
    description: >
      consumer .claude/_overlay/project.yaml 에서 codeforge.channel 필드 읽기.
      미선언 = stable 자연 fallback (경고 0, lint skip 0 — backward_compat invariant).
      선언 시 enum 검증: ["stable", "beta", "canary"] closed-set.
    check_command: >
      scripts/infer-channel-from-version.sh (write-0 invariant 보존)
    failure_mode: "enum 외 값 감지 → walk_result FAILED"

  - step_id: "WS-906-2"
    description: >
      family 7 plugin 전체를 선언된 channel 로 동시 resolve.
      per-plugin override 금지 invariant 검사 (mixed channel = abort-before-touch).
      member_enum: ["codeforge","codeforge-requirements","codeforge-design",
                    "codeforge-develop","codeforge-test","codeforge-review","codeforge-pmo"]
    check_command: >
      scripts/atomic-upgrade-7-plugins.sh --channel <tier>
      (mixed channel detection → abort, family_7_plugin_atomic × channel 버전 고정)
    failure_mode: "mixed channel 감지 → walk_result FAILED"

  - step_id: "WS-906-3"
    description: >
      publisher plugin.json version ↔ registry marketplace.json
      channels[tier=<C>].version ↔ consumer version_pin 3-way byte-identical 검증.
      semver normalize 금지: "5.83.0 ≠ 5.83 ≠ v5.83.0" (publisher SSOT canonical).
    check_command: >
      scripts/check-3way-version-parity.sh (channel 차원 확장 포함)
    failure_mode: "3-way mismatch → walk_result FAILED (blocking-on-pr)"

  - step_id: "WS-906-4"
    description: >
      channel drift 3-tuple 감지:
      (a) consumer project.yaml codeforge.channel 선언값
      ↔ (b) 실 install plugin.json .version
      ↔ (c) registry marketplace.json channels[*].versions[] 멤버십.
      warning-first tier (ADR-060 §결정 5 default 정합).
    check_command: >
      channel-drift-detection.yml workflow (24h cron + workflow_dispatch)
      + scripts/check-channel-drift.sh
    failure_mode: "drift 감지 → walk_result SUCCESS_WITH_DEGRADATION (경고 발화)"

invariants_preserved:
  - id: "INV-906-1"
    name: "channel 3-tier closed-enum"
    detail: >
      consumer_channel_field.enum: ["stable","beta","canary"] open_extension:false.
      4번째 tier 신설 = reconcile-protocol-v1 §4.10 Amendment 필요
      (ADR-064 §self-application 강화 방향만).
  - id: "INV-906-2"
    name: "family_7_plugin_atomic × channel 버전 고정"
    detail: >
      per_plugin_override_forbidden: true.
      consumer codeforge.channel: <C> 선언 시 7 plugin 전체 동일 channel <C>.
      mixed channel = ADR-016 §결정 1 family scope invariant 위배.
  - id: "INV-906-3"
    name: "3-way channel version byte-identical"
    detail: >
      publisher ↔ registry ↔ consumer 3-way byte-identical.
      orthogonality_invariant: channel 버전 고정 가용성 ≠ version 정합성
      (버전 고정 미선언=stable fallback ≠ version mismatch=blocking-on-pr).
  - id: "INV-906-4"
    name: "canary tier authority advisory"
    detail: >
      canary tier = HIGH risk class, admin 권장. consumer CODEOWNERS path 영역.
      ProductionEvidenceDeputy spawn trigger (ADR-72 §결정 1 정합).

open_extension: false

