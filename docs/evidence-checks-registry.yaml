      promotion signal 아님 — ADR-060 4-tier promotion path / failure_threshold
      / pr_cumulative_min 와 무관):
        - CFP-500 FIX-5 (1차): #456 merge 직전 첫 actual collision (table format +
          7-row format 두 heading 등장 → first-match capture boundary 로 인해
          첫 heading 만 capture, 7-row regex 0/7 match → fail)
        - CFP-451 본 세션 transient (2차): #486 step 3 시점 동일 패턴 재현 후
          step 4 awk-delete fix → step 5 final PASS

      Logic refinement (CFP-490 Phase 2): 5a guard tie-break case A/B/C 식별 +
      .mjs extraction (.github/scripts/check-lane-evidence-block.mjs) +
      analyzeDuplicateHeadings() 함수로 valid heading 명시. Option A strict
      (CFP-465 invariant 보존) — lenient fallback 채택 안 함. recurrence_count
      framework / promotion gate input / lint warning condition 모두 무관 (description-only narrative).
      CFP-509 schema v1.2 (ADR-060 Amendment 6) 에 `recurrence:` field 정식 도입 — 본 entry 는
      schema-level count: 2 보유 (CFP-500 FIX-5 + CFP-451 transient 2회 historical evidence).
