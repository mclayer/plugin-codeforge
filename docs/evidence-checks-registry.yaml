  # ─── CFP-2635 Phase 2 (ADR-060 Amendment 22 — 20번째 warning-tier entry) — shell-test exit-masking + mock-seam-무assert 정적 lint ───
  - name: shell-test-exit-masking-detect
    description: |
      CFP-2635 / ADR-060 Amendment 22 (20번째 warning-tier entry) — codeforge 거버넌스 shell self-test
      코퍼스(scripts/test-*.sh + tests/scripts/*.sh, non-recursive glob = 실 self-test 69 file; git-pathspec
      recursive 33+37=70 중 1 = scripts/test-fixtures/ 내 비-self-test fixture 자산 자연 제외)의
      (a) raw `cmd || true` exit-masking(cmd exit 이 유일 pass/fail 신호이고 하류 카운터/assertion 부재 =
      항상 PASS) + (b) mock-seam env export(`_*MOCK*=`) 후 block-scope 내 동반 assertion 부재 = false-coverage
      를 정적 스캔. bats 문자 매칭 아님 (codeforge bats 미사용, Story §2.3 재편 — 대상 = 실 shell 코퍼스).
      ★ anti-hollow-gate 1급 요건: 정당 `|| true` 를 오탐 0 으로 제외 (naive grep = 149행 대부분 오탐 →
      lint 자체가 hollow/noisy gate 자기모순, ADR-119 위반). 제외 알고리즘:
      (1) logical-line 재구성(backslash-continuation join) — 정밀도 keystone (다중행 assert continuation 의
      `|| true` 가 head token=assert-family 로 귀속) / (2) LEGIT 4규칙 — (a) counter-backup(assert_/expect_/
      check_/require_/verify_/test_/run_ 접두 OR 파일-정의 function + FAIL 카운터 corroborate) /
      (b) arithmetic `((..))` / (c) redirect-capture(`2>/dev/null`·`2>&1`·`VAR=$(...)`·value-pipe) /
      (d) branch-guard(if/elif/while/until 헤드 + cond-assign) / (3) heredoc·comment 제외 / (4) 그 외 bare
      `raw_cmd || true` 는 block-scope 전방 companion(하류 카운터/assert) 부재 시에만 flag (§3.1 "하류
      카운터/assertion 부재" 의 line-block-local 실현). ReDoS-safe (anchored 리터럴 + `\d+`/bounded quantifier
      + line-by-line 재구성 후 + per-file scan cap — input-driven resource exhaustion, ReDoS=subtype).
      discriminating self-test 동반(TC-M1/M2 검출 / TC-L1~L6 미검출(TC-L2=정밀도 keystone) / TC-S1 RED·
      TC-S2 GREEN + MK-1/2/3 mutation-kill(제외/검출/재구성 로직 load-bearing) + 실 코퍼스 precision proof
      오탐 0). warning tier (ADR-060 §결정 5 default — blocking 승격 = evidence-gated 별 carrier).
      honesty ceiling(ADR-151 §결정7 상속): naive/구조적 masking 패턴만 검출 — 검출력(surviving test 가
      실제 mutation 을 죽이는가)은 미강제(G3/review/QADev discriminating-case 소관). "false-coverage 완전
      봉인" hard-claim 부재 (presence/형식 천장, 먼 assert masking false-negative 정직 인정).
      injection-safe (pull_request NOT pull_request_target / permissions contents:read).
    detect_command: bash scripts/check-shell-test-masking.sh
    workflow: .github/workflows/shell-test-exit-masking-detect.yml  # templates+.github byte-identical (ADR-005, sha256 ba587365)
    current_tier: warning            # ADR-060 §결정 5 / Amendment 22 — 첫 도입 = warning mode
