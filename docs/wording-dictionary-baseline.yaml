  content: scope: "Amendment 3 — read-side cutover orphan 기록 + 라벨 물리 삭제 (A2-3) 안전 envelope 보강 (documentary, additive). CFP-2581(phase-gate-mergeable 자동 Story-issue 인식) 설계 lane 이 firsthand 로 발견한 A2-2 OR-bridge 의 read-side 미전파 gap 을 A2-3 promotion invariant 의 선결조건으로 기록한다. 3 기록: (1) read-side orphan — A2-2 OR-bridge( OR 라벨)는 story-init.yml 트리거에만 적용됐고 phase-gate-mergeable.yml 의 canonical issue 직독 predicate 2곳(step-3 L113 + deadlock-resolver L330 동일 검사)은 여전히 **라벨** predicate → cutover read-side 후속 미완. (2) A2-3 라벨 삭제 선결조건 추가 — 현 A2-3 의 PC-2 canary(TC-13)는 story-init 발화만 입증하고 phase-gate 직독은 미검. 라벨 삭제 후 L113/L330 이 label-only 인 채로 남으면 native-only Story 를 링크한 bare PR(현재 직독 성립 부류, #2559/#2580)마저 step-3 직독이 깨져 수동 미러로 회귀 → **PC-4 신설: 라벨 삭제 前 phase-gate read-side(L113+L330) OR-bridge 완료 + 직독 canary green**. (3) native-null blocker — #2563 은 =null(type:story 라벨만 보유, A2-1 silent type_id drop 잔재 추정, RequirementsReviewPL firsthand). native-null issue 는 라벨 삭제 시 label predicate ∧ OR-bridge 양쪽 실패 → **PC-5 신설: 라벨 삭제 前 native-type audit/backfill 로 native-null 집합 0 확인**(DI-1 완전 충족의 실 조건). scope 경계 — CFP-2581 실 변경 = PR body 의 canonical-issue 바인딩 파싱 확장(localRefs 정규식 same-repo 인식)으로 native-type cutover 와 **disjoint**(별 read 경로). read-side OR-bridge(구 후보 b) 자체는 본 Story 미실행 — A2-3 라벨 삭제 carrier 로 defer(선결조건으로만 기록). 본 Amendment 는 mechanism 무변경 documentary."
