  content: summary: "§결정 16 신설 — resource-safety-claim ↔ proof-link write-time 정직 discipline (write-time verify super-class 의 3번째 presence-lint carrier). governance/보안 tooling(evidence-check 게이트·보안 script·워크플로 YAML)의 docstring·inline 주석·워크플로 YAML 주석에 resource-safety/복잡도/DoS-guard 안전성-claim(catastrophic backtracking 0 / ReDoS-safe / DoS 가드 / resource exhaustion 방어 / scan cap = bound / nested quantifier 0 류)을 쓸 때 (a) paired proof-reference(reproducer / wall-clock 벤치마크 / 복잡도 회귀 self-test 링크) 동반 또는 (b) honest-ceiling('bounded degradation, 임의 입력 무해 아님') downgrade 를 mandate. lint 은 이 proof-ref/ceiling 의 **presence** 만 검사 — claim 의 **참됨(truth)** 미강제(honesty-ceiling ADR-151 §결정7 상속, verify ⊋ presence disjoint). super-class 관계: §결정 11(code-level artifact write-time verify) + §결정 15(claim closed-set → paired annotation presence lint, issue-body-claim-pre-screen) 의 artifact-class 인스턴스 확장 — 신규 mechanism CLASS 아님. 원천 = CFP-2635 retro escalate_user 후보 A (pattern_count 2: CFP-2635 masking tool O(n²) DoS over-claim + CFP-2591 carrier-lint ReDoS over-claim, ADR-045 §D-9 forcing function). 2-layer: Layer 1 write-time declaration mandate(roster/skill prose, governance-tool 작성 주체 SecurityArch/dev/QADev — ADR-140 §결정3 hybrid 착지) + Layer 2 presence lint 5-piece chain(Python SSOT check_resource_safety_claim_proof.py + thin wrapper + byte-identical workflow pair + discriminating self-test + registry warning-tier entry + hotfix-bypass label + grandfather baseline). ★ 자기참조 DoS 회피(메타-재귀): 본 lint 도 파일 regex 스캔 = CFP-2635 SF-1 동일 표면 — 4-axis born-safe bound(T-1 anchored bounded regex nested-quantifier 0 / T-2 index-advance O(n) tokenize slice-in-loop 0 = check_shell_test_masking.py:235-252 / check_spawn_prompt_fact_verify.py 답습 / T-3 MAX_PHYSICAL_LINE_LEN per-physical-line truncate = count-cap 별개 축 / T-4 islice read cap) 처음부터 배선(CFP-2635 는 T-2 algorithmic + T-3 line-length 축 enumeration 누락으로 O(n²)). 본 lint 자기 docstring 정직 = 자기 resource-safety over-claim 금지(presence≠truth, bounded degradation) +