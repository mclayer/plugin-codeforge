  content: scope: "§D-9 sub-decision (c) 신설 — Pattern A (chief-author self-attest false claim) 반응형(reactive)→예방형(preventive) merge-time gate-provenance self-attest forcing function (additive ratchet, sub-decision (a)/(b) RETAIN, §D-9 본문 의미 변경 0건). Epic CFP-2324 S6 carrier (escalation #2322 흡수). 기존 §D-9 (a) post-detection escalation + (b) pre-publish 3-source AND verify 는 PMOAgent retro-time 영역. 본 (c) = gate verdict write-time 영역 (Orchestrator self-write gate-pass label/comment 직전 self-attest preventive gate). axis 분리: (a)/(b) = retro corpus / ADR draft 영역 ↔ (c) = gate verdict provenance 영역 (disjoint). carrier source = CFP-1353 Pattern A 'chief author self-attest false claim' pattern (명칭 SSOT = docs/agent-prompt-guardrails.md:26, Pattern A-2 = InfraEng FIX iter 1 false self-attest tests_passed 19/19 vs actual 10/27). 기존 ADR-082 §결정 1 (write-time self-write verify) + ADR-073 (verify-before-assert) 는 author 가 자기 claim 을 스스로 verify 하는 self-discipline layer = 반응형 (위반해도 검출 시점 = downstream review/retro). 본 (c) = merge-time mechanical preventive gate — gate verdict 가 (1) lane-produced machine-checkable artifact (review-verdict-v4 packet 형식 준수 + 필수필드 contract_version/lane/story_key/iteration/pl_recommendation 존재) ∧ (2) Story §14 lane-evidence binding (해당 lane row 존재 + output_status/outcome 정합) multi-anchor AND 충족 시에만 정당. wrapper-self repo = ADR-031 §결정 (Amendment, mixed repo §14 면제) 라 §14 anchor 대신 PR body/코멘트 review-verdict packet 병행 anchor 로 충당. multi-anchor AND 3-source 패턴 = ADR-026 §결정 6 isPostMergeFix (label ∧ Story §10 binding ∧ §7 보안 non-touch) 답습 — single point of forgery 제거 mechanism. 위협모델 = honest-but-careless (연극 게이트 / 실수로 빈 verdict 부착 / artifact 부재인데 gate-pass label 부착). 악의 단일계정 위조 (single-session·single-account = git author 기반 implementer≠certifier separation 불가) = out-of-scope accepted risk 명시 박제 (mitigation 비용 > 이득, dogfood wrapper-self 환경 single-operator). 적용 = 모든 게이트 (요구사항리뷰 [ADR-125 신규 lane, S2 self-attest 구멍 공동 차단] / 설계리뷰 / 보안테스트 / 배포리뷰). posture = warning