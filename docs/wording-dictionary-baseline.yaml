  content: | 131 | CFP-2419 | active | 2026-06-26 KST (ArchitectAgent direct write per ADR-070 / CFP-578 chief author precedent — cross-repo 책임 배치 거버넌스 모델 SSOT carrier. Epic CFP-2418 (cross-repo 책임 배치 거버넌스, wrapper-self) Story 1 (선행 Story — S2 게이트 검사대상·S3 자동화 대조대상 전제 확정). 5 결정: §결정1 토폴로지 SSOT 1급화 (author = ArchitectAgent chief 권한 확장, 신규 영구 deputy 0 + 신규 RACI R 0 — ADR-042:876 repo-level 분해 경계 확정 chief authority pre-exists cross-ref) + §결정2 wrapper 메타불변식만 강제 (4 메타불변식: 모든 책임 정확히 1 소유레포 / 주인없는 책임 0 / 중복소유 0 / SSOT 파일 존재+스키마 유효; "정책값 공백 = PASS" 가 ADR-130 fail-closed(unknown=exit 1, L96)와 다른 LAYER 임 verbatim 명시 — wrapper 구조검증 vs consumer 정책 opt-in) + §결정3 게이트 = 메타불변식 hard-block + 거친 파생 (책임 의미단위 깊은 파생 = deferred, 마커 시스템 선결; declared↔derived = Bazel forward + Terraform reverse 2-도구 합성 유추) + §결정4 기계 vs 사람 판정 분리 (구조적 사실 = hard-block / 의미 판정 = 소유 선언 + 리뷰어 근거인용 attestation 요구만, 승인 자체 대신 판단 안 함 — 검사연극 금지 ADR-119 정합; CODEOWNERS 선례 + OPA Gatekeeper enforcementAction progressive) + §결정5 상위 자동화 = ADR-069 Phase 2 구현 (story-init.yml components 소비 라우팅, Story 3). axis-disjoint 5-checklist 자기적용 (ADR-086 동형): axis disjoint(토폴로지 SSOT author repo-level ⊥ ModuleArch 레포 내부 ⊥ RefactorAgent advocacy) + RefactorAgent advisory 무축소 verbatim 박제("배치 결정 강제 = 소유레포 확정·기록 강제이지 분해 제안 강제 아님 — RefactorAgent advisory(escalation-tier 제안) 무축소") + RACI R 단일(chief, ADR-042:876) + deputy 0 신설(6 permanent 무손상) + fail-safe layer 분리. ADR-069 Amendment 1 동반 발의 (repos[].components → repo 라우팅 Phase 2 codify + "소유레포 결정 source = ADR-131 토폴로지 SSOT" cross-ref). Out-of-Scope: 책임 의미단위 깊은 파생검증(deferred 별 CFP, 마커 시스템 선결) / 게이트 실행 스크립트(Story 2) / story-init.yml 자동화(Story 3) / consumer adoption(별 follow-on). is_transitional: false 영구 강화 ratchet (chief authority 확장 + 메타불변식 추가, 약화 surface 0 — ADR-058 §결정 5 sunset_justification 비대상). mechanical_enforcement_actions: [] Phase 1 declaration-only (검사 스크립트·required check 0 신설 — Story 2/3 carrier, 회귀 0 차단). collision check: git ls-tree origin/main archive/adr/ numeric max = ADR-130 (CFP-2395) → 131 free (verified-via worktree base b469bd41d8f889f664a4263db6c06e7e1cf41bc3, ADR-129/130 sibling 파일 실재 = numeric max 130 + registry table tail row = 129(CFP-2392)/130(CFP-2395) 등록 max 130 + commit 직전 재verify). status 미경유 직접 (row 120/121/126/127/129/130 ArchitectAgent/ArchitectPLAgent chief author precedent 정합). ADR file = . parent_epic CFP-2418.) |
