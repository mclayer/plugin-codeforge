  content: summary: "CFP-2560 — 전 에이전트 opus 단일 tier 전환에 따른 3-tier 정책 재편 (carrier = ADR-141). ADR-141(전 에이전트 opus 단일 tier + fable 폐기)이 신설되며 본 ADR §결정 1 의 Opus/Sonnet/Haiku 3-tier role-pattern 선택 표를 **superseded 마킹**한다 — 단일 tier = opus 이므로 role 별 tier 판정 불요. §결정 1 tier 표 위 Amendment 19 안내 blockquote + 파일 말미 섹션 append (기존 본문·Amendment 섹션 rewrite 0). **tier-flip 3종 dead 마킹**: Amd15(ServiceDeveloperAgent sonnet dev preset) / Amd16(InfraOperationalArchitectAgent stakes-gated opus→sonnet) / Amd17(DomainAgent financial-invariant-0 opus→sonnet) 은 대상 tier(sonnet)가 소멸하므로 dead — 전 에이전트 opus 라 flip 대상 0. **잔존 명시**: Amd13(RefactorAgent reusability 축 신설) / Amd14(측정 mechanical wire) / Amd18(RefactorAgent 측정 축 relocation) 은 mandate-축(tier 무관)이라 잔존. **§결정 3 의무 승계**: '신규 agent 도입 / model 변경 시 ADR 의무' → ADR-141 로 승계(신규 agent = opus default, 단일 tier 이탈 = ADR-141 amendment 의무). **§결정 2 invariant 지위 판정**: tier 신호로서는 폐지(sonnet tier 부재), role-정합 원칙('mandate 얕으면 role 재정의')으로는 잔존하되 결론이 model downgrade 아닌 mandate 명확화로만 이어짐. **§결정 5(Haiku rollback) / §결정 6(재-audit) = moot**(대상 haiku/sonnet tier 소멸). dead-path: check-stakes-tier-gating.sh + test = 존치(live-machinery, env-driven, frontmatter 무결합 — 삭제 시 evidence-checks-registry detect_command broken). ADR 텍스트로 dead 판정만, 기계 정리 0. Phase 1 = ADR-141 + 본 Amd19 + ADR-117 Superseded + ADR-057 Amd6 + architecture doc; Phase 2 = 45 frontmatter opus 통일 + SSOT 3 문서 청산 + registry dead 마킹 + plugin bump 9 + marketplace sync."
