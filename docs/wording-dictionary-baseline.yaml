  content: summary: "CFP-1126 — AggregateArchitectAgent deprecate + ModuleArchitectAgent mandate 확장 (boundary axis advocate 통합, Amendment 8 partial retroactive rollback). 7 permanent → 6 permanent + 3+1 CONDITIONAL (AggregateArch applicability → ModuleArchitect CONDITIONAL carry-over 보존, frontend-only / API-only / external-managed RDB consumer non-applicable). ModuleArchitect mandate 확장 — module-level boundary (CodeArchitect rename from Amendment 7 본 mandate) + aggregate-level boundary (AggregateArch from Amendment 8 흡수). 사용자 직권 minimal path 2번째 적용 — CFP-1110 paired Amendment paradox-break 후속 carrier. ADR-058 §결정 5 sunset_justification first applied carrier (ratchet 축소 첫 시도, 약화 방향 evidence-grounded justification). Researcher 평가 net 35% 정당화 (verify-before-trust + Epic gate 영역만 net positive) + Codex ROI indeterminate-부정쪽 confidence medium 수렴 + synthesizer-stale-reference pattern_count 6 (CFP-722/801/792/810/819/825) + ADR-082 Amendment 5 §결정 1 sub-scope (1-C) 구조적 원인 #2 직접 인용 (codeforge-design lane fan-out 불균형 chief + 7 deputy + 4-tuple = 12+ agent advocacy vs 1 user 요구 weight 비대칭). minimal path 정합 — Story file 0 / Lane spawn 0 / FIX iter 0 / Phase 분리 0 / Retro 0 / ADR-013 명시 위배 (사용자 승인 2026-05-21 KST) — closed-loop break 외부 결정 채널 2번째. Wave 1 = declarative anchor only (ADR-042 정책 SSOT). Wave 2 mechanical (codeforge-design plugin AggregateArchitectAgent agent file 실 deprecate + cross-repo sibling sync ADR-010 정합) = 별 CFP carrier (deferred-followup)."
- file: archive/adr/ADR-042-agent-model-selection-policy.md
  word: 별
  content: summary: "CFP-2364 — RefactorAgent Reusability 1급 축 신설 (ISO/IEC 25010 유지보수성 gap 충당). 실증 결과 RefactorAgent 가 ISO/IEC 25010 Maintainability 5축 (Modularity / Reusability / Analysability / Modifiability / Testability) 중 Modularity 1축 (decoupling / pattern / interface 분리) 만 1급으로 다루고 Reusability 명시 공백 (증거 ①~⑦). 기존 3 카테고리 (a Decoupling / b Pattern / c Interface) → 4 카테고리 (+ d Reusability) 확장 — 카테고리 (d) 신설: 중복 코드 제거 · 공통 추상 추출 · DRY/WET · 재사용 가능 단위 식별. 트리거 = rule-of-three (동일/유사 블록 3회 이상) / duplication-ratio 임계 초과 / cross-module 동형 로직 발견 시 공통화 제안. DRY/WET 는 (b) Pattern 에서 (d) 로 이관 (개념 정합 — 본질이 중복/재사용), (b) 는 아키텍처 패턴 (Hexagonal/Clean/Ports&Adapters) 만 retain. output 슬롯 (d) Reusability advocacy 신설 (중복 위치 + 추출 대상 공통 단위 + 재사용 단위 배치 ModuleArch consult 표식 + 측정 신호 + repo 분해 escalation 표식). scope guard escalation 예외 — cross-cutting 공통추출 / repo-level 분해는 본질적으로 cross-module/global 이므로 요건 범위 밖이라도 escalation-tier 제안 가능 (escalation 표식 + ArchitectAgent 판정 회부 의무, 그 외 무관한 전역 리팩터링 여전히 금지). repo-level 분해 advocacy (응집 cluster → 별 deploy/ownership 단위 분리) escalation-tier 신설. 측정 연동 — (d) 제안마다 before 신호 (duplication ratio / clone 수 / 제거 예상 중복 LOC) emit → ArchitectAgent 통합 + 구현리뷰 게이트 falsifiable 검증 (증거 ⑤ 충당). axis disjoint = RefactorAgent reusability/decoupling advocacy (중복·공통추출·repo-split pressure 식별·제안) ↔ ModuleArch boundary authority (경계 placement 결정) — RefactorAgent 는 pressure 제안만, 경계 확정은 ModuleArch + ArchitectAgent chief. RefactorAgent = 기존 sub-tuple agent 의 mandate 확장 (신설 아님) — roster 6 permanent + 3 sub-tuple 카운트 무변경, model tier Sonnet 무변경. ADR-086 axis 분석 lens adjacent-case 적용 (axis disjoint + 5-checklist as 도구 — mandate 확장은 ADR-086 explicit scope 신설/미도입/rename/축소 미열거이므로 framework 전면 self-application 주장 아님). SSOT propagation 3원본 (RefactorAgent.md + skills/deputy-mandate/SKILL.md + plugins/codeforge-design/CLAUDE.md mirror). bump 0.26.0 → 0.27.0 MINOR (mandate 확장 — ADR-037). marketplace version sync (ADR-063). ratchet 강화 방향 (카테고리 3 → 4 = scope 확장, ADR-058 §결정 5 정합) → sunset_justification 불요."
- file: archive/adr/ADR-042-agent-model-selection-policy.md
  word: 별
  content: summary: "CFP-2369 — RefactorAgent (d) Reusability 축 측정 연동 Phase-2 mechanical wire (warning-tier duplication-ratio 측정). CFP-2364 Amendment 13 가 (d) Reusability 축을 1급 advocacy 로 신설하되 측정은 Phase-1 declarative (RefactorAgent 가 before 신호 (duplication ratio / clone 수 / 제거 예상 중복 LOC) emit 하나 자동 측정·enforcement deferred) 로 두었음 (Amendment 13 §변경 사항 '측정 연동 (declaration-only Wave 1)' + ADR-086 5-checklist #5 deferred trigger). 본 Amendment 14 = 그 deferred 를 mechanical wire 로 실현 — warning-tier duplication-ratio 측정 도구 (scripts/check-duplication-ratio.sh) + consumer template (templates/github-workflows/duplication-check.yml) + anti-theater discriminating test (scripts/test-check-duplication-ratio.sh, stub detector 로 dirty/clean RED→GREEN 변별 실증) + evidence-check-registry entry (duplication-ratio-warning, owner_adr ADR-042 / carrier_adr ADR-060, warning tier) codify. detector 계약 = DUPLICATION_TOOL env (target dir → 중복 백분율 stdout) override 가능, 미설정 시 default jscpd (npx --yes jscpd --reporters json) total percentage 추출 — top-level key 는 (복수, jscpd v5.0.10 실측 주 키) 이며 파서가 구 버전/문서 변종 (단수) 도 허용 (버전 편차 흡수, parse_jscpd_percentage 함수로 추출 — jq + python try-순서). DUPLICATION_THRESHOLD (default 5.0%, 비숫자면 5.0 fallback + warning) 초과 시 ::warning:: emit, 항상 exit 0 (비차단). wrapper-self = src 부재 declarative-only → graceful skip (CI 통과). RefactorAgent 역할 = Grep/Glob 로 중복 위치 식별·verbatim 인용 + 정량 ratio 는 CI 검사 결과 참조 (에이전트 권한 확장 0 — 도구 직접 실행 안 함, CI 가 구동). **여전히 warning-tier (비차단)** — blocking 승격은 evidence 누적 후 별 CFP. **repo-분해 mechanical gate 는 advisory 유지 (out-of-scope)** — 응집 cluster → repo 분리 advocacy 는 ArchitectAgent chief 판정 회부 (mechanical gate 아님). RefactorAgent.md 측정 연동 단락 deferred → tool-grounded 정정 (frontmatter / roster / 카테고리 4 / model tier Sonnet 무변경 — 본문 측정 단락만 갱신). bump 0.27.0 → 0.28.0 (codeforge-design, RefactorAgent 측정 grounding) + 6.27.0 → 6.28.0 (wrapper root codeforge, scripts/templates/workflow/registry 신규 consumer-facing surface) MINOR (ADR-037). marketplace version sync (ADR-063). ratchet 강화 방향 (declarative → mechanical 측정 = enforcement scope 확장, ADR-058 §결정 5 정합) → sunset_justification 불요."
- file: archive/adr/ADR-042-agent-model-selection-policy.md
  word: 별
  content: summary: "CFP-2432 — Story-shape 조건부 model tier (stakes-gated static-per-context tier). low-stakes Story shape(실자금 없음 ∧ production cutover 없음 ∧ 신규 신뢰경계 없음 ∧ live 외부 API 호출 없음 — 4-AND) 에서 InfraOperationalArchitectAgent 를 opus→sonnet spawn-time override, high-stakes shape 는 opus 유지. §결정 2 invariant 충돌 해소 = stakes 를 mandate-orthogonal 축으로 codify (tier = f(mandate depth, stakes)). opus 기준 (c)high-stakes domain / (d)safety boundary / (e)real-funds 는 stakes-conditional 근거 — Story 가 그 stakes 를 carry 할 때만 발화. 선례 = LiveOps/LiveOrdering CONDITIONAL spawn 동형 논리(deputy 의 opus depth 가 stakes 있을 때만 필요)를 permanent agent tier 선택으로 일반화. §결정 1(d) 비대칭 — safety boundary owner 4종 중 InfraOpArch 만 1급 flip 후보: §7.4.1 DR / §7.4.2 cancel-on-disconnect / §7.4.3 clock sync / §7.4.4 rate limit mandate 발현 trigger(외부 stream/endpoint/time-window 프로토콜/외부 API weight)가 live 연결 부재 shape 에서 물리적 dormant(InfraOpArch self-assessment verify). §7.4.5 env isolation / §7.4.6 container 는 잔존(secret hygiene / Docker-first 표준 설정 = sonnet single-mandate advocacy 깊이로 cover) → shape별 mandate 표면 재정의 동반 의무(순수 model 치환 = §결정 2 위반). SecurityArch=ADR-117 surgical set + 보안경계 low-stakes 상존 제외; DataArch(데이터 무결성 상존)·TestContractArch(§8 perf baseline 상존)=본 Story scope 외(별도 판정). DomainAgent=v1 제외(financial-correctness invariant 가 백테스트에도 상존 — lookahead/survivorship/fee — flip 시 sonnet 으로 새는 risk, F3 catalog) → follow-up CFP. 4번째 AND 조건 'live 외부 API 호출 없음(read-only 시세 포함)' = InfraOpArch G3 false-negative 가드(데이터 수집이 live API 호출 시 §7.4.4 재발현, RequirementsReview F4 live API read-only 경계 동시 해소). 메커니즘 신설 0 — frontmatter model:opus 보수 default(override 누락=opus fail-safe) + Orchestrator low-stakes shape 에서만 opts.model:sonnet fresh spawn(SendMessage resume 금지, ADR-057 §결정 4 선례). consumer overlay = 보수 방향(opus 강제)만, down-tier(opus→sonnet) 공격적 override 불가 — schema-gate + spawn-time clamp(max(wrapper_floor, overlay)) 2중 enforcement(ADR-127 §결정 6 확장-only 정합, SecurityArch consult). F1(P1) evidence-gate: tier-flip = provisional, sonnet 산출물 품질 ≥ opus baseline 측정 protocol(Codex 독립 review baseline 선례 = ADR-057 §결정 3 / ADR-042 Amd4 — F1 의 'ADR-057 Amd4' 는 mislabel, Amd4 = 버전핀→별칭) + 미달 시 opus 복원 trigger(누락≥1 OR P0/P1 finding OR tolerance 미달). D4 부수 정정 = ChangeImpactAgent model:sonnet 비준(파일 이미 sonnet, 정책 opus 와 drift) — ADR-042 Amd5 / ADR-057 §결정 3 의 opus 확정(사용자 verbatim 'changeimpact는 내가 보기에 opus가 괜찮아보인다')을 2026-06-27 사용자 directive('sonnet 범위 확장')로 명시 reversal(silent 금지). tier-flip(opus→sonnet)=ratchet 약화 방향 → sunset_justification(evidence) 의무(ADR-058 §결정 5 / ADR-064 §결정 7 is_transitional:false governance 약화 evidence-gate). 본 Phase 1 = ADR-042 Amd16 + change-plan + Story §7; Phase 2 = InfraOperationalArchitectAgent.md frontmatter 주석 + project.yaml story_stakes schema + gating 배선 + ChangeImpactAgent.md 정합 + plugin bump + marketplace sync."
