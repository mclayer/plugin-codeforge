  content: **판별 기준**: Agent tool result 에 / 포함 시 model-unavailable 로 분류. rate-limit ( / / ) 와 disjoint — fable spawn 이 rate-limit 에러를 반환하면 model-unavailable 이 아니라 rate-limit 경로(§결정 2 동형 mechanism, fresh-spawn-only 동일 적용)로 처리하되 §14 태그는 trigger 별 구분. 외부 모범(Anthropic API errors)상 model-unavailable = 403 permission / 404 not_found (permanent class — 재시도 무의미, 다른 모델 전환이 정답), rate-limit = 429 (transient) [source: https://platform.claude.com/docs/claude/reference/errors]. agent spawn 층이 raw HTTP status 아닌 메시지 문자열만 노출할 수 있어 string-match 불가피할 수 있음.
