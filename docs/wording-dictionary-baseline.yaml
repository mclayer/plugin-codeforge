  content: | 133 | CFP-2489 | active | 2026-06-30 KST (ArchitectAgent direct write per ADR-070 / CFP-578 chief author precedent — ADR-RESERVATION atomic claim 프로토콜 SSOT carrier, Epic CFP-2481 (Epic 병렬 실행 정형화) Phase A E3a. (CFP-708 retro §6 + CFP-709 retro §6 합산 escalation lineage, pattern_count 2 threshold reach). 8 결정: §결정1 메커니즘 정명 = OCC (공유 메모리 아닌 공유 리소스 → 하드웨어 CAS 직접 적용 불가, CAS = OCC 단일-셀 특수형 비유) + §결정2 실현 채널 hard-commit = GitHub Contents API PUT →409 retry (load-bearing 분기 — Refs API PATCH 는 expected-old-SHA CAS-equality precondition 부재(force boolean only, fast-forward 거부 422 만, branch HEAD 단위라 단일 카운터값 직렬화 미실현), Contents API 가 REST-only 유일 단일-셀 OCC. 신규 알고리즘 발명 금지 — Pattern A( + 작동 참조구현 ) binding, RefactorAgent reusability 축) + §결정3 2-channel 분리 (claim 채널 long-lived branch Contents API OCC ↔ audit 채널 PR merge + ADR 파일. ADR-070 chief author inline append 정합 보존 — claim=점유 직렬화 / append=기록 책무 분리) + §결정4 claim↔commit 상태 전이 (unclaimed→claimed/reserved→committed/active + 409 reject 재시도 + abandon reserved 잔류, 자동 회수 = E3b) + §결정5 ABA 내성 = append-only 단조성 불변식 (blob SHA 자체는 ABA 미차단(값-동등성), 내성은 번호 단조증가 append-only 에서 옴. claim state 별도 파일 분리 시 독립 단조 version 불변식 필수) + §결정6 구현 경계 (본 ADR=설계만, E3b=claim primitive script + race-guard 게이트 mutation-RED + stale-path dead-gate 정정 + stale slot 자동 회수) + §결정7 권장 1안(mechanical OCC 2-channel) vs 대안 1안(convention 강화 + 사후 게이트 blocking 승격) trade-off 기록 (#724 escalate_user 대응 — 비가역 충돌 시에만 escalate, claim/append 책무 분리로 ADR-070 inline append 보존하므로 비가역 미발생) + §결정8 3-layer disjoint (ADR-050 PR-level post-hoc / ADR-085 session-level pre-hoc / ADR-133 artifact-slot-level pre-hoc — ADR-050 §결정1·3 약화 금지 1차 방어 layer 추가 ratchet) + ADR-082 Amd17 sub-scope 1-G(amendment_id slot pre-claim 4-tuple) 의 adr_number slot 일반화 (중복 신설 아님 — 기존 primitive 확장. ADR-082 Amd17 Wave 2 mechanical wire = 실파일 부재 동형 미완 layer, ADR-133 OCC 가 adr_number 축에서 실현. EC-4 amendment_id slot race 도 동일 primitive 커버). is_transitional: false 영구 강화 ratchet (ADR-050 위 사전 차단 layer 추가, 약화 surface 0 — ADR-058 §결정5 sunset_justification 비대상). mechanical_enforcement_actions: [] Phase 1 declaration-only (검사 스크립트·required check 0 신설 — E3b carrier, 회귀 0; pattern_count ≥ 2 재발 시 후속 CFP MUST promote to mechanical lint per ADR-082 §결정6). E3a 코드변경 0 (ADR 문서 + 본 row append). contract/registry version bump 0 + marketplace_sync_required: false (kind:contract/kind:registry frontmatter 미수정). collision check: git ls-tree origin/main archive/adr/ numeric max = ADR-132 (file 존재, CFP-2469 #2485 MERGED) → registry table tail row = 131 (CFP-2419) BUT row 132 LAPSED (file 존재·registry row 미기재 = rows 114/116-119/122-125/128 동형 lapse gap, append 누락 구조적 빈발 — 본 ADR evidence carrier #3) → 133 free (verified-via worktree base 4b4c05d9 numeric max=132 + ADR-133/134 부재 firsthand + commit 직전 재verify). E1 (CFP-2488) = ADR-134 별 slot disjoint. status 미경유 직접 (row 120/121/126/127/129/130/131 ArchitectAgent/ArchitectPLAgent chief author precedent 정합). ADR file = . parent_epic CFP-2481.) |
