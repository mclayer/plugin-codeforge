# lane-self-write-ownership-matrix.yaml
# Per-section owner-agent mapping SSOT — machine-readable
# Carrier: CFP-722 §13.A (2026-05-16)
# Human-readable mirror: lane-self-write-ownership-matrix.md (same dir)
# Drift-sync: yaml ↔ SKILL.md (skills/lane-self-write-boundary/SKILL.md) ↔ story-page-structure.md headings ↔ lint regex
# Follow-up 3-way sync-check: Change Plan §13.B (separate CFP)
#
# owner_agents: canonical agent/lane identifiers
#   requirements   = RequirementsPL (codeforge-requirements)
#   design         = ArchitectAgent / DesignLane (codeforge-design)
#   develop        = DeveloperPL (codeforge-develop)
#   pmo            = PMOAgent (codeforge-pmo)
#   review         = ReviewPL (codeforge-review)
#   orchestrator   = Orchestrator (top-level Claude session) — monopoly
#
# monopoly: true = Orchestrator-only write (CFP-32 / ADR-031)
# excluded: true = handled by different lint (cross-ref only, no duplicate codification)
#
# lint_invariant:
#   INV-DI-1: lane-owned section — semantic-normalize + token-level deletion by non-owner = violation
#   INV-DI-2: monopoly section — ANY base-row mutation without Orchestrator/delegate attribution = violation
#   EXCLUDED: handled by story-section-1-immutable.yml, cross-ref only

---
schema_version: "1.0"
introduced_by: CFP-722
date: 2026-05-16
ssot_skill: skills/lane-self-write-boundary/SKILL.md
lint_script: scripts/lib/check_story_section_ownership.py
lint_workflow: templates/github-workflows/story-section-ownership-check.yml

sections:
  - section: "1"
    heading: "개요"
    owner_agents: []
    monopoly: false
    excluded: true
    excluded_reason: "story-section-1-immutable.yml 영역 — 중복 codification 금지 (cross-ref only)"
    lint_invariant: EXCLUDED

  - section: "2"
    heading: "도메인 컨텍스트"
    owner_agents: ["requirements"]
    monopoly: false
    excluded: false
    lint_invariant: INV-DI-1

  - section: "3"
    heading: "ADR 결정 매트릭스"
    owner_agents: ["design"]
    monopoly: false
    excluded: false
    lint_invariant: INV-DI-1
    # CFP-1086 Story-5 (W3 S5) — deputy sub-ownership column (P6 carrier)
    # ADR-042 Amendment 8 + ADR-086 (7+3+1 roster) + ADR-068 Amendment 2 (chief tie-break ladder)
    # ownership_kind enum: primary (single-axis owner) / co-author (cross-layer joint) / contributor (advisory)
    # 4-way RACI matrix host = skills/deputy-mandate/SKILL.md (canonical mapping)
    deputy_sub_ownership:
      - sub_section: "3 도메인 모델 / aggregate invariant (RDB OLTP)"
        deputy: AggregateArchitectAgent
        ownership_kind: primary
        applicability_field: "aggregate_arch.applicable"
        cross_ref: "ADR-042 Amendment 8 §Roster (AggregateArch 신설, Sonnet single-mandate)"
      - sub_section: "3 데이터 / 빅데이터 OLAP (Parquet / DuckDB / streaming)"
        deputy: DataArchitectAgent
        ownership_kind: primary
        cross_ref: "ADR-042 Amendment 8 §Roster (DataArch mandate 축소 — RDB OLTP 영역 제거)"
      - sub_section: "3 데이터 ↔ RDB OLTP cross-layer (ELT/ETL/CDC)"
        deputy: [AggregateArchitectAgent, DataArchitectAgent]
        ownership_kind: co-author
        cross_ref: "ADR-042 Amendment 8 §3 cross-layer ELT/ETL/CDC"
      - sub_section: "3 module boundary / dependency direction / layered/hexagonal/clean"
        deputy: ModuleArchitectAgent
        ownership_kind: primary
        cross_ref: "ADR-042 Amendment 8 §Roster (CodeArch rename → ModuleArch, axis 정정)"
      - sub_section: "3 API contract (REST/GraphQL/gRPC/WebSocket + DTO + OpenAPI/GraphQL schema)"
        deputy: APIContractArchitectAgent
        ownership_kind: primary
        cross_ref: "ADR-042 Amendment 8 §Roster (APIContractArch 신설, Sonnet, body 심화 S2)"

  - section: "4"
    heading: "요구사항 분석"
    owner_agents: ["requirements"]
    monopoly: false
    excluded: false
    lint_invariant: INV-DI-1
    notes: "§4.0, §4.1, §4.2, §4.3 sub-sections 포함"

  - section: "5"
    heading: "요구사항 확장 해석"
    owner_agents: ["requirements"]
    monopoly: false
    excluded: false
    lint_invariant: INV-DI-1

  - section: "6"
    heading: "외부 지식"
    owner_agents: ["requirements"]
    monopoly: false
    excluded: false
    lint_invariant: INV-DI-1

  - section: "7"
    heading: "설계 서사"
    owner_agents: ["design"]
    monopoly: false
    excluded: false
    lint_invariant: INV-DI-1
    # CFP-1086 Story-5 (W3 S5) — deputy sub-ownership column (P6 carrier)
    # ADR-014 (OperationalRisk SSOT distribution) + ADR-042 Amendment 8 cross-ref
    deputy_sub_ownership:
      - sub_section: "7.1~7.3 보안 architecture (threat model / authn-authz / crypto)"
        deputy: SecurityArchitectAgent
        ownership_kind: primary
        cross_ref: "ADR-014 §7 SecurityArch primary mandate"
      - sub_section: "7.4 운영 리스크 (DR / rate limit / env / clock / container)"
        deputy: InfraOperationalArchitectAgent
        ownership_kind: primary
        cross_ref: "ADR-014 §7.4 OperationalRiskArch rename → InfraOperationalArch (ADR-042 Amd 7)"
      - sub_section: "7.5~7.6 보안 architecture (data classification / incident response)"
        deputy: SecurityArchitectAgent
        ownership_kind: primary
        cross_ref: "ADR-014 §7 SecurityArch primary mandate"

  - section: "8"
    heading: "개발 서사"
    owner_agents: ["develop"]
    monopoly: false
    excluded: false
    lint_invariant: INV-DI-1

  - section: "8.5"
    heading: "Impl Manifest"
    owner_agents: ["develop"]
    monopoly: false
    excluded: false
    lint_invariant: INV-DI-1

  - section: "9"
    heading: "리뷰 결과"
    owner_agents: ["review", "design", "develop", "requirements"]
    monopoly: false
    excluded: false
    lint_invariant: INV-DI-1
    notes: |
      §9.1/§9.2/§9.3/§9.4 sub-sections 각 lane PL 이 작성 (review-verdict-v4 packet).
      final §9 verdict append = Orchestrator (CFP-134/ADR-035 정정 후).
      본 lint 는 §9 writer가 §9를 수정하는 경우 INV-DI-1 적용 (다른 lane이 §9 수정하는 경우).

  - section: "10"
    heading: "FIX Ledger"
    owner_agents: ["orchestrator"]
    monopoly: true
    excluded: false
    lint_invariant: INV-DI-2
    ssot_references:
      - "fix-event-v1 contract (CFP-32 monopoly)"
      - "docs/inter-plugin-contracts/fix-event-v1.md"

  - section: "10.5"
    heading: "GitOps"
    owner_agents: ["orchestrator"]
    monopoly: true
    excluded: false
    lint_invariant: INV-DI-2
    ssot_references:
      - "GitOpsAgent Orchestrator-delegate (ADR-031 Amendment 1)"

  - section: "11"
    heading: "PMO"
    owner_agents: ["design", "pmo"]
    monopoly: false
    excluded: false
    lint_invariant: INV-DI-1
    notes: |
      ArchitectAgent writes §11 Change Plan context (design lane).
      PMOAgent writes §11 retro/sprint-review (pmo lane).
    # CFP-1086 Story-5 (W3 S5) — deputy sub-ownership column (P6 carrier)
    # ADR-042 Amendment 8 (Aggregate/Data split) + ADR-72 (ProductionEvidence CONDITIONAL)
    deputy_sub_ownership:
      - sub_section: "11 RDB OLTP migration (schema rollback / aggregate invariant 보존)"
        deputy: AggregateArchitectAgent
        ownership_kind: primary
        applicability_field: "aggregate_arch.applicable"
        cross_ref: "ADR-042 Amendment 8 §Roster + consumer-guide §1l"
      - sub_section: "11 빅데이터 OLAP migration (Parquet schema / streaming backfill / 시계열 백필)"
        deputy: DataArchitectAgent
        ownership_kind: primary
        cross_ref: "ADR-042 Amendment 8 §Roster (DataArch OLAP-only)"
      - sub_section: "11 production cutover evidence (Live touching / production touching Story)"
        deputy: ProductionEvidenceDeputyAgent
        ownership_kind: conditional
        trigger: "Live touching Story OR production cutover Story (ADR-72)"
        cross_ref: "ADR-72 §결정 1 + ADR-042 Amendment 7 CONDITIONAL spawn"

  - section: "12"
    heading: "회고 / Retro"
    owner_agents: ["pmo"]
    monopoly: false
    excluded: false
    lint_invariant: INV-DI-1

  - section: "13"
    heading: "ArchitectPL Verdict"
    owner_agents: ["orchestrator"]
    monopoly: true
    excluded: false
    lint_invariant: INV-DI-2
    ssot_references:
      - "ArchitectPLAgent verdict packet (review-verdict-v4)"
      - "Issue #722 (b) monopoly classification"

  - section: "14"
    heading: "Lane Evidence"
    owner_agents: ["orchestrator"]
    monopoly: true
    excluded: false
    lint_invariant: INV-DI-2
    ssot_references:
      - "ADR-031 §결정 1 + Amendment 1 (delegate subagent PASS)"
      - "docs/adr/ADR-031-lane-spawn-evidence-mandate.md"

delegate_subagent_rule:
  description: |
    Orchestrator-owned delegate subagent (ADR-031 Amendment 1 / fix-event-v1 Amendment, CFP-275)
    이 monopoly section 을 수정하는 경우 = PASS attribution (Orchestrator identity 귀속).
    Attribution 판정 = branch proxy (cfp-NNN flat = Orchestrator pattern) + phase:* label.
    Lane plugin spawn ≠ Orchestrator-owned delegate spawn 분기 = §7.3 proxy attribution SSOT.
  orchestrator_branch_pattern: "^cfp-\\d+$"  # flat branch (no /lane suffix) = Orchestrator pattern
  lane_plugin_branch_pattern: "cfp-\\d+/<lane>"  # hierarchical = lane plugin pattern
  fail_open_on_ambiguous: true  # ambiguous attribution → violation still reported (content-diff basis)

# ─── CFP-841 Phase 2 — cross_plugin_doc_ownership sub-tree (append-only, sections 1-12 무접촉) ───
# §13.B 4-way drift-sync invariant SSOT (Change Plan §3.2):
#   yaml cross_plugin_doc_ownership (canonical) ↔ SKILL.md owner path 표 ↔ story-page-structure.md ↔ lint regex
#   yaml-as-canonical single-direction: 나머지 3 = derived mirror, mismatch = flag
# INV-DI semantic 보존 — 기존 sections: 1-12 sub-tree 와 disjoint
# cross_ref_ssot: CODEOWNERS (docs/adr/** = architect team review) + ADR-013 behavioral scope-out

cross_plugin_doc_ownership:
  schema_version: "1.0"
  introduced_by: CFP-841
  date: 2026-05-17
  description: |
    doc_type x owner_plugin cross-plugin ownership registry.
    ChangeImpactAgent Phase 0 mapping artifact 의 wrapper-local 단정 line 이
    [ownership-verified: <yaml-query-path>] annotation 보유 여부 검출 시 참조 SSOT.
    §13.B 4-way drift-sync invariant: yaml=canonical, SKILL.md+story-page-structure.md+lint-regex=derived.
  entries:
    - doc_type: adr
      paths:
        - "docs/adr/ADR-*.md"
      owner_plugin: codeforge-design
      owner_agent: ArchitectAgent
      write_authority: owner_agent_direct
      cross_ref_ssot:
        - "CODEOWNERS docs/adr/** => @mclayer/architects"
        - "ADR-013 §결정 3 behavioral scope-out (dogfood-out policy)"
        - "docs/adr/ADR-026-story-scoped-phase-policy.md §3 owner path"
      notes: "ADR = codeforge-design lane ArchitectAgent direct write (CFP-26 Phase 0a). wrapper-canonical."

    - doc_type: change_plan
      paths:
        - "docs/change-plans/*.md"
      owner_plugin: codeforge-design
      owner_agent: ArchitectAgent
      write_authority: owner_agent_direct
      cross_ref_ssot:
        - "CODEOWNERS docs/change-plans/** => @mclayer/architects"
        - "ADR-013 §결정 3 behavioral scope-out"
        - "skills/lane-self-write-boundary/SKILL.md L18 (codeforge-design row)"
      notes: "Change Plan = ArchitectAgent direct write. wrapper-canonical."

    - doc_type: retro
      paths:
        - "docs/retros/*.md"
      owner_plugin: codeforge-pmo
      owner_agent: PMOAgent
      write_authority: owner_agent_direct
      cross_ref_ssot:
        - "ADR-013 §결정 3 behavioral scope-out"
        - "skills/lane-self-write-boundary/SKILL.md L22 (codeforge-pmo row)"
      notes: "Retro = PMOAgent direct write. wrapper-canonical."

    - doc_type: domain_knowledge
      paths:
        - "docs/domain-knowledge/**/*.md"
        - "docs/domain-knowledge/**/*.yaml"
      owner_plugin: codeforge-design
      owner_agent: ArchitectAgent
      write_authority: owner_agent_direct
      cross_ref_ssot:
        - "ADR-013 §결정 3 behavioral scope-out"
        - "docs/doc-locations.yaml domain_knowledge entry"
      notes: "Domain knowledge = ArchitectAgent direct write. wrapper-canonical."

    - doc_type: spec
      paths:
        - "docs/specs/*.md"
        - "docs/specs/**/*.md"
      owner_plugin: codeforge-requirements
      owner_agent: RequirementsPLAgent
      write_authority: owner_agent_direct
      cross_ref_ssot:
        - "ADR-013 §결정 3 behavioral scope-out"
        - "docs/doc-locations.yaml spec entry"
      notes: "Spec = RequirementsPLAgent direct write (Stage 0 brainstorm artifact)."

    - doc_type: plan
      paths:
        - "docs/plans/*.md"
        - "docs/plans/**/*.md"
      owner_plugin: codeforge-design
      owner_agent: ArchitectAgent
      write_authority: owner_agent_direct
      cross_ref_ssot:
        - "ADR-013 §결정 3 behavioral scope-out"
        - "docs/doc-locations.yaml plan entry"
      notes: "Plan = ArchitectAgent direct write (implementation plan artifact)."

bootstrap_exempt_rule:
  description: |
    Carrier-Story self-app exemption (ADR-062 §결정 1 / EC-4 §7.6).
    Story frontmatter 에 bootstrap_exempt_protocols 목록 중
    "policy:lane-self-write-boundary-mechanical" 포함 AND carrier_story == own story key 시
    모든 ownership check BYPASS (first short-circuit).
  exempt_protocol_id: "policy:lane-self-write-boundary-mechanical"
  audit: "::notice:: carrier-exempt audit" (매 exemption 적용 시)
