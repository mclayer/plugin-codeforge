# lane-self-write-ownership-matrix.yaml
# Per-section owner-agent mapping SSOT — machine-readable
# Carrier: CFP-722 §13.A (2026-05-16)
# Human-readable mirror: lane-self-write-ownership-matrix.md (same dir)
# Drift-sync: yaml ↔ SKILL.md (skills/lane-self-write-boundary/SKILL.md) ↔ story-page-structure.md headings ↔ lint regex
# Follow-up 3-way sync-check: Change Plan §13.B (separate CFP)
#
# owner_agents: canonical agent/lane identifiers
#   requirements   = RequirementsPL (codeforge-requirements)
#   design         = ArchitectAgent / DesignLane (codeforge-design)
#   develop        = DeveloperPL (codeforge-develop)
#   pmo            = PMOAgent (codeforge-pmo)
#   review         = ReviewPL (codeforge-review)
#   orchestrator   = Orchestrator (top-level Claude session) — monopoly
#
# monopoly: true = Orchestrator-only write (CFP-32 / ADR-031)
# excluded: true = handled by different lint (cross-ref only, no duplicate codification)
#
# lint_invariant:
#   INV-DI-1: lane-owned section — semantic-normalize + token-level deletion by non-owner = violation
#   INV-DI-2: monopoly section — ANY base-row mutation without Orchestrator/delegate attribution = violation
#   EXCLUDED: handled by story-section-1-immutable.yml, cross-ref only

---
schema_version: "1.0"
introduced_by: CFP-722
date: 2026-05-16
ssot_skill: skills/lane-self-write-boundary/SKILL.md
