# CodeForge 플러그인 자체의 dev를 위한 GitHub 좌표.
# Dog-food: 플러그인이 스스로를 consumer로 쓰는 상황 (CFP-1 self-application 정책 적용).
# Schema: docs/project-config-schema.md

project:
  name: codeforge

github:
  org: mclayer
  repo: plugin-codeforge
  default_branch: main

  pr_title_prefix_template: "[{key}] {title}"
  # CFP = CodeForge Plugin. CFP-1 (CLAUDE.md "Plugin 자체 적용" 섹션) 결정.
  story_key_prefix: CFP

  codeowners:
    # 1인 maintainer 환경 — mclayer org에 team 부재. 직접 username 매핑.
    # 향후 collaborator 추가 시 team으로 격상 가능.
    architect_team: "@mccho8865"
    domain_expert_team: "@mccho8865"

  discussions:
    domain_kb_category: "Domain Q&A"

  milestone:
    epic_naming_pattern: "Epic-{key}-{slug}"

labels:
  # Plugin 자체 components — Story Issue Form에서 선택지로 노출.
  components:
    - agents       # agents/**.md
    - docs         # docs/** (ADR, change-plans, stories, domain-knowledge, guides)
    - templates    # templates/** (SSOT 템플릿)
    - workflows    # .github/workflows/**, templates/github-workflows/**
    - presets      # presets/** (consumer 시작점)
    - core         # CLAUDE.md, .claude/_overlay 등 plugin 핵심 정책
    - infra        # .github/ISSUE_TEMPLATE, CODEOWNERS, PR template


# CFP-1146 W5-S16 — Atlassian suite 재결합 (Epic-A, ADR-100 §결정 3 + ADR-103 sync mechanism)
# wrapper dogfood — A-2 SoR-docs Confluence authoritative (space CFP / cloudId 0729a627-…)
# secret: api_token / user_email 은 env-indirect (literal 0, GitHub Actions secret 또는 .env)
atlassian:
  enabled: true
  confluence:
    base_url: "https://mclayer.atlassian.net/wiki"
    space_key: "CFP"
    api_token_env: "ATLASSIAN_API_TOKEN"
    user_email_env: "ATLASSIAN_USER_EMAIL"
  # jira 결정 채널 (CFP-2285 — Orchestrator↔사용자 평문 결정 루프)
  # ADR-100 §결정 3 jira block schema 의 실 wire (W4+ defer 를 S1~S2 로 앞당김).
  # ADR-099 Amendment 1: addCommentToJiraIssue 1종 narrow-allow (§A1-1) + payload deny-scan (§A1-2)
  #   + first-valid-immutable/short-window (§A1-3) + wrapper-side audit SSOT (§A1-4).
  # control project = 비공개·단일 사용자 결정 채널 전용 (wrapper dogfood).
  # secret 없음 — cloud_id/key 는 비밀 아님. notify = Jira 네이티브(PushNotification 의존 회피).
  # CFP-2285 S4 (#2290): 타임아웃 재알림(escalation) 스케줄. ADR-099 §A1-3 short-window 확장.
  jira:
    decision_channel:
      cloud_id: "0729a627-5f0e-4e17-b8d1-0365ba887d41"
      control_project_key: "KAN"
      issue_type: "작업"
      notify: "assignee"   # assignee | watcher — Jira native 알림
      # ---- CFP-2294 활성 (판단 기반 라우팅) ----
      enabled: true
      control_issue_key: "KAN-2"   # operator 생성 control 결정 이슈(사용자 assignee). 결정 질문을 이 이슈에 코멘트 post.
      # ---- S4 타임아웃 재알림 (자동결정 금지) ----
      # timeout_minutes = 이 시간(분) 미응답 시 재알림(escalation) 시작 임계. 기본 1440 = 24h.
      timeout_minutes: 1440
      # escalation.intervals_minutes = 재알림 점증 스케줄(분). 초반 자주→이후 드물게 ping.
      #   소진 후 마지막 interval 유지(무한 ping). SKILL.md §11 참조.
      escalation:
        intervals_minutes: [60, 240, 1440]
      # auto_decide_on_timeout = 사용자 확정 결정(박제): timeout 도달해도 **자동 결정 절대 금지**.
      #   timeout = 재알림 trigger 일 뿐, 결정은 끝까지 사용자 몫. SKILL.md §11 / #2290 설계 근거.
      auto_decide_on_timeout: false
    # CFP-2285 S5 (#2291) — Arc B: 세션·작업 모니터링 미러 (comment-only).
    # 사용 도구 = addCommentToJiraIssue 1종(ADR-099 §A1-1 준수). 이슈 생성(createJiraIssue)·
    #   status 전이(transitionJiraIssue)·issue-field write(editJiraIssue) = **전부 deny — 미사용**.
    # 방향 = Orchestrator → Jira 단방향(진행을 내보냄, 답 미수신). decision_channel(Arc A)
    #   의 poll/dedup/echo-guard/rehydrate/timeout/stale 은 **전부 비대상** — Arc B 가 import 안 함.
    #   공유는 sentinel(⟦cf-orch⟧)·deny-scan 2개뿐 → 같은 control project 안전(cross-echo 차단).
    # 입도 = ADR-038 6-point lane 전이(진입/PASS/FIX 검출/원인 판정/재진입/완료)는 코멘트 텍스트로,
    #   현재활동 1줄은 단일 코멘트 update 로(라이브 turn-단위 아님). skill = codeforge:jira-progress-mirror.
    progress_mirror:
      enabled: true           # CFP-2294 활성 (decision_channel 과 동일 control 이슈 공유)
      # project_key = 진행 미러 대상 control project. decision_channel.control_project_key 와
      #   같은 project 공유 가능(sentinel·echo-guard 정합으로 cross-echo 차단 — 안전).
      project_key: "KAN"
      cloud_id: "0729a627-5f0e-4e17-b8d1-0365ba887d41"   # decision_channel 과 공유
      # mirror_issue_key = 운영자가 **사전 생성**한 모니터링 이슈 1개의 key(Epic 당 또는 기존 이슈 재사용).
      #   skill 은 이슈를 만들지 않는다(createJiraIssue deny). 빈값/미지정 = no-op skip(warn 1회).
      #   SKILL.md §1 참조. 예: "KAN-123".
      mirror_issue_key: "KAN-2"
      # current_activity = "현재 무엇 하는중" 1줄 갱신 방식. pinned-comment-update = 단일 "현재활동"
      #   코멘트를 commentId 로 update(addCommentToJiraIssue 1종 — issue-field write 안 함). SKILL.md §3.
      current_activity: "pinned-comment-update"

# ── 인프라 자원 선언 manifest (CFP-2700 / ADR-157 §결정1, wrapper-self dogfood) ──
# wrapper 실 secret 9종(grep -rhoE "secrets\.[A-Z_]+" .github/workflows/ | sort -u = 9, verified)을
#   기계판독 manifest 로 선언 — 게이트가 자기 자신에게 먼저 작동(none 위장 anti-hollow dogfood).
# Schema SSOT: docs/project-config-schema.md `infra_resources` 섹션.
# infra_strategy (ADR-033) 와 직교 — 본 block 은 자원 내용, infra_strategy 는 적용 여부 스위치.
# G1 범위 = manifest 선언까지 (런타임 스캐너=G2 / startup validator=G3 / Confluence 2계열 라이브 수렴=G6).
#
# ★ FIX iter1(구현): execution_unit = 실 .github/workflows/*.yml 워크플로만(phantom 0, D3 스캐너 실 스캔 대상).
#   각 mode = 해당 워크플로 degrade 동작 firsthand 판정 (required=부재 시 실행불가 / optional_degradable=부재 시 degrade+exit0).
infra_resources:
  # ── plane A: 자원 카탈로그 (census 9종 → 9 논리 자원) ──
  resources:
    - id: anthropic-api
      canonical_env: ANTHROPIC_API_KEY          # Claude API 자격증명 (confluence-forward-sync 무인 CI 경로만 소비 = 1 워크플로)
    - id: cross-repo-pat
      canonical_env: CODEFORGE_CROSS_REPO_PAT   # cross-repo GitHub PAT (read-write 토큰, D3 는 read-only 로 사용 — ADR-157 §결정4/§결정8 정직)
    # Confluence 자격증명 — 2계열 alias 수렴 (DEC-3 / ADR-157 §결정5). G1 = 선언만, 라이브 수렴 정정 = G6.
    #   canonical = ATLASSIAN_API_TOKEN (선언면, atlassian.confluence.api_token_env)
    #   accepted alias = CONFLUENCE_API_TOKEN (소비면, confluence-forward-sync.yml:64 secrets.CONFLUENCE_API_TOKEN)
    #   canonical 이 ATLASSIAN 인 근거 = Atlassian-account-scoped blast-radius 정직 명명 (§결정5).
    - id: confluence-credential
      canonical_env: ATLASSIAN_API_TOKEN
      aliases:
        accepted: [CONFLUENCE_API_TOKEN]
    - id: confluence-base-url
      canonical_env: CONFLUENCE_BASE_URL
    - id: confluence-space
      canonical_env: CONFLUENCE_SPACE_ID
    - id: confluence-user-email
      canonical_env: CONFLUENCE_USER_EMAIL
    - id: docker-hub-token
      canonical_env: DOCKER_HUB_TOKEN
    - id: github-token
      canonical_env: GITHUB_TOKEN                # GitHub Actions 기본 주입 토큰 (항상 존재)
    - id: ssh-key-passphrase
      canonical_env: SSH_KEY_PASSPHRASE
  # ── plane B: 실행단위 → required 자원 (실 .github/workflows/*.yml 만, ID-only 참조) ──
  execution_units:
    # confluence-forward-sync.yml — git→Confluence 무인 fallback. continue-on-error:true(:38) +
    #   secret 하나라도 부재 시 dry-run(:14/:59; confluence_forward_sync.py secrets_present() → dry-run, exit 0).
    #   ∴ 5 자원 전부 optional_degradable (부재 = 부팅거부 아님, dry-run 으로 degrade).
    confluence-forward-sync:
      required: [anthropic-api, confluence-credential, confluence-base-url, confluence-space, confluence-user-email]
      resource_modes:
        anthropic-api: optional_degradable
        confluence-credential: optional_degradable
        confluence-base-url: optional_degradable
        confluence-space: optional_degradable
        confluence-user-email: optional_degradable
        anthropic-api_degraded_behavior: "secret 부재 시 dry-run (실 AI/Confluence 호출 0, exit 0; confluence-forward-sync.yml:38 continue-on-error)"
        confluence-credential_degraded_behavior: "secret 부재 시 dry-run (실 AI/Confluence 호출 0, exit 0)"
        confluence-base-url_degraded_behavior: "secret 부재 시 dry-run (실 AI/Confluence 호출 0, exit 0)"
        confluence-space_degraded_behavior: "secret 부재 시 dry-run (실 AI/Confluence 호출 0, exit 0)"
        confluence-user-email_degraded_behavior: "secret 부재 시 dry-run (실 AI/Confluence 호출 0, exit 0)"
    # auto-deploy.yml — Epic close→배포 signal (declarative seed, warning-tier). continue-on-error:true(:44) +
    #   mask step 이 `if [[ -n "${secret:-}" ]]` graceful(:53-58) → 부재 시 masking skip + signal-only 진행(실 배포 미수행).
    auto-deploy:
      required: [docker-hub-token, ssh-key-passphrase]
      resource_modes:
        docker-hub-token: optional_degradable
        ssh-key-passphrase: optional_degradable
        docker-hub-token_degraded_behavior: "부재 시 secret masking skip + signal-only 진행 (declarative seed, continue-on-error — 실 배포 미수행)"
        ssh-key-passphrase_degraded_behavior: "부재 시 secret masking skip + signal-only 진행 (declarative seed, continue-on-error — 실 배포 미수행)"
    # ac-traceability-matrix.yml — cross-repo AC 추적 (required check, continue-on-error 없음).
    #   cross-repo-pat 부재 = fail-closed(:64 "부재/degraded = FAIL"; :140 `if(!token){fail(...);return}`) → required.
    #   github-token = Actions 기본 주입(:68) 항상 존재 → required.
    ac-traceability-matrix:
      required: [cross-repo-pat, github-token]
      resource_modes:
        cross-repo-pat: required
        github-token: required
    # deferred-item-recovery.yml — cross-repo-pat 부재 시 graceful skip(:47-51 `if [ -z "${GH_TOKEN:-}" ]; ... exit 0`).
    #   ∴ 동일 cross-repo-pat 이 ac-traceability-matrix 서 required, 여기선 optional_degradable
    #   = AC-18 진성 same-resource cross-unit EDGE (wrapper reality 실보유 — firsthand, fabricate 아님).
    #   EDGE 의 런타임 falsification(부재-시-실동작 대조)은 D2 startup fixture = G3 carrier.
    deferred-item-recovery:
      required: [cross-repo-pat]
      resource_modes:
        cross-repo-pat: optional_degradable
        cross-repo-pat_degraded_behavior: "PAT 부재 시 exit 0 graceful skip (deferred-item-recovery.yml:47-51, retro-mandatory.yml 패턴 답습)"
