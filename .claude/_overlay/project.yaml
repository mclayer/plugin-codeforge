# CodeForge 플러그인 자체의 dev를 위한 GitHub 좌표.
# Dog-food: 플러그인이 스스로를 consumer로 쓰는 상황 (CFP-1 self-application 정책 적용).
# Schema: docs/project-config-schema.md

project:
  name: codeforge

github:
  org: mclayer
  repo: plugin-codeforge
  default_branch: main

  pr_title_prefix_template: "[{key}] {title}"
  # CFP = CodeForge Plugin. CFP-1 (CLAUDE.md "Plugin 자체 적용" 섹션) 결정.
  story_key_prefix: CFP

  codeowners:
    # 1인 maintainer 환경 — mclayer org에 team 부재. 직접 username 매핑.
    # 향후 collaborator 추가 시 team으로 격상 가능.
    architect_team: "@mccho8865"
    domain_expert_team: "@mccho8865"

  discussions:
    domain_kb_category: "Domain Q&A"

  milestone:
    epic_naming_pattern: "Epic-{key}-{slug}"

labels:
  # Plugin 자체 components — Story Issue Form에서 선택지로 노출.
  components:
    - agents       # agents/**.md
    - docs         # docs/** (ADR, change-plans, stories, domain-knowledge, guides)
    - templates    # templates/** (SSOT 템플릿)
    - workflows    # .github/workflows/**, templates/github-workflows/**
    - presets      # presets/** (consumer 시작점)
    - core         # CLAUDE.md, .claude/_overlay 등 plugin 핵심 정책
    - infra        # .github/ISSUE_TEMPLATE, CODEOWNERS, PR template


# CFP-1146 W5-S16 — Atlassian suite 재결합 (Epic-A, ADR-100 §결정 3 + ADR-103 sync mechanism)
# wrapper dogfood — A-2 SoR-docs Confluence authoritative (space CFP / cloudId 0729a627-…)
# secret: api_token / user_email 은 env-indirect (literal 0, GitHub Actions secret 또는 .env)
atlassian:
  enabled: true
  confluence:
    base_url: "https://mclayer.atlassian.net/wiki"
    space_key: "CFP"
    api_token_env: "ATLASSIAN_API_TOKEN"
    user_email_env: "ATLASSIAN_USER_EMAIL"
  # jira 결정 채널 (CFP-2285 — Orchestrator↔사용자 평문 결정 루프)
  # ADR-100 §결정 3 jira block schema 의 실 wire (W4+ defer 를 S1~S2 로 앞당김).
  # ADR-099 Amendment 1: addCommentToJiraIssue 1종 narrow-allow (§A1-1) + payload deny-scan (§A1-2)
  #   + first-valid-immutable/short-window (§A1-3) + wrapper-side audit SSOT (§A1-4).
  # control project = 비공개·단일 사용자 결정 채널 전용 (wrapper dogfood).
  # secret 없음 — cloud_id/key 는 비밀 아님. notify = Jira 네이티브(PushNotification 의존 회피).
  # CFP-2285 S4 (#2290): 타임아웃 재알림(escalation) 스케줄. ADR-099 §A1-3 short-window 확장.
  jira:
    decision_channel:
      cloud_id: "0729a627-5f0e-4e17-b8d1-0365ba887d41"
      control_project_key: "KAN"
      issue_type: "작업"
      notify: "assignee"   # assignee | watcher — Jira native 알림
      # ---- S4 타임아웃 재알림 (자동결정 금지) ----
      # timeout_minutes = 이 시간(분) 미응답 시 재알림(escalation) 시작 임계. 기본 1440 = 24h.
      timeout_minutes: 1440
      # escalation.intervals_minutes = 재알림 점증 스케줄(분). 초반 자주→이후 드물게 ping.
      #   소진 후 마지막 interval 유지(무한 ping). SKILL.md §11 참조.
      escalation:
        intervals_minutes: [60, 240, 1440]
      # auto_decide_on_timeout = 사용자 확정 결정(박제): timeout 도달해도 **자동 결정 절대 금지**.
      #   timeout = 재알림 trigger 일 뿐, 결정은 끝까지 사용자 몫. SKILL.md §11 / #2290 설계 근거.
      auto_decide_on_timeout: false
    # CFP-2285 S5 (#2291) — Arc B: 세션·작업 모니터링 미러 (comment-only).
    # 사용 도구 = addCommentToJiraIssue 1종(ADR-099 §A1-1 준수). 이슈 생성(createJiraIssue)·
    #   status 전이(transitionJiraIssue)·issue-field write(editJiraIssue) = **전부 deny — 미사용**.
    # 방향 = Orchestrator → Jira 단방향(진행을 내보냄, 답 미수신). decision_channel(Arc A)
    #   의 poll/dedup/echo-guard/rehydrate/timeout/stale 은 **전부 비대상** — Arc B 가 import 안 함.
    #   공유는 sentinel(⟦cf-orch⟧)·deny-scan 2개뿐 → 같은 control project 안전(cross-echo 차단).
    # 입도 = ADR-038 6-point lane 전이(진입/PASS/FIX 검출/원인 판정/재진입/완료)는 코멘트 텍스트로,
    #   현재활동 1줄은 단일 코멘트 update 로(라이브 turn-단위 아님). skill = codeforge:jira-progress-mirror.
    progress_mirror:
      enabled: false          # opt-in (기본 off — 비활성/미설정 = no-op skip)
      # project_key = 진행 미러 대상 control project. decision_channel.control_project_key 와
      #   같은 project 공유 가능(sentinel·echo-guard 정합으로 cross-echo 차단 — 안전).
      project_key: "KAN"
      cloud_id: "0729a627-5f0e-4e17-b8d1-0365ba887d41"   # decision_channel 과 공유
      # mirror_issue_key = 운영자가 **사전 생성**한 모니터링 이슈 1개의 key(Epic 당 또는 기존 이슈 재사용).
      #   skill 은 이슈를 만들지 않는다(createJiraIssue deny). 빈값/미지정 = no-op skip(warn 1회).
      #   SKILL.md §1 참조. 예: "KAN-123".
      mirror_issue_key: ""
      # current_activity = "현재 무엇 하는중" 1줄 갱신 방식. pinned-comment-update = 단일 "현재활동"
      #   코멘트를 commentId 로 update(addCommentToJiraIssue 1종 — issue-field write 안 함). SKILL.md §3.
      current_activity: "pinned-comment-update"
