# CodeForge 플러그인 자체의 dev를 위한 GitHub 좌표.
# Dog-food: 플러그인이 스스로를 consumer로 쓰는 상황.
# Schema: docs/project-config-schema.md

project:
  name: codeforge

github:
  org: mctrader
  repo: plugin-codeforge
  default_branch: main

  pr_title_prefix_template: "[{key}] {title}"
  story_key_prefix: PLG

  codeowners:
    architect_team: "@mctrader/architects"
    domain_expert_team: "@mctrader/domain-experts"

  discussions:
    domain_kb_category: "Domain Q&A"

  milestone:
    epic_naming_pattern: "Epic-{key}-{slug}"

labels:
  components:
    - codeforge  # 현 플러그인. 향후 다른 plugin도 component 라벨로 같은 repo 공유
