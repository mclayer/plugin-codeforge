project:
  name: "<REPLACE — e.g. logparser>"

github:
  org: "<REPLACE — e.g. acme>"
  repo: "<REPLACE — e.g. logparser>"
  default_branch: main

  pr_title_prefix_template: "[{key}] {title}"
  story_key_prefix: "<REPLACE — e.g. LP>"

  codeowners:
    architect_team: "<REPLACE — e.g. @acme/architects>"
    domain_expert_team: "<REPLACE — e.g. @acme/domain-experts>"

  discussions:
    domain_kb_category: "Domain Q&A"

  milestone:
    epic_naming_pattern: "Epic-{key}-{slug}"

labels:
  components:
    - cli       # 명령·인자 처리
    - parser    # 로그 파싱 엔진
    - filter    # Event 필터링
    - infra     # 패키징·릴리스

# CFP-128 / ADR-033 — cli-tool 은 Docker-first (distroless binary 시범 동봉)
# CLI binary 도 컨테이너로 배포 가능 (`docker run org/cli:tag --options`)
infra_strategy: docker_first
infra_strategy_extras:
  k8s_preset_enabled: false  # CLI binary 는 K8s preset 무관 (default false)
