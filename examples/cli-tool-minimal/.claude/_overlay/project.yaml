project:
  name: "<REPLACE — e.g. logparser>"

github:
  org: "<REPLACE — e.g. acme>"
  repo: "<REPLACE — e.g. logparser>"
  default_branch: main

  pr_title_prefix_template: "[{key}] {title}"
  story_key_prefix: "<REPLACE — e.g. LP>"

  codeowners:
    architect_team: "<REPLACE — e.g. @acme/architects>"
    domain_expert_team: "<REPLACE — e.g. @acme/domain-experts>"

  discussions:
    domain_kb_category: "Domain Q&A"

  milestone:
    epic_naming_pattern: "Epic-{key}-{slug}"

labels:
  components:
    - cli       # 명령·인자 처리
    - parser    # 로그 파싱 엔진
    - filter    # Event 필터링
    - infra     # 패키징·릴리스
