project:
  name: "<REPLACE — e.g. schema-guard>"

github:
  org: "<REPLACE — e.g. acme>"
  repo: "<REPLACE — e.g. schema-guard>"
  default_branch: main

  pr_title_prefix_template: "[{key}] {title}"
  story_key_prefix: "<REPLACE — e.g. SG>"

  codeowners:
    architect_team: "<REPLACE — e.g. @acme/architects>"
    domain_expert_team: "<REPLACE — e.g. @acme/domain-experts>"

  discussions:
    domain_kb_category: "Domain Q&A"

  milestone:
    epic_naming_pattern: "Epic-{key}-{slug}"

labels:
  components:
    - api       # 공개 API surface
    - core      # 내부 검증 엔진
    - infra     # 패키징·릴리스 자동화
    - docs      # docstring·API reference·예시
