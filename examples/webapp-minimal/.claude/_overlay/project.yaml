project:
  name: "<REPLACE — e.g. task-manager>"

github:
  org: "<REPLACE — e.g. acme>"
  repo: "<REPLACE — e.g. task-manager>"
  default_branch: main

  pr_title_prefix_template: "[{key}] {title}"
  story_key_prefix: "<REPLACE — e.g. TM>"

  codeowners:
    architect_team: "<REPLACE — e.g. @acme/architects>"
    domain_expert_team: "<REPLACE — e.g. @acme/domain-experts>"

  discussions:
    domain_kb_category: "Domain Q&A"

  milestone:
    epic_naming_pattern: "Epic-{key}-{slug}"

labels:
  components:
    - api      # 백엔드 라우트·비즈니스 로직
    - ui       # 템플릿·정적 자산
    - data     # DB·마이그레이션·스키마
    - infra    # 배포·설정·CI

# CFP-128 / ADR-033 — webapp 은 Docker-first (Dockerfile + compose 시범 동봉)
infra_strategy: docker_first
infra_strategy_extras:
  k8s_preset_enabled: false  # single-host docker compose 충분 (default)

# CFP-2700 / ADR-157 D5 — infra_resources 승격(populated 2-plane). compose.yml web.environment 참조면과 self-consistent.
infra_resources:
  resources:
    - id: app-db
      canonical_env: DATABASE_URL          # compose.yml web.environment.DATABASE_URL 과 self-consistent
    - id: app-cache
      canonical_env: REDIS_URL             # compose.yml web.environment.REDIS_URL 과 self-consistent
  execution_units:
    web:
      required:
        - app-db
        - app-cache
      resource_modes:
        app-db: required                   # 미설정 시 부팅 거부
        app-cache: optional_degradable     # 미설정 시 degrade + WARN (부팅 거부 아님)
        app-cache_degraded_behavior: "캐시 miss 시 DB 직조회 — 성능 저하만 (raw 조회 지속)"
